          //     ガラスのフチは覆わない＝黒く引き締まる。
          {
            // Retina対策: 液体バッファを端末ピクセル密度(最大2x)で生成し、
            // 論理サイズの矩形へ縮小合成する。低解像度の拡大ボケを解消する。
            const ss = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
            const lw = Math.max(1, Math.round(rect.w * ss));
            const lh = Math.max(1, Math.round(rect.h * ss));
            const liquid = renderLiquidBuffer(lw, lh, drops, opts.layerReveal, (flower && flower.seed) || 7, opts.surfaceTilt, opts.waveAmt, opts.waveTime, ss);
            const comp = sizeBuf(_bottleCompBuf, lw, lh);
            const cc = comp.getContext('2d');
            cc.setTransform(1, 0, 0, 1, 0, 0);
            cc.globalAlpha = 1;
            cc.globalCompositeOperation = 'source-over';
            cc.filter = 'none';
            cc.imageSmoothingEnabled = true;
            cc.imageSmoothingQuality = 'high';
            cc.clearRect(0, 0, comp.width, comp.height);
            cc.drawImage(liquid, 0, 0, comp.width, comp.height);
            cc.globalCompositeOperation = 'destination-in';
            // ガラスの肉厚を表現: マスクを左右・底へ内側に収縮させ、透明なガラスのフレームを残す。
            const insX = comp.width * 0.05;    // 左右の肉厚 ~5%
            const insBottom = comp.height * 0.045; // 底の肉厚 ~4.5%
            const mdx = insX, mdy = 0;
            const mdw = comp.width - insX * 2;
            const mdh = comp.height - insBottom;
            if (bottleMaskCanvas) {
              cc.drawImage(bottleMaskCanvas, 0, 0, bottleMaskCanvas.width, bottleMaskCanvas.height, mdx, mdy, mdw, mdh);
            } else {
              const cr0 = rect.crop;
              cc.drawImage(bottleImg, cr0.sx, cr0.sy, cr0.sw, cr0.sh, mdx, mdy, mdw, mdh);
            }
            cc.globalCompositeOperation = 'source-over';
            c.save();
            c.globalCompositeOperation = 'source-over';
            c.globalAlpha = 0.94;
            c.imageSmoothingEnabled = true;
            c.imageSmoothingQuality = 'high';
            c.drawImage(comp, rect.x, rect.y, rect.w, rect.h);
            c.restore();
          }

          // (C) ガラスのハイライト・屈折・縦の光を screen でインクの上に融合（発光する光沢）。
          //     screenが強いと色が白飛びするため控えめに（暗部は変化せずフチの黒は残る）。
          c.save();
          c.globalCompositeOperation = 'screen';
          c.globalAlpha = 0.34;
          c.filter = 'none';
          c.drawImage(bottleImg, cr.sx, cr.sy, cr.sw, cr.sh, rect.x, rect.y, rect.w, rect.h);
          c.restore();

          // (C2) overlay でガラスの明暗をインクへ焼き込み、ガラスと液体を一体化させる。
          //      光が通る中心のインクは一段と鮮やかに“ギラッ”と発色し、フチは深く引き締まる。
          c.save();
          c.globalCompositeOperation = 'overlay';
          c.globalAlpha = 0.4;
          c.filter = 'none';
          c.drawImage(bottleImg, cr.sx, cr.sy, cr.sw, cr.sh, rect.x, rect.y, rect.w, rect.h);
          c.restore();

          // (D) 最前面で暗い輪郭・影を multiply により引き締める（プラスチック感を消す）。
          c.save();
          c.globalCompositeOperation = 'multiply';
          c.globalAlpha = 0.55;
          c.filter = 'none';
          c.drawImage(bottleImg, cr.sx, cr.sy, cr.sw, cr.sh, rect.x, rect.y, rect.w, rect.h);
          c.restore();
          return rect;
        } catch (err) {
          // 何が起きても描画ループは止めない
          console.warn('drawGlassBottle error:', err);
        }
      }

      function traceLineArtPath(c, w, h, seed) {
        const rng = mulberry32((seed >>> 0) + 7919);
        c.beginPath();
        const pts = [];
        for (let i = 0; i <= 12; i++) {
          const t = i / 12;
          pts.push({
            x: w * (0.72 - t * 0.55 + Math.sin(t * 4 + rng() * 2) * 0.06),
            y: h * (0.12 + t * 0.78 + Math.cos(t * 3 + rng() * 2) * 0.04)
          });
        }
        c.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) {
          const p = pts[i], prev = pts[i - 1];
          c.quadraticCurveTo(
            (prev.x + p.x) / 2 + (rng() - 0.5) * w * 0.08,
            (prev.y + p.y) / 2 + (rng() - 0.5) * h * 0.04,
            p.x, p.y
          );
        }
        c.moveTo(w * 0.25, h * 0.2);
        c.bezierCurveTo(w * 0.45, h * 0.35, w * 0.55, h * 0.55, w * 0.35, h * 0.82);
        c.moveTo(w * 0.65, h * 0.15);
        c.bezierCurveTo(w * 0.8, h * 0.4, w * 0.7, h * 0.7, w * 0.5, h * 0.88);
      }

      function drawLineArt(c, w, h, seed, alpha) {
        c.save();
        traceLineArtPath(c, w, h, seed);
        c.strokeStyle = `rgba(28,32,38,${alpha == null ? 0.88 : alpha})`;
        c.lineWidth = Math.max(0.8, w * 0.006);
        c.lineCap = 'round';
        c.lineJoin = 'round';
        c.stroke();
        c.restore();
      }

      // 完成アート用オフスクリーンバッファ（マスク切り抜きの隔離）
      const _artBuf = document.createElement('canvas');
      const _artBandBuf = document.createElement('canvas');
      const _artMaskPadBuf = document.createElement('canvas');

      // マスクを寸分ズレなくスタンプ（膨張はしない＝外側ハミ出し防止）。
      // imageSmoothing を切って半透明フチの増殖を防ぐ。
      function stampTightMask(dest, mask, dx, dy, dw, dh) {
        dest.save();
        dest.globalCompositeOperation = 'source-over';
        dest.globalAlpha = 1;
        dest.filter = 'none';
        dest.imageSmoothingEnabled = false;
        dest.drawImage(mask, dx, dy, dw, dh);
        dest.restore();
      }

      // 線画シルエットの「実面積」を N 等分する境界フラクション(0..1)を返す。
      //   等高分割だと、幅の広い花頭が上の色を独占し、細い茎に下の色が潰れて詰め込まれる。
      //   → 各行の塗り面積(alpha総和)を積分し、面積が均等になる y 位置で色を切り替える。
      //   これでボトル同様に「全色が均等なボリューム」で薔薇の中に現れる。
      const _areaBuf = document.createElement('canvas');
      function computeAreaBandFracs(mask, rw, rh, N) {
        if (!mask || N < 2) return null;
        try {
          const sw = Math.max(1, Math.min(180, Math.round(rw)));
          const sh = Math.max(1, Math.min(360, Math.round(rh)));
          _areaBuf.width = sw; _areaBuf.height = sh;
          const a = _areaBuf.getContext('2d');
          a.setTransform(1, 0, 0, 1, 0, 0);
          a.clearRect(0, 0, sw, sh);
          a.drawImage(mask, 0, 0, sw, sh);
          const data = a.getImageData(0, 0, sw, sh).data;
          const rowArea = new Float64Array(sh);
          let total = 0;
          for (let y = 0; y < sh; y++) {
            let s = 0;
            for (let x = 0; x < sw; x++) s += data[(y * sw + x) * 4 + 3];
            rowArea[y] = s; total += s;
          }
          if (total <= 0) return null;
          const fr = [0];
          const target = total / N;
          let acc = 0, k = 1;
          for (let y = 0; y < sh && k < N; y++) {
            acc += rowArea[y];
            while (k < N && acc >= target * k) { fr.push((y + 0.5) / sh); k++; }
          }
          while (fr.length < N) fr.push(1);
          fr.push(1);
          // 単調増加を保証（浮動小数の揺れ対策）
          for (let i = 1; i < fr.length; i++) if (fr[i] < fr[i - 1]) fr[i] = fr[i - 1];
          return fr;
        } catch (e) { return null; }
      }

      // 明るいマット（台紙）: 白〜淡グレーのざらついたテクスチャ＋ヴィネット
      function drawArtMat(c, w, h) {
        c.save();
        c.globalCompositeOperation = 'source-over';
        c.globalAlpha = 1;
        c.filter = 'none';
        const g = c.createLinearGradient(0, 0, 0, h);
        g.addColorStop(0, '#f8f5ef');
        g.addColorStop(1, '#eceae2');
        c.fillStyle = g;
        c.fillRect(0, 0, w, h);
        if (fabricImg && fabricImg.naturalWidth > 0) {
          c.globalAlpha = 0.12;
          c.globalCompositeOperation = 'multiply';
          c.drawImage(fabricImg, 0, 0, w, h);
          c.globalAlpha = 1;
          c.globalCompositeOperation = 'source-over';
        }
        const vg = c.createRadialGradient(w * 0.5, h * 0.5, Math.min(w, h) * 0.3, w * 0.5, h * 0.5, Math.max(w, h) * 0.78);
        vg.addColorStop(0, 'rgba(0,0,0,0)');
        vg.addColorStop(1, 'rgba(58,52,44,0.12)');
        c.fillStyle = vg;
        c.fillRect(0, 0, w, h);
        c.restore();
      }

      // 7日分の色を「ボトル同様のうねる境界＋水彩のにじみ」で塗る（バッファへ）。
      // ★Blurはここで色帯にのみ適用。呼び出し側がこの後に必ず destination-in で切り抜くこと。
      function paintArtGradient(bx, w, h, drops, seed, gy0, gyH, bandFracs, artCfg) {
        const N = drops.length;
        const y0 = (gy0 == null) ? 0 : gy0;
        const yH = (gyH == null || gyH <= 0) ? h : gyH;
        const cfg = artCfg || ART_LINE_CONFIG_DEFAULT;
        const waveScale = Math.max(0.35, Math.min(1.4, cfg.waveScale == null ? 0.8 : cfg.waveScale));
        const inkOf = (drop) => saturateHex(bottleInkColor(drop.color, bottleDensity(drop)), 0.12);
        const fr = (bandFracs && bandFracs.length === N + 1)
          ? bandFracs
          : Array.from({ length: N + 1 }, (_, i) => i / N);

        const bandCv = sizeBuf(_artBandBuf, w, h);
        const bc = bandCv.getContext('2d');
        bc.setTransform(1, 0, 0, 1, 0, 0);
        bc.globalAlpha = 1;
        bc.globalCompositeOperation = 'source-over';
        bc.filter = 'none';
        bc.clearRect(0, 0, w, h);

        if (N === 1) {
          bc.fillStyle = rgbaFromHex(inkOf(drops[0]), 1);
          bc.fillRect(0, Math.floor(y0) - 1, w, Math.ceil(yH) + 2);
        } else {
          const unit = yH / N;
          const rngW = mulberry32((seed >>> 0) + 707);
          const bnd = [];
          for (let s = 0; s <= N; s++) {
            const baseY = y0 + fr[s] * yH;
            const isEdge = (s === 0 || s === N);
            bnd.push({
              baseY,
              amp: isEdge ? 0 : Math.min(unit * 0.42, 18) * (0.55 + rngW() * 0.45) * waveScale,
              freq: 0.55 + rngW() * 1.35,
              phase: rngW() * Math.PI * 2,
              amp2: isEdge ? 0 : Math.min(unit * 0.22, 10) * (0.4 + rngW() * 0.6) * waveScale,
              freq2: 1.5 + rngW() * 2.2,
              phase2: rngW() * Math.PI * 2,
              tiltPx: isEdge ? 0 : (rngW() * 2 - 1) * Math.min(unit * 0.32, 12) * waveScale,
              sag: isEdge ? 0 : Math.min(unit * 0.38, 14) * (0.45 + rngW() * 0.55) * waveScale
            });
          }
          const xL = -8, xR = w + 8;
          const step = Math.max(1, Math.round(w / 64));
          const bY = (s, x) => {
            const d = bnd[s];
            const u = Math.max(0, Math.min(1, x / w));
            return d.baseY
              + d.tiltPx * (u - 0.5)
              + d.sag * Math.sin(u * Math.PI)
              + d.amp * Math.sin(u * d.freq * Math.PI * 2 + d.phase)
              + d.amp2 * Math.sin(u * d.freq2 * Math.PI * 2 + d.phase2);
          };
          const overlap = Math.max(1.2, Math.min(3.5, unit * 0.07));
          for (let j = N - 1; j >= 0; j--) {
            const col = inkOf(drops[N - 1 - j]);
            const topS = j;
            const botS = j + 1;
            bc.beginPath();
            bc.moveTo(xL, bY(topS, xL) - overlap);
            for (let x = xL; x <= xR; x += step) bc.lineTo(x, bY(topS, x) - overlap);
            bc.lineTo(xR, bY(topS, xR) - overlap);
            bc.lineTo(xR, bY(botS, xR) + overlap);
            for (let x = xR; x >= xL; x -= step) bc.lineTo(x, bY(botS, x) + overlap);
            bc.closePath();
            bc.fillStyle = rgbaFromHex(col, 1);
            bc.fill();
          }
        }

        // 線画ごとの blurRadius で境界だけにじませる（マスク前のみ。上限を抑えてハロー予備軍を減らす）
        const feather = Math.max(1.2, Math.min(4.5, cfg.blurRadius != null ? cfg.blurRadius : 2.2));
        bx.save();
        bx.globalAlpha = 1;
        bx.globalCompositeOperation = 'source-over';
        bx.filter = 'none';
        drawBlurred(bx, bandCv, feather);
        bx.restore();

        const rng = mulberry32((seed >>> 0) + 555);
        bx.globalCompositeOperation = 'source-over';
        for (let i = 0; i < N; i++) {
          const drop = drops[i];
          const col = bottleInkColor(drop.color, bottleDensity(drop));
          const j = N === 1 ? 0 : (N - 1 - i);
          const ty = N === 1 ? 0.5 : (fr[j] + fr[j + 1]) / 2;
          const bandH = N === 1 ? yH : Math.max(4, (fr[j + 1] - fr[j]) * yH);
          const spots = 2 + (rng() > 0.5 ? 1 : 0);
          for (let s = 0; s < spots; s++) {
            const bx0 = w * 0.5 + (rng() - 0.5) * w * 0.42;
            const by0 = y0 + yH * ty + (rng() - 0.5) * bandH * 0.38;
            const r = Math.min(w, yH) * (0.08 + rng() * 0.1);
            const rg = bx.createRadialGradient(bx0, by0, 0, bx0, by0, r);
            rg.addColorStop(0, rgbaFromHex(saturateHex(col, 0.2), 0.16));
            rg.addColorStop(1, rgbaFromHex(col, 0));
            bx.fillStyle = rg;
            bx.fillRect(0, 0, w, h);
          }
        }
      }

      // 完成アート: 選ばれた線画の「シルエット内側だけ」に7色の水彩インクを閉じ込める。
      // 描画順: (1)背景マット → (2)線画別パラメータで色水＋Blur → (3)ハードマスクで切り抜き → (4)主線。
      // ★Blurの後にマスク。マスク後にBlurは絶対にしない（外側ハミ出しの典型）。
      function drawOrganicLiquidArt(c, w, h, flower, revealT) {
        if (!flower) return;
        const drops = getBottleDrops(flower);
        const seed = flower.seed >>> 0;
        const rt = revealT == null ? 1 : Math.min(1, Math.max(0, revealT));
        const N = drops.length;
        const W = Math.max(1, Math.round(w));
        const H = Math.max(1, Math.round(h));
        const artCfg = getArtLineConfig(flower);

        drawArtMat(c, W, H);

        const img = getSelectedLineartImg(flower);
        const mask = getSelectedLineartMask(flower);
        const ref = img || mask;
        let rx = 0, ry = 0, rw = W, rh = H;
        if (ref) {
          const rect = getLineartDrawRect(flower, W, H);
          rx = rect.dx; ry = rect.dy; rw = rect.dW; rh = rect.dH;
        }

        if (!N) {
          if (img) { c.save(); c.globalAlpha = 0.9; c.drawImage(img, rx, ry, rw, rh); c.restore(); }
          else drawLineArt(c, W, H, seed, 0.82);
          return;
        }

        // 線画ごとの yOffsetTop / yOffsetBottom でインク縦範囲を実絵柄にジャストフィット
        const yTop = Math.max(0, Math.min(0.45, artCfg.yOffsetTop != null ? artCfg.yOffsetTop : 0.02));
        const yBot = Math.max(yTop + 0.2, Math.min(1, artCfg.yOffsetBottom != null ? artCfg.yOffsetBottom : 0.98));
        const gy0 = ry + rh * yTop;
        const gyH = Math.max(1, rh * (yBot - yTop));

        const buf = sizeBuf(_artBuf, W, H);
        const bx = buf.getContext('2d');
        bx.setTransform(1, 0, 0, 1, 0, 0);
        bx.globalAlpha = 1;
        bx.globalCompositeOperation = 'source-over';
        bx.filter = 'none';
        bx.imageSmoothingEnabled = true;
        bx.imageSmoothingQuality = 'high';
        bx.clearRect(0, 0, buf.width, buf.height);

        const bandFracs = computeAreaBandFracs(mask, rw, rh, N);
        // (A) 有機グラデ＋Blur（まだ全画面・マスク前）
        paintArtGradient(bx, W, H, drops, seed, gy0, gyH, bandFracs, artCfg);

        if (mask) {
          // (B) 最後にハードマスクで切り抜き（拡大縮小の半透明フチも二値化で抹殺）
          //     ★マスク後に Blur / filter は絶対にかけない
          const mPad = sizeBuf(_artMaskPadBuf, W, H);
          const mx = mPad.getContext('2d');
          mx.setTransform(1, 0, 0, 1, 0, 0);
          mx.globalAlpha = 1;
          mx.globalCompositeOperation = 'source-over';
          mx.filter = 'none';
          mx.clearRect(0, 0, mPad.width, mPad.height);
          stampTightMask(mx, mask, rx, ry, rw, rh);
          hardenCanvasAlpha(mPad, artCfg.maskThreshold != null ? artCfg.maskThreshold : 205, false);

          bx.filter = 'none';
          bx.imageSmoothingEnabled = false;
          bx.globalCompositeOperation = 'destination-in';
          bx.drawImage(mPad, 0, 0, W, H);
          // 切り抜き結果も二値化 → 外側の半透明ハローを完全除去、内側は不透明維持
          hardenCanvasAlpha(buf, 160, true);

          bx.imageSmoothingEnabled = true;
          bx.imageSmoothingQuality = 'high';
          bx.globalCompositeOperation = 'source-atop';
          const cx = rx + rw * 0.5, cy = ry + rh * 0.5;
          const rr = Math.max(rw, rh) * 0.62;
          const eg = bx.createRadialGradient(cx, cy, rr * 0.52, cx, cy, rr);
          eg.addColorStop(0, 'rgba(18,14,28,0)');
          eg.addColorStop(1, 'rgba(18,14,28,0.18)');
          bx.fillStyle = eg;
          bx.fillRect(0, 0, W, H);
          bx.globalCompositeOperation = 'screen';
          const hy = ry + rh * 0.32;
          const hg = bx.createRadialGradient(cx, hy, 0, cx, hy, rr * 0.38);
          hg.addColorStop(0, 'rgba(255,255,255,0.14)');
          hg.addColorStop(1, 'rgba(255,255,255,0)');
          bx.fillStyle = hg;
          bx.fillRect(0, 0, W, H);
          // ハイライト後も外側へ薄い光が漏れないよう、もう一度マスクを噛ませる
          bx.globalCompositeOperation = 'destination-in';
          bx.imageSmoothingEnabled = false;
          bx.drawImage(mPad, 0, 0, W, H);
          hardenCanvasAlpha(buf, 160, true);
          bx.globalCompositeOperation = 'source-over';
          bx.imageSmoothingEnabled = true;
        }

        if (rt < 1) {
          const bottom = ry + rh;
          const feather = Math.max(8, rh * 0.16);
          const level = bottom - (rh + feather * 2) * rt + feather;
          bx.save();
          bx.globalCompositeOperation = 'destination-out';
          bx.filter = 'none';
          const wipe = bx.createLinearGradient(0, level - feather, 0, level + feather);
          wipe.addColorStop(0, 'rgba(0,0,0,1)');
          wipe.addColorStop(1, 'rgba(0,0,0,0)');
          bx.fillStyle = wipe;
          bx.fillRect(0, level - feather, W, feather * 2);
          if (level - feather > 0) {
            bx.fillStyle = 'rgba(0,0,0,1)';
            bx.fillRect(0, 0, W, level - feather);
          }
          bx.restore();
        }

        c.save();
        c.globalAlpha = 1;
        c.globalCompositeOperation = 'source-over';
        c.imageSmoothingEnabled = true;
        c.imageSmoothingQuality = 'high';
        c.drawImage(buf, 0, 0, W, H);
        c.restore();

        if (fabricImg && fabricImg.naturalWidth > 0) {
          c.save();
          c.globalAlpha = 0.1 * rt;
          c.globalCompositeOperation = 'multiply';
          c.drawImage(fabricImg, 0, 0, W, H);
          c.restore();
        }

        if (img) {
          c.save();
          c.globalAlpha = 1;
          c.globalCompositeOperation = 'source-over';
          // 主線はニアレスト寄りで載せ、半透明の色フチを線の芯で確実に覆う
          c.imageSmoothingEnabled = true;
          c.imageSmoothingQuality = 'high';
          c.drawImage(img, rx, ry, rw, rh);
          c.restore();
        } else {
          drawLineArt(c, W, H, seed, 0.82);
        }
      }

      function resizeBottleCanvas() {
        const wrap = bottleCanvas.parentElement;
        if (!wrap) return;
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        const cw = Math.max(1, Math.round(wrap.clientWidth || BOTTLE_LOGICAL_W));
        const ch = Math.max(1, Math.round(wrap.clientHeight || BOTTLE_LOGICAL_H));
        const pxw = Math.round(cw * dpr), pxh = Math.round(ch * dpr);
        if (bottleCanvas.width !== pxw || bottleCanvas.height !== pxh) {
          bottleCanvas.width = pxw;
          bottleCanvas.height = pxh;
        }
        bottleCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        bottleCtx.__dpr = dpr;
      }

      // 現在の充填率（0..1）。デポジットアニメ中は時間補間する。
      // 液体の高さは常に満タン固定。layerReveal は「最新層の割り込み進捗(0→1)」を表す。
      // アニメ中のみ 0→1 を返し、定常時は 1（=完全に落ち着いた状態）。
      function currentBottleReveal() {
        if (bottleAnim.active) {
          const t = Math.min(1, (performance.now() - bottleAnim.start) / bottleAnim.duration);
          const e = easeOutCubic(t);
          if (t >= 1) {
            bottleAnim.active = false;
            if (bottleAnim.onComplete) { const cb = bottleAnim.onComplete; bottleAnim.onComplete = null; cb(); }
          }
          return e;
        }
        return 1;
      }

      // 蓄積ボトルの液面の揺れ（物理シミュレーション）。
      //  current : 現在の液面傾き角(度)   vel : 角速度   target : 傾き目標角(ジャイロ由来)
      //  motion  : タップ/フリック等で注入された揺れエネルギー(0..1.2)
      const AMBIENT_WAVE = 0.11;          // 静止時も液体が“生きて”見えるゆるやかな常時さざ波
      const bottleTilt = { current: 0, vel: 0, motion: 0, target: 0, lastGamma: null };
      let bottleTiltReady = false;
      let orientationAttached = false;
      let motionPermAsked = false;
      // 揺れエネルギー・角速度インパルスを注入（タップ/フリック/急な傾き）
      function exciteBottle(impulse, energy) {
        bottleTilt.vel += impulse;
        bottleTilt.motion = Math.min(1.4, bottleTilt.motion + energy);
      }
      // ジャイロ本体（傾き→液面が大きく傾き、急変でスロッシュ）
      function onDeviceOrientation(e) {
        const gamma = (typeof e.gamma === 'number') ? e.gamma : 0;   // 左右傾き(度)
        // 目標液面角: 端末の傾きに比例（±16°で頭打ち）。強すぎる傾きは隙間の原因になるため抑制。
        bottleTilt.target = Math.max(-16, Math.min(16, gamma * 0.6));
        if (bottleTilt.lastGamma == null) { bottleTilt.lastGamma = gamma; return; }
        const dg = gamma - bottleTilt.lastGamma;
        bottleTilt.lastGamma = gamma;
        // 急な傾き=大きなスロッシュ（振幅と余韻を強める）
        if (Math.abs(dg) > 0.3) exciteBottle(dg * 0.14, Math.min(0.7, Math.abs(dg) * 0.06));
      }
      function attachOrientationListener() {
        if (orientationAttached || !window.DeviceOrientationEvent) return;
        orientationAttached = true;
        window.addEventListener('deviceorientation', onDeviceOrientation, { passive: true });
      }
      // iOS 13+ はユーザー操作を起点に許可を要求する必要がある。非対応環境は即アタッチ。
      function requestBottleMotionPermission() {
        if (motionPermAsked) return;
        motionPermAsked = true;
        try {
          if (typeof DeviceOrientationEvent !== 'undefined'
              && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
              .then((state) => { if (state === 'granted') attachOrientationListener(); })
              .catch(() => { /* 拒否時は常時さざ波＋タップ揺れにフォールバック */ });
          } else {
            attachOrientationListener();   // Android / 旧iOS / デスクトップ
          }
        } catch (err) {
          attachOrientationListener();
        }
      }
      // 最初のユーザー操作(タップ/クリック)で一度だけ許可要求（ジェスチャ内で呼ぶ必要がある）。
      // capture段階で拾い、子要素が stopPropagation してもジェスチャを取りこぼさない。
      function armMotionPermissionOnFirstGesture() {
        const fire = () => { requestBottleMotionPermission(); };
        const opt = { once: true, passive: true, capture: true };
        window.addEventListener('pointerdown', fire, opt);
        window.addEventListener('touchstart', fire, opt);
        window.addEventListener('click', fire, opt);
      }
      function setupBottleTilt() {
        if (bottleTiltReady) return;
        bottleTiltReady = true;
        // requestPermission が不要な環境（Android/旧iOS/デスクトップ）は即座に有効化。
        if (typeof DeviceOrientationEvent !== 'undefined'
            && typeof DeviceOrientationEvent.requestPermission === 'function') {
          armMotionPermissionOnFirstGesture();   // iOS: 初回操作で許可
        } else {
          attachOrientationListener();
        }
        if (bottleCanvas) {
          // ボトルをタップ → 水面に振動が伝わったように大きく波紋が立つ
          bottleCanvas.addEventListener('pointerdown', (e) => {
            requestBottleMotionPermission();
            exciteBottle((Math.random() * 2 - 1) * 2.4, 1.0);
          }, { passive: true });
          // デスクトップ: ボトル上でポインタが動いた分だけ波立てる
          let lastX = null;
          bottleCanvas.addEventListener('pointermove', (e) => {
            if (lastX == null) { lastX = e.clientX; return; }
            const dx = e.clientX - lastX;
            lastX = e.clientX;
            if (Math.abs(dx) > 0.5) exciteBottle(dx * 0.02, Math.min(0.4, Math.abs(dx) * 0.012));
          }, { passive: true });
          bottleCanvas.addEventListener('pointerleave', () => { lastX = null; });
        }
      }

      // 常時走るボトル描画ループ（データ更新後も途切れず毎フレーム描き直す）
      let bottleLoopId = null;
      function bottleLoop() {
        bottleLoopId = requestAnimationFrame(bottleLoop);
        // ボトルが非表示（注ぎ完了フェーズ）ならスキップだけしてループは維持
        if (getBottlePhase(currentFlower) === BOTTLE_PHASES.COMPLETE) return;
        if (bottleStage.classList.contains('is-hidden')) return;
        // バネ振動: 目標角(target)へ復元力で追従し、弱めの減衰で“タプン、タプン”と余韻を残す。
        bottleTilt.vel += (bottleTilt.target - bottleTilt.current) * 0.052;   // 目標へ引き戻す(復元力)
        bottleTilt.vel *= 0.915;                                              // 減衰(1に近いほど余韻が長い)
        bottleTilt.current += bottleTilt.vel;
        bottleTilt.motion *= 0.945;                                           // 揺れエネルギーの自然減衰
        // 目標が0(傾けていない)で、ほぼ静止したら微小ドリフトをスナップ除去。
        if (Math.abs(bottleTilt.target) < 0.01
            && Math.abs(bottleTilt.current) < 0.02
            && Math.abs(bottleTilt.vel) < 0.01) {
          bottleTilt.current = 0; bottleTilt.vel = 0;
        }
        // 揺れ量: 目標との差(スロッシュ)＋角速度＋注入エネルギー＋常時さざ波(AMBIENT)。
        const live = Math.abs(bottleTilt.current - bottleTilt.target) + Math.abs(bottleTilt.vel) * 6;
        const waveAmt = Math.min(1, AMBIENT_WAVE + live * 0.42 + bottleTilt.motion);
        resizeBottleCanvas();
        const cw = bottleCanvas.clientWidth || BOTTLE_LOGICAL_W;
        const ch = bottleCanvas.clientHeight || BOTTLE_LOGICAL_H;
        drawGlassBottle(bottleCtx, cw, ch, currentFlower, {
          layerReveal: currentBottleReveal(),
          // 描画に渡す傾きは ±18° に制限（急な入力でも回転しすぎて隙間を作らない安全弁）。
          surfaceTilt: Math.max(-18, Math.min(18, bottleTilt.current)),
          waveAmt: waveAmt,
          waveTime: performance.now() / 1000
        });
      }

      function startBottleLoop() {
        setupBottleTilt();
        if (bottleLoopId == null) bottleLoopId = requestAnimationFrame(bottleLoop);
      }

      // 単発の再描画（ループが止まっていても1フレーム描く保険）
      function redrawBottle() {
        resizeBottleCanvas();
        const cw = bottleCanvas.clientWidth || BOTTLE_LOGICAL_W;
        const ch = bottleCanvas.clientHeight || BOTTLE_LOGICAL_H;
        drawGlassBottle(bottleCtx, cw, ch, currentFlower, { layerReveal: currentBottleReveal() });
      }

      function animateBottleDeposit(onComplete) {
        const N = getFlowerDayCount(currentFlower);
        // 最新層(最上)が高さ0→1/Nへ割り込み、既存層がキュッと縮む再分配アニメ。
        // Day1は透明な水が全体染まる（renderLiquidBuffer側でαフェード）。
        bottleAnim = {
          active: true,
          start: performance.now(),
          duration: 1600,
          layerIndex: N - 1,
          onComplete: onComplete || null
        };
        startBottleLoop();
      }

      // 7枚の線画サムネイルを2列グリッドに構築（初回のみ）。タップで選択→確定ボタンを有効化。
      let canvasCardsBuilt = false;
      function buildCanvasCards() {
        if (!canvasCardGrid) return;
        initWaterSound(); // SELECT画面表示時に水滴音を先読み（確認タップでデコード待ちを消す）
        loadLineartImages();
        if (!canvasCardsBuilt) {
          canvasCardGrid.innerHTML = '';
          LINEART_TEMPLATES.forEach((t) => {
            const card = document.createElement('button');
            card.type = 'button';
            card.className = 'canvas-card';
            card.dataset.canvasId = t.id;
            card.setAttribute('aria-label', `${t.label}を選ぶ`);
            const thumb = document.createElement('div');
            thumb.className = 'canvas-card-thumb';
            const img = document.createElement('img');
            img.src = assetSrc(t.src);
            img.alt = t.label;
            img.loading = 'lazy';
            thumb.appendChild(img);
            const label = document.createElement('span');
            label.className = 'canvas-card-label';
            label.textContent = t.label;
            card.appendChild(thumb);
            card.appendChild(label);
            card.addEventListener('click', () => selectCanvasCard(t.id));
            canvasCardGrid.appendChild(card);
          });
          canvasCardsBuilt = true;
        }
        // 既存の選択状態を反映
        const preselect = (currentFlower && currentFlower.selectedCanvasId) || null;
        highlightCanvasCard(preselect && CANVAS_TEMPLATES[preselect] ? CANVAS_TEMPLATES[preselect].id : null);
      }

      function highlightCanvasCard(id) {
        pendingCanvasId = id;
        if (canvasCardGrid) {
          canvasCardGrid.querySelectorAll('.canvas-card').forEach((el) => {
            el.classList.toggle('is-selected', el.dataset.canvasId === id);
          });
        }
        if (canvasConfirmBtn) canvasConfirmBtn.disabled = !id;
      }

      function selectCanvasCard(id) {
        highlightCanvasCard(id);
      }

      function updateExperienceUI() {
        const phase = getBottlePhase(currentFlower);
        const poured = phase === BOTTLE_PHASES.COMPLETE;
        const dayCount = getFlowerDayCount(currentFlower);
        const complete = currentFlower && isFlowerComplete(currentFlower);

        canvasWrap.classList.toggle('is-bottle-mode', !poured);
        bottleStage.classList.toggle('is-hidden', poured);
        canvasSelectOverlay.classList.toggle('visible', phase === BOTTLE_PHASES.SELECT);
        canvasSelectOverlay.setAttribute('aria-hidden', phase !== BOTTLE_PHASES.SELECT ? 'true' : 'false');
        pourStage.classList.toggle('visible', phase === BOTTLE_PHASES.POUR);
        pourStage.setAttribute('aria-hidden', phase !== BOTTLE_PHASES.POUR ? 'true' : 'false');

        if (phase === BOTTLE_PHASES.DEPOSIT) {
          bottleHint.textContent = dayCount > 0
            ? `${dayCount}日目の感情をボトルに預けました`
            : '感情をボトルに預けています';
        }

        const hintEl = document.querySelector('.emotion-palette-hint');
        if (hintEl) {
          hintEl.textContent = poured
            ? '作品が完成しました'
            : '長押しで色を育て、上へフリックしてボトルに預ける';
        }

        frameProgressHint.textContent = dayCount > 0 && !complete
          ? `感情を預ける ${dayCount}日目`
          : (complete && phase !== BOTTLE_PHASES.COMPLETE ? 'キャンバスへ注ぐ準備ができました' : '');
        frameProgressHint.classList.toggle('visible', dayCount > 0 && phase === BOTTLE_PHASES.DEPOSIT && !complete);

        if (phase === BOTTLE_PHASES.SELECT) buildCanvasCards();
      }

      let pourDragStartX = null;

      // pourキャンバスの内部解像度を「表示サイズ × dpr(最低2倍)」で確保し、Retina相当のクッキリ描画にする。
      // 返り値は論理サイズ(CSSピクセル)。ctxはdprスケール＋高品質スムージングを有効化した状態になる。
      function preparePourCanvas(canvas, ctx, fallbackW, fallbackH) {
        const dpr = Math.max(2, window.devicePixelRatio || 1);
        const cw = canvas.clientWidth || fallbackW;
        const ch = canvas.clientHeight || fallbackH;
        const pxw = Math.max(1, Math.round(cw * dpr));
        const pxh = Math.max(1, Math.round(ch * dpr));
        if (canvas.width !== pxw || canvas.height !== pxh) {
          canvas.width = pxw;
          canvas.height = pxh;
        }
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        return { w: cw, h: ch };
      }

      function drawPourFrame() {
        const b = preparePourCanvas(pourBottleCanvas, pourBottleCtx, 110, 196);
        const a = preparePourCanvas(pourArtCanvas, pourArtCtx, 160, 284);
        drawGlassBottle(pourBottleCtx, b.w, b.h, currentFlower, { layerReveal: 1, surfaceTilt: pourState.tilt || 0 });
        drawOrganicLiquidArt(pourArtCtx, a.w, a.h, currentFlower, pourState.pourT);
        if (pourState.pourT >= 0.98 && pourState.active) finishPourSequence();
      }

      function finishPourSequence() {
        if (!pourState.active) return;
        pourState.active = false;
        if (pourState.rafId) cancelAnimationFrame(pourState.rafId);
        currentFlower.selectedCanvasId = currentFlower.selectedCanvasId || 'flow-01';
        setBottlePhase(BOTTLE_PHASES.COMPLETE);
        redrawCanvas();
        refreshCanvasExportSnapshot();
        updateFrameButtonState();
      }

      function startPourSequence() {
        canvasSelectOverlay.classList.remove('visible');
        setBottlePhase(BOTTLE_PHASES.POUR);
        pourState = { active: true, tilt: 0, pourT: 0, rafId: null };
        pourBottleWrap.style.transform = 'rotate(0deg)';
        drawPourFrame();
        // 線画/マスク画像のロード（＆実行時マスク生成）完了後にもう一度描画し、
        // 色を注ぐ前でも選択した線画の黒い輪郭が確実にキャンバス上へ出るようにする。
        loadLineartImages().then(() => { if (pourState.active) drawPourFrame(); });
        const loop = () => {
          if (!pourState.active) return;
          if (pourState.tilt > 12 && pourState.pourT < 1) {
            pourState.pourT = Math.min(1, pourState.pourT + 0.008);
            drawPourFrame();
          }
          pourState.rafId = requestAnimationFrame(loop);
        };
        pourState.rafId = requestAnimationFrame(loop);
      }

      let inkFillAnim = null;

      // 選ばれた線画を中央に大きく表示 →「下から上へ滲み込む」3秒のインク流し込みアニメ →
      // 100%着色状態を保存 → 額装＋完了アラート、という新しい完成演出。
      // ※ 色順・source-inマスク・80%描画/中央揃え・保存(toDataURL)ロジックは一切変更せず、
      //   drawOrganicLiquidArt の revealT(0→1) を時間補間するだけで実現する。
      // ※ SE はここでは鳴らさない。ボトル預け時(commitInkLanding)のみ可聴。
      //    3秒アニメ完了の Promise 解決 → 保存フローへは従来どおり直列で繋がる。
      function runInkFillAnimation() {
        if (inkFillAnim && inkFillAnim.rafId) cancelAnimationFrame(inkFillAnim.rafId);
        const DURATION = 3000;
        const start = performance.now();
        const drawAt = (t) => {
          const { w, h } = getCanvasLogicalSize();
          fillCanvasBackground();
          drawOrganicLiquidArt(ctx, w, h, currentFlower, t);
        };
        // 水彩が染み込むような滑らかなイージング
        const ease = (p) => (p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2);
        drawAt(0);
        return new Promise((resolve) => {
          const step = (now) => {
            const p = Math.min(1, (now - start) / DURATION);
            drawAt(ease(p));
            if (p < 1) {
              inkFillAnim = { rafId: requestAnimationFrame(step) };
            } else {
              inkFillAnim = null;
              // 完全着色状態を確定描画 → スナップショット更新（保存はこの状態を使う）
              drawAt(1);
              refreshCanvasExportSnapshot();
              resolve();
            }
          };
          inkFillAnim = { rafId: requestAnimationFrame(step) };
        });
      }

      // 線画選択確定 → 3秒インク流し込み（無音）→ 100%保存 → 額装＋完了アラート
      // ※ SE はボトル預け時のみ。ここでは絶対に鳴らさない。
      async function onCanvasSelected(canvasId) {
        if (!currentFlower || !isFlowerComplete(currentFlower)) return;
        currentFlower.selectedCanvasId = canvasId;
        saveFlower();
        // 選択オーバーレイ・pourステージを閉じ、ボトルを完全に非表示にする。
        canvasSelectOverlay.classList.remove('visible');
        canvasSelectOverlay.setAttribute('aria-hidden', 'true');
        pourStage.classList.remove('visible');
        pourStage.setAttribute('aria-hidden', 'true');
        // 線画/マスク画像のロードを必ず待ってから演出開始（白紙化防止）
        try { await loadLineartImages(); } catch (e) { console.warn('線画ロード待機:', e); }
        // COMPLETEフェーズへ = ボトルステージ非表示 & 本キャンバスに線画を中央大表示。
        setBottlePhase(BOTTLE_PHASES.COMPLETE);
        updateExperienceUI();
        // 非額装レイアウトでメインキャンバスを正しいサイズへ。redrawCanvas(全色)が走るが、
        // 直後の runInkFillAnimation の drawAt(0) が同期的に上書きするためフラッシュは見えない。
        resizeCanvas();
        // ① 3秒間のインク流し込み（静寂）→ ② 完了後に厳格直列保存
        await runInkFillAnimation();
        updateFrameButtonState();
        await executeFrameArtworkFlow();
      }

      function setupPourInteraction() {
        const maxTilt = 48;
        const onMove = (clientX) => {
          if (!pourState.active || pourDragStartX == null) return;
          pourState.tilt = Math.max(0, Math.min(maxTilt, (clientX - pourDragStartX) * 0.35));
          pourBottleWrap.style.transform = `rotate(${pourState.tilt}deg)`;
          if (pourState.tilt > 12) pourState.pourT = Math.min(1, pourState.pourT + 0.015);
          drawPourFrame();
        };
        pourScene.addEventListener('mousedown', (e) => { pourDragStartX = e.clientX; });
        pourScene.addEventListener('mousemove', (e) => { if (pourDragStartX != null) onMove(e.clientX); });
        document.addEventListener('mouseup', () => { pourDragStartX = null; });
        pourScene.addEventListener('touchstart', (e) => {
          if (e.touches[0]) pourDragStartX = e.touches[0].clientX;
        }, { passive: true });
        pourScene.addEventListener('touchmove', (e) => {
          if (e.touches[0] && pourDragStartX != null) onMove(e.touches[0].clientX);
        }, { passive: true });
        document.addEventListener('touchend', () => { pourDragStartX = null; });
        if (window.DeviceOrientationEvent) {
          window.addEventListener('deviceorientation', (e) => {
            if (!pourState.active || getBottlePhase(currentFlower) !== BOTTLE_PHASES.POUR) return;
            const gamma = e.gamma || 0;
            pourState.tilt = Math.max(0, Math.min(maxTilt, gamma * 1.2));
            pourBottleWrap.style.transform = `rotate(${pourState.tilt}deg)`;
            if (pourState.tilt > 8) pourState.pourT = Math.min(1, pourState.pourT + 0.012);
            drawPourFrame();
          });
        }
      }

      async function renderBottleSnapshotDataUrl(flower) {
        const dpr = Math.min(2, Math.max(1, window.devicePixelRatio || 1));
        const lw = BOTTLE_LOGICAL_W, lh = BOTTLE_LOGICAL_H;
        const out = document.createElement('canvas');
        out.width = Math.round(lw * dpr);
        out.height = Math.round(lh * dpr);
        const octx = out.getContext('2d');
        octx.setTransform(dpr, 0, 0, dpr, 0, 0);
        drawGlassBottle(octx, lw, lh, flower, { layerReveal: 1 });
        // ボトルは透過を保持したいのでPNG。ただし長辺440pxへ縮小し容量を抑える（退避優先度は最下位）。
        let bottleImageDataUrl = toStorableDataUrl(out, 440, undefined, 'image/png');
        if (!bottleImageDataUrl) {
          try { bottleImageDataUrl = out.toDataURL('image/png'); } catch (e) { bottleImageDataUrl = null; }
        }
        return { bottleImageDataUrl, bottleW: lw, bottleH: lh };
      }

      // ── グラデーションアート: 地層のように色を積み重ねて全面を染める ──
      function getGradientDrops(flower) {
        if (!flower) return [];
        return [flower.center, ...(flower.petals || [])].filter(Boolean);
      }

      // チャージ時間（=opacity 0.4〜1.0）を 0〜1 の「感情の重さ／インクの深さ」に正規化
      function layerDensity(drop) {
        const o = drop.opacity ?? CHARGE_OPACITY_MIN;
        const d = (o - CHARGE_OPACITY_MIN) / Math.max(0.0001, CHARGE_OPACITY_MAX - CHARGE_OPACITY_MIN);
        return Math.min(1, Math.max(0, d));
      }

      // インク最大不透明度の上限。長押しMAXでも布目がギリギリ奥に透ける濃さに解放。
      const INK_ALPHA_CAP = 0.95;

      // 濃淡から水彩の色域を作る。淡い＝水多め（紙に近い明色）／濃い＝沈殿した深色。
      // multiplyで沈んでも鮮やかさが死なないよう、濃い日ほど彩度を引き上げる。
      function layerPigment(color, d) {
        const sv = saturateHex(color, 0.14 + d * 0.28);
        return {
          pale: lightenHex(sv, 0.26 - d * 0.18),
          mid: d < 0.5 ? lightenHex(sv, (0.5 - d) * 0.2) : darkenHex(sv, (d - 0.5) * 0.14),
          // 縁の濃色は黒混ぜではなく同系色の深い色（ネイビー/ワイン等）
          deep: deepenHex(sv, 0.3 + d * 0.22)
        };
      }

      // 各層の「太さ」を体感的均等（不規則な面積）で決める。1/Nギチギチを廃止し、
      // ある色は大胆に太く、ある色は細く潜り込む。全色が必ずどこかに露出する。
      const _bandBaseCache = {};
      function getBandBases(N, seed) {
        const key = (seed >>> 0) + '_' + N;
        if (_bandBaseCache[key]) return _bandBaseCache[key];
        const rng = mulberry32(((seed * 2246822519) + N * 3266489917 + 12345) >>> 0);
        const weights = [];
        let sum = 0;
        for (let i = 0; i < N; i++) {
          const wt = 0.4 + Math.pow(rng(), 2) * 4.0; // 約0.4〜4.4 → 最大/最小で約10倍差
          weights.push(wt); sum += wt;
        }
        const bases = [0];
        let acc = 0;
        for (let i = 0; i < N; i++) { acc += weights[i] / sum; bases.push(Math.min(1, acc)); }
        bases[N] = 1;
        _bandBaseCache[key] = bases;
        return bases;
      }

      // 境界m（0..N）の不規則な波状ライン。m=0は上端, m=Nは下端で平坦。
      // 層ごとに開始オフセット・周波数・うねり方向・大きな斜め傾きを分離し、横帯感を排除。
      // （seed固定=再描画で安定。ただし各層は全く別物の輪郭を持つ。）
      function dividerY(m, N, x, w, h, seed) {
        if (m <= 0) return 0;
        if (m >= N) return h;
        const bases = getBandBases(N, seed);
        const base = bases[m] * h;
        // 層ごとに大きく離れた独立シード（山谷が層間で一致しない）
        const rng = mulberry32(((seed * 2654435761) + m * 1013904223 + N * 40503) >>> 0);
        const t = x / w;

        // (1) 各層でランダムにずらす開始オフセット
        const phaseOff = rng() * Math.PI * 2;

        // (2) 波の周波数を層ごとにシャッフル（大うねり〜中細かさ）
        const f1 = 0.7 + rng() * 1.5;           // 全体で約1〜2回
        const f2 = f1 + 0.9 + rng() * 2.3;      // 中くらい
        const f3 = f2 + 1.6 + rng() * 3.8;      // やや細かい
        const ph1 = rng() * 6.283, ph2 = rng() * 6.283, ph3 = rng() * 6.283;
        const a1 = 0.6 + rng() * 0.5;
        const a2 = 0.15 + rng() * 0.35;
        const a3 = 0.05 + rng() * 0.2;
        const u = t * Math.PI * 2 + phaseOff;
        let wob = Math.sin(u * f1 + ph1) * a1 + Math.sin(u * f2 + ph2) * a2 + Math.sin(u * f3 + ph3) * a3;
        wob /= (a1 + a2 + a3);
        const ampBase = h * (0.03 + rng() * 0.03);

        // ★ うねり方向の強制反転: 中央が膨らむ凸型 or 中央が凹む凹型を層ごとにランダム化
        const lobeSign = rng() < 0.5 ? 1 : -1;
        const lobeAmp = h * (0.05 + rng() * 0.06);
        const lobe = lobeSign * lobeAmp * Math.sin(Math.PI * t * (0.85 + rng() * 0.4) + rng() * 0.6);

        // ★ 大きな斜め傾き: 左右端のY差を画面縦幅の 15〜25%、向きはランダム
        const tiltPx = h * (0.15 + rng() * 0.10) * (rng() < 0.5 ? -1 : 1);
        const tiltY = tiltPx * (t - 0.5);

        // 局所的な歪み（手書きのいびつさ）
        const dcx = rng();
        const dw = 0.07 + rng() * 0.2;
        const damp = h * (0.03 + rng() * 0.05) * (rng() < 0.5 ? -1 : 1);
        const dx = (t - dcx) / dw;
        const dist = damp * Math.exp(-0.5 * dx * dx);

        let y = base + tiltY + lobe + ampBase * wob + dist;
        // 斜めに激しく交差させるため、キャンバス内に収める程度の緩いクランプのみ
        const lo = 0.006 * h;
        const hi = 0.994 * h;
        if (y < lo) y = lo;
        if (y > hi) y = hi;
        return y;
      }

      // 帯k（上端=境界k, 下端=境界k+1）のパス。offsetで上下に膨らませブリード用に。
      function buildEqualBandPath(c, k, N, w, h, seed, offset) {
        const steps = 36;
        const off = offset || 0;
        c.beginPath();
        for (let i = 0; i <= steps; i++) {
          const x = (i / steps) * w;
          const y = dividerY(k, N, x, w, h, seed) - off;
          if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
        }
        for (let i = steps; i >= 0; i--) {
          const x = (i / steps) * w;
          c.lineTo(x, dividerY(k + 1, N, x, w, h, seed) + off);
        }
        c.closePath();
      }

      // 有機的なにじみムラ（絵の具の濃淡ブロブ）を層内に散らす
      function addWatercolorMottle(c, w, h, y0, y1, color, seed, baseAlpha) {
        const rng = mulberry32((seed || 7) >>> 0);
        const blobs = 6;
        const minDim = Math.min(w, h);
        for (let i = 0; i < blobs; i++) {
          const bx = rng() * w;
          const by = y0 + rng() * (y1 - y0);
          const br = minDim * (0.1 + rng() * 0.26);
          const tint = rng() < 0.5
            ? darkenHex(color, 0.1 + rng() * 0.16)
            : lightenHex(color, 0.08 + rng() * 0.18);
          const a = baseAlpha * (0.07 + rng() * 0.12);
          const g = c.createRadialGradient(bx, by, 0, bx, by, br);
          g.addColorStop(0, rgbaFromHex(tint, a));
          g.addColorStop(0.6, rgbaFromHex(tint, a * 0.4));
          g.addColorStop(1, rgbaFromHex(tint, 0));
          c.fillStyle = g;
          c.fillRect(bx - br, by - br, br * 2, br * 2);
        }
      }

      // ぼかし合成用オフスクリーン（使い回し）
      const _gradTemps = [];
      function getGradTemp(i, w, h) {
        let cv = _gradTemps[i];
        if (!cv) { cv = document.createElement('canvas'); _gradTemps[i] = cv; }
        if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
        return cv;
      }

      // 横方向にランダムな強弱を持つマスク境界（滲みのムラ用）。posは昇順。
      function buildBlurMaskStops(rng) {
        const n = 3 + Math.floor(rng() * 3); // 3..5区間
        const stops = [];
        for (let i = 0; i <= n; i++) {
          stops.push({ pos: i / n, a: Math.pow(rng(), 1.3) });
        }
        return stops;
      }

      // srcを指定ぼかしでcへ合成（maskがあれば横位置マスクを掛ける。invertで反転）
      function compositeMaskedBlur(c, src, w, h, blur, stops, invert, supportsFilter, alpha) {
        let img = src;
        if (stops) {
          const tw = src.width, th = src.height;
          const tmp = getGradTemp(1, tw, th);
          const tc = tmp.getContext('2d');
          tc.setTransform(1, 0, 0, 1, 0, 0);
          tc.globalAlpha = 1;
          tc.filter = 'none';
          tc.globalCompositeOperation = 'source-over';
          tc.clearRect(0, 0, tw, th);
          tc.drawImage(src, 0, 0);
          tc.globalCompositeOperation = 'destination-in';
          const mg = tc.createLinearGradient(0, 0, tw, 0);
          for (const s of stops) {
            const a = invert ? (1 - s.a) : s.a;
            mg.addColorStop(Math.max(0, Math.min(1, s.pos)), `rgba(0,0,0,${a.toFixed(3)})`);
          }
          tc.fillStyle = mg;
          tc.fillRect(0, 0, tw, th);
          tc.globalCompositeOperation = 'source-over';
          img = tmp;
        }
        c.save();
        c.globalAlpha = (alpha == null) ? 1 : alpha;
        if (supportsFilter) c.filter = `blur(${blur}px)`;
        c.drawImage(img, 0, 0, w, h);
        c.restore();
      }

      // ユーザーが決めたベース濃度の「内部」に、水彩特有の濃淡ムラ・かすれを足す。
      // ベタ塗りを排除し、色が薄い/濃い揺らぎと不透明度ノイズでインク溜まりを表現。
      function addInkTexture(bc, k, N, bw, bh, seed, color, d, baseAlpha, bleedB) {
        const ibases = getBandBases(N, seed);
        const top = ibases[k] * bh - bleedB;
        const bot = ibases[k + 1] * bh + bleedB;
        const rng = mulberry32((seed + k * 191 + 5) >>> 0);
        const va = baseAlpha;
        const minDim = Math.min(bw, bh);
        bc.save();
        buildEqualBandPath(bc, k, N, bw, bh, seed, bleedB);
        bc.clip();

        // (a) 斜めの色ムラ: 左右(斜め)で薄い部分・濃い部分の揺らぎを作る
        const rev = rng() < 0.5;
        const hg = bc.createLinearGradient(rev ? bw : 0, top, rev ? 0 : bw, bot);
        hg.addColorStop(0.00, rgbaFromHex(lightenHex(color, 0.14), 0));
        hg.addColorStop(0.22, rgbaFromHex(darkenHex(color, 0.10), va * 0.16));
        hg.addColorStop(0.45, rgbaFromHex(lightenHex(color, 0.16), va * 0.10));
        hg.addColorStop(0.68, rgbaFromHex(darkenHex(color, 0.13), va * 0.20));
        hg.addColorStop(1.00, rgbaFromHex(lightenHex(color, 0.10), 0));
        bc.globalCompositeOperation = 'source-over';
        bc.fillStyle = hg;
        bc.fillRect(0, top, bw, bot - top);

        // (b) 不透明度のランダム微変動ノイズ（インク溜まり＆かすれ）
        const specks = 26;
        for (let i = 0; i < specks; i++) {
          const sx = rng() * bw;
          const sy = top + rng() * (bot - top);
          const sr = minDim * (0.02 + rng() * 0.08);
          const darker = rng() < 0.55;
          const tint = darker ? darkenHex(color, 0.12 + rng() * 0.16) : lightenHex(color, 0.12 + rng() * 0.2);
          const a = (darker ? 0.05 + rng() * 0.1 : 0.04 + rng() * 0.08) * (0.6 + va);
          const sg = bc.createRadialGradient(sx, sy, 0, sx, sy, sr);
          sg.addColorStop(0, rgbaFromHex(tint, a));
          sg.addColorStop(1, rgbaFromHex(tint, 0));
          bc.globalCompositeOperation = darker ? 'multiply' : 'source-over';
          bc.fillStyle = sg;
          bc.fillRect(sx - sr, sy - sr, sr * 2, sr * 2);
        }
        bc.globalCompositeOperation = 'source-over';
        bc.restore();
      }

      // 1つの色帯（k番目 / 全N帯）を水彩で塗る。縁に濃色が溜まり、隣とにじみ合う。
      // 滲み（ぼかし）は1本の縁の中でも横位置によって強弱にムラが出る。
      function paintBand(c, w, h, drop, k, N, seed) {
        const color = normalizeSplashHex(drop.color) || '#5d78b8';
        const d = layerDensity(drop);
        const pig = layerPigment(color, d);
        const minDim = Math.min(w, h);
        const supportsFilter = ('filter' in c);
        const bases = getBandBases(N, seed);
        const band = (bases[k + 1] - bases[k]) * h; // 層ごとに不規則な太さ
        // 水彩境界のフェード幅を約18%拡張し、より生々しく溶け合わせる
        const bleed = Math.min(band * 0.7, h * 0.06);
        // ■ ユーザー長押し=その日の層の「インク最大密度（アルファ基準）」。
        //   最短=0.15(儚いベール) 〜 最長=0.95(ドロっと濃厚) までダイナミックに解放。
        const baseAlpha = Math.min(INK_ALPHA_CAP, 0.15 + d * 0.80);

        const bw = Math.max(1, Math.round(w));
        const bh = Math.max(1, Math.round(h));
        const sy = bh / h;

        // 1) 鮮明な帯をオフスクリーンに描画（縁に濃色が溜まる水彩境界＋内部ムラ＋沈殿）
        const buf = getGradTemp(0, bw, bh);
        const bc = buf.getContext('2d');
        bc.setTransform(1, 0, 0, 1, 0, 0);
        bc.globalAlpha = 1;
        bc.filter = 'none';
        bc.globalCompositeOperation = 'source-over';
        bc.clearRect(0, 0, bw, bh);
        const top = bases[k] * bh;
        const bot = bases[k + 1] * bh;
        const bleedB = bleed * sy;
        const g = bc.createLinearGradient(0, top - bleedB, 0, bot + bleedB);
        g.addColorStop(0.0, rgbaFromHex(pig.deep, 0));
        g.addColorStop(0.16, rgbaFromHex(pig.deep, baseAlpha));
        g.addColorStop(0.5, rgbaFromHex(pig.mid, baseAlpha * 0.86));
        g.addColorStop(0.84, rgbaFromHex(pig.deep, baseAlpha));
        g.addColorStop(1.0, rgbaFromHex(pig.deep, 0));
        buildEqualBandPath(bc, k, N, bw, bh, seed, bleedB);
        bc.fillStyle = g;
        bc.fill();

        // 2) ベース濃度の“内部”に水彩の濃淡ムラ・かすれを融合（ベタ塗り排除）
        addInkTexture(bc, k, N, bw, bh, seed, color, d, baseAlpha, bleedB);

        // 沈殿(multiply): 濃い日ほど境界へ食い込むが、上限ガードで黒潰れ防止
        if (d > 0.1 && N > 1) {
          bc.globalCompositeOperation = 'multiply';
          buildEqualBandPath(bc, k, N, bw, bh, seed, -band * sy * 0.14);
          bc.fillStyle = rgbaFromHex(pig.deep, Math.min(0.3, 0.08 + d * 0.22));
          bc.fill();
          bc.globalCompositeOperation = 'source-over';
        }
        addWatercolorMottle(bc, bw, bh, top - bleedB, bot + bleedB, color, (drop.softSeed || 0) + k * 7, baseAlpha);

        // 3) 滲みのムラ: クッキリ部分と激しく溶ける部分を横マスクで分配。
        //    2枚の合計が概ね「1回分」になるので、ベース濃度(=上限0.78)を超えず布目が透ける。
        const zr = mulberry32((seed + k * 53 + 11) >>> 0);
        const stops = buildBlurMaskStops(zr);
        const lowBlur = minDim * (0.0048 + zr() * 0.012);
        const highBlur = minDim * (0.065 + (1 - d) * 0.06 + zr() * 0.035);
        compositeMaskedBlur(c, buf, w, h, lowBlur, stops, false, supportsFilter, 1);
        compositeMaskedBlur(c, buf, w, h, highBlur, stops, true, supportsFilter, 1);
      }

      // 境界線そのものに水彩の「溜まり」を、場所ごとに強弱を変えて描く
      function paintDivider(c, w, h, N, m, drops, seed, supportsFilter) {
        if (m <= 0 || m >= N) return;
        const above = drops[N - 1 - (m - 1)];
        const below = drops[N - 1 - m];
        const cAbove = normalizeSplashHex(above && above.color) || '#5d78b8';
        const cBelow = normalizeSplashHex(below && below.color) || '#5d78b8';
        const minDim = Math.min(w, h);
        const segs = 16;
        const rng = mulberry32((seed + m * 977 + 31) >>> 0);
        let px = 0, py = dividerY(m, N, 0, w, h, seed);
        for (let i = 1; i <= segs; i++) {
          const x = (i / segs) * w;
          const y = dividerY(m, N, x, w, h, seed);
          const crisp = rng() < 0.5;
          const blur = crisp ? minDim * (0.0048 + rng() * 0.012) : minDim * (0.036 + rng() * 0.06);
          const lw = crisp ? minDim * (0.005 + rng() * 0.01) : minDim * (0.02 + rng() * 0.03);
          // 黒混ぜをやめ、隣接色の同系ディープカラーで水彩境界を描く
          const col = deepenHex(rng() < 0.5 ? cAbove : cBelow, 0.3 + rng() * 0.2);
          const a = Math.min(0.3, crisp ? 0.16 + rng() * 0.14 : 0.06 + rng() * 0.08);
          c.save();
          c.globalCompositeOperation = 'source-over';
          if (supportsFilter) c.filter = `blur(${blur}px)`;
          c.strokeStyle = rgbaFromHex(col, a);
          c.lineWidth = lw;
          c.lineCap = 'round';
          c.beginPath();
          c.moveTo(px, py);
          c.lineTo(x, y);
          c.stroke();
          c.restore();
          px = x; py = y;
        }
      }

      // キャンバス上下端でインクを透明へフェードし、空間へ溶け込ませる（直線の途切れを廃止）
      function applyEdgeFade(ic, iw, ih) {
        const fade = Math.max(20, Math.min(32, ih * 0.045));
        ic.save();
        ic.globalCompositeOperation = 'destination-out';
        ic.filter = 'none';
        let g = ic.createLinearGradient(0, 0, 0, fade);
        g.addColorStop(0, 'rgba(0,0,0,1)');
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ic.fillStyle = g;
        ic.fillRect(0, 0, iw, fade);
        g = ic.createLinearGradient(0, ih - fade, 0, ih);
        g.addColorStop(0, 'rgba(0,0,0,0)');
        g.addColorStop(1, 'rgba(0,0,0,1)');
        ic.fillStyle = g;
        ic.fillRect(0, ih - fade, iw, fade);
        ic.restore();
      }

      // N色でキャンバスを縦に等分割して全面を塗る（新しい色=上, 古い色=下）。
      function drawGradientLayers(c, w, h, drops, seed) {
        const N = drops.length;
        if (!N) return;
        const iw = Math.max(1, Math.round(w));
        const ih = Math.max(1, Math.round(h));
        // インク層は透明背景のオフスクリーンに描画し、上下端を透明フェードしてから合成
        const ink = getGradTemp(2, iw, ih);
        const ic = ink.getContext('2d');
        ic.setTransform(1, 0, 0, 1, 0, 0);
        ic.globalAlpha = 1;
        ic.filter = 'none';
        ic.globalCompositeOperation = 'source-over';
        ic.clearRect(0, 0, iw, ih);
        const supportsFilter = ('filter' in ic);
        for (let k = 0; k < N; k++) {
          const chrono = N - 1 - k; // 上ほど新しい日
          paintBand(ic, iw, ih, drops[chrono], k, N, seed >>> 0);
        }
        // 各境界に強弱ムラのある水彩の溜まり線を重ねる
        for (let m = 1; m < N; m++) {
          paintDivider(ic, iw, ih, N, m, drops, seed >>> 0, supportsFilter);
        }
        applyPaperGrainOverlay(ic, iw, ih, seed);
        applyEdgeFade(ic, iw, ih);
        // 背景（布目）の上へインク層を合成 → フェードしたフチは背景が透ける
        c.save();
        c.globalAlpha = 1;
        c.globalCompositeOperation = 'source-over';
        c.filter = 'none';
        c.drawImage(ink, 0, 0, w, h);
        c.restore();
        // 布目テクスチャを全体にうっすら乗算
        if (fabricImg && fabricImg.naturalWidth > 0) {
          c.save();
          c.globalAlpha = 0.16;
          c.globalCompositeOperation = 'multiply';
          c.drawImage(fabricImg, 0, 0, w, h);
          c.restore();
        }
      }

      // 等分割レイアウトを1枚のオフスクリーンに描く（アニメのクロスフェード用）
      function renderGradientSnapshotCanvas(drops, w, h, seed) {
        const cw = Math.max(1, Math.round(w));
        const ch = Math.max(1, Math.round(h));
        const cv = document.createElement('canvas');
        cv.width = cw;
        cv.height = ch;
        const c = cv.getContext('2d');
        fillCanvasBackgroundOnCtx(c, cw, ch);
        drawGradientLayers(c, cw, ch, drops, seed);
        return cv;
      }

      function drawGradientArt(c, w, h, flower) {
        if (!flower) return;
        drawGradientLayers(c, w, h, getGradientDrops(flower), flower.seed);
      }

      // 既存呼び出し互換のエイリアス
      function drawFlowerArt(c, w, h, flower) {
        drawGradientArt(c, w, h, flower);
      }

      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      // 新しい色が加わると全体をN等分し直す。旧レイアウト→新レイアウトを静かにクロスフェード。
      function animateFlowerGrowth(kind, index, w, h, onComplete) {
        const drops = getGradientDrops(currentFlower);
        const N = drops.length;
        const seed = currentFlower.seed;
        const beforeBuf = renderGradientSnapshotCanvas(drops.slice(0, Math.max(0, N - 1)), w, h, seed);
        const afterBuf = renderGradientSnapshotCanvas(drops, w, h, seed);
        flowerAnim = { active: true, kind, index: N - 1, progress: 0 };
        const duration = 2000;
        const start = performance.now();

        function tick(now) {
          const t = Math.min(1, (now - start) / duration);
          flowerAnim.progress = t;
          const e = easeInOutCubic(t);

          fillCanvasBackground();
          ctx.drawImage(beforeBuf, 0, 0, w, h);
          ctx.save();
          ctx.globalAlpha = e;
          ctx.drawImage(afterBuf, 0, 0, w, h);
          ctx.restore();
          clearAndDrawOverlays();

          if (t < 1) {
            requestAnimationFrame(tick);
          } else {
            flowerAnim = { active: false, kind: 'none', progress: 1, index: -1 };
            redrawCanvas();
            if (onComplete) onComplete();
          }
        }
        requestAnimationFrame(tick);
      }

      // グラデーションアートは画像アセットを使わないため、ローダは即時解決する
      function loadFlowerCenterAssets() {
        return Promise.resolve();
      }

      function ensureCenterLoaded() {
        return Promise.resolve();
      }

      function applyPaperGrainOverlay(c, w, h, seed) {
        const rng = mulberry32(seed || 42);
        const step = Math.max(3, Math.floor(Math.min(w, h) / 80));
        c.save();
        c.globalCompositeOperation = 'multiply';
        for (let y = 0; y < h; y += step) {
          for (let x = 0; x < w; x += step) {
            const n = rng();
            if (n > 0.58) continue;
            const tone = 248 + Math.floor(n * 8);
            c.fillStyle = `rgba(${tone},${tone - 3},${tone - 8},${0.03 + n * 0.04})`;
            c.fillRect(x, y, step, step);
          }
        }
        c.restore();
      }

      async function renderFlowerSnapshotDataUrl(flower, logicalW, logicalH, fabricImage) {
        const dpr = Math.min(2, Math.max(1, window.devicePixelRatio || 1));
        const pixelW = Math.round(logicalW * dpr);
        const pixelH = Math.round(logicalH * dpr);
        const out = document.createElement('canvas');
        out.width = pixelW;
        out.height = pixelH;
        const octx = out.getContext('2d');
        octx.setTransform(dpr, 0, 0, dpr, 0, 0);

        fillCanvasBackgroundOnCtx(octx, logicalW, logicalH);
        // マスク(シルエット)＋主線＋インクの描画は drawOrganicLiquidArt 内で同期的に完了する。
        // 画像は loadLineartImages() の await 済み＆Base64データURIなので、ここでの toDataURL は
        // 「色＋線画が乗った完成状態」を確実に捉える。
        drawOrganicLiquidArt(octx, logicalW, logicalH, flower, 1);

        let artworkImageDataUrl;
        try {
          // 回廊蓄積を守る軽量エンコード（巨大PNG一択は LocalStorage 件数を殺す）
          artworkImageDataUrl = encodeArtworkDataUrl(out);
          if (!artworkImageDataUrl) artworkImageDataUrl = out.toDataURL('image/webp', 0.86);
        } catch (err) {
          console.error('■ 保存エラー発生: 作品スナップショットの toDataURL 失敗（canvas汚染の可能性）:', err);
          artworkImageDataUrl = null;
        }
        console.log('[gallery-save] 作品画像 dataURL 生成:', {
          ok: !!artworkImageDataUrl && artworkImageDataUrl.length > 512,
          length: artworkImageDataUrl ? artworkImageDataUrl.length : 0,
          approxKB: artworkImageDataUrl ? Math.round(artworkImageDataUrl.length / 1024) : 0,
          head: artworkImageDataUrl ? artworkImageDataUrl.slice(0, 40) : null
        });
        // ボトル画像の生成失敗（万一のtaint等）で、完成した作品画像まで巻き添えで失わないよう分離。
        let bottleSnap = { bottleImageDataUrl: null, bottleW: 0, bottleH: 0 };
        try {
          bottleSnap = await renderBottleSnapshotDataUrl(flower);
        } catch (err) {
          console.warn('ボトル画像の生成に失敗（作品画像は保持）:', err);
        }
        return {
          artworkImageDataUrl,
          bottleImageDataUrl: bottleSnap.bottleImageDataUrl,
          bottleW: bottleSnap.bottleW,
          bottleH: bottleSnap.bottleH,
          canvasW: logicalW,
          canvasH: logicalH,
          snapshotPixelW: pixelW,
          snapshotPixelH: pixelH
        };
      }

      function findFlowerHit(px, py) {
        const drops = getGradientDrops(currentFlower);
        if (!drops.length) return null;
        const { w, h } = getCanvasLogicalSize();
        let best = null;
        let bestD = Infinity;
        drops.forEach((d) => {
          const dx = (d.nx ?? 0.5) * w - px;
          const dy = (d.ny ?? 0.5) * h - py;
          const dd = dx * dx + dy * dy;
          if (dd < bestD) { bestD = dd; best = d; }
        });
        if (!best) return null;
        return {
          nx: best.nx ?? 0.5,
          ny: best.ny ?? 0.5,
          timestamp: best.timestamp,
          word: best.word
        };
      }

      function redrawCanvas() {
        const { w, h } = getCanvasLogicalSize();
        const phase = getBottlePhase(currentFlower);
        if (phase === BOTTLE_PHASES.COMPLETE && currentFlower && currentFlower.center) {
          canvasWrap.classList.remove('is-bottle-mode');
          fillCanvasBackground();
          drawOrganicLiquidArt(ctx, w, h, currentFlower, 1);
        } else {
          fillCanvasBackground();
          redrawBottle();
        }
      }

      function clampTapPosition(x, y, w, h, splashMeta) {
        const half = getSplashMetaHalfExtent(splashMeta);
        const pad = Math.max(8, half * 0.2);
        return {
          x: Math.max(pad, Math.min(w - pad, x)),
          y: Math.max(pad, Math.min(h - pad, y))
        };
      }

      function commitInkLanding(savedWord, payload) {
        const pickedColor = normalizeSplashHex(payload.color);
        if (!pickedColor || isDiarySubmitting) return;
        if (hasReachedSplashLimit()) return;

        onUserActivity();
        isDiarySubmitting = true;
        wordInput.disabled = true;
        setEmotionPaletteDisabled(true);
        fadeOutLandingUI();

        const { w, h } = getCanvasLogicalSize();

        // 感情（色）をボトルへ預けた瞬間: 水滴がガラス瓶に落ちる静かな効果音
        playWaterDrop();

        const startGrowth = () => {
          const record = addFlowerDayRecord(savedWord, pickedColor, payload);
          appendDiaryColorLog(savedWord, pickedColor, record.timestamp, record.opacity);
          wordInput.value = '';
          syncHistoriesFromSplashes();

          const justCompleted = isFlowerComplete(currentFlower);
          animateBottleDeposit(() => {
            redrawBottle();
            if (justCompleted) {
              currentFlower.bottlePhase = BOTTLE_PHASES.SELECT;
              saveFlower();
              setTimeout(() => {
                updateExperienceUI();
                buildCanvasCards();
              }, 600);
            } else {
              updateExperienceUI();
            }
            ensureAmbientLoop();
            saveGallerySnapshot();
            if (getGalleryProgress().ready && getBottlePhase(currentFlower) === BOTTLE_PHASES.COMPLETE) {
              updateFrameButtonState();
            } else {
              scheduleZenAfterImpact();
            }
            isDiarySubmitting = false;
            lockDiaryForToday();
            applyDailyLockUI();
            updateUIState();
            showCompletionWhisper(true);
          });
        };

        startGrowth();
      }

      function canSubmitDiaryNow() {
        return false;
      }

      function isCanvasDirectTarget(e) {
        return e.target === canvas;
      }

      function getCanvasLocalCoordsFromClient(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const logical = getCanvasLogicalSize();
        const scaleX = rect.width > 0 ? logical.w / rect.width : 1;
        const scaleY = rect.height > 0 ? logical.h / rect.height : 1;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY,
          clientX,
          clientY
        };
      }

      function getCanvasLocalCoordsFromEvent(e) {
        let clientX;
        let clientY;
        if (e.changedTouches && e.changedTouches.length > 0) {
          clientX = e.changedTouches[0].clientX;
          clientY = e.changedTouches[0].clientY;
        } else if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }
        return getCanvasLocalCoordsFromClient(clientX, clientY);
      }

      function handleCanvasTapAt(coords, e) {
        spawnTapRipple(coords.x, coords.y);

        if (isCanvasInteractionLocked()) {
          const s = findSplashAt(coords.x, coords.y);
          if (s) showTooltip(s, coords.clientX, coords.clientY);
          else hideTooltip();
          return;
        }

        const s = findSplashAt(coords.x, coords.y);
        if (s) showTooltip(s, coords.clientX, coords.clientY);
        else hideTooltip();
      }

      function formatDate(ts) {
        const d = new Date(ts);
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        const hr = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${y}/${mo}/${da} ${hr}:${mi}`;
      }

      function findSplashAt(px, py) {
        return findFlowerHit(px, py);
      }

      function showTooltip(s, clientX, clientY) {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        const rect = canvas.getBoundingClientRect();
        const sx = clientX != null ? clientX : s.nx * w + rect.left;
        const sy = clientY != null ? clientY : s.ny * h + rect.top;
        const label = s.word ? `${s.word} · ${formatDate(s.timestamp)}` : formatDate(s.timestamp);
        tooltip.textContent = label;
        tooltip.style.left = sx + 'px';
        tooltip.style.top = sy + 'px';
        tooltip.classList.add('visible');
      }

      function hideTooltip() {
        tooltip.classList.remove('visible');
      }

      canvas.addEventListener('click', (e) => {
        if (!isCanvasDirectTarget(e)) return;
        onUserActivity();
        if (Date.now() - lastCanvasTapHandledAt < 500) {
          e.preventDefault();
          return;
        }
        if (e.cancelable) e.preventDefault();
        handleCanvasTapAt(getCanvasLocalCoordsFromEvent(e), e);
      });

      canvas.addEventListener('mousemove', (e) => {
        if (!isCanvasDirectTarget(e)) return;
        onUserActivity();
        const { x, y } = getCanvasLocalCoordsFromEvent(e);
        const s = findSplashAt(x, y);
        if (s) showTooltip(s, e.clientX, e.clientY);
        else hideTooltip();
      });

      canvas.addEventListener('mouseleave', hideTooltip);

      canvas.addEventListener('touchstart', (e) => {
        if (!isCanvasDirectTarget(e)) return;
        onUserActivity();

        const touch = e.touches && e.touches[0];
        if (!touch) return;

        const coords = getCanvasLocalCoordsFromClient(touch.clientX, touch.clientY);
        canvasTouchStart = {
          x: coords.x,
          y: coords.y,
          clientX: coords.clientX,
          clientY: coords.clientY,
          t: Date.now(),
          id: touch.identifier
        };

        if (canSubmitDiaryNow() || isCanvasInteractionLocked()) {
          if (canSubmitDiaryNow() && document.activeElement === wordInput) {
            wordInput.blur();
          }
          e.preventDefault();
        }
      }, { passive: false });

      canvas.addEventListener('touchend', (e) => {
        if (!canvasTouchStart) return;

        const touch = e.changedTouches && e.changedTouches[0];
        if (!touch || touch.identifier !== canvasTouchStart.id) return;

        const coords = getCanvasLocalCoordsFromClient(touch.clientX, touch.clientY);
        const moved = Math.hypot(coords.x - canvasTouchStart.x, coords.y - canvasTouchStart.y);
        const elapsed = Date.now() - canvasTouchStart.t;
        canvasTouchStart = null;

        if (moved > 16 || elapsed > 700) {
          if (isCanvasInteractionLocked()) setTimeout(hideTooltip, 1800);
          return;
        }

        e.preventDefault();
        handleCanvasTapAt(coords, e);
      }, { passive: false });

      canvas.addEventListener('touchcancel', () => {
        canvasTouchStart = null;
      }, { passive: true });

      wordInput.addEventListener('beforeinput', clearWordInputLengthLimit);

      wordInput.addEventListener('input', () => {
        clearWordInputLengthLimit();
        onUserActivity();
        updateUIState();
      });

      wordInput.addEventListener('focus', () => {
        clearWordInputLengthLimit();
        setTimeout(() => {
          wordInput.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }, 320);
      });

      document.addEventListener('mousemove', onUserActivity, { passive: true });
      document.addEventListener('touchstart', onUserActivity, { passive: true });

      window.addEventListener('resize', () => {
        resizeCanvas();
      });

      function bootApp() {
      migrateHistoriesToRecipes();
      migrateGalleryStorage();
      currentFlower = loadFlower();
      syncFlowerToSplashes();
      syncHistoriesFromSplashes();
      loadFabricImage().catch(() => {});
      initWaterSound(); // 起動時に水滴mp3を先読み（確認・預け時の再生遅延を防ぐ）
      // ボトル画像は初期化時に1度だけ読み込み（ループ内でnew Imageしない）。
      // 読み込み完了前でもフォールバックで描画し続けられるよう、先にループを起動する。
      startBottleLoop();
      loadBottleImage().then(() => { redrawBottle(); }).catch(() => {});
      loadFlowerCenterAssets().then(() => { redrawCanvas(); }).catch(() => {});
      buildEmotionPalette();
      resizeCanvas();
      requestAnimationFrame(() => {
        resizeCanvas();
        requestAnimationFrame(() => refreshCanvasExportSnapshot());
      });
      applyDailyLockUI();
      restoreCompletionWhisperIfNeeded();
      updateUIState();
      updateFrameButtonState();
      bindFrameButtonClick();
      scheduleDiaryDayUnlockCheck();
      setupPourInteraction();
      loadLineartImages().then(() => {
        if (getBottlePhase(currentFlower) === BOTTLE_PHASES.SELECT) buildCanvasCards();
        remasterGalleryArtworkSnapshots();
      }).catch(() => {});
      if (canvasConfirmBtn) {
        canvasConfirmBtn.addEventListener('click', () => {
          if (!pendingCanvasId) return;
          // 線画流し込みは完全無音。水滴SEはボトル預け時(commitInkLanding)のみ。
          onCanvasSelected(pendingCanvasId);
        });
      }
      updateExperienceUI();
      if (currentFlower && getBottlePhase(currentFlower) === BOTTLE_PHASES.SELECT) {
        setTimeout(() => updateExperienceUI(), 400);
      }

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) return;
        applyDailyLockUI();
        if (hasPostedToday()) {
          restoreCompletionWhisperIfNeeded();
        } else {
          hideCompletionWhisper();
        }
        updateUIState();
      });

      // 水滴SEの document 一括再生は廃止（文字入力タップ等で誤鳴りするため）。
      // Autoplay解除は playWaterDrop() 内で、実際に鳴らすタイミングのユーザージェスチャに合わせて行う。
      }

      bootApp();
    })();
  </script>
</body>
</html>
