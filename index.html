      }

      const FABRIC_IMAGE = 'canvas-fabric.png';
      const BOTTLE_IMAGE = 'bottle.png';
      // file:// 環境では PNG を canvas に描くと汚染(taint)され toDataURL() が失敗する。
      // embedded-assets.js に埋め込んだ Base64 データURI（同一オリジン扱い）を優先し、汚染を根絶する。
      function assetSrc(name) {
        const e = (typeof window !== 'undefined') && window.EMBEDDED_ASSETS;
        return (e && e[name]) ? e[name] : name;
      }
      const CANVAS_BG = '#f7f4eb';
      const splatImg = new Image();
      const fabricImg = new Image();
      const bottleImg = new Image();
      const stampCache = {};
      let splatReady = false;
      let fabricReady = false;
      let fabricLoadPromise = null;
      let bottleReady = false;
      let bottleLoadPromise = null;
      let bottleMaskCanvas = null;
      let bottleCrop = null;
      // bottle.png の実測: 本体は画像内で以下の割合を占める（余白が多いのでクロップ必須）
      const BOTTLE_CROP_FRACTIONS = { sx: 0.376, sy: 0.12, sw: 0.247, sh: 0.805 };
      // インクを溜める「胴体(丸み)」領域（描画矩形=首を含むボトル全体に対する縦割合）。
      // 首(ネック)にはインクを入れない: bodyTop は肩が終わり胴体が始まる位置。
      const BOTTLE_BODY_TOP_FRAC = 0.34;   // これより上（首・肩）は常に空気
      const BOTTLE_BODY_BOTTOM_FRAC = 0.955; // 瓶底の少し内側
      const BOTTLE_AIR_GAP_FRAC = 0.18;    // 7日目でも胴体上部に残す空気層(胴体高さ比)

      // 7枚の線画PNG(主線)＋塗りつぶしシルエットマスクPNGを初期化時に一度だけ読み込み（id -> Image）
      const lineartImgs = {};
      const lineartMaskImgs = {};
      // 各線画の「絵柄の実バウンディングボックス」(不透明画素の外接矩形, 画像ピクセル座標)。
      // PNGごとにバラバラな透明余白を無視し、キャンバス上の見た目サイズを揃えるために使う。
      const lineartBBox = {};
      let lineartLoadPromise = null;
      function loadLineartImages() {
        if (lineartLoadPromise) return lineartLoadPromise;
        const jobs = [];
        LINEART_TEMPLATES.forEach((t) => {
          jobs.push(new Promise((resolve) => {
            const img = new Image();
            img.onload = () => { lineartImgs[t.id] = img; resolve(); };
            img.onerror = () => resolve();
            img.src = assetSrc(t.src);
          }));
          jobs.push(new Promise((resolve) => {
            const m = new Image();
            m.onload = () => { lineartMaskImgs[t.id] = m; resolve(); };
            m.onerror = () => resolve(); // マスクPNGが無い線画はロード後に実行時生成する
            m.src = assetSrc(t.src.replace(/\.png$/i, '-mask.png'));
          }));
        });
        lineartLoadPromise = Promise.all(jobs).then(() => {
          // ★重要: 同寸法の *-mask.png（製作者シルエット）を最優先で使う。
          //   以前は実行時洪水塗りで上書きしていたが、壁膨張が外側ハローを生み
          //   細い葉・茎では内部が壁で潰れて抜け落ちる真原因になっていた。
          //   ファイルマスクが無い／寸法不一致のときだけ実行時生成にフォールバック。
          LINEART_TEMPLATES.forEach((t) => {
            const img = lineartImgs[t.id];
            const fileMask = lineartMaskImgs[t.id];
            const iw = img ? (img.naturalWidth || 0) : 0;
            const ih = img ? (img.naturalHeight || 0) : 0;
            const mw = fileMask ? (fileMask.naturalWidth || fileMask.width || 0) : 0;
            const mh = fileMask ? (fileMask.naturalHeight || fileMask.height || 0) : 0;
            const cfg = Object.assign({}, ART_LINE_CONFIG_DEFAULT, ART_LINE_CONFIG[t.id] || {});
            try {
              if (fileMask && iw > 0 && mw === iw && mh === ih) {
                lineartMaskImgs[t.id] = prepareClipMaskCanvas(fileMask, cfg.maskThreshold, cfg.maskErode || 0);
              } else if (img && iw > 0) {
                if (fileMask && (mw !== iw || mh !== ih)) {
                  console.warn('マスク寸法不一致→実行時生成:', t.id, mw + 'x' + mh, 'vs', iw + 'x' + ih);
                }
                lineartMaskImgs[t.id] = prepareClipMaskCanvas(
                  buildRuntimeSilhouetteMask(img),
                  cfg.maskThreshold,
                  cfg.maskErode || 0
                );
              } else {
                console.warn('マスク欠落:', t.id);
              }
            } catch (err) {
              console.warn('マスク準備に失敗:', t.id, err);
            }
            // 絵柄の実バウンディングボックスを算出（透明余白を除いた見た目サイズ正規化用）
            if (img && img.naturalWidth > 0 && !lineartBBox[t.id]) {
              try {
                lineartBBox[t.id] = computeLineartContentBBox(img);
              } catch (err) {
                console.warn('線画bbox算出に失敗:', t.id, err);
              }
            }
          });
        });
        return lineartLoadPromise;
      }

      // 線画画像の「不透明な絵柄部分」の外接矩形を返す（画像ピクセル座標）。
      // 透明余白のみを除去するため alpha 闾値で判定する。失敗時は全面を返す。
      function computeLineartContentBBox(img) {
        const W = img.naturalWidth, H = img.naturalHeight;
        const cv = document.createElement('canvas');
        cv.width = W; cv.height = H;
        const ctx = cv.getContext('2d');
        ctx.drawImage(img, 0, 0, W, H);
        const data = ctx.getImageData(0, 0, W, H).data;
        let minX = W, minY = H, maxX = -1, maxY = -1;
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
            if (data[(y * W + x) * 4 + 3] > 24) {
              if (x < minX) minX = x;
              if (x > maxX) maxX = x;
              if (y < minY) minY = y;
              if (y > maxY) maxY = y;
            }
          }
        }
        if (maxX < minX || maxY < minY) return { x: 0, y: 0, w: W, h: H };
        return { x: minX, y: minY, w: (maxX - minX + 1), h: (maxY - minY + 1) };
      }

      // 選択線画の絵柄を、キャンバス(w×h)内の一定サイズ枠へ正規化して収める描画矩形を返す。
      // どの線画も「絵柄部分」が同じ占有率(TARGET)・中央配置になり、見た目サイズが揃う。
      // 返り値 {dx,dy,dW,dH} は drawImage(img/mask, dx, dy, dW, dH) 用（画像全体の配置）。
      // ★主線とマスクは必ず同一矩形で描くこと（ズレの防止）。座標は整数に丸める。
      function getLineartDrawRect(flower, w, h) {
        const tpl = resolveLineartTpl(flower);
        const img = tpl && lineartImgs[tpl.id];
        const iw = img ? (img.naturalWidth || img.width) : 0;
        const ih = img ? (img.naturalHeight || img.height) : 0;
        if (!iw || !ih) return { dx: 0, dy: 0, dW: Math.round(w), dH: Math.round(h) };
        const bb = (tpl && lineartBBox[tpl.id]) || { x: 0, y: 0, w: iw, h: ih };
        const TARGET = 0.80; // 絵柄がキャンバスに占める最大割合（上下左右に均等な余白を確保）
        const scale = Math.min((w * TARGET) / bb.w, (h * TARGET) / bb.h);
        const dW = Math.round(iw * scale);
        const dH = Math.round(ih * scale);
        // 絵柄bboxの中心をキャンバス中心へ合わせる
        const cxImg = bb.x + bb.w / 2, cyImg = bb.y + bb.h / 2;
        const dx = Math.round(w / 2 - cxImg * scale);
        const dy = Math.round(h / 2 - cyImg * scale);
        return { dx, dy, dW, dH };
      }

      // 主線画像から「閉じたシルエット内側」のハードマスクを生成（ファイルマスク欠落時のみ）。
      // wallD は洪水の漏れ止め専用。最終塗りは !outside（外枠内すべて）を採用し、
      // 外側ハローになる「壁膨張帯への deep 膨張」は絶対に行わない。
      function buildRuntimeSilhouetteMask(img) {
        const W = img.naturalWidth, H = img.naturalHeight;
        const src = document.createElement('canvas');
        src.width = W; src.height = H;
        const sctx = src.getContext('2d');
        sctx.drawImage(img, 0, 0, W, H);
        const data = sctx.getImageData(0, 0, W, H).data;
        const N = W * H;

        const wall = new Uint8Array(N);
        for (let i = 0; i < N; i++) {
          const a = data[i * 4 + 3];
          const lum = 0.299 * data[i * 4] + 0.587 * data[i * 4 + 1] + 0.114 * data[i * 4 + 2];
          // 主線の芯だけ（薄いAAフチは壁にしない＝外側へ塗りが乗らない）
          if (a > 80 && lum < 140) wall[i] = 1;
        }
        const R = 2;
        const wallD = new Uint8Array(N);
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
            if (!wall[y * W + x]) continue;
            for (let dy = -R; dy <= R; dy++) {
              const ny = y + dy; if (ny < 0 || ny >= H) continue;
              for (let dx = -R; dx <= R; dx++) {
                if (dx * dx + dy * dy > R * R) continue;
                const nx = x + dx; if (nx < 0 || nx >= W) continue;
                wallD[ny * W + nx] = 1;
              }
            }
          }
        }
        const outside = new Uint8Array(N);
        const stack = new Int32Array(N);
        let sp = 0;
        const push = (idx) => { if (!outside[idx] && !wallD[idx]) { outside[idx] = 1; stack[sp++] = idx; } };
        for (let x = 0; x < W; x++) { push(x); push((H - 1) * W + x); }
        for (let y = 0; y < H; y++) { push(y * W); push(y * W + (W - 1)); }
        while (sp > 0) {
          const idx = stack[--sp];
          const x = idx % W, y = (idx / W) | 0;
          if (x + 1 < W) push(idx + 1);
          if (x - 1 >= 0) push(idx - 1);
          if (y + 1 < H) push(idx + W);
          if (y - 1 >= 0) push(idx - W);
        }
        // 外枠の内側すべて（細い葉の内部も wallD で潰れていても外枠内なら塗る）
        const out = document.createElement('canvas');
        out.width = W; out.height = H;
        const octx = out.getContext('2d');
        const outImg = octx.createImageData(W, H);
        const od = outImg.data;
        for (let i = 0; i < N; i++) {
          if (!outside[i]) {
            od[i * 4] = 255; od[i * 4 + 1] = 255; od[i * 4 + 2] = 255; od[i * 4 + 3] = 255;
          }
        }
        octx.putImageData(outImg, 0, 0);
        return out;
      }

      // マスクを二値化し、必要なら形態学的収縮で外側フチを内側へ戻す
      function prepareClipMaskCanvas(src, threshold, erodePx) {
        const W = src.naturalWidth || src.width;
        const H = src.naturalHeight || src.height;
        const cv = document.createElement('canvas');
        cv.width = W; cv.height = H;
        const c = cv.getContext('2d', { willReadFrequently: true });
        c.clearRect(0, 0, W, H);
        c.imageSmoothingEnabled = false;
        c.drawImage(src, 0, 0, W, H);
        hardenCanvasAlpha(cv, threshold == null ? 200 : threshold, false);
        const er = Math.max(0, Math.min(3, erodePx | 0));
        if (er > 0) erodeMaskAlpha(cv, er);
        hardenCanvasAlpha(cv, 128, false);
        return cv;
      }

      function erodeMaskAlpha(cv, rounds) {
        try {
          const c = cv.getContext('2d', { willReadFrequently: true });
          const w = cv.width, h = cv.height;
          let d = new Uint8ClampedArray(c.getImageData(0, 0, w, h).data);
          for (let r = 0; r < rounds; r++) {
            const src = d;
            const next = new Uint8ClampedArray(src);
            for (let y = 0; y < h; y++) {
              for (let x = 0; x < w; x++) {
                const i = (y * w + x) * 4;
                if (src[i + 3] < 128) {
                  next[i] = next[i + 1] = next[i + 2] = next[i + 3] = 0;
                  continue;
                }
                let keep = true;
                for (let dy = -1; dy <= 1 && keep; dy++) {
                  for (let dx = -1; dx <= 1; dx++) {
                    const nx = x + dx, ny = y + dy;
                    if (nx < 0 || ny < 0 || nx >= w || ny >= h) { keep = false; break; }
                    if (src[(ny * w + nx) * 4 + 3] < 128) { keep = false; break; }
                  }
                }
                if (!keep) next[i] = next[i + 1] = next[i + 2] = next[i + 3] = 0;
              }
            }
            d = next;
          }
          const out = c.createImageData(w, h);
          out.data.set(d);
          c.putImageData(out, 0, 0);
        } catch (_) {}
      }

      // キャンバスのアルファを二値化して半透明フチ（外側ハロー／内側抜け）を抹殺する
      function hardenCanvasAlpha(cv, threshold, rgbKeep) {
        try {
          const c = cv.getContext('2d', { willReadFrequently: true });
          const w = cv.width, h = cv.height;
          if (!w || !h) return;
          const img = c.getImageData(0, 0, w, h);
          const d = img.data;
          const t = threshold == null ? 128 : threshold;
          for (let i = 0; i < d.length; i += 4) {
            const a = d[i + 3];
            if (a >= t) {
              d[i + 3] = 255;
              if (!rgbKeep) { d[i] = 255; d[i + 1] = 255; d[i + 2] = 255; }
            } else {
              d[i] = d[i + 1] = d[i + 2] = d[i + 3] = 0;
            }
          }
          c.putImageData(img, 0, 0);
        } catch (_) {}
      }
      function resolveLineartTpl(flower) {
        const id = (flower && flower.selectedCanvasId) || 'line-1';
        return CANVAS_TEMPLATES[id] || CANVAS_TEMPLATES['line-1'];
      }
      // 選択された線画(主線)のImage
      function getSelectedLineartImg(flower) {
        const tpl = resolveLineartTpl(flower);
        const img = tpl && lineartImgs[tpl.id];
        return img && img.naturalWidth > 0 ? img : null;
      }
      // 選択された線画の塗りつぶしシルエットマスクのImage
      function getSelectedLineartMask(flower) {
        const tpl = resolveLineartTpl(flower);
        const m = tpl && lineartMaskImgs[tpl.id];
        // Image（naturalWidth）と 実行時生成の canvas（width）の両対応
        const ok = m && ((m.naturalWidth || 0) > 0 || (m.width || 0) > 0);
        return ok ? m : null;
      }

      function loadBottleImage() {
        if (bottleReady && bottleImg.naturalWidth > 0) return Promise.resolve(bottleImg);
        if (bottleLoadPromise) return bottleLoadPromise;
        bottleLoadPromise = new Promise((resolve) => {
          const finish = (ok) => {
            bottleLoadPromise = null;
            if (ok) {
              bottleReady = true;
              // まず実測フラクションからデフォルトのクロップを設定（getImageDataが使えなくても正しいサイズ）
              const iw = bottleImg.naturalWidth, ih = bottleImg.naturalHeight;
              bottleCrop = {
                sx: Math.round(iw * BOTTLE_CROP_FRACTIONS.sx),
                sy: Math.round(ih * BOTTLE_CROP_FRACTIONS.sy),
                sw: Math.round(iw * BOTTLE_CROP_FRACTIONS.sw),
                sh: Math.round(ih * BOTTLE_CROP_FRACTIONS.sh)
              };
              buildBottleMask();
              resolve(bottleImg);
            }
            else resolve(null);
          };
          bottleImg.onload = () => finish(bottleImg.naturalWidth > 0);
          bottleImg.onerror = () => finish(false);
          bottleImg.src = assetSrc(BOTTLE_IMAGE);
          if (bottleImg.complete) finish(bottleImg.naturalWidth > 0);
        });
        return bottleLoadPromise;
      }

      // 瓶PNGから「内側だけ」のマスクを生成（外側の輪郭でクリップ）。
      // 背景が透過ならalphaで、白背景でも輪郭のfloodで内側を判定する堅牢版。
      function buildBottleMask() {
        try {
          const iw = bottleImg.naturalWidth, ih = bottleImg.naturalHeight;
          if (!iw || !ih) return;
          const src = document.createElement('canvas');
          src.width = iw; src.height = ih;
          const sctx = src.getContext('2d', { willReadFrequently: true });
          sctx.drawImage(bottleImg, 0, 0);
          const data = sctx.getImageData(0, 0, iw, ih);
          const px = data.data;
          const inside = new Uint8Array(iw * ih); // 1 = 瓶(内側/ガラス), 0 = 外側背景
          // 背景判定: 四隅の色/透明度を基準に、"背景に近い" 画素を外側とする
          const corner = [0, (iw - 1) * 4, (ih - 1) * iw * 4, (ih * iw - 1) * 4];
          let bgA = 0, bgR = 0, bgG = 0, bgB = 0;
          corner.forEach((o) => { bgA += px[o + 3]; bgR += px[o]; bgG += px[o + 1]; bgB += px[o + 2]; });
          bgA /= 4; bgR /= 4; bgG /= 4; bgB /= 4;
          const transparentBg = bgA < 40;
          const isBg = (o) => {
            const a = px[o + 3];
            if (transparentBg) return a < 40;
            // 白(または背景色)に近く不透明なら背景
            const dr = px[o] - bgR, dg = px[o + 1] - bgG, db = px[o + 2] - bgB;
            return a > 40 && (dr * dr + dg * dg + db * db) < 900;
          };
          // 外周からflood fillして"到達できる背景"をマーク。到達しなければ瓶内側。
          const visited = new Uint8Array(iw * ih);
          const stack = [];
          const pushIf = (x, y) => {
            if (x < 0 || y < 0 || x >= iw || y >= ih) return;
            const idx = y * iw + x;
            if (visited[idx]) return;
            visited[idx] = 1;
            if (isBg(idx * 4)) stack.push(idx);
          };
          for (let x = 0; x < iw; x++) { pushIf(x, 0); pushIf(x, ih - 1); }
          for (let y = 0; y < ih; y++) { pushIf(0, y); pushIf(iw - 1, y); }
          while (stack.length) {
            const idx = stack.pop();
            const x = idx % iw, y = (idx / iw) | 0;
            pushIf(x + 1, y); pushIf(x - 1, y); pushIf(x, y + 1); pushIf(x, y - 1);
          }
          // visited かつ 背景 = 外側。それ以外 = 瓶。同時にバウンディングボックスを算出。
          const full = document.createElement('canvas');
          full.width = iw; full.height = ih;
          const fctx = full.getContext('2d');
          const out = fctx.createImageData(iw, ih);
          let minX = iw, minY = ih, maxX = 0, maxY = 0, any = false;
          for (let i = 0; i < iw * ih; i++) {
            const outside = visited[i] && isBg(i * 4);
            out.data[i * 4 + 3] = outside ? 0 : 255;
            if (!outside) {
              const x = i % iw, y = (i / iw) | 0;
              if (x < minX) minX = x; if (x > maxX) maxX = x;
              if (y < minY) minY = y; if (y > maxY) maxY = y;
              any = true;
            }
          }
          fctx.putImageData(out, 0, 0);
          if (!any) { bottleMaskCanvas = full; bottleCrop = { sx: 0, sy: 0, sw: iw, sh: ih }; return; }
          const pad = Math.round(Math.min(iw, ih) * 0.01);
          const sx = Math.max(0, minX - pad), sy = Math.max(0, minY - pad);
          const sw = Math.min(iw - sx, maxX - minX + 1 + pad * 2);
          const sh = Math.min(ih - sy, maxY - minY + 1 + pad * 2);
          const mask = document.createElement('canvas');
          mask.width = sw; mask.height = sh;
          mask.getContext('2d').drawImage(full, sx, sy, sw, sh, 0, 0, sw, sh);
          bottleMaskCanvas = mask;
          bottleCrop = { sx, sy, sw, sh };
        } catch (e) {
          // getImageDataが使えない場合はマスクなし（=alpha直接クリップ）＋デフォルトクロップを維持
          bottleMaskCanvas = null;
        }
      }

      function clearStampCache() {
        Object.keys(stampCache).forEach(k => { delete stampCache[k]; });
      }

      function loadFabricImage() {
        if (fabricReady && fabricImg.naturalWidth > 0) return Promise.resolve(fabricImg);
        if (fabricLoadPromise) return fabricLoadPromise;

        fabricLoadPromise = new Promise((resolve) => {
          const finish = (ok) => {
            fabricLoadPromise = null;
            if (ok) {
              fabricReady = true;
              resolve(fabricImg);
            } else {
              resolve(null);
            }
          };

          fabricImg.onload = () => finish(fabricImg.naturalWidth > 0);
          fabricImg.onerror = () => finish(false);
          fabricImg.src = assetSrc(FABRIC_IMAGE);

          if (fabricImg.complete) {
            finish(fabricImg.naturalWidth > 0);
          }
        });

        return fabricLoadPromise;
      }

      function drawCanvasCrosshatch(targetCtx, w, h) {
        targetCtx.save();
        targetCtx.strokeStyle = 'rgba(0, 0, 0, 0.03)';
        targetCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 4) {
          targetCtx.beginPath();
          targetCtx.moveTo(0, y);
          targetCtx.lineTo(w, y);
          targetCtx.stroke();
        }
        for (let x = 0; x < w; x += 4) {
          targetCtx.beginPath();
          targetCtx.moveTo(x, 0);
          targetCtx.lineTo(x, h);
          targetCtx.stroke();
        }
        targetCtx.restore();
      }

      function drawCanvasFabricBase(targetCtx, w, h, fabricImage) {
        targetCtx.globalCompositeOperation = 'source-over';
        targetCtx.fillStyle = CANVAS_BG;
        targetCtx.fillRect(0, 0, w, h);
        drawCanvasCrosshatch(targetCtx, w, h);
        if (fabricImage && fabricImage.naturalWidth > 0) {
          targetCtx.globalCompositeOperation = 'multiply';
          targetCtx.drawImage(fabricImage, 0, 0, w, h);
          targetCtx.globalCompositeOperation = 'source-over';
        }
      }

      function captureCompositeArtworkDataUrl(w, h, fabricImage) {
        const out = document.createElement('canvas');
        out.width = w;
        out.height = h;
        const octx = out.getContext('2d');
        octx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, w, h);
        if (fabricImage && fabricImage.naturalWidth > 0) {
          octx.save();
          octx.globalAlpha = 0.35;
          octx.globalCompositeOperation = 'multiply';
          octx.drawImage(fabricImage, 0, 0, w, h);
          octx.restore();
        }
        return out.toDataURL('image/png');
      }

      function createGradientStamp(color1, color2) {
        if (!splatReady || !splatImg.naturalWidth) return null;
        const c1 = normalizeSplashHex(color1);
        const c2 = normalizeSplashHex(color2);
        if (!c1) return null;
        const cacheKey = `grad:${c1}|${c2 || c1}`;
        if (stampCache[cacheKey]) return stampCache[cacheKey];

        try {
          const w = splatImg.naturalWidth;
          const h = splatImg.naturalHeight;
          const work = document.createElement('canvas');
          work.width = w;
          work.height = h;
          const wctx = work.getContext('2d');
          const grad = wctx.createLinearGradient(0, 0, w, h);
          grad.addColorStop(0, c1);
          grad.addColorStop(1, c2);
          wctx.fillStyle = grad;
          wctx.fillRect(0, 0, w, h);
          wctx.globalCompositeOperation = 'screen';
          wctx.drawImage(splatImg, 0, 0);
          wctx.globalCompositeOperation = 'source-over';
          stampCache[cacheKey] = work;
          return work;
        } catch (err) {
          console.error('グラデーションスタンプ生成エラー:', err);
          return createColorStamp(c1);
        }
      }

      function getSplashStamp(splash) {
        const primary = normalizeSplashHex(splash.color1 || splash.color);
        if (!primary) return null;
        if (splash.gradient && splash.color2) {
          return createGradientStamp(primary, splash.color2);
        }
        return createColorStamp(primary);
      }

      // getImageData 不使用: screen で色染め → multiply で白背景を壁色に溶かす
      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth) return null;
        const normalized = normalizeSplashHex(color);
        if (!normalized) return null;
        if (stampCache[normalized]) return stampCache[normalized];

        try {
          const w = splatImg.naturalWidth;
          const h = splatImg.naturalHeight;
          const work = document.createElement('canvas');
          work.width = w;
          work.height = h;
          const wctx = work.getContext('2d');

          wctx.fillStyle = normalized;
          wctx.fillRect(0, 0, w, h);
          wctx.globalCompositeOperation = 'screen';
          wctx.drawImage(splatImg, 0, 0);
          wctx.globalCompositeOperation = 'source-over';

          stampCache[normalized] = work;
          return work;
        } catch (err) {
          console.error('スタンプ生成エラー:', err);
          return null;
        }
      }

      function isCanvasFramedDisplay() {
        return canvasWrap.classList.contains('is-framed')
          || canvasWrap.classList.contains('framing-active')
          || museumFrame.classList.contains('framing-animate');
      }

      function getCanvasLogicalSize() {
        if (isCanvasFramedDisplay()) {
          return getStoredCanvasAspect();
        }
        const w = canvas.clientWidth || CANVAS_LOGICAL_W;
        const h = canvas.clientHeight || CANVAS_LOGICAL_H;
        return { w, h };
      }

      function fillCanvasBackground() {
        const { w, h } = getCanvasLogicalSize();
        fillCanvasBackgroundOnCtx(ctx, w, h);
      }

      function fillCanvasBackgroundOnCtx(c, w, h) {
        c.globalCompositeOperation = 'source-over';
        c.fillStyle = CANVAS_BG;
        c.fillRect(0, 0, w, h);
      }

      function getStoredCanvasAspect() {
        const aspectW = parseFloat(canvasWrap.style.getPropertyValue('--creation-aspect-w'))
          || parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-w'));
        const aspectH = parseFloat(canvasWrap.style.getPropertyValue('--creation-aspect-h'))
          || parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-h'));
        if (aspectW > 0 && aspectH > 0) {
          return { w: Math.round(aspectW), h: Math.round(aspectH) };
        }
        const isFramed = canvasWrap.classList.contains('is-framed')
          || canvasWrap.classList.contains('framing-active');
        if (!isFramed) {
          const cw = Math.round(canvas.clientWidth);
          const ch = Math.round(canvas.clientHeight);
          if (cw > 0 && ch > 0) {
            return { w: cw, h: ch };
          }
        }
        return { w: CANVAS_LOGICAL_W, h: CANVAS_LOGICAL_H };
      }

      function lockCreationCanvasAspect() {
        if (canvasWrap.dataset.creationAspectLocked === '1') {
          return getStoredCanvasAspect();
        }
        let cw = Math.round(canvas.clientWidth);
        let ch = Math.round(canvas.clientHeight);
        if (!(cw > 0 && ch > 0)) {
          cw = CANVAS_LOGICAL_W;
          ch = CANVAS_LOGICAL_H;
        }
        canvasWrap.style.setProperty('--creation-aspect-w', String(cw));
        canvasWrap.style.setProperty('--creation-aspect-h', String(ch));
        canvasWrap.style.setProperty('--canvas-aspect-w', String(cw));
        canvasWrap.style.setProperty('--canvas-aspect-h', String(ch));
        canvasWrap.dataset.creationAspectLocked = '1';
        return { w: cw, h: ch };
      }

      function clearCreationCanvasAspectLock() {
        canvasWrap.removeAttribute('data-creation-aspect-locked');
        canvasWrap.style.removeProperty('--creation-aspect-w');
        canvasWrap.style.removeProperty('--creation-aspect-h');
      }

      // チャージ進行度とキャンバス実寸から描画ピクセルサイズを決定
      function createSplashData(chargeProgress, inkOpacity, w, h) {
        const drawSizePx = splashPixelSizeFromProgress(chargeProgress, w, h);
        const opacity = Math.min(CHARGE_OPACITY_MAX, Math.max(CHARGE_OPACITY_MIN, Number(inkOpacity) || CHARGE_OPACITY_MIN));
        return {
          v: 10,
          drawSizePx,
          baseSize: drawSizePx,
          rotation: Math.random() * Math.PI * 2,
          scaleFactor: 1,
          opacity,
          splashPattern: Math.floor(Math.random() * SPLAT_PATTERN_COUNT),
          hitRadius: Math.max(14, drawSizePx * 0.22)
        };
      }

      function migrateSplash(s) {
        let baseSize = s.baseSize || 95;
        if (baseSize >= 200) {
          // 旧仕様（220〜410px台）のデータはそのまま維持
        } else if (baseSize > 0 && baseSize < 35) {
          baseSize *= 2.5;
        }
        const scaleFactor = s.scaleFactor ?? (0.9 + Math.random() * 0.45);
        const drawSizePx = s.drawSizePx ?? (baseSize * scaleFactor);
        return {
          id: s.id || Date.now().toString(36),
          nx: s.nx,
          ny: s.ny,
          color: normalizeSplashHex(s.color1 || s.color),
          color1: normalizeSplashHex(s.color1 || s.color),
          color2: s.color2 ? normalizeSplashHex(s.color2) : null,
          gradient: !!s.gradient && !!s.color2,
          weight: s.weight ?? 1.2,
          word: s.word || '',
          timestamp: s.timestamp,
          v: s.v ?? 10,
          drawSizePx,
          baseSize: drawSizePx,
          rotation: s.rotation ?? Math.random() * Math.PI * 2,
          scaleFactor: s.drawSizePx ? 1 : scaleFactor,
          opacity: s.opacity ?? CHARGE_OPACITY_MIN,
          splashPattern: s.splashPattern ?? 0,
          hitRadius: s.hitRadius || Math.max(14, drawSizePx * 0.22),
          drip: null
        };
      }

      function initDrip(splash) {
        const size = resolveSplashDrawSizePx(splash);
        splash.drip = {
          offsetX: (Math.random() - 0.5) * size * 0.1,
          offsetY: size * (0.16 + Math.random() * 0.1),
          length: 0,
          maxLength: 22 + Math.random() * 38,
          speed: 0.32 + Math.random() * 0.48,
          width: 1.6 + Math.random() * 2.8,
          active: true
        };
      }

      function updateDrips(dt) {
        let active = false;
        splashes.forEach(s => {
          if (!s.drip || !s.drip.active) return;
          if (s.drip.length < s.drip.maxLength) {
            s.drip.length = Math.min(s.drip.maxLength, s.drip.length + s.drip.speed * dt);
            active = true;
          } else {
            s.drip.active = false;
          }
        });
        return active;
      }

      function spawnShockwave(px, py) {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        shockwaves.push({
          x: px,
          y: py,
          radius: 0,
          maxRadius: Math.min(w, h) * 0.42,
          alpha: 0.52,
          start: performance.now(),
          duration: 520
        });
      }

      function spawnTapRipple(px, py) {
        const w = canvas.clientWidth || CANVAS_LOGICAL_W;
        const h = canvas.clientHeight || CANVAS_LOGICAL_H;
        tapRipples.push({
          x: px,
          y: py,
          start: performance.now(),
          duration: TAP_RIPPLE_DURATION,
          maxRadius: Math.min(w, h) * TAP_RIPPLE_MAX_FRAC
        });
        ensureAmbientLoop();
      }

      function renderShockwaves() {
        const now = performance.now();
        shockwaves = shockwaves.filter(sw => {
          const t = Math.min(1, (now - sw.start) / sw.duration);
          if (t >= 1) return false;
          const radius = sw.maxRadius * easeOutCubic(t);
          const alpha = sw.alpha * (1 - t);
          shockCtx.strokeStyle = `rgba(72, 68, 62, ${alpha})`;
          shockCtx.lineWidth = 2.5 * (1 - t * 0.65);
          shockCtx.beginPath();
          shockCtx.arc(sw.x, sw.y, radius, 0, Math.PI * 2);
          shockCtx.stroke();
          shockCtx.strokeStyle = `rgba(120, 112, 100, ${alpha * 0.35})`;
          shockCtx.lineWidth = 1.2 * (1 - t);
          shockCtx.beginPath();
          shockCtx.arc(sw.x, sw.y, radius * 0.72, 0, Math.PI * 2);
          shockCtx.stroke();
          return true;
        });
        return shockwaves.length > 0;
      }

      function renderTapRipples() {
        const now = performance.now();
        tapRipples = tapRipples.filter(ripple => {
          const t = Math.min(1, (now - ripple.start) / ripple.duration);
          if (t >= 1) return false;
          const radius = ripple.maxRadius * easeOutCubic(t);
          const alpha = 0.6 * (1 - t);
          shockCtx.strokeStyle = `rgba(212, 175, 55, ${alpha})`;
          shockCtx.lineWidth = 1.75;
          shockCtx.beginPath();
          shockCtx.arc(ripple.x, ripple.y, radius, 0, Math.PI * 2);
          shockCtx.stroke();
          shockCtx.strokeStyle = `rgba(243, 229, 171, ${alpha * 0.42})`;
          shockCtx.lineWidth = 1.2;
          shockCtx.beginPath();
          shockCtx.arc(ripple.x, ripple.y, radius * 0.82, 0, Math.PI * 2);
          shockCtx.stroke();
          return true;
        });
        return tapRipples.length > 0;
      }

      function clearAndDrawOverlays() {
        const w = shockCanvas.clientWidth;
        const h = shockCanvas.clientHeight;
        shockCtx.clearRect(0, 0, w, h);
        const shocksActive = renderShockwaves();
        const ripplesActive = renderTapRipples();
        return shocksActive || ripplesActive;
      }

      function drawShockwaves() {
        return clearAndDrawOverlays();
      }

      function triggerCanvasShake() {
        canvasWrap.classList.remove('shaking');
        void canvasWrap.offsetWidth;
        canvasWrap.classList.add('shaking');
        setTimeout(() => canvasWrap.classList.remove('shaking'), 460);
      }

      function ensureAmbientLoop() {
        if (ambientLoopId) return;
        let last = performance.now();
        function frame(now) {
          const dt = Math.min(0.05, (now - last) / 1000);
          last = now;
          const dripsActive = updateDrips(dt);
          const overlaysActive = clearAndDrawOverlays();
          if (dripsActive || overlaysActive) {
            redrawCanvas();
            ambientLoopId = requestAnimationFrame(frame);
          } else {
            ambientLoopId = null;
            shockCtx.clearRect(0, 0, shockCanvas.clientWidth, shockCanvas.clientHeight);
          }
        }
        ambientLoopId = requestAnimationFrame(frame);
      }

      function exitZenMode() {
        clearTimeout(zenTimer);
        clearTimeout(zenFadeTimer);
        zenTimer = null;
        zenFadeTimer = null;
        isZenMode = false;
        phoneShell.classList.remove('zen-mode', 'zen-fading');
      }

      function resetZenTimer() {
        if (!zenArmed || frameModal.classList.contains('open') || getGalleryProgress().ready) return;
        exitZenMode();
        zenTimer = setTimeout(() => {
          phoneShell.classList.add('zen-fading');
          zenFadeTimer = setTimeout(() => {
            isZenMode = true;
            phoneShell.classList.remove('zen-fading');
            phoneShell.classList.add('zen-mode');
          }, ZEN_FADE_MS);
        }, ZEN_IDLE_MS);
      }

      function scheduleZenAfterImpact() {
        if (getGalleryProgress().ready) {
          updateFrameButtonState();
          return;
        }
        zenArmed = true;
        resetZenTimer();
      }

      function onUserActivity() {
        if (isZenMode || phoneShell.classList.contains('zen-fading')) {
          exitZenMode();
        }
        if (zenArmed && !frameModal.classList.contains('open') && !getGalleryProgress().ready) {
          resetZenTimer();
        }
      }

      function migrateHistoriesToRecipes() {
        try {
          const raw = localStorage.getItem(HISTORY_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          if (!Array.isArray(data) || !data.length) return;
          if (data[0].image && data[0].timestamp != null && typeof data[0].nx !== 'number') {
            localStorage.removeItem(HISTORY_KEY);
          }
        } catch (_) {}
      }

      function migrateGalleryStorage() {
        try {
          const data = readGalleryStore();
          if (!Array.isArray(data) || !data.length) return;
          const recipeOnly = data.filter(entry => entry && Array.isArray(entry.splats));
          if (recipeOnly.length !== data.length) {
            writeGalleryStore(recipeOnly);
          }
        } catch (_) {}
      }

      // 回廊用の軽量スナップショット生成（容量を抑えつつ境界のにじみを最小化）
      function encodeArtworkDataUrl(sourceCanvas) {
        // WebP優先（小さい）。未対応時は JPEG。PNGは肥大化して回廊件数を殺すため最終手段のみ。
        let url = toStorableDataUrl(sourceCanvas, 560, 0.86, 'image/webp');
        if (!url || url.indexOf('data:image/webp') !== 0) {
          url = toStorableDataUrl(sourceCanvas, 520, 0.84, 'image/jpeg');
        }
        if (!url) url = toStorableDataUrl(sourceCanvas, 480, undefined, 'image/png');
        return url;
      }

      // 旧JPEG／画像欠落（容量退避で剥がされた）作品を、軽量エンコードで1件ずつ安全に復元する。
      // ★一括で巨大WebP/PNGに差し替えてから write すると Quota 退避で古い画像が剝がれ、
      //   gallery.html の hasValidArtworkImage で「数件しか見えない」偽データロスになる。
      const ART_MASK_VERSION = 4;
      function galleryEntryHasFlower(e) {
        return !!(e && e.flower && (e.flower.center || (Array.isArray(e.flower.petals) && e.flower.petals.length)));
      }
      function galleryEntryNeedsRemaster(e) {
        if (!galleryEntryHasFlower(e)) return false;
        const url = e.artworkImageDataUrl || '';
        if (!url || url.length < 512 || url.indexOf('data:image') !== 0) return true;
        if (/^data:image\/jpe?g/i.test(url) && e.artMaskVersion !== ART_MASK_VERSION) return true;
        if (e.artMaskVersion !== ART_MASK_VERSION && /^data:image\/png/i.test(url) && url.length > 350000) return true;
        return false;
      }
      async function remasterGalleryArtworkSnapshots() {
        try {
          await loadLineartImages();
          await loadFabricImage().catch(() => {});
          const gallery = readGalleryStore();
          if (!Array.isArray(gallery) || !gallery.length) return;
          let restored = 0;
          let skipped = 0;
          const fabric = (fabricImg && fabricImg.naturalWidth > 0) ? fabricImg : null;

          for (let i = 0; i < gallery.length; i++) {
            const e = gallery[i];
            if (!galleryEntryNeedsRemaster(e)) continue;
            if (!e.id) e.id = `art_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 7)}`;
            const prevUrl = e.artworkImageDataUrl;
            const prevVer = e.artMaskVersion;
            const lw = (e.canvasW > 0) ? Math.round(e.canvasW) : CANVAS_LOGICAL_W;
            const lh = (e.canvasH > 0) ? Math.round(e.canvasH) : CANVAS_LOGICAL_H;
            let snap = null;
            try {
              snap = await renderFlowerSnapshotDataUrl(e.flower, lw, lh, fabric);
            } catch (err) {
              console.warn('[gallery-remaster] 再描画失敗:', e.id, err);
              skipped++;
              continue;
            }
            if (!snap || !snap.artworkImageDataUrl || snap.artworkImageDataUrl.length < 512) {
              skipped++;
              continue;
            }
            e.artworkImageDataUrl = snap.artworkImageDataUrl;
            e.artMaskVersion = ART_MASK_VERSION;
            if (snap.snapshotPixelW) e.snapshotPixelW = snap.snapshotPixelW;
            if (snap.snapshotPixelH) e.snapshotPixelH = snap.snapshotPixelH;
            // ボトルは容量圧迫の主因になりやすいので再ベイクでは載せ直さない
            delete e.bottleImageDataUrl;
            delete e.bottleW;
            delete e.bottleH;
            const ok = writeGalleryStore(gallery, e.id);
            if (!ok) {
              e.artworkImageDataUrl = prevUrl;
              e.artMaskVersion = prevVer;
              skipped++;
              console.warn('[gallery-remaster] 容量不足で復元スキップ:', e.id);
              break;
            }
            restored++;
          }
          console.log('[gallery-remaster] 復元:', restored, '件 / スキップ:', skipped, '件 / 総エントリ:', gallery.length);
        } catch (err) {
          console.warn('[gallery-remaster] 失敗:', err);
        }
      }

      function loadHistoryRecipes() {
        try {
          const raw = localStorage.getItem(HISTORY_KEY);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          return data.filter(s => s && typeof s.nx === 'number' && s.color);
        } catch { return []; }
      }

      function saveGallerySnapshot() {
        try {
          syncHistoriesFromSplashes();
          updateFrameButtonState();
        } catch (err) {
          console.warn('履歴保存に失敗:', err);
        }
      }

      function buildDiaryHistoryFromSplashes(list) {
        const points = list.map((s) => ({
          nx: s.nx,
          ny: s.ny,
          x: typeof s.nx === 'number' ? Math.round(s.nx * 100) : undefined,
          y: typeof s.ny === 'number' ? Math.round(s.ny * 100) : undefined,
          color: normalizeSplashHex(s.color1 || s.color),
          baseSize: resolveSplashDrawSizePx(s),
          size: resolveSplashDrawSizePx(s),
          drawSizePx: resolveSplashDrawSizePx(s),
          scaleFactor: s.scaleFactor,
          rotation: s.rotation,
          opacity: s.opacity,
          word: s.word || '',
          timestamp: s.timestamp || Date.now()
        }));
        const entries = list.map((s) => ({
          word: s.word || '',
          color: normalizeSplashHex(s.color1 || s.color),
          date: formatDate(s.timestamp),
          timestamp: s.timestamp || Date.now(),
          opacity: s.opacity
        })).filter((e) => e.color);
        return [{ points, history: entries, updatedAt: Date.now() }];
      }

      function syncHistoriesFromSplashes() {
        syncFlowerToSplashes();
        const recipes = splashes.map(({ drip, ...rest }) => rest);
        try {
          localStorage.setItem(HISTORY_KEY, JSON.stringify(recipes));
          localStorage.setItem(INSCAPE_HISTORY_KEY, JSON.stringify(buildDiaryHistoryFromSplashes(splashes)));
        } catch (err) {
          console.warn('履歴同期に失敗:', err);
        }
      }

      function normalizeDiaryColor(color) {
        if (!color) return null;
        const raw = String(color).trim();
        const matched = raw.match(/#[0-9A-Fa-f]{6}\b/);
        if (matched) return matched[0].toLowerCase();
        if (/^[0-9A-Fa-f]{6}$/.test(raw)) return `#${raw.toLowerCase()}`;
        return raw;
      }

      function appendDiaryColorLog(word, color, timestamp, opacity) {
        const hex = normalizeDiaryColor(color);
        if (!hex) return;
        try {
          let logs = JSON.parse(localStorage.getItem(ALL_DIARIES_KEY)) || [];
          if (!Array.isArray(logs)) logs = [];
          const ts = timestamp || Date.now();
          const op = Math.min(CHARGE_OPACITY_MAX, Math.max(CHARGE_OPACITY_MIN,
            opacity != null ? Number(opacity) : CHARGE_OPACITY_MIN));
          const entry = {
            word: String(word || '').trim(),
            color: hex,
            date: formatDate(ts),
            timestamp: ts,
            opacity: op   // 長押しで決めた感情の濃淡（ボトル・今日の私の色と同期）
          };
          const dedupeKey = `${entry.timestamp}|${entry.color}|${entry.word}`;
          const existingIdx = logs.findIndex((e) => `${e.timestamp || 0}|${e.color}|${e.word || ''}` === dedupeKey);
          if (existingIdx >= 0) {
            // 既存ログに濃淡が欠落している場合は補完する（過去データの救出）
            if (logs[existingIdx].opacity == null) logs[existingIdx].opacity = op;
            localStorage.setItem(ALL_DIARIES_KEY, JSON.stringify(logs));
            return;
          }
          logs.push(entry);
          localStorage.setItem(ALL_DIARIES_KEY, JSON.stringify(logs));
        } catch (err) {
          console.warn('カラー日記ログの保存に失敗:', err);
        }
      }

      async function saveRecipeToGallery(prefetchedSnapshot, frozenFlower) {
        const flower = frozenFlower || cloneFlowerForGallerySave(currentFlower);
        if (!isFlowerComplete(flower)) {
          console.warn('回廊保存: 花が未完成です', getFlowerDayCount(flower));
          return false;
        }
        const saveSplashes = flowerToSplashRecipes(flower);

        try {
          const cycleKey = buildArtworkCycleKeyFromFlower(flower);
          syncHistoriesFromSplashes();
          const history = saveSplashes.map((s) => ({
            word: s.word || '',
            color: normalizeSplashHex(s.color1 || s.color),
            date: formatDate(s.timestamp),
            timestamp: s.timestamp || Date.now()
          })).filter((e) => e.color);

          const snapshot = (prefetchedSnapshot && prefetchedSnapshot.artworkImageDataUrl)
            ? prefetchedSnapshot
            : await persistArtworkCanvasSnapshot(flower);
          const { period, periodStart, periodEnd } = computeArtworkPeriodFromFlower(flower);
          const flowerDays = getFlowerDayCount(flower);

          let gallery = readGalleryStore();
          if (!Array.isArray(gallery)) gallery = [];

          const wordsHash = hashWeekWords(
            saveSplashes
              .slice()
              .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0))
              .map((s) => String(s.word || '').trim())
              .filter(Boolean)
          );

          const entry = {
            id: `art_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 7)}`,
            splats: saveSplashes,
            flower,
            flowerDays,
            history,
            period,
            periodStart,
            periodEnd,
            wordsHash,
            cycleKey,
            completedAt: flower.completedAt || Date.now(),
            canvasW: snapshot && snapshot.canvasW ? snapshot.canvasW : (parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-w')) || canvas.clientWidth),
            canvasH: snapshot && snapshot.canvasH ? snapshot.canvasH : (parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-h')) || canvas.clientHeight),
            snapshotPixelW: snapshot && snapshot.snapshotPixelW ? snapshot.snapshotPixelW : undefined,
            snapshotPixelH: snapshot && snapshot.snapshotPixelH ? snapshot.snapshotPixelH : undefined
          };
          if (snapshot && snapshot.artworkImageDataUrl) {
            entry.artworkImageDataUrl = snapshot.artworkImageDataUrl;
          }
          if (snapshot && snapshot.bottleImageDataUrl) {
            entry.bottleImageDataUrl = snapshot.bottleImageDataUrl;
            entry.bottleW = snapshot.bottleW;
            entry.bottleH = snapshot.bottleH;
          }
          entry.selectedCanvasId = flower.selectedCanvasId || 'flow-01';
          entry.bottlePhase = flower.bottlePhase || BOTTLE_PHASES.COMPLETE;

          const existingIdx = gallery.findIndex((item) => item && item.cycleKey === cycleKey);
          if (existingIdx >= 0) {
            entry.id = gallery[existingIdx].id || entry.id;
            gallery[existingIdx] = mergeGalleryEntry(gallery[existingIdx], entry);
          } else {
            gallery.push(entry);
          }

          if (gallery.length > GALLERY_MAX) {
            gallery = gallery.slice(-GALLERY_MAX);
          }

          // 【保存直前ログ】これから永続化する対象データが100%生存していることを証明する。
          const artUrl = entry.artworkImageDataUrl || '';
          console.log('■ [保存直前] 感情の回廊へ書き込むデータ:');
          console.table([{
            作品ID: entry.id,
            線画ID: entry.selectedCanvasId,
            画像URL長: artUrl.length,
            画像KB: Math.round(artUrl.length / 1024),
            日数: entry.flowerDays,
            期間: entry.period,
            総エントリ数: gallery.length
          }]);

          const saved = writeGalleryStore(gallery, entry.id);
          if (!saved) {
            console.error('■ 保存エラー発生: 回廊への保存に失敗しました（容量確保不可）');
            return false;
          }

          // 【保存直後ログ】LocalStorageから読み戻して、当該作品の画像が定着したことを証明する。
          const verifyBack = readGalleryStore();
          const savedEntry = Array.isArray(verifyBack)
            ? verifyBack.find((e) => e && e.id === entry.id)
            : null;
          const savedUrl = (savedEntry && savedEntry.artworkImageDataUrl) || '';
          console.log('■ [保存直後] LocalStorage(inscape_gallery) 読み戻し検証:');
          console.table([{
            作品ID: savedEntry ? savedEntry.id : '(消失)',
            画像URL長: savedUrl.length,
            画像KB: Math.round(savedUrl.length / 1024),
            画像生存: savedUrl.length >= 512 ? 'YES' : 'NO',
            保存後総数: Array.isArray(verifyBack) ? verifyBack.length : 0
          }]);
          return saved;
        } catch (err) {
          console.error('■ 保存エラー発生: 回廊レシピ保存で例外:', err);
          return false;
        }
      }

      // Canvasを「保存用に軽量化」した data URL へ変換する。
      // LocalStorage(約5MB)を圧迫しないよう、長辺を maxLongSide に縮小し、
      // 作品画像は不透明マット背景なので JPEG(高圧縮)で数十KBに収める。
      // mime='image/png' 指定時のみ透過を保持(ボトル用)。
      function toStorableDataUrl(sourceCanvas, maxLongSide, quality, mime) {
        try {
          const sw = sourceCanvas.width, sh = sourceCanvas.height;
          if (!sw || !sh) return null;
          const useMime = mime || 'image/jpeg';
          const scale = Math.min(1, maxLongSide / Math.max(sw, sh));
          const dw = Math.max(1, Math.round(sw * scale));
          const dh = Math.max(1, Math.round(sh * scale));
          const tmp = document.createElement('canvas');
          tmp.width = dw; tmp.height = dh;
          const tctx = tmp.getContext('2d');
          tctx.imageSmoothingEnabled = true;
          tctx.imageSmoothingQuality = 'high';
          if (useMime === 'image/jpeg') {
            // JPEGは透過非対応。透過部分が黒くならないようマット色で下地を塗る。
            tctx.fillStyle = '#f4f1ea';
            tctx.fillRect(0, 0, dw, dh);
          }
          tctx.drawImage(sourceCanvas, 0, 0, dw, dh);
          return tmp.toDataURL(useMime, quality == null ? 0.85 : quality);
        } catch (err) {
          console.error('■ 保存エラー発生: 画像の軽量化(toStorableDataUrl)に失敗:', err);
          return null;
        }
      }

      async function renderArtworkSnapshotDataUrl(splashList, logicalW, logicalH, fabricImage) {
        const dpr = Math.min(2, Math.max(1, window.devicePixelRatio || 1));
        const pixelW = Math.round(logicalW * dpr);
        const pixelH = Math.round(logicalH * dpr);
        const out = document.createElement('canvas');
        out.width = pixelW;
        out.height = pixelH;
        const octx = out.getContext('2d');
        octx.setTransform(dpr, 0, 0, dpr, 0, 0);

        fillCanvasBackgroundOnCtx(octx, logicalW, logicalH);
        const list = Array.isArray(splashList) ? splashList : [];
        list.forEach((splash) => {
          drawSplatter(splash, logicalW, logicalH, undefined, octx);
          drawDrip(splash, logicalW, logicalH, octx);
        });

        if (fabricImage && fabricImage.naturalWidth > 0) {
          octx.save();
          octx.globalAlpha = 0.35;
          octx.globalCompositeOperation = 'multiply';
          octx.drawImage(fabricImage, 0, 0, logicalW, logicalH);
          octx.restore();
        }

        const artworkImageDataUrl = out.toDataURL('image/png');
        return {
          artworkImageDataUrl,
          canvasW: logicalW,
          canvasH: logicalH,
          snapshotPixelW: pixelW,
          snapshotPixelH: pixelH
        };
      }

      async function persistArtworkCanvasSnapshot(frozenFlower) {
        try {
          lockCreationCanvasAspect();
          const { w: logicalW, h: logicalH } = getStoredCanvasAspect();
          const flower = frozenFlower || currentFlower;
          if (!flower || !flower.center) return null;
          const fabricImage = await loadFabricImage();
          await ensureCenterLoaded();
          // 線画(主線)＋シルエットマスクPNGのロード完了を必ず待ってから描画→保存する。
          // これを待たないと「色がクリップされない/白紙」の未完成画像が保存されてしまう。
          await loadLineartImages();
          const result = await renderFlowerSnapshotDataUrl(flower, logicalW, logicalH, fabricImage);
          if (!result.artworkImageDataUrl || result.artworkImageDataUrl === 'data:,') return null;
          refreshCanvasExportSnapshot();
          return result;
        } catch (err) {
          console.warn('作品スナップショットの保存に失敗:', err);
          return null;
        }
      }

      const FRAME_MAT_PADDING = 28;
      const FRAME_BORDER_WIDTH = 20;

      function updateCanvasAspectVars() {
        if (canvasWrap.classList.contains('is-framed') || canvasWrap.classList.contains('framing-active')) {
          return;
        }
        if (canvasWrap.dataset.creationAspectLocked === '1') {
          return;
        }
        const cw = canvas.clientWidth || canvasWrap.clientWidth;
        const ch = canvas.clientHeight || canvasWrap.clientHeight;
        if (cw > 0 && ch > 0) {
          canvasWrap.style.setProperty('--canvas-aspect-w', String(cw));
          canvasWrap.style.setProperty('--canvas-aspect-h', String(ch));
        }
      }

      function updateFramedArtSize() {
        const { w: aspectW, h: aspectH } = getStoredCanvasAspect();
        if (!aspectW || !aspectH) return;

        const frameInset = 2 * (FRAME_MAT_PADDING + FRAME_BORDER_WIDTH);
        const availW = Math.max(1, canvasWrap.clientWidth - frameInset);
        const availH = Math.max(1, canvasWrap.clientHeight - frameInset);

        let artW = availW;
        let artH = (artW * aspectH) / aspectW;
        if (artH > availH) {
          artH = availH;
          artW = (artH * aspectW) / aspectH;
        }

        canvasWrap.style.setProperty('--framed-art-w', `${Math.round(artW)}px`);
        canvasWrap.style.setProperty('--framed-art-h', `${Math.round(artH)}px`);
      }

      function waitForFrameAnimation(el, durationMs) {
        return new Promise(resolve => {
          let finished = false;
          const done = () => {
            if (finished) return;
            finished = true;
            el.removeEventListener('transitionend', onEnd);
            resolve();
          };
          const onEnd = (e) => {
            if (e.target === el) done();
          };
          el.addEventListener('transitionend', onEnd);
          setTimeout(done, durationMs + 120);
        });
      }

      function showFrameCompleteDialog(gallerySaved, entryCount) {
        return new Promise(resolve => {
          if (!frameCompleteDialog || !frameCompleteOk) {
            resolve();
            return;
          }
          const messageEl = frameCompleteDialog.querySelector('p');
          if (messageEl) {
            if (gallerySaved === false) {
              messageEl.textContent = '回廊への保存に失敗しました。もう一度お試しください';
            } else if (entryCount) {
              messageEl.textContent = `${entryCount}日間の感情から生まれた作品を、感情の回廊に大切に飾りました`;
            } else {
              messageEl.textContent = '作品を感情の回廊に大切に飾りました';
            }
          }
          const close = () => {
            frameCompleteDialog.classList.remove('open');
            frameCompleteDialog.setAttribute('aria-hidden', 'true');
            frameCompleteOk.removeEventListener('click', close);
            resolve();
          };
          frameCompleteDialog.classList.add('open');
          frameCompleteDialog.setAttribute('aria-hidden', 'false');
          frameCompleteOk.addEventListener('click', close);
        });
      }

      function dayKeyFromTimestamp(ts) {
        const d = new Date(ts);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }

      function getGalleryEntryCount() {
        return getFlowerDayCount(currentFlower);
      }

      function getGalleryProgress() {
        const entryCount = getGalleryEntryCount();
        return {
          entryCount,
          ready: isFlowerComplete(currentFlower) && getBottlePhase(currentFlower) === BOTTLE_PHASES.COMPLETE
        };
      }

      function showFrameCtaReady() {
        exitZenMode();
        zenArmed = false;
        clearTimeout(zenTimer);
        clearTimeout(zenFadeTimer);
        zenTimer = null;
        zenFadeTimer = null;

        lockCreationCanvasAspect();
        canvasWrap.classList.add('is-framed');

        frameCtaOverlay.classList.add('visible', 'ready');
        frameCtaOverlay.setAttribute('aria-hidden', 'false');
        frameBtn.classList.add('ready');

        frameBtn.removeAttribute('disabled');
        frameBtn.removeAttribute('aria-disabled');
        frameProgress.textContent = `${getFlowerDayCount(currentFlower)}日間の感情が注がれた作品`;

      function hideFrameCta() {

          canvasWrap.style.removeProperty('--framed-art-w');

      function updateFrameButtonState() {
        const entryCount = getGalleryEntryCount();
        const { ready } = getGalleryProgress();

        if (framingCompleted || frameModal.classList.contains('open')) return;

        if (!entryCount) {
          hideFrameCta();
          frameProgressHint.classList.remove('visible');
          frameProgressHint.textContent = '';
          return;
        }

        if (ready) {
          showFrameCtaReady();
          return;
        }

        hideFrameCta();
        const dayCount = getGalleryEntryCount();
        frameProgressHint.textContent = dayCount > 0 ? `感情を預ける ${dayCount}日目` : '';
        frameProgressHint.classList.toggle('visible', dayCount > 0);

      function clearMainCanvasToWhite() {
        const dpr = window.devicePixelRatio || 1;
        const w = canvas.width > 0 ? canvas.width / dpr : (canvas.clientWidth || CANVAS_LOGICAL_W);
        const h = canvas.height > 0 ? canvas.height / dpr : (canvas.clientHeight || CANVAS_LOGICAL_H);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = CANVAS_BG;
        ctx.fillRect(0, 0, w, h);
      }

      function resetCanvasDisplayStyles() {
        canvas.style.removeProperty('width');
        canvas.style.removeProperty('height');
        shockCanvas.style.removeProperty('width');
        shockCanvas.style.removeProperty('height');
      }

      function forceCanvasToLogicalBlank() {
        const dpr = window.devicePixelRatio || 1;
        const cw = CANVAS_LOGICAL_W;
        const ch = CANVAS_LOGICAL_H;
        canvas.width = Math.round(cw * dpr);
        canvas.height = Math.round(ch * dpr);
        canvas.style.width = `${cw}px`;
        canvas.style.height = `${ch}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        shockCanvas.width = Math.round(cw * dpr);
        shockCanvas.height = Math.round(ch * dpr);
        shockCanvas.style.width = `${cw}px`;
        shockCanvas.style.height = `${ch}px`;
        shockCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        shockCtx.clearRect(0, 0, shockCanvas.width, shockCanvas.height);
        fillCanvasBackgroundOnCtx(ctx, cw, ch);
      }

      function restartAppCycle() {
        splashes = [];
        currentFlower = null;
        flowerAnim = { active: false, kind: 'none', progress: 1, index: -1 };
        bottleAnim = { active: false, progress: 0, layerIndex: -1 };
        pourState = { active: false, tilt: 0, pourT: 0, rafId: null };
        saveSplashes();
        saveFlower();
        localStorage.removeItem(HISTORY_KEY);

        if (ambientLoopId) {
          cancelAnimationFrame(ambientLoopId);
          ambientLoopId = null;
        }
        shockwaves = [];
        tapRipples = [];

        framingCompleted = false;
        zenArmed = false;
        exitZenMode();

        hideFrameCta();
        canvasSelectOverlay.classList.remove('visible');
        pourStage.classList.remove('visible');
        frameProgressHint.classList.remove('visible');
        frameProgressHint.textContent = '';
        frameProgress.textContent = '';

        clearCssFrameFromCanvas();
        clearCreationCanvasAspectLock();

        wordInput.value = '';

      function clearCssFrameFromCanvas() {
        const sculpted = museumFrame.querySelector('.museum-frame-sculpted');
        if (sculpted) sculpted.classList.add('frame-reset-instant');

        museumFrame.classList.remove('framing-animate');
        canvasWrap.classList.remove('framing-active', 'is-framed');
        canvasWrap.style.removeProperty('--framed-art-w');
        canvasWrap.style.removeProperty('--framed-art-h');
        resetCanvasDisplayStyles();
        forceCanvasToLogicalBlank();

        requestAnimationFrame(() => {

            resizeCanvas();

      function bindFrameButtonClick() {
        if (!frameBtn) return;
        frameBtn.onclick = function(e) {
          if (e) {
            e.preventDefault();
            e.stopPropagation();
          }
          executeFrameArtworkFlow();
        };
      }

      // ③④ を厳格に直列実行する保存コミット。
      // 「100%染まりきったCanvasの dataURL 取得 → LocalStorage(inscape_gallery)書き込み →
      //   読み戻し検証」まで完了して初めて成功とみなす。どこかで失敗したら必ず throw する。
      // これにより「artworkImageDataUrl 欠落の空エントリ」がサイレントに保存される不確実性を根絶する。
      async function commitArtworkToGallery(frozenFlower) {
        // ③ 完全着色状態のオフスクリーンCanvasから toDataURL('image/png') を確実に取得
        //    （persistArtworkCanvasSnapshot 内部で線画/マスク画像ロードを await 済み）
        const snapshot = await persistArtworkCanvasSnapshot(frozenFlower);
        const dataUrl = snapshot && snapshot.artworkImageDataUrl;
        if (!dataUrl || typeof dataUrl !== 'string' || dataUrl.length < 512 || dataUrl === 'data:,') {
          throw new Error('作品画像(toDataURL)の生成に失敗しました（空/不正なdataURL）。保存を中止します。');
        }
        // ④ LocalStorage への書き込み（saveRecipeToGallery 内で localStorage.setItem を実行）
        const saved = await saveRecipeToGallery(snapshot, frozenFlower);
        if (!saved) {
          throw new Error('LocalStorage(inscape_gallery)への書き込みに失敗しました。');
        }
        // 読み戻し検証: 「今保存したこの作品」自身の画像が LocalStorage に定着したかを cycleKey で照合。
        // （容量超過で当該作品の画像だけが剥がされたケースも、ここで確実に失敗として検出する）
        const cycleKey = buildArtworkCycleKeyFromFlower(frozenFlower);
        const back = readGalleryStore();
        const savedEntry = Array.isArray(back)
          ? back.find((e) => e && e.cycleKey === cycleKey)
          : null;
        const ok = savedEntry
          && typeof savedEntry.artworkImageDataUrl === 'string'
          && savedEntry.artworkImageDataUrl.length >= 512;
        if (!ok) {
          throw new Error('保存後の読み戻し検証で、この作品の画像がLocalStorageに定着していませんでした（容量超過の可能性）。');
        }
        return snapshot;
      }

      async function executeFrameArtworkFlow() {
        if (frameProcessing) return;
        if (!getGalleryProgress().ready) return;

        frameProcessing = true;
        frameBtn.classList.add('processing');
        frameBtn.setAttribute('aria-disabled', 'true');
        frameProgress.textContent = '額装中...';
        hideFrameCta();
        const frozenFlower = cloneFlowerForGallerySave(currentFlower);
        if (!isFlowerComplete(frozenFlower)) {
          frameProcessing = false;
          frameBtn.classList.remove('processing');
          frameBtn.removeAttribute('aria-disabled');
          frameProgress.textContent = '保存データが不足しています';
          return;
        }
        const entryCount = getFlowerDayCount(frozenFlower);

        // 額装アニメーション（視覚演出）は並行で開始してよい。
        // ただし toDataURL は独立したオフスクリーンCanvasで完全着色状態(revealT=1)を描くため、
        // この画面アニメーションの進行状況に一切影響されない。
        canvasWrap.classList.add('framing-active', 'is-framed');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            updateFramedArtSize();
            museumFrame.classList.add('framing-animate');
            resizeCanvas();
          });
        });

        // ③④【厳格な直列保存】setItem＋読み戻し検証が100%完了するまで await でブロックする。
        //    ここを通過するまでは、絶対にOKアラート(モーダル)を出さない。
        let gallerySaved = false;
        try {
          await commitArtworkToGallery(frozenFlower);
          gallerySaved = true;
          console.log("★ [100%保証] 作品が感情の回廊に定着しました。");
        } catch (error) {
          console.error("■ 保存エラー発生:", error);
          gallerySaved = false;
        }

        // 額装アニメーションの最低演出時間を確保（保存が速く終わっても見栄えを担保）
        await waitForFrameAnimation(museumFrame, 1500);
        frameProgress.textContent = gallerySaved ? '額装完了' : '保存に失敗しました';

        // ★ LocalStorageへの定着が確認できた後にのみ、OKアラートをフェードイン表示する。
        await showFrameCompleteDialog(gallerySaved, entryCount);

        if (!frameProcessing) return;
        if (gallerySaved) {
          restartAppCycle();
        } else {
          framingCompleted = false;
          frameBtn.classList.remove('processing');
          frameBtn.classList.add('ready');
          frameBtn.removeAttribute('aria-disabled');
          frameCtaOverlay.classList.add('visible', 'ready');
          frameCtaOverlay.setAttribute('aria-hidden', 'false');
          bindFrameButtonClick();
        }
        frameProcessing = false;
        frameBtn.classList.remove('processing');
      }

      // キャンバス全体（上下左右）にダイナミックに散らす
      function randomSplashPosition(w, h, splashMeta) {
        const half = getSplashMetaHalfExtent(splashMeta);
        const padX = Math.max(8, Math.min(half * 0.18, w * 0.06));
        const padY = Math.max(8, Math.min(half * 0.18, h * 0.06));
        return {
          x: padX + Math.random() * Math.max(1, w - padX * 2),
          y: padY + Math.random() * Math.max(1, h - padY * 2)
        };
      }

      function updateUIState() {
        if (applyDailyLockUI()) return;
        wordInput.disabled = isDiarySubmitting;
        setEmotionPaletteDisabled(isDiarySubmitting);
        updateCanvasSubmitHint();
      }

      function loadSplashes() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const data = raw ? JSON.parse(raw) : [];
          if (!Array.isArray(data)) return [];
          const now = Date.now();
          return data
            .filter(s => now - s.timestamp < RETENTION_MS)
            .slice(-MAX_ENTRIES)
            .map(migrateSplash);
        } catch { return []; }
      }

      function saveSplashes() {
        const data = splashes.map(({ drip, ...rest }) => rest);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function resizeCanvas() {
        const wrap = canvasWrap;
        const dpr = window.devicePixelRatio || 1;
        const isFramed = canvasWrap.classList.contains('is-framed') || museumFrame.classList.contains('framing-animate');
        const artSurface = wrap.querySelector('.art-surface');

        let ch;

          ch = aspect.h;

          ch = artSurface.clientHeight;

            wrap.style.setProperty('--canvas-aspect-h', String(ch));
          }
        } else {
          cw = CANVAS_LOGICAL_W;
          ch = CANVAS_LOGICAL_H;
          wrap.style.setProperty('--canvas-aspect-w', String(cw));
          wrap.style.setProperty('--canvas-aspect-h', String(ch));
        }

        if (cw < 1 || ch < 1) {
          cw = CANVAS_LOGICAL_W;
          ch = CANVAS_LOGICAL_H;
        }

        canvas.width = cw * dpr;
        canvas.height = ch * dpr;
        if (isFramed) {
          canvas.style.width = '100%';
          canvas.style.height = '100%';
        } else {
          canvas.style.width = cw + 'px';
          canvas.style.height = ch + 'px';
        }

        shockCanvas.height = ch * dpr;

          shockCanvas.style.width = '100%';
          shockCanvas.style.height = '100%';
        } else {
          shockCanvas.style.width = cw + 'px';
          shockCanvas.style.height = ch + 'px';
        }
        shockCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
