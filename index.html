      }

      function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
      function easeInExpo(t) { return t <= 0 ? 0 : Math.pow(2, 10 * t - 10); }

      // ── 水滴サウンド（本物の録音を new Audio で再生。数式合成は廃止） ──
      //   ★推奨: 単発の高品質な水滴mp3を sounds/water-drop.mp3 に配置してください。
      //     無い場合は同梱済みCC0録音 sounds/water-drops.mp3 の冒頭だけを自動で鳴らします。
      //   ★可聴再生は playWaterDrop() のみ。
      //     ・確認ボタン等のユーザージェスチャ内で同期的に a.play() を起動すること（不発防止）
      //     ・返り値 Promise は「実際に再生が始まった瞬間」で resolve（アニメ同期用）
      const WATER_SOUND_SRC = 'sounds/water-drop.mp3';
      const WATER_SOUND_FALLBACK_SRC = 'sounds/water-drops.mp3';
      const WATER_SOUND_FALLBACK_CAP_MS = 700;   // フォールバック（複数滴）は最初の1滴ぶんだけ再生
      const WATER_POOL_SIZE = 5;                 // 連続タップで音が気持ちよく重なるようプール化
      const WATER_VOLUME = 0.85;
      let waterPool = null;
      let waterPoolIdx = 0;
      let waterUseFallback = false;
      let waterUnlocked = false;

      function buildWaterPool(src) {
        waterPool = [];
        for (let i = 0; i < WATER_POOL_SIZE; i++) {
          const a = new Audio(src);
          a.preload = 'auto';
          a.volume = WATER_VOLUME;
          a.muted = false;
          waterPool.push(a);
        }
      }

      function initWaterSound() {
        if (waterPool) return;
        buildWaterPool(WATER_SOUND_SRC);
        // プライマリ(単発mp3)が読めない環境では、同梱録音へ一度だけ自動フォールバック
        waterPool[0].addEventListener('error', () => {
          if (waterUseFallback) return;
          waterUseFallback = true;
          waterUnlocked = false;
          buildWaterPool(WATER_SOUND_FALLBACK_SRC);
          // フォールバックも先読み
          waterPool.forEach((a) => { try { a.load(); } catch (_) {} });
        }, { once: true });
        waterPool.forEach((a) => { try { a.load(); } catch (_) {} });
      }

      // Autoplay制限の無音解除（音量0＋muted）。入力画面では呼ばない。
      function unlockWaterSound(force) {
        initWaterSound();
        if (!waterPool || !waterPool.length) return;
        if (waterUnlocked && !force) return;
        waterUnlocked = true;
        waterPool.forEach((a) => {
          try {
            a.muted = true;
            a.volume = 0;
            const p = a.play();
            const settle = () => {
              if (!a.muted) return; // 可聴再生中は触らない
              try { a.pause(); a.currentTime = 0; } catch (_) {}
              a.muted = true;
              a.volume = WATER_VOLUME;
            };
            if (p && p.then) p.then(settle).catch(settle);
            else settle();
          } catch (_) {}
        });
      }

      // 水滴音を再生し、「再生が実際に始まった」瞬間で resolve する Promise を返す。
      // ★必ずユーザージェスチャの同期コールスタック内で呼び出す（awaitの後ろで呼ぶと不発する）。
      function playWaterDrop() {
        initWaterSound();
        return new Promise((resolve) => {
          if (!waterPool || !waterPool.length) { resolve(false); return; }
          const a = waterPool[waterPoolIdx];
          waterPoolIdx = (waterPoolIdx + 1) % waterPool.length;
          let settled = false;
          const finish = (ok) => {
            if (settled) return;
            settled = true;
            try { a.removeEventListener('playing', onPlaying); } catch (_) {}
            resolve(ok);
          };
          const onPlaying = () => finish(true);
          try {
            a.muted = false;
            a.volume = WATER_VOLUME;
            try { a.currentTime = 0; } catch (_) {}
            waterUnlocked = true;
            a.addEventListener('playing', onPlaying);
            const p = a.play();
            if (p && p.then) {
              p.then(() => {
                // play() resolve ≒ 再生開始。playing が遅れる環境向けフォールバック
                setTimeout(() => finish(true), 0);
              }).catch(() => finish(false));
            } else {
              finish(true);
            }
            if (waterUseFallback) {
              setTimeout(() => { try { a.pause(); a.currentTime = 0; a.muted = true; } catch (_) {} }, WATER_SOUND_FALLBACK_CAP_MS);
            }
          } catch (_) {
            finish(false);
          }
        });
      }

      function hexToRgb(hex) {
        const n = parseInt(hex.replace('#', ''), 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }

      function wrapTextLines(tctx, text, maxWidth, letterSpacing) {
        const lines = [];
        text.split('\n').forEach((paragraph) => {
          if (!paragraph) {
            lines.push('');
            return;
          }
          let line = '';
          for (const ch of paragraph) {
            const next = line + ch;
            const extra = line.length > 0 ? letterSpacing : 0;
            if (tctx.measureText(next).width + extra > maxWidth && line) {
              lines.push(line);
              line = ch;
            } else {
              line = next;
            }
          }
          if (line) lines.push(line);
        });
        return lines;
      }

      function drawSplatterStamp(c, stamp, size, alpha, pattern) {
        const p = pattern ?? 0;
        if (p === 1) {
          c.globalAlpha = alpha;
          c.drawImage(stamp, -size / 2, -size / 2, size, size);
          const spur = size * 0.36;
          const offsets = [[1, 0], [-1, 0], [0, -1], [0.65, 0.65]];
          offsets.forEach(([dx, dy]) => {
            c.globalAlpha = alpha * 0.52;
            c.drawImage(stamp, dx * spur - spur * 0.5, dy * spur - spur * 0.5, spur, spur);
          });
          return;
        }
        if (p === 2) {
          const heavy = size * 1.28;
          c.globalAlpha = alpha * 0.9;
          c.drawImage(stamp, -heavy / 2, -heavy / 2, heavy, heavy);
          c.globalAlpha = alpha * 0.42;
          c.drawImage(stamp, -size / 2, -size / 2, size, size);
          return;
        }
        c.globalAlpha = alpha;
        c.drawImage(stamp, -size / 2, -size / 2, size, size);
      }

      function drawSplatter(splash, w, h, scale, targetCtx) {
        if (!splatReady) return;

        const stamp = getSplashStamp(splash);
        if (!stamp) return;
        const c = targetCtx || ctx;

        const cx = splash.nx * w;
        const cy = splash.ny * h;
        const s = scale !== undefined ? scale : 1;
        const size = resolveSplashDrawSizePx(splash) * s;
        const alpha = splash.opacity ?? CHARGE_OPACITY_MAX;

        c.save();
        c.translate(cx, cy);
        c.rotate(splash.rotation || 0);
        c.globalCompositeOperation = 'multiply';
        drawSplatterStamp(c, stamp, size, alpha, splash.splashPattern ?? 0);
        c.restore();
        c.globalCompositeOperation = 'source-over';
      }

      function drawDrip(splash, w, h, targetCtx) {
        if (!splash.drip || splash.drip.length <= 0.5) return;
        const stamp = getSplashStamp(splash);
        if (!stamp) return;

        const cx = splash.nx * w;
        const cy = splash.ny * h;
        const drip = splash.drip;
        const originX = cx + drip.offsetX;
        const originY = cy + drip.offsetY;
        const dripH = drip.length;
        const dripW = drip.width;
        const color = normalizeSplashHex(splash.color1 || splash.color);
        const c = targetCtx || ctx;

        c.save();
        c.translate(originX, originY);
        c.globalAlpha = (splash.opacity ?? 1) * 0.88;
        c.globalCompositeOperation = 'multiply';
        c.drawImage(stamp, -dripW / 2, 0, dripW, dripH);
        c.globalCompositeOperation = 'source-over';
        c.globalAlpha = (splash.opacity ?? 1) * 0.55;
        c.fillStyle = color || '#1a2e40';
        c.fillRect(-dripW * 0.35, dripH * 0.85, dripW * 0.7, dripH * 0.15);
        c.restore();
        c.globalCompositeOperation = 'source-over';
      }

      // ───────────────────────── 花モジュール ─────────────────────────
      function pickFlowerTargetDays() {
        return FLOWER_MIN_DAYS + Math.floor(Math.random() * (FLOWER_MAX_DAYS - FLOWER_MIN_DAYS + 1));
      }

      function createEmptyFlower() {
        return {
          id: `fl_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`,
          seed: Math.floor(Math.random() * 2147483647),
          targetDays: pickFlowerTargetDays(),
          startedAt: null,
          completedAt: null,
          center: null,
          petals: [],
          bottlePhase: BOTTLE_PHASES.DEPOSIT,
          selectedCanvasId: null,
          pourCompleted: false
        };
      }

      function getFlowerDayCount(flower) {
        if (!flower) return 0;
        return (flower.center ? 1 : 0) + (Array.isArray(flower.petals) ? flower.petals.length : 0);
      }

      function isFlowerComplete(flower) {
        if (!flower || !flower.center) return false;
        return getFlowerDayCount(flower) >= flower.targetDays;
      }

      // 旧データ（位置情報なし）を雫の座標付きへ移行する
      function migrateDropFields(data) {
        const ensure = (rec, idx) => {
          if (!rec) return;
          if (rec.widthNorm == null) rec.widthNorm = rec.sizeNorm ?? 0.5;
          if (rec.nx == null || rec.ny == null) {
            const rng = mulberry32((data.seed || 1) + idx * 977 + 31);
            const pos = assignDropPosition(idx, data.targetDays || FLOWER_MIN_DAYS, rng);
            if (rec.nx == null) rec.nx = pos.nx;
            if (rec.ny == null) rec.ny = pos.ny;
          }
        };
        ensure(data.center, 0);
        (data.petals || []).forEach((p, i) => ensure(p, i + 1));
      }

      function loadFlower() {
        try {
          const raw = localStorage.getItem(FLOWER_KEY);
          if (!raw) return null;
          const data = JSON.parse(raw);
          if (!data || typeof data !== 'object') return null;
          if (!data.targetDays) data.targetDays = pickFlowerTargetDays();
          if (!Array.isArray(data.petals)) data.petals = [];
          if (data.seed == null) data.seed = Math.floor(Math.random() * 2147483647);
          if (!data.bottlePhase) {
            data.bottlePhase = data.pourCompleted ? BOTTLE_PHASES.COMPLETE
              : (isFlowerComplete(data) ? BOTTLE_PHASES.SELECT : BOTTLE_PHASES.DEPOSIT);
          }
          if (data.pourCompleted == null) data.pourCompleted = data.bottlePhase === BOTTLE_PHASES.COMPLETE;
          if (data.bottlePhase === BOTTLE_PHASES.POUR) data.bottlePhase = BOTTLE_PHASES.SELECT;
          migrateDropFields(data);
          return data;
        } catch {
          return null;
        }
      }

      function saveFlower() {
        if (!currentFlower) {
          localStorage.removeItem(FLOWER_KEY);
          return;
        }
        try {
          localStorage.setItem(FLOWER_KEY, JSON.stringify(currentFlower));
        } catch (err) {
          console.warn('花データの保存に失敗:', err);
        }
      }

      function cloneFlowerForGallerySave(flower) {
        if (!flower) return null;
        try {
          return JSON.parse(JSON.stringify(flower));
        } catch {
          return null;
        }
      }

      // 花の各日の記録 → 既存の splashes 互換データ（履歴・回廊・語彙集計に使用）
      function flowerToSplashRecipes(flower) {
        if (!flower) return [];
        const records = [flower.center, ...(flower.petals || [])].filter(Boolean);
        return records.map((r, i) => ({
          id: `fl_${i}`,
          nx: 0.5,
          ny: 0.42,
          color: r.color,
          color1: r.color,
          word: r.word,
          timestamp: r.timestamp,
          opacity: r.opacity,
          sizeNorm: r.sizeNorm,
          drawSizePx: 40 + (r.sizeNorm || 0.5) * 70
        }));
      }

      function syncFlowerToSplashes() {
        splashes = currentFlower ? flowerToSplashRecipes(currentFlower) : [];
      }

      function computeArtworkPeriodFromFlower(flower) {
        const records = [flower && flower.center, ...(flower && flower.petals ? flower.petals : [])].filter(Boolean);
        return computeArtworkPeriodFromSplashes(records.map((r) => ({ timestamp: r.timestamp })));
      }

      function buildArtworkCycleKeyFromFlower(flower) {
        if (!flower) return '';
        return buildArtworkCycleKeyFromSplashes(flowerToSplashRecipes(flower)) + '\u241e' + flower.id;
      }

      function createFlowerDayRecord(word, color, payload) {
        return {
          word: String(word || '').trim(),
          color: normalizeSplashHex(color),
          timestamp: Date.now(),
          opacity: Math.min(CHARGE_OPACITY_MAX, Math.max(CHARGE_OPACITY_MIN, payload.opacity ?? CHARGE_OPACITY_MIN)),
          sizeNorm: Math.min(1, Math.max(0, payload.progress ?? 0.5))
        };
      }

      // 雫の落下位置を決める。日ごとに縦方向へ帯状に並べ、全体で縦グラデーションを形成する
      function assignDropPosition(idx, targetDays, rng) {
        const n = Math.max(1, targetDays);
        let ny = (idx + 0.5) / n + (rng() - 0.5) * 0.16;
        let nx = 0.5 + (rng() - 0.5) * 0.5;
        ny = Math.min(0.92, Math.max(0.08, ny));
        nx = Math.min(0.85, Math.max(0.15, nx));
        return { nx, ny };
      }

      function enrichDropRecord(record, flower, idx) {
        const rng = mulberry32(flower.seed + idx * 977 + 31);
        const pos = assignDropPosition(idx, flower.targetDays, rng);
        return {
          ...record,
          nx: pos.nx,
          ny: pos.ny,
          widthNorm: record.sizeNorm,
          softSeed: Math.floor(rng() * 1e9)
        };
      }

      function enrichCenterRecord(record, flower) {
        return enrichDropRecord(record, flower, 0);
      }

      function enrichPetalRecord(record, flower) {
        return enrichDropRecord(record, flower, flower.petals.length + 1);
      }

      function addFlowerDayRecord(word, color, payload) {
        if (!currentFlower) {
          currentFlower = createEmptyFlower();
          currentFlower.startedAt = Date.now();
        }
        const record = createFlowerDayRecord(word, color, payload);
        const dayCount = getFlowerDayCount(currentFlower);

        if (!currentFlower.center) {
          currentFlower.center = enrichCenterRecord(record, currentFlower);
        } else if (dayCount < currentFlower.targetDays) {
          currentFlower.petals.push(enrichPetalRecord(record, currentFlower));
        }

        if (isFlowerComplete(currentFlower) && !currentFlower.completedAt) {
          currentFlower.completedAt = Date.now();
        }

        saveFlower();
        syncFlowerToSplashes();
        return record;
      }

      // ── 感情ボトル ＆ 7日目線画融合 ──
      function getBottlePhase(flower) {
        if (!flower) return BOTTLE_PHASES.DEPOSIT;
        return flower.bottlePhase || BOTTLE_PHASES.DEPOSIT;
      }

      function setBottlePhase(phase) {
        if (!currentFlower) return;
        currentFlower.bottlePhase = phase;
        if (phase === BOTTLE_PHASES.COMPLETE) currentFlower.pourCompleted = true;
        saveFlower();
        updateExperienceUI();
      }

      function getBottleDrops(flower) {
        return getGradientDrops(flower);
      }

      // 長押し正規化値 d(0..1): 0=短い(淡い感情), 1=長い(濃い感情)
      function bottleDensity(drop) {
        const o = drop.opacity ?? CHARGE_OPACITY_MIN;
        return Math.min(1, Math.max(0, (o - CHARGE_OPACITY_MIN) / Math.max(0.0001, CHARGE_OPACITY_MAX - CHARGE_OPACITY_MIN)));
      }

      // 不透明度は固定（黒に吸われて灰色に濁るのを防ぐ）。濃淡は「色の成分」で表現する。
      function bottleLayerAlpha() {
        return 0.97;
      }

      // 「色水の濃度（原液の量）」で濃淡を表現する。アルファは変えない。
      //  d小(短い/薄い): 白を多く混ぜた不透明なパステル → 何色かハッキリ分かる優しい色水。
      //  d大(長い/濃い): 混ぜものなしの原液そのもの → どっしり鮮やかな濃厚カラー。
      function bottleInkColor(hex, d) {
        const base = normalizeSplashHex(hex) || '#b83a5a';
        const t = Math.min(1, Math.max(0, d));
        // 長押しが長いほど彩度も上げて原液感を強調（コントラストを尖らせる）。
        const vivid = saturateHex(base, 0.18 + t * 0.22);
        // 短いほど白を多く混ぜて明確なパステルに（最大68%）。淡い日と濃い日の差を劇的に。
        const whiten = Math.pow(1 - t, 0.82) * 0.68;
        return lightenHex(vivid, whiten);
      }

      // 瓶（バウンディングボックス）を(w,h)内にcontainフィットさせた配置矩形を返す
      function getBottleRect(w, h) {
        const crop = bottleCrop || {
          sx: 0, sy: 0,
          sw: (bottleImg && bottleImg.naturalWidth) || 9,
          sh: (bottleImg && bottleImg.naturalHeight) || 16
        };
        const scale = Math.min(w / crop.sw, h / crop.sh);
        const rw = crop.sw * scale, rh = crop.sh * scale;
        return { x: (w - rw) * 0.5, y: (h - rh) * 0.5, w: rw, h: rh, crop };
      }

      // 液体（オーガニック・デジタルリキッド）を矩形バッファに描く。
      // 下から順に色が積み重なり、隣り合う色が滑らかに溶け合って美しい中間色を作る。
      // surfaceTilt(度)で液面を傾け、瓶を傾けたときの揺れを表現する。
      // ボトル描画専用のオフスクリーンバッファ（getGradTempと共有せず状態を隔離）
      const _bottleLiquidBuf = document.createElement('canvas');
      const _bottleCompBuf = document.createElement('canvas');
      const _bottleBandBuf = document.createElement('canvas');
      function sizeBuf(cv, w, h) {
        const W = Math.max(1, Math.round(w)), H = Math.max(1, Math.round(h));
        if (cv.width !== W || cv.height !== H) { cv.width = W; cv.height = H; }
        return cv;
      }

      // Canvas 2D の filter(blur) が「実際に効くか」を実測判定（一度だけ）。
      // iOS Safari はプロパティが存在(string)しても blur が黙って無視される場合があるため、
      // ハードエッジをぼかして境界の外側へ色が滲むかをピクセルで検証する。
      // ★重要: iOS WebKit は ctx.filter プロパティが存在しても「大きな半径の blur」だけ
      //   黙って無視することがある。小半径で試すと誤検出するため、実使用に近い大半径(40px)で
      //   実測し、境界から十分離れた位置まで色が滲むかで「本当に効くか」を判定する。
      const CANVAS_FILTER_OK = (function () {
        try {
          const S = 160;
          const src = document.createElement('canvas');
          src.width = S; src.height = S;
          const sx = src.getContext('2d');
          sx.fillStyle = '#000';
          sx.fillRect(0, 0, S / 2, S);                 // 左半分だけ不透明（境界 x=80）
          const dst = document.createElement('canvas');
          dst.width = S; dst.height = S;
