<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="INSCAPE">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-outer: #121316;
      --bg: #121316;
      --text: #e8e6e2;
      --text-soft: rgba(232, 230, 226, 0.55);
      --muted: #5a5854;
      --canvas-bg: #f7f4eb;
      --paper-antique: #f7f4eb;
      --mat-ivory: #fbf9f5;
      --gold-antique: #b8860b;
      --wood-walnut: #1c110a;
      --accent: #b8a07a;
      --frame-max: 450px;
      --canvas-fabric-url: url('canvas-fabric.png');
      --canvas-portrait-w: 270px;
      --canvas-portrait-h: 480px;
      --canvas-portrait-ratio: 9 / 16;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg-outer);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .phone-shell {
      width: 100%;
      max-width: var(--frame-max);
      height: 100%;
      height: 100dvh;
      margin: 0 auto;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      height: auto;
      padding:
        0
        env(safe-area-inset-right)
        calc(2.5rem + env(safe-area-inset-bottom, 0px))
        env(safe-area-inset-left);
    }

    .logo--header {
      flex: 0 0 auto;
      width: 100%;
      margin: 0;
      padding:
        calc(0.65rem + env(safe-area-inset-top, 0px))
        1.15rem
        0.55rem;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Times New Roman", "Georgia", serif;
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.56em;
      text-indent: 0.56em;
      color: rgba(232, 230, 226, 0.58);
      text-shadow:
        0 0 28px rgba(255, 255, 255, 0.1),
        0 1px 0 rgba(0, 0, 0, 0.35);
    }

    .top-area {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 0.35rem 0 0.5rem;
      position: relative;
    }

    .logo {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Times New Roman", "Georgia", serif;
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.52em;
      text-indent: 0.52em;
      color: rgba(232, 230, 226, 0.44);
      text-align: center;
      flex-shrink: 0;
      position: relative;
      z-index: 3;
      pointer-events: none;
      user-select: none;
    }

    .controls {
      flex: 0 0 auto;
      width: 100%;
      padding: 0.35rem 1.15rem 0.5rem;
      min-height: 0;
      position: relative;
      z-index: 2;
    }

    .mid-panel {
      flex: 0 0 auto;
      width: 100%;
      padding: 0.85rem 1.15rem 0.65rem;
      scroll-margin-top: 0.5rem;
      scroll-margin-bottom: 1.5rem;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .input-wrap {
      position: relative;
    }

    #wordInput {
      width: 100%;
      min-height: 2.75rem;
      max-height: min(32vh, 10rem);
      padding: 0.85rem 0.65rem;
      scroll-margin-top: 1rem;
      scroll-margin-bottom: 30vh;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", "Yu Gothic", serif;
      font-size: 0.88rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      line-height: 1.65;
      outline: none;
      resize: none;
      overflow-y: auto;
      transition:
        border-color 0.55s ease,
        box-shadow 0.55s ease,
        background 0.55s ease,
        color 0.4s ease;
    }

    #wordInput::placeholder {
      color: rgba(255, 255, 255, 0.25);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", "Yu Gothic", serif;
      font-weight: 300;
      letter-spacing: 0.1em;
    }

    #wordInput.word-sucking {
      color: transparent;
      caret-color: transparent;
    }

    .word-suck-ghost {
      position: fixed;
      z-index: 56;
      pointer-events: none;
      padding: 0.85rem 0.5rem;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", "Yu Gothic", serif;
      font-size: 0.88rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      overflow: hidden;
      opacity: 1;
      transform: translate(0, 0) scale(1);
      transform-origin: center center;
      transition:
        transform 1.5s cubic-bezier(0.45, 0.05, 0.2, 1),
        opacity 1.5s cubic-bezier(0.4, 0, 0.6, 1);
      will-change: transform, opacity;
    }

    #wordInput:hover:not(:disabled) {
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: 0 0 24px rgba(184, 160, 122, 0.06);
    }

    #wordInput:focus {
      border-color: rgba(184, 160, 122, 0.35);
      background: rgba(255, 255, 255, 0.035);
      box-shadow: 0 0 32px rgba(184, 160, 122, 0.1);
    }

    #wordInput:disabled { opacity: 0.28; cursor: not-allowed; }

    .drop-word-btn {
      display: block;
      width: 100%;
      margin-top: 0.65rem;
      padding: 0.72rem 0.5rem;
      border: 0.5px solid rgba(184, 160, 122, 0.28);
      border-radius: 1px;
      background: rgba(184, 160, 122, 0.06);
      color: rgba(232, 230, 226, 0.72);
      font-family: inherit;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.38em;
      text-indent: 0.38em;
      cursor: pointer;
      transition: background 0.45s ease, border-color 0.45s ease, color 0.45s ease;
    }

    .drop-word-btn:hover:not(:disabled) {
      border-color: rgba(184, 160, 122, 0.45);
      color: rgba(232, 230, 226, 0.92);
      background: rgba(184, 160, 122, 0.1);
    }

    .drop-word-btn:disabled {
      opacity: 0.28;
      cursor: not-allowed;
    }

    .input-wrap.locked-hidden .drop-word-btn {
      display: none;
    }

    .smoke-text {
      position: absolute;
      left: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.92rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      white-space: nowrap;
      z-index: 5;
    }

    .smoke-text.active {
      animation: smoke 1.4s ease-out forwards;
    }

    @keyframes smoke {
      0%   { opacity: 1; transform: translateY(-50%) scale(1); filter: blur(0); }
      40%  { opacity: 0.7; transform: translateY(-80%) scale(1.05); filter: blur(1px); }
      100% { opacity: 0; transform: translateY(-160%) scale(1.2); filter: blur(6px); }
    }

    .emotion-palette {
      flex: 0 0 auto;
      width: 100%;
      padding: 0.55rem 1.15rem 1rem;
    }

    .emotion-palette.locked-hidden {
      display: none;
    }

    .emotion-palette.is-ui-fading {
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .mid-panel.is-ui-fading {
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .emotion-palette-spheres {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.32rem;
      max-width: 24.5rem;
      margin: 0 auto;
    }

    .emotion-sphere-btn {
      flex: 1 1 0;
      max-width: 2.35rem;
      min-width: 0;
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .emotion-sphere-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .emotion-sphere-swatch {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      opacity: var(--charge-opacity, 0.12);
      background-color: var(--sphere-color, #5d78b8);
      background-image:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.72) 0%, transparent 46%),
        radial-gradient(circle at 72% 78%, rgba(255, 255, 255, 0.28) 0%, transparent 52%),
        radial-gradient(circle at 50% 55%, color-mix(in srgb, var(--sphere-color) 42%, white) 0%, color-mix(in srgb, var(--sphere-color) 68%, white) 58%, var(--sphere-color) 100%);
      box-shadow:
        inset 0 1px 4px rgba(255, 255, 255, 0.42),
        inset 0 -2px 6px rgba(255, 255, 255, 0.12),
        0 4px 14px rgba(255, 255, 255, 0.08),
        0 0 10px color-mix(in srgb, var(--sphere-color) 6%, transparent);
      transition: opacity 0.07s linear, box-shadow 0.28s ease, filter 0.28s ease;
      filter: saturate(0.72) brightness(1.08);
    }

    .emotion-sphere-btn.is-charging .emotion-sphere-swatch {
      filter: saturate(1) brightness(1);
      box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 0.2),
        inset 0 -4px 10px rgba(0, 0, 0, 0.22),
        0 12px 32px rgba(0, 0, 0, 0.38),
        0 0 22px color-mix(in srgb, var(--sphere-color) 22%, transparent);
    }

    .emotion-palette-hint {
      margin-top: 0.72rem;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: 0.5rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-indent: 0.2em;
      text-align: center;
      color: rgba(201, 169, 98, 0.38);
    }

    .color-atelier {
      display: none !important;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
      padding: 0.5rem 1.15rem 0.85rem;
    }

    .color-atelier.locked-hidden {
      display: none;
    }

    .color-wheel-host {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .color-magnifier {
      position: relative;
      z-index: 3;
      width: 3.35rem;
      height: 3.35rem;
      padding: 0;
      border-radius: 50%;
      border: 0.5px solid rgba(255, 255, 255, 0.14);
      cursor: pointer;
      background:
        radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.62) 0%, rgba(255, 255, 255, 0) 44%),
        radial-gradient(circle at 68% 78%, rgba(0, 0, 0, 0.38) 0%, rgba(0, 0, 0, 0) 50%),
        radial-gradient(circle at 48% 52%, color-mix(in srgb, var(--picked-color, #3d4f5f) 78%, white) 0%, var(--picked-color, #3d4f5f) 54%, color-mix(in srgb, var(--picked-color, #3d4f5f) 52%, black) 100%);
      box-shadow:
        inset 0 3px 7px rgba(255, 255, 255, 0.26),
        inset 0 -4px 10px rgba(0, 0, 0, 0.35),
        0 0 20px color-mix(in srgb, var(--picked-color, #3d4f5f) 58%, transparent),
        0 0 38px color-mix(in srgb, var(--picked-color, #3d4f5f) 22%, transparent),
        0 4px 14px rgba(0, 0, 0, 0.38);
      transition:
        transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.45s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .color-magnifier::after {
      content: '';
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, rgba(255, 255, 255, 0.28) 0%, transparent 62%);
      pointer-events: none;
    }

    .color-magnifier:disabled {
      opacity: 0.22;
      cursor: not-allowed;
    }

    .color-wheel-host.open .color-magnifier {
      transform: scale(0.92);
    }

    @media (hover: hover) {
      .color-wheel-host:not(.disabled):hover .color-magnifier:not(:disabled) {
        box-shadow:
          inset 0 3px 7px rgba(255, 255, 255, 0.3),
          inset 0 -4px 10px rgba(0, 0, 0, 0.35),
          0 0 24px color-mix(in srgb, var(--picked-color, #3d4f5f) 65%, transparent),
          0 0 44px color-mix(in srgb, var(--picked-color, #3d4f5f) 28%, transparent),
          0 5px 16px rgba(0, 0, 0, 0.4);
      }
    }

    .color-palette-rail {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.48rem;
      padding: 0.52rem 0.62rem 0.58rem;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.022);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .color-wheel-host.disabled + .color-palette-rail,
    .color-wheel-host.disabled + .color-preview-orb + .color-palette-rail {
      opacity: 0.22;
      pointer-events: none;
    }

    .color-preview-orb {
      position: relative;
      width: 2.85rem;
      height: 2.85rem;
      border-radius: 50%;
      pointer-events: none;
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      background:
        radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0) 42%),
        radial-gradient(circle at 68% 78%, rgba(0, 0, 0, 0.35) 0%, rgba(0, 0, 0, 0) 48%),
        radial-gradient(circle at 48% 52%, color-mix(in srgb, var(--wheel-preview-color, #3d4f5f) 78%, white) 0%, var(--wheel-preview-color, #3d4f5f) 54%, color-mix(in srgb, var(--wheel-preview-color, #3d4f5f) 52%, black) 100%);
      box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 0.22),
        inset 0 -3px 7px rgba(0, 0, 0, 0.32),
        0 0 12px color-mix(in srgb, var(--wheel-preview-color, #3d4f5f) 55%, transparent),
        0 0 24px color-mix(in srgb, var(--wheel-preview-color, #3d4f5f) 22%, transparent);
      transition: background 0.18s ease, box-shadow 0.18s ease;
    }

    .color-preview-orb::after {
      content: '';
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, rgba(255, 255, 255, 0.24) 0%, transparent 62%);
      pointer-events: none;
    }

    .emotion-swatches {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.28rem;
    }

    .emotion-swatch {
      flex: 1 1 0;
      min-width: 0;
      max-width: 1.35rem;
      aspect-ratio: 1;
      padding: 0;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      cursor: pointer;
      background: var(--swatch-color, #3d4f5f);
      box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.12);
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .emotion-swatch.is-active {
      border-color: rgba(255, 255, 255, 0.32);
      box-shadow:
        0 0 10px color-mix(in srgb, var(--swatch-color) 45%, transparent),
        inset 0 1px 3px rgba(255, 255, 255, 0.18);
      transform: scale(1.08);
    }

    .hue-rail,
    .fine-rails {
      width: 100%;
    }

    .fine-rails {
      display: flex;
      gap: 0.55rem;
    }

    .fine-rails .hue-rail {
      flex: 1 1 0;
      min-width: 0;
    }

    .color-hue-slider,
    .color-fine-slider {
      -webkit-appearance: none;
      appearance: none;
      display: block;
      width: 100%;
      height: 14px;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    .color-hue-slider::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(
        90deg,
        #e74c3c 0%,
        #f1c40f 17%,
        #2ecc71 33%,
        #1abc9c 50%,
        #3498db 67%,
        #9b59b6 83%,
        #e74c3c 100%
      );
      border: 0.5px solid rgba(255, 255, 255, 0.08);
    }

    .color-fine-slider::-webkit-slider-runnable-track {
      height: 2px;
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.1);
      border: 0.5px solid rgba(255, 255, 255, 0.06);
    }

    .color-fine-slider[data-rail="sat"]::-webkit-slider-runnable-track {
      background: linear-gradient(
        90deg,
        color-mix(in srgb, var(--picked-color, #3d4f5f) 12%, #121316) 0%,
        var(--picked-color, #3d4f5f) 100%
      );
    }

    .color-fine-slider[data-rail="light"]::-webkit-slider-runnable-track {
      background: linear-gradient(
        90deg,
        #050508 0%,
        var(--picked-color, #3d4f5f) 52%,
        #f7f4eb 100%
      );
    }

    .color-hue-slider::-webkit-slider-thumb,
    .color-fine-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      margin-top: -5px;
      border-radius: 50%;
      border: 0.5px solid rgba(255, 255, 255, 0.45);
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0) 55%),
        var(--picked-color, #3d4f5f);
      box-shadow: 0 0 8px color-mix(in srgb, var(--picked-color, #3d4f5f) 40%, transparent);
    }

    .color-fine-slider::-webkit-slider-thumb {
      width: 10px;
      height: 10px;
      margin-top: -4px;
    }

    .color-hue-slider::-moz-range-track,
    .color-fine-slider::-moz-range-track {
      height: 3px;
      border-radius: 2px;
      border: none;
    }

    .color-hue-slider::-moz-range-thumb,
    .color-fine-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 0.5px solid rgba(255, 255, 255, 0.45);
      background: var(--picked-color, #3d4f5f);
    }

    .bh-fx-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 55;
    }

    .paint-ball {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 60;
      will-change: transform, left, top, opacity;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.65) 0%, rgba(255, 255, 255, 0) 40%),
        radial-gradient(circle at 70% 80%, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0) 50%),
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--ball-color, #3d4f5f) 80%, white) 0%, var(--ball-color, #3d4f5f) 55%, color-mix(in srgb, var(--ball-color, #3d4f5f) 50%, black) 100%);
      box-shadow:
        inset 0 3px 7px rgba(255, 255, 255, 0.35),
        inset 0 -5px 10px rgba(0, 0, 0, 0.4),
        0 8px 24px rgba(0, 0, 0, 0.45),
        0 0 20px color-mix(in srgb, var(--ball-color, #3d4f5f) 40%, transparent);
    }

    .paint-ball.glow {
      animation: ballGlow 0.2s ease-out forwards;
    }

    .paint-ball.crystallize {
      animation: ballCrystallize 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes ballGlow {
      from { filter: brightness(1.4); }
      to   { filter: brightness(1); }
    }

    @keyframes ballCrystallize {
      0%   { transform: scale(0); opacity: 0; filter: brightness(2.2); }
      55%  { transform: scale(1.22); opacity: 1; filter: brightness(1.6); }
      100% { transform: scale(1); opacity: 1; filter: brightness(1); }
    }

    .condense-text {
      display: none;
    }

    .wheel-overlay {
      position: absolute;
      inset: 0;
      z-index: 160;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .wheel-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(18, 19, 22, 0.62);
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    .phone-shell.wheel-open .wheel-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .wheel-stage {
      position: relative;
      width: min(16rem, 78vw);
      height: min(16rem, 78vw);
      max-width: calc(var(--frame-max) - 2rem);
      max-height: calc(var(--frame-max) - 2rem);
      padding: 1.75rem;
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      transition:
        transform 0.58s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.42s ease;
    }

    .wheel-preview-orb {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2.65rem;
      height: 2.65rem;
      border-radius: 50%;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      background:
        radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0) 42%),
        radial-gradient(circle at 68% 78%, rgba(0, 0, 0, 0.35) 0%, rgba(0, 0, 0, 0) 48%),
        radial-gradient(circle at 48% 52%, color-mix(in srgb, var(--wheel-preview-color, #3d4f5f) 78%, white) 0%, var(--wheel-preview-color, #3d4f5f) 54%, color-mix(in srgb, var(--wheel-preview-color, #3d4f5f) 52%, black) 100%);
      box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 0.22),
        inset 0 -3px 7px rgba(0, 0, 0, 0.32),
        0 0 10px color-mix(in srgb, var(--wheel-preview-color, #3d4f5f) 55%, transparent),
        0 0 22px color-mix(in srgb, var(--wheel-preview-color, #3d4f5f) 22%, transparent);
      transition:
        opacity 0.28s ease,
        transform 0.14s ease,
        box-shadow 0.12s ease,
        background 0.1s ease;
    }

    .wheel-preview-orb.is-active {
      opacity: 1;
    }

    .wheel-preview-orb.is-picking {
      transform: translate(-50%, -50%) scale(1.07);
    }

    .wheel-preview-orb::after {
      content: '';
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, rgba(255, 255, 255, 0.24) 0%, transparent 62%);
      pointer-events: none;
    }

    #wheelCanvas {
      position: relative;
      z-index: 2;
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow:
        0 0 0 0.5px rgba(255, 255, 255, 0.12),
        0 8px 40px rgba(0, 0, 0, 0.45),
        0 0 80px rgba(184, 160, 122, 0.08);
      touch-action: none;
      cursor: crosshair;
    }

    .phone-shell.wheel-open .wheel-stage {
      transform: scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .phone-shell.wheel-closing .wheel-stage {
      transform: scale(0);
      opacity: 0;
      transition-duration: 0.42s;
      transition-timing-function: cubic-bezier(0.55, 0, 0.85, 0.36);
    }

    .phone-shell.wheel-open .wheel-overlay {
      pointer-events: auto;
    }

    #inscapeBtn {
      display: none;
      flex: 1;
      padding: 1.05rem 0;
      border: 0.5px solid rgba(255, 255, 255, 0.14);
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.015);
      color: rgba(232, 230, 226, 0.78);
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.52em;
      text-indent: 0.52em;
      cursor: pointer;
      transition:
        background 0.55s ease,
        border-color 0.55s ease,
        color 0.55s ease,
        box-shadow 0.55s ease;
    }

    #inscapeBtn:hover:not(:disabled) {
      border-color: rgba(184, 160, 122, 0.4);
      color: rgba(232, 230, 226, 0.95);
      background: rgba(184, 160, 122, 0.06);
      box-shadow:
        0 0 28px rgba(184, 160, 122, 0.12),
        inset 0 0 24px rgba(255, 255, 255, 0.02);
    }

    #inscapeBtn:active:not(:disabled) {
      background: rgba(184, 160, 122, 0.1);
      box-shadow: 0 0 16px rgba(184, 160, 122, 0.08);
    }

    #inscapeBtn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .canvas-wrap {
      flex: 0 0 auto;
      position: relative;
      z-index: 2;
      margin: 0 auto;
      padding: 0;
      background: transparent;
      border-radius: 0;
      overflow: hidden;
      box-shadow: none;
      border: none;
      transform: translateZ(0);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 100%;
    }

    .canvas-wrap:not(.is-framed):not(.framing-active) {
      width: clamp(270px, 92vw, 300px);
      min-width: 270px;
      max-width: 300px;
      aspect-ratio: var(--canvas-portrait-ratio);
      min-height: 480px;
      height: auto;
      flex: 0 0 auto;
    }

    .canvas-wrap.is-framed,
    .canvas-wrap.framing-active {
      flex: 1 1 auto;
      min-height: 0;
      max-height: min(72dvh, 560px);
    }

    .canvas-wrap:not(.is-framed):not(.framing-active) .museum-frame {
      width: 100%;
      height: 100%;
    }

    .canvas-wrap:not(.is-framed):not(.framing-active) .museum-frame-sculpted {
      width: 100%;
      height: 100%;
    }

    .canvas-wrap.is-framed,
    .canvas-wrap.framing-active {
      overflow: visible;
    }

    .museum-frame {
      width: 100%;
      height: 100%;
      transform-origin: center center;
      transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .canvas-wrap.is-framed .museum-frame,
    .museum-frame.framing-animate {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .museum-frame.framing-animate {
      transform: scale(0.85);
    }

    /* 通常時：麻布キャンバスのみが闇に浮かぶ（余白・枠・影なし） */
    .museum-frame-sculpted {
      position: relative;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      background: transparent;
      border: none;
      outline: none;
      box-shadow: none;
      transition:
        padding 1.5s cubic-bezier(0.4, 0, 0.2, 1),
        background 1.5s cubic-bezier(0.4, 0, 0.2, 1),
        border-color 1.5s cubic-bezier(0.4, 0, 0.2, 1),
        outline 1.5s cubic-bezier(0.4, 0, 0.2, 1),
        box-shadow 1.5s cubic-bezier(0.4, 0, 0.2, 1),
        width 1.5s cubic-bezier(0.4, 0, 0.2, 1),
        height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 完成準備 or 額装アニメーション時：マット・木枠・金枠を出現 */
    .canvas-wrap.is-framed .museum-frame-sculpted,
    .museum-frame.framing-animate .museum-frame-sculpted {
      width: fit-content;
      height: fit-content;
      max-width: 100%;
      max-height: 100%;
      margin: auto;
      display: block;
      padding: 28px 22px 32px;
      background: #fbf9f5;
      border: 20px solid #1c110a;
      border-top-color: #f3e5ab;
      border-left-color: #d4af37;
      border-right-color: #8a640f;
      border-bottom-color: #5c430a;
      outline: 3px solid #aa7c11;
      outline-offset: -20px;
      box-shadow:
        inset 0 4px 0 rgba(255, 255, 255, 0.15),
        inset 0 -4px 8px rgba(0, 0, 0, 0.8),
        0 50px 100px rgba(0, 0, 0, 0.95),
        0 15px 30px rgba(0, 0, 0, 0.7);
    }

    .canvas-wrap.is-framed .museum-frame-sculpted::before,
    .museum-frame.framing-animate .museum-frame-sculpted::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 20px solid transparent;
      border-image: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, transparent 40%, rgba(0,0,0,0.35) 100%) 1;
      opacity: 0.85;
    }

    .art-surface {
      position: relative;
      width: 100%;
      height: 100%;
      aspect-ratio: var(--canvas-portrait-ratio);
      min-height: 0;
      overflow: hidden;
      z-index: 1;
      line-height: 0;
      font-size: 0;
      margin: 0 auto;
    }

    .canvas-wrap.is-framed .art-surface,
    .museum-frame.framing-animate .art-surface {
      width: var(--framed-art-w);
      height: var(--framed-art-h);
      flex-shrink: 0;
      padding: 0;
      margin: 0;
    }

    .paper-texture-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background-color: transparent;
      background-image: var(--canvas-fabric-url);
      background-size: cover;
      background-blend-mode: multiply;
      mix-blend-mode: multiply;
      opacity: 0.35;
    }

    #mainCanvas,
    .gallery-art-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: default;
      position: relative;
      z-index: 1;
      vertical-align: top;
      background-color: #f7f4eb;
      background-image:
        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 4px),
        var(--canvas-fabric-url);
      background-blend-mode: multiply;
      background-size: auto, auto, cover;
    }

    /* 通常時：キャンバス単体が闇に浮かぶ微かな落ち影のみ */
    .canvas-wrap:not(.is-framed):not(.framing-active) #mainCanvas {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
    }

    /* 額装時：額縁の奥に嵌まった布地の陰影 */
    .canvas-wrap.is-framed #mainCanvas,
    .canvas-wrap.framing-active #mainCanvas,
    .gallery-art-canvas {
      box-shadow:
        inset 5px 5px 15px rgba(0, 0, 0, 0.4),
        inset -3px -3px 10px rgba(255, 255, 255, 0.6);
    }

    #mainCanvas {
      cursor: default;
    }

    .canvas-wrap.shaking {
      animation: canvasShake 0.44s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    @keyframes canvasShake {
      0%   { transform: translate(0, 0); }
      12%  { transform: translate(-6px, 4px); }
      24%  { transform: translate(7px, -5px); }
      36%  { transform: translate(-5px, -4px); }
      48%  { transform: translate(5px, 3px); }
      60%  { transform: translate(-3px, 2px); }
      72%  { transform: translate(3px, -2px); }
      84%  { transform: translate(-1px, 1px); }
      100% { transform: translate(0, 0); }
    }

    .shock-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .zen-target {
      transition: opacity 2s ease, visibility 2s ease;
    }

    .phone-shell.zen-fading .zen-target,
    .phone-shell.zen-mode .zen-target {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .phone-shell.zen-mode .top-area {
      flex: 0 0 auto;
      max-height: none;
    }

    .header-actions {
      position: relative;
      flex: 0 0 auto;
      width: 100%;
      margin: 0 0 0.85rem;
      padding: 0 0.65rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.38rem;
    }

    .header-nav-core {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 0.22rem;
      width: 100%;
      flex-wrap: wrap;
    }

    .header-nav-core > * {
      flex: 1 1 0;
      min-width: 3.4rem;
      max-width: 5.2rem;
    }

    .header-action-btn {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.3rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-indent: 0.03em;
      color: rgba(232, 230, 226, 0.45);
      padding: 0.38rem 0.24rem;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      background: rgba(18, 19, 22, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease, opacity 2s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }

    a.header-action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-action-btn:hover:not(:disabled) {
      color: rgba(232, 230, 226, 0.82);
      border-color: rgba(184, 160, 122, 0.35);
      background: rgba(24, 25, 28, 0.88);
    }

    .header-action-btn:disabled {
      opacity: 0.45;
      cursor: wait;
    }

    .header-action-btn.is-current {
      color: rgba(201, 169, 98, 0.62);
      border-color: rgba(201, 169, 98, 0.22);
      background: rgba(201, 169, 98, 0.06);
      pointer-events: none;
      cursor: default;
    }

    @media (max-width: 480px) {
      .header-nav-core {
        gap: 0.14rem;
      }

      .header-nav-core > * {
        min-width: 2.9rem;
      }

      .header-action-btn {
        font-size: 0.28rem;
        letter-spacing: 0.02em;
        text-indent: 0.02em;
        padding: 0.34rem 0.18rem;
      }
    }

    .phone-shell.zen-fading .header-actions,
    .phone-shell.zen-mode .header-actions {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .frame-cta-overlay {
      position: absolute;
      inset: 0;
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.35rem;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }

    .frame-cta-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .frame-cta-overlay.ready {
      pointer-events: none;
    }

    .frame-btn {
      position: relative;
      z-index: 9999;
      pointer-events: auto;
      display: block;
      width: 100%;
      max-width: 17rem;
      margin: 0;
      padding: 1.05rem 0.75rem;
      border: 0.5px solid rgba(184, 160, 122, 0.18);
      border-radius: 1px;
      background: rgba(18, 19, 22, 0.82);
      color: rgba(232, 230, 226, 0.55);
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transform: translateY(12px) scale(0.96);
      transition:
        opacity 1.1s ease,
        transform 1.1s cubic-bezier(0.22, 1, 0.36, 1),
        visibility 1.1s ease,
        border-color 0.5s ease,
        background 0.5s ease,
        box-shadow 0.5s ease;
      box-shadow: 0 20px 64px rgba(0, 0, 0, 0.45);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .frame-cta-overlay.visible .frame-btn {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    .frame-btn.locked {
      opacity: 0.26;
      pointer-events: none;
      cursor: default;
    }

    .frame-btn.ready {
      position: relative;
      z-index: 9999;
      pointer-events: auto !important;
      cursor: pointer !important;
      opacity: 1 !important;
      visibility: visible !important;
      border-color: rgba(201, 169, 98, 0.48);
      background: linear-gradient(180deg, rgba(28, 26, 24, 0.95) 0%, rgba(18, 19, 22, 0.92) 100%);
      color: rgba(232, 230, 226, 0.92);
      box-shadow:
        0 0 48px rgba(201, 169, 98, 0.18),
        0 24px 80px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      animation: frameBtnGlow 2.4s ease-in-out infinite;
    }

    .frame-btn.processing {
      pointer-events: none;
      cursor: wait !important;
      animation: none;
    }

    .frame-progress-hint {
      text-align: center;
      font-size: 0.52rem;
      letter-spacing: 0.14em;
      color: rgba(232, 230, 226, 0.28);
      margin-top: 0.55rem;
      display: none;
    }

    .frame-progress-hint.visible {
      display: block;
    }

    @keyframes frameBtnGlow {
      0%, 100% { box-shadow: 0 0 24px rgba(184, 160, 122, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.05); }
      50%      { box-shadow: 0 0 40px rgba(201, 169, 98, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.08); }
    }

    .frame-btn-main {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.55em;
      text-indent: 0.55em;
      margin-bottom: 0.2rem;
    }

    .frame-btn-en {
      display: block;
      font-size: 0.48rem;
      letter-spacing: 0.28em;
      text-indent: 0.28em;
      color: rgba(201, 169, 98, 0.75);
      margin-bottom: 0.35rem;
    }

    .frame-btn-progress {
      display: block;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      color: rgba(232, 230, 226, 0.35);
    }

    .frame-btn.ready .frame-btn-progress {
      color: rgba(201, 169, 98, 0.65);
    }

    .frame-modal {
      position: absolute;
      inset: 0;
      z-index: 210;
      background: rgba(8, 9, 11, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(1rem + env(safe-area-inset-top)) 1rem calc(1rem + env(safe-area-inset-bottom));
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .frame-modal.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .frame-modal-inner {
      width: 100%;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
    }

    .frame-preview-wrap {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    #framePreview {
      max-width: 100%;
      max-height: 52vh;
      display: block;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.45),
        0 24px 80px rgba(0, 0, 0, 0.35);
    }

    .frame-modal-title {
      font-size: 0.56rem;
      letter-spacing: 0.42em;
      text-indent: 0.42em;
      color: var(--text-soft);
      text-align: center;
    }

    .frame-modal-actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .frame-action-btn {
      width: 100%;
      padding: 0.85rem;
      border: 0.5px solid rgba(201, 169, 98, 0.35);
      border-radius: 1px;
      background: rgba(201, 169, 98, 0.08);
      color: rgba(232, 230, 226, 0.85);
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      text-indent: 0.35em;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .frame-action-btn.secondary {
      border-color: rgba(255, 255, 255, 0.12);
      background: transparent;
      color: rgba(232, 230, 226, 0.55);
      letter-spacing: 0.2em;
      text-indent: 0.2em;
    }

    .frame-action-btn.primary {
      background: linear-gradient(180deg, rgba(201, 169, 98, 0.18) 0%, rgba(184, 160, 122, 0.08) 100%);
    }

    .frame-complete-dialog {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.72);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    .frame-complete-dialog.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .frame-complete-inner {
      width: min(100%, 20rem);
      padding: 1.75rem 1.5rem 1.35rem;
      border: 0.5px solid rgba(201, 169, 98, 0.28);
      border-radius: 3px;
      background: linear-gradient(180deg, rgba(28, 28, 30, 0.98) 0%, rgba(14, 14, 16, 0.98) 100%);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
      text-align: center;
    }

    .frame-complete-inner p {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      line-height: 1.9;
      color: rgba(232, 230, 226, 0.88);
      margin-bottom: 1.35rem;
    }

    .frame-complete-btn {
      padding: 0.55rem 1.35rem;
      border: 0.5px solid rgba(201, 169, 98, 0.4);
      border-radius: 2px;
      background: rgba(201, 169, 98, 0.1);
      color: #e8d5a3;
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      text-indent: 0.28em;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .frame-complete-btn:hover {
      background: rgba(201, 169, 98, 0.18);
      border-color: rgba(201, 169, 98, 0.55);
    }

    .tooltip {
      position: fixed;
      padding: 0.4rem 0.65rem;
      background: rgba(18, 19, 22, 0.88);
      color: #f7f7f5;
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      border-radius: 2px;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.25s ease;
      white-space: nowrap;
      transform: translate(-50%, -120%);
    }

    .tooltip.visible { opacity: 1; }

    .canvas-wrap.submit-ready #mainCanvas {
      cursor: crosshair;
      touch-action: none;
    }

    #mainCanvas {
      touch-action: manipulation;
    }

    .daily-lock-message {
      display: none;
    }

    .completion-whisper {
      position: fixed;
      bottom: calc(1.15rem + env(safe-area-inset-bottom));
      left: 50%;
      z-index: 9000;
      width: min(92vw, 22rem);
      margin: 0;
      padding: 0 0.5rem;
      text-align: center;
      pointer-events: none;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", serif;
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      line-height: 1.8;
      color: rgba(232, 230, 226, 0.35);
      opacity: 0;
      transform: translate3d(-50%, 8px, 0);
      transition: opacity 2s ease, transform 2s ease;
      -webkit-transform: translate3d(-50%, 8px, 0);
      -webkit-transition: opacity 2s ease, -webkit-transform 2s ease;
      will-change: opacity, transform;
    }

    .completion-whisper.visible {
      opacity: 1;
      transform: translate3d(-50%, 0, 0);
      -webkit-transform: translate3d(-50%, 0, 0);
    }

    @media (max-width: 480px) {
      .completion-whisper {
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        bottom: calc(1.35rem + env(safe-area-inset-bottom));
      }
    }

    .input-wrap.locked-hidden,
    .color-atelier.locked-hidden,
    footer.controls.locked-hidden {
      display: none;
    }

    .app.daily-locked .top-area {
      max-height: none;
    }

    .phone-shell.daily-locked .header-actions,
    .phone-shell.daily-locked .header-actions > * {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

  </style>
</head>
<body>
  <div class="phone-shell" id="phoneShell">
    <p class="completion-whisper" id="completionWhisper" aria-hidden="true"></p>

    <div class="frame-cta-overlay" id="frameCtaOverlay" aria-hidden="true">
      <button type="button" class="frame-btn" id="frameBtn" aria-label="作品を額装する">
        <span class="frame-btn-main">完成</span>
        <span class="frame-btn-en">Frame the Artwork</span>
        <span class="frame-btn-progress" id="frameProgress">0 / 7</span>

    </div>

    <div class="frame-modal" id="frameModal" aria-hidden="true">

        </div>
        <div class="frame-modal-actions">
          <button type="button" class="frame-action-btn primary" id="frameDownload">PNGで保存</button>
          <button type="button" class="frame-action-btn secondary" id="frameModalClose">閉じる</button>
        </div>
      </div>
    </div>

    <div class="app">
      <p class="logo logo--header zen-target" aria-label="INSCAPE">INSCAPE</p>

      <header class="header-actions" aria-label="ナビゲーション">
        <nav class="header-nav-core" aria-label="メイン">
          <a class="header-action-btn is-current" href="index.html" aria-current="page">キャンバス</a>
          <a class="header-action-btn gallery-link" href="gallery.html">感情の回廊</a>
          <a class="header-action-btn mycolors-link" href="mycolors.html">今日の私の色</a>
        </nav>
      </header>

      <div class="top-area">
        <div class="canvas-wrap" id="canvasWrap">
          <div class="museum-frame" id="museumFrame">
            <div class="museum-frame-sculpted">
              <div class="art-surface">
                <canvas id="mainCanvas" width="270" height="480"></canvas>
                <div class="paper-texture-overlay" aria-hidden="true"></div>
              </div>
            </div>
          </div>
          <canvas id="shockCanvas" class="shock-overlay" width="270" height="480" aria-hidden="true"></canvas>
        </div>
      </div>

      <div class="mid-panel zen-target" id="midPanel">
        <div class="input-wrap" id="inputWrap">
          <textarea id="wordInput" placeholder="感情をここに落とす" autocomplete="off" rows="2" aria-label="言葉を紡ぐ"></textarea>
          <span class="smoke-text" id="smokeText"></span>
        </div>
      </div>

      <div class="emotion-palette zen-target" id="emotionPalette">
        <div class="emotion-palette-spheres" id="emotionPaletteSpheres" role="listbox" aria-label="感情の八色"></div>
        <p class="emotion-palette-hint">長押しで感情を育て、上へフリックして落とす</p>
      </div>

      <footer class="controls zen-target" id="controlsFooter">
        <p class="frame-progress-hint zen-target" id="frameProgressHint"></p>
      </footer>

    <div class="tooltip" id="tooltip"></div>
    <div class="frame-complete-dialog" id="frameCompleteDialog" aria-hidden="true">
      <div class="frame-complete-inner">
        <p>作品を感情の回廊に大切に飾りました</p>
        <button type="button" class="frame-complete-btn" id="frameCompleteOk">OK</button>
      </div>
    </div>

  </div>

  <script>
    (function () {
      'use strict';

      const STORAGE_KEY = 'inscape_splashes';
      const HISTORY_KEY = 'histories';
      const INSCAPE_HISTORY_KEY = 'inscape_history';
      const GALLERY_KEY = 'inscape_gallery';
      const ALL_DIARIES_KEY = 'inscape_all_diaries';
      const LAST_DIARY_DATE_KEY = 'inscape_last_diary_date_v2';
      const LAST_EXPLOSION_AT_KEY = 'inscape_last_explosion_at';
      const COMPLETION_WHISPER_KEY = 'inscape_completion_whisper_v1';
      const MAX_ENTRIES = 7;
      const GALLERY_MAX = 28;
      const RETENTION_MS = 7 * 24 * 60 * 60 * 1000;
      const GALLERY_RETENTION_MS = RETENTION_MS;
      const FRAME_ENTRIES_REQUIRED = 7;
      const ZEN_IDLE_MS = 5000;
      const ZEN_FADE_MS = 2000;
      const CANVAS_LOGICAL_W = 270;
      const CANVAS_LOGICAL_H = 480;
      const BASE_SPLAT_SIZE = 72;
      const CHARGE_OPACITY_MIN = 0.4;
      const CHARGE_OPACITY_MAX = 1.0;
      const CHARGE_SECONDS_TO_MAX = 5.0;
      const SPLASH_AREA_COVERAGE = 0.5;
      const SPLASH_MIN_TO_MAX_RATIO = 0.22;
      const SPHERE_IDLE_OPACITY_DEFAULT = 0.12;
      const FLICK_UP_THRESHOLD_PX = 52;
      const SPLAT_PATTERN_COUNT = 3;
      const TAP_RIPPLE_DURATION = 900;
      const TAP_RIPPLE_MAX_FRAC = 0.24;

      const COMPLETION_WHISPERS = [
        '今日は、この色でした。',
        'この瞬間を、とどめました。',
        '今日は、ここに置いておきます。',
        'ありのまま、残りました。',
        '今日という一日を、保管しました。',
        'この色は、未来のあなたへ。',
        '言葉も色も、このままで。',
        'また一つ、人生が残りました。',
        '意味は、いつか人生がつくります。',
        'ありのままを、そのまま。'
      ];

      const CURATED_COLORS = [
        { hex: '#5d78b8', label: 'Slate Blue', idleOpacity: 0.10 },
        { hex: '#8b63c7', label: 'Dusty Violet', idleOpacity: 0.11 },
        { hex: '#b56a88', label: 'Muted Rose', idleOpacity: 0.12 },
        { hex: '#b56c4e', label: 'Terracotta', idleOpacity: 0.13 },
        { hex: '#6e8a4b', label: 'Olive Green', idleOpacity: 0.12 },
        { hex: '#c49a42', label: 'Ochre', idleOpacity: 0.11 },
        { hex: '#4e8b91', label: 'Deep Teal', idleOpacity: 0.14 },
        { hex: '#c9c4bc', label: 'Warm Gray', idleOpacity: 0.15 }
      ];

      const SPLASH_SLOTS = [
        { nx: 0.72, ny: 0.14 },
        { nx: 0.28, ny: 0.24 },
        { nx: 0.54, ny: 0.40 },
        { nx: 0.22, ny: 0.54 },
        { nx: 0.70, ny: 0.60 },
        { nx: 0.40, ny: 0.74 },
        { nx: 0.58, ny: 0.88 }
      ];

      const wordInput = document.getElementById('wordInput');

      function clearWordInputLengthLimit() {
        if (!wordInput) return;
        wordInput.removeAttribute('maxlength');
        wordInput.removeAttribute('maxLength');
        // iOS/Android のキャッシュや PWA で maxlength が残る場合の保険
        if (typeof wordInput.maxLength === 'number' && wordInput.maxLength > 0 && wordInput.maxLength < 100000) {
          wordInput.maxLength = 1048576;
        }
      }

      clearWordInputLengthLimit();
      const smokeText = document.getElementById('smokeText');
      const phoneShell = document.getElementById('phoneShell');
      const midPanel = document.getElementById('midPanel');
      const emotionPalette = document.getElementById('emotionPalette');
      const emotionPaletteSpheres = document.getElementById('emotionPaletteSpheres');
      const inscapeBtn = document.getElementById('inscapeBtn');
      const canvas = document.getElementById('mainCanvas');
      const ctx = canvas.getContext('2d');
      const canvasWrap = document.getElementById('canvasWrap');
      const museumFrame = document.getElementById('museumFrame');
      const shockCanvas = document.getElementById('shockCanvas');
      const shockCtx = shockCanvas.getContext('2d');
      const tooltip = document.getElementById('tooltip');
      const frameBtn = document.getElementById('frameBtn');
      const frameCtaOverlay = document.getElementById('frameCtaOverlay');
      const frameProgress = document.getElementById('frameProgress');
      const frameProgressHint = document.getElementById('frameProgressHint');
      const frameModal = document.getElementById('frameModal');
      const framePreview = document.getElementById('framePreview');
      const frameDownload = document.getElementById('frameDownload');
      const frameModalClose = document.getElementById('frameModalClose');
      const frameCompleteDialog = document.getElementById('frameCompleteDialog');
      const frameCompleteOk = document.getElementById('frameCompleteOk');
      const completionWhisper = document.getElementById('completionWhisper');
      const inputWrap = document.getElementById('inputWrap');
      const controlsFooter = document.getElementById('controlsFooter');
      const appEl = document.querySelector('.app');

      let selectedColor = '#5d78b8';
      let chargeState = {
        active: false,
        landed: false,
        color: null,
        progress: 0,
        inkOpacity: CHARGE_OPACITY_MIN,
        inkSizePx: 0,
        startX: 0,
        startY: 0,
        btnEl: null,
        rafId: null,
        lastTs: 0
      };
      let colorSyncLock = false;
      let splashes = [];
      let audioCtx = null;
      let noiseBuffer = null;
      let activeSuckSound = null;
      let shockwaves = [];
      let tapRipples = [];
      let ambientLoopId = null;
      let zenTimer = null;
      let zenFadeTimer = null;
      let zenArmed = false;
      let isZenMode = false;
      let framingCompleted = false;
      let frameProcessing = false;
      let lastCanvasExportDataUrl = null;
      let isDiarySubmitting = false;
      let canvasTouchStart = null;
      let lastCanvasTapHandledAt = 0;
      let diaryUnlockTimer = null;

      function rgbToHex(r, g, b) {
        return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
      }

      function getSplashSizeBoundsPx(w, h) {
        const cw = Math.max(1, w || canvas.clientWidth || CANVAS_LOGICAL_W);
        const ch = Math.max(1, h || canvas.clientHeight || CANVAS_LOGICAL_H);
        const maxSize = Math.sqrt(cw * ch * SPLASH_AREA_COVERAGE);
        const minSize = maxSize * SPLASH_MIN_TO_MAX_RATIO;
        return { minSize, maxSize };
      }

      function splashPixelSizeFromProgress(progress, w, h) {
        const { minSize, maxSize } = getSplashSizeBoundsPx(w, h);
        const p = Math.min(1, Math.max(0, Number(progress) || 0));
        return minSize + (maxSize - minSize) * p;
      }

      function resolveSplashDrawSizePx(splash) {
        if (!splash) return BASE_SPLAT_SIZE;
        if (typeof splash.drawSizePx === 'number' && splash.drawSizePx > 0) {
          return splash.drawSizePx;
        }
        return Math.max(1, (splash.baseSize || BASE_SPLAT_SIZE) * (splash.scaleFactor || 1));
      }

      function getSplashMetaHalfExtent(splashMeta) {
        if (!splashMeta) return BASE_SPLAT_SIZE * 0.5;
        if (typeof splashMeta.drawSizePx === 'number' && splashMeta.drawSizePx > 0) {
          return splashMeta.drawSizePx * 0.5;
        }
        return (splashMeta.baseSize || BASE_SPLAT_SIZE) * (splashMeta.scaleFactor || 1) * 0.5;
      }

      function getSphereIdleOpacity(btn) {
        if (!btn) return SPHERE_IDLE_OPACITY_DEFAULT;
        const stored = parseFloat(btn.dataset.idleOpacity);
        return Number.isFinite(stored) ? stored : SPHERE_IDLE_OPACITY_DEFAULT;
      }

      function setSphereOpacity(btn, opacity) {
        if (!btn) return;
        btn.style.setProperty('--charge-opacity', String(opacity));
      }

      function resetAllSphereVisuals() {
        if (!emotionPaletteSpheres) return;
        emotionPaletteSpheres.querySelectorAll('.emotion-sphere-btn').forEach((btn) => {
          setSphereOpacity(btn, getSphereIdleOpacity(btn));
          btn.classList.remove('is-charging');
        });
      }

      function updateChargeVisuals() {
        const p = chargeState.progress;
        const opacity = CHARGE_OPACITY_MIN + (CHARGE_OPACITY_MAX - CHARGE_OPACITY_MIN) * p;
        const w = canvas.clientWidth || CANVAS_LOGICAL_W;
        const h = canvas.clientHeight || CANVAS_LOGICAL_H;
        chargeState.inkOpacity = opacity;
        chargeState.inkSizePx = splashPixelSizeFromProgress(p, w, h);
        if (chargeState.btnEl) {
          setSphereOpacity(chargeState.btnEl, opacity);
          chargeState.btnEl.classList.toggle('is-charging', p > 0.02);
        }
        if (emotionPaletteSpheres) {
          emotionPaletteSpheres.querySelectorAll('.emotion-sphere-btn').forEach((btn) => {
            if (btn !== chargeState.btnEl) {
              setSphereOpacity(btn, getSphereIdleOpacity(btn));
              btn.classList.remove('is-charging');
            }
          });
        }
      }

      function stopChargeLoop() {
        if (chargeState.rafId) {
          cancelAnimationFrame(chargeState.rafId);
          chargeState.rafId = null;
        }
        chargeState.lastTs = 0;
      }

      function chargeStep(ts) {
        if (!chargeState.active) return;
        if (!chargeState.lastTs) chargeState.lastTs = ts;
        const dt = Math.min(48, ts - chargeState.lastTs);
        chargeState.lastTs = ts;
        chargeState.progress = Math.min(1, chargeState.progress + dt / (CHARGE_SECONDS_TO_MAX * 1000));
        updateChargeVisuals();
        chargeState.rafId = requestAnimationFrame(chargeStep);
      }

      let chargeDocCleanup = null;

      function bindChargeDocumentListeners() {
        unbindChargeDocumentListeners();
        const onDocMove = (e) => {
          if (!chargeState.active || chargeState.landed) return;
          const point = e.touches && e.touches.length ? e.touches[0] : e;
          if (!point) return;
          handleChargeMove(point.clientX, point.clientY);
        };
        const onDocEnd = () => {
          if (!chargeState.active || chargeState.landed) return;
          resetChargeState();
        };
        document.addEventListener('mousemove', onDocMove);
        document.addEventListener('touchmove', onDocMove, { passive: false });
        document.addEventListener('mouseup', onDocEnd);
        document.addEventListener('touchend', onDocEnd);
        document.addEventListener('touchcancel', onDocEnd);
        chargeDocCleanup = () => {
          document.removeEventListener('mousemove', onDocMove);
          document.removeEventListener('touchmove', onDocMove);
          document.removeEventListener('mouseup', onDocEnd);
          document.removeEventListener('touchend', onDocEnd);
          document.removeEventListener('touchcancel', onDocEnd);
          chargeDocCleanup = null;
        };
      }

      function unbindChargeDocumentListeners() {
        if (chargeDocCleanup) chargeDocCleanup();
      }

      function resetChargeState() {
        stopChargeLoop();
        unbindChargeDocumentListeners();
        chargeState.active = false;
        chargeState.landed = false;
        chargeState.color = null;
        chargeState.progress = 0;
        chargeState.inkOpacity = CHARGE_OPACITY_MIN;
        const resetW = canvas.clientWidth || CANVAS_LOGICAL_W;
        const resetH = canvas.clientHeight || CANVAS_LOGICAL_H;
        chargeState.inkSizePx = splashPixelSizeFromProgress(0, resetW, resetH);
        chargeState.btnEl = null;
        resetAllSphereVisuals();
      }

      function startCharge(btn, color, clientX, clientY) {
        if (isDiarySubmitting || isCanvasInteractionLocked()) return;
        resetChargeState();
        chargeState.active = true;
        chargeState.color = color;
        chargeState.btnEl = btn;
        chargeState.startX = clientX;
        chargeState.startY = clientY;
        selectedColor = color;
        updateChargeVisuals();
        bindChargeDocumentListeners();
        chargeState.rafId = requestAnimationFrame(chargeStep);
      }

      function handleChargeMove(clientX, clientY) {
        if (!chargeState.active || chargeState.landed) return;
        if (chargeState.startY - clientY >= FLICK_UP_THRESHOLD_PX) {
          tryCommitLanding();
        }
      }

      function fadeOutLandingUI() {
        if (midPanel) midPanel.classList.add('is-ui-fading');
        if (emotionPalette) emotionPalette.classList.add('is-ui-fading');
      }

      function tryCommitLanding() {
        if (!chargeState.active || chargeState.landed || isDiarySubmitting) return;
        const savedWord = wordInput.value.trim();
        if (!savedWord || isCanvasInteractionLocked()) return;
        chargeState.landed = true;
        stopChargeLoop();
        const payload = {
          color: chargeState.color,
          opacity: chargeState.inkOpacity,
          progress: chargeState.progress
        };
        resetChargeState();
        commitInkLanding(savedWord, payload);
      }

      function buildEmotionPalette() {
        if (!emotionPaletteSpheres) return;
        emotionPaletteSpheres.innerHTML = '';
        CURATED_COLORS.forEach((entry) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'emotion-sphere-btn';
          btn.dataset.color = entry.hex;
          btn.dataset.idleOpacity = String(entry.idleOpacity ?? SPHERE_IDLE_OPACITY_DEFAULT);
          btn.setAttribute('aria-label', entry.label);
          setSphereOpacity(btn, entry.idleOpacity ?? SPHERE_IDLE_OPACITY_DEFAULT);

          const swatch = document.createElement('span');
          swatch.className = 'emotion-sphere-swatch';
          swatch.style.setProperty('--sphere-color', entry.hex);
          btn.appendChild(swatch);

          const onDown = (e) => {
            if (isDiarySubmitting || isCanvasInteractionLocked()) return;
            e.preventDefault();
            const point = e.touches ? e.touches[0] : e;
            startCharge(btn, entry.hex, point.clientX, point.clientY);
          };

          const onMove = (e) => {
            if (!chargeState.active || chargeState.btnEl !== btn) return;
            const point = e.touches ? e.touches[0] : e;
            handleChargeMove(point.clientX, point.clientY);
          };

          btn.addEventListener('mousedown', onDown);
          btn.addEventListener('touchstart', onDown, { passive: false });
          btn.addEventListener('mousemove', onMove);
          btn.addEventListener('touchmove', onMove, { passive: false });

          emotionPaletteSpheres.appendChild(btn);
        });
      }

      function extractHexColor(text) {
        const m = String(text || '').match(/#[0-9A-Fa-f]{6}\b/);
        return m ? m[0].toLowerCase() : null;
      }

      function normalizeSplashHex(color) {
        return extractHexColor(color) || normalizeDiaryColor(color);
      }

      function hexToRgb(hex) {
        const normalized = extractHexColor(hex);
        if (!normalized) return null;
        const n = parseInt(normalized.slice(1), 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }

      function applyColorToSplash(splash, color) {
        if (!splash) return splash;
        const exactColor = normalizeSplashHex(color);
        splash.color = exactColor;
        splash.color1 = exactColor;
        splash.color2 = null;
        splash.gradient = false;
        splash.weight = 1;
        return splash;
      }

      function hashWeekWords(words) {
        return words.map((w) => String(w).trim()).join('\u241e');
      }

      function getWeekWordsFromStorage() {
        const fromSplashes = splashes
          .slice()
          .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0))
          .map((s) => String(s.word || '').trim())
          .filter(Boolean);
        if (fromSplashes.length >= MAX_ENTRIES) {
          return fromSplashes.slice(0, MAX_ENTRIES);
        }

        const fromHistory = loadInscapeHistory()
          .slice()
          .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0))
          .map((e) => String(e.word || '').trim())
          .filter(Boolean);
        return fromHistory.slice(0, MAX_ENTRIES);
      }

      function getWeekEntryCount() {
        const splashCount = splashes.filter((s) => String(s.word || '').trim()).length;
        const historyCount = loadInscapeHistory().filter((e) => String(e.word || '').trim()).length;
        return Math.max(splashCount, historyCount);
      }

      function getArtworkDiaryDay(ts) {
        const n = Number(ts);
        if (!n || n <= 0) return null;
        const d = new Date(n);
        if (Number.isNaN(d.getTime())) return null;
        const shifted = new Date(d.getTime() - (6 * 60 * 60 * 1000));
        return new Date(shifted.getFullYear(), shifted.getMonth(), shifted.getDate());
      }

      function collectArtworkDiaryDays(list) {
        const source = Array.isArray(list) ? list : [];
        const seen = new Set();
        const days = [];
        source.forEach((entry) => {
          const day = getArtworkDiaryDay(entry && entry.timestamp);
          if (!day) return;
          const key = day.getTime();
          if (seen.has(key)) return;
          seen.add(key);
          days.push(day);
        });
        days.sort((a, b) => a.getTime() - b.getTime());
        return days;
      }

      function computeArtworkPeriodFromSplashes(list) {
        const days = collectArtworkDiaryDays(list);
        const endDate = days.length ? days[days.length - 1] : (getArtworkDiaryDay(Date.now()) || new Date());
        const startDate = days.length ? days[0] : endDate;
        const periodStart = formatDotDate(startDate);
        const periodEnd = formatDotDate(endDate);
        const period = periodStart === periodEnd ? periodStart : `${periodStart} - ${periodEnd}`;
        return { period, periodStart, periodEnd };
      }

      function hasReachedSplashLimit() {
        return splashes.length >= MAX_ENTRIES;
      }

      function pickBalancedSplashPosition(w, h, splashMeta, slotIndex) {
        const slot = SPLASH_SLOTS[slotIndex % SPLASH_SLOTS.length];
        const jitter = 0.035;
        const nx = Math.min(0.94, Math.max(0.06, slot.nx + (Math.random() - 0.5) * jitter));
        const ny = Math.min(0.94, Math.max(0.06, slot.ny + (Math.random() - 0.5) * jitter));
        const raw = { x: nx * w, y: ny * h };
        return clampTapPosition(raw.x, raw.y, w, h, splashMeta);
      }

      function setEmotionPaletteDisabled(disabled) {
        if (!emotionPaletteSpheres) return;
        emotionPaletteSpheres.querySelectorAll('.emotion-sphere-btn').forEach((btn) => {
          btn.disabled = !!disabled;
        });
      }

      function getDiaryDayKey(date = new Date()) {
        const offsetTime = new Date(date.getTime() - (6 * 60 * 60 * 1000));
        const y = offsetTime.getFullYear();
        const mo = String(offsetTime.getMonth() + 1).padStart(2, '0');
        const da = String(offsetTime.getDate()).padStart(2, '0');
        return `${y}-${mo}-${da}`;
      }

      function normalizeDiaryDayKey(raw) {
        if (!raw) return '';
        const text = String(raw).trim();
        const iso = text.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
        if (iso) {
          return `${iso[1]}-${iso[2].padStart(2, '0')}-${iso[3].padStart(2, '0')}`;
        }
        const slash = text.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
        if (slash) {
          return `${slash[1]}-${slash[2].padStart(2, '0')}-${slash[3].padStart(2, '0')}`;
        }
        const parsed = Date.parse(text.replace(/\./g, '/'));
        if (!Number.isNaN(parsed)) return getDiaryDayKey(new Date(parsed));
        return text;
      }

      function formatDotDate(d) {
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        return `${y}.${mo}.${da}`;
      }

      function getDiaryDayKeyFromTimestamp(ts) {
        const n = Number(ts);
        if (!n || n <= 0) return '';
        return getDiaryDayKey(new Date(n));
      }

      function readGalleryStore() {
        try {
          const raw = localStorage.getItem(GALLERY_KEY);
          const data = raw ? JSON.parse(raw) : [];
          return Array.isArray(data) ? data : [];
        } catch {
          return [];
        }
      }

      function writeGalleryStore(gallery) {
        const list = Array.isArray(gallery) ? gallery : [];
        const tryWrite = (entries) => {
          localStorage.setItem(GALLERY_KEY, JSON.stringify(entries));
        };
        try {
          tryWrite(list);
          return true;
        } catch (err) {
          const isQuota = err && (err.name === 'QuotaExceededError' || err.code === 22 || err.code === 1014);
          if (!isQuota) {
            console.warn('ギャラリー保存に失敗:', err);
            return false;
          }
          try {
            const lighter = list.map((entry) => {
              if (!entry || typeof entry !== 'object') return entry;
              const copy = { ...entry };
              delete copy.artworkImageDataUrl;
              delete copy.snapshotPixelW;
              delete copy.snapshotPixelH;
              return copy;
            });
            tryWrite(lighter);
            return true;
          } catch (err2) {
            console.warn('ギャラリー保存に失敗（容量不足）:', err2);
            return false;
          }
        }
      }

      function buildArtworkCycleKey() {
        const words = getWeekWordsFromStorage();
        const stamp = splashes
          .slice()
          .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0))
          .map((s) => `${s.timestamp || 0}|${s.nx}|${s.ny}|${s.color || s.color1 || ''}`)
          .join('\u241f');
        return `${hashWeekWords(words)}\u241e${stamp}`;
      }

      function hasPostedToday() {
        try {
          const atRaw = localStorage.getItem(LAST_EXPLOSION_AT_KEY);
          if (atRaw) {
            const at = Number(atRaw);
            if (at > 0) return getDiaryDayKeyFromTimestamp(at) === getDiaryDayKey();
          }
          const legacy = localStorage.getItem(LAST_DIARY_DATE_KEY);
          if (!legacy) return false;
          return normalizeDiaryDayKey(legacy) === getDiaryDayKey();
        } catch {
          return false;
        }
      }

      function lockDiaryForToday() {
        const now = Date.now();
        const dayKey = getDiaryDayKey(new Date(now));
        try {
          localStorage.setItem(LAST_EXPLOSION_AT_KEY, String(now));
          localStorage.setItem(LAST_DIARY_DATE_KEY, dayKey);
        } catch (err) {
          console.warn('日記ロックの保存に失敗:', err);
        }
      }

      function isCanvasInteractionLocked() {
        return hasPostedToday() || hasReachedSplashLimit();
      }

      function pickCompletionWhisper() {
        return COMPLETION_WHISPERS[Math.floor(Math.random() * COMPLETION_WHISPERS.length)];
      }

      function loadStoredCompletionWhisper() {
        try {
          const raw = localStorage.getItem(COMPLETION_WHISPER_KEY);
          if (!raw) return null;
          const data = JSON.parse(raw);
          if (!data) return null;
          if (Number.isInteger(data.index) && data.index >= 0 && data.index < COMPLETION_WHISPERS.length) {
            if (normalizeDiaryDayKey(data.dayKey) !== getDiaryDayKey()) return null;
            return COMPLETION_WHISPERS[data.index];
          }
          if (!data.text) return null;
          if (normalizeDiaryDayKey(data.dayKey) !== getDiaryDayKey()) return null;
          return String(data.text);
        } catch {
          return null;
        }
      }

      function storeCompletionWhisper(text) {
        const dayKey = getDiaryDayKey();
        let index = COMPLETION_WHISPERS.indexOf(text);
        if (index < 0) index = Math.floor(Math.random() * COMPLETION_WHISPERS.length);
        try {
          localStorage.setItem(COMPLETION_WHISPER_KEY, JSON.stringify({
            dayKey,
            index,
            text: COMPLETION_WHISPERS[index]
          }));
        } catch (err) {
          console.warn('完了メッセージの保存に失敗:', err);
        }
      }

      function revealCompletionWhisper(text) {
        if (!completionWhisper || !text) return;
        completionWhisper.textContent = text;
        completionWhisper.classList.remove('visible');
        void completionWhisper.offsetWidth;
        completionWhisper.classList.add('visible');
        completionWhisper.setAttribute('aria-hidden', 'false');
      }

      function showCompletionWhisper(forceNew) {
        let text = forceNew ? pickCompletionWhisper() : (loadStoredCompletionWhisper() || pickCompletionWhisper());
        storeCompletionWhisper(text);
        revealCompletionWhisper(text);
        requestAnimationFrame(() => {
          requestAnimationFrame(() => revealCompletionWhisper(text));
        });
        setTimeout(() => revealCompletionWhisper(text), 600);
      }

      function hideCompletionWhisper() {
        if (!completionWhisper) return;
        completionWhisper.classList.remove('visible');
        completionWhisper.setAttribute('aria-hidden', 'true');
      }

      function restoreCompletionWhisperIfNeeded() {
        if (!hasPostedToday()) return;
        const text = loadStoredCompletionWhisper();
        if (text) revealCompletionWhisper(text);
      }

      function getMsUntilNextDiaryReset() {
        const now = new Date();
        const next = new Date(now);
        next.setHours(6, 0, 0, 0);
        if (now.getTime() >= next.getTime()) {
          next.setDate(next.getDate() + 1);
        }
        return Math.max(1000, next.getTime() - now.getTime());
      }

      function scheduleDiaryDayUnlockCheck() {
        if (diaryUnlockTimer) clearTimeout(diaryUnlockTimer);
        diaryUnlockTimer = setTimeout(() => {
          diaryUnlockTimer = null;
          if (!hasPostedToday()) {
            hideCompletionWhisper();
            try {
              localStorage.removeItem(COMPLETION_WHISPER_KEY);
            } catch (_) {}
            applyDailyLockUI();
            updateUIState();
          }
          scheduleDiaryDayUnlockCheck();
        }, getMsUntilNextDiaryReset());
      }

      function applyDailyLockUI() {
        const locked = isCanvasInteractionLocked();

        if (appEl) appEl.classList.toggle('daily-locked', locked);
        phoneShell.classList.toggle('daily-locked', locked);

        if (locked) {
          if (inputWrap) inputWrap.classList.add('locked-hidden');
          if (emotionPalette) emotionPalette.classList.add('locked-hidden');
          if (controlsFooter) controlsFooter.classList.add('locked-hidden');
          wordInput.disabled = true;
          if (emotionPaletteSpheres) {
            emotionPaletteSpheres.querySelectorAll('.emotion-sphere-btn').forEach((btn) => {
              btn.disabled = true;
            });
          }
          canvasWrap.classList.remove('submit-ready');
        } else {
          if (inputWrap) inputWrap.classList.remove('locked-hidden');
          if (emotionPalette) emotionPalette.classList.remove('locked-hidden');
          if (controlsFooter) controlsFooter.classList.remove('locked-hidden');
          hideCompletionWhisper();
          wordInput.disabled = isDiarySubmitting;
          setEmotionPaletteDisabled(isDiarySubmitting);
        }

        updateCanvasSubmitHint();
        return locked;
      }

      function updateCanvasSubmitHint() {
        const ready = canSubmitDiaryNow();
        canvasWrap.classList.toggle('submit-ready', ready);
      }

      function refreshCanvasExportSnapshot() {
        redrawCanvas();
        try {
          lastCanvasExportDataUrl = canvas.toDataURL('image/png');
        } catch (err) {
          console.warn('canvas export snapshot failed:', err);
          lastCanvasExportDataUrl = null;
        }
      }

      function loadInscapeHistory() {
        try {
          const raw = localStorage.getItem(INSCAPE_HISTORY_KEY);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          if (data[0] && Array.isArray(data[0].history)) {
            return data[0].history.map((entry) => ({
              word: entry.word || entry.text || '',
              color: entry.color,
              date: entry.date || formatDate(entry.timestamp),
              timestamp: entry.timestamp || 0
            })).filter((e) => e.color);
          }
          return data.map((entry) => ({
            word: entry.word || entry.text || '',
            color: entry.color,
            date: entry.date || formatDate(entry.timestamp),
            timestamp: entry.timestamp || 0
          })).filter((e) => e.color);
        } catch {
          return [];
        }
      }

      const SPLAT_IMAGE = 'splat.png';
      const FABRIC_IMAGE = 'canvas-fabric.png';
      const CANVAS_BG = '#f7f4eb';
      const splatImg = new Image();
      const fabricImg = new Image();
      const stampCache = {};
      let splatReady = false;
      let splatLoadPromise = null;
      let fabricReady = false;
      let fabricLoadPromise = null;

      function clearStampCache() {
        Object.keys(stampCache).forEach(k => { delete stampCache[k]; });
      }

      function loadFabricImage() {
        if (fabricReady && fabricImg.naturalWidth > 0) return Promise.resolve(fabricImg);
        if (fabricLoadPromise) return fabricLoadPromise;

        fabricLoadPromise = new Promise((resolve) => {
          const finish = (ok) => {
            fabricLoadPromise = null;
            if (ok) {
              fabricReady = true;
              resolve(fabricImg);
            } else {
              resolve(null);
            }
          };

          fabricImg.onload = () => finish(fabricImg.naturalWidth > 0);
          fabricImg.onerror = () => finish(false);
          fabricImg.src = FABRIC_IMAGE;

          if (fabricImg.complete) {
            finish(fabricImg.naturalWidth > 0);
          }
        });

        return fabricLoadPromise;
      }

      function drawCanvasCrosshatch(targetCtx, w, h) {
        targetCtx.save();
        targetCtx.strokeStyle = 'rgba(0, 0, 0, 0.03)';
        targetCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 4) {
          targetCtx.beginPath();
          targetCtx.moveTo(0, y);
          targetCtx.lineTo(w, y);
          targetCtx.stroke();
        }
        for (let x = 0; x < w; x += 4) {
          targetCtx.beginPath();
          targetCtx.moveTo(x, 0);
          targetCtx.lineTo(x, h);
          targetCtx.stroke();
        }
        targetCtx.restore();
      }

      function drawCanvasFabricBase(targetCtx, w, h, fabricImage) {
        targetCtx.globalCompositeOperation = 'source-over';
        targetCtx.fillStyle = CANVAS_BG;
        targetCtx.fillRect(0, 0, w, h);
        drawCanvasCrosshatch(targetCtx, w, h);
        if (fabricImage && fabricImage.naturalWidth > 0) {
          targetCtx.globalCompositeOperation = 'multiply';
          targetCtx.drawImage(fabricImage, 0, 0, w, h);
          targetCtx.globalCompositeOperation = 'source-over';
        }
      }

      function captureCompositeArtworkDataUrl(w, h, fabricImage) {
        const out = document.createElement('canvas');
        out.width = w;
        out.height = h;
        const octx = out.getContext('2d');
        octx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, w, h);
        if (fabricImage && fabricImage.naturalWidth > 0) {
          octx.save();
          octx.globalAlpha = 0.35;
          octx.globalCompositeOperation = 'multiply';
          octx.drawImage(fabricImage, 0, 0, w, h);
          octx.restore();
        }
        return out.toDataURL('image/png');
      }

      function loadSplatImage() {
        if (splatReady && splatImg.naturalWidth > 0) return Promise.resolve();
        if (splatLoadPromise) return splatLoadPromise;

        splatLoadPromise = new Promise((resolve, reject) => {
          const onReady = () => {
            if (!splatImg.naturalWidth || !splatImg.naturalHeight) {
              splatLoadPromise = null;
              reject(new Error('splat.png: 画像サイズが取得できませんでした'));
              return;
            }
            splatReady = true;
            clearStampCache();
            redrawCanvas();
            resolve();
          };

          const onFail = () => {
            splatLoadPromise = null;
            console.error('splat.png の読み込みに失敗しました。index.html と同じフォルダにあるか確認してください。');
            reject(new Error('splat.png load failed'));
          };

          splatImg.onload = onReady;
          splatImg.onerror = onFail;
          splatImg.src = SPLAT_IMAGE;
