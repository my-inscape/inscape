<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="INSCAPE">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-outer: #121316;
      --bg: #121316;
      --text: #e8e6e2;
      --text-soft: rgba(232, 230, 226, 0.55);
      --muted: #5a5854;
      --canvas-bg: #f7f4eb;
      --paper-antique: #f7f4eb;
      --mat-ivory: #fbf9f5;
      --gold-antique: #b8860b;
      --wood-walnut: #1c110a;
      --accent: #b8a07a;
      --frame-max: 450px;
      --canvas-fabric-url: url('canvas-fabric.png');
      --canvas-portrait-w: 270px;
      --canvas-portrait-max-h: min(40dvh, 480px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg-outer);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .phone-shell {
      width: 100%;
      max-width: var(--frame-max);
      height: 100%;
      height: 100dvh;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .top-area {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 0.5rem 0 0;
      position: relative;
    }

    .logo {
      font-size: 0.55rem;
      letter-spacing: 0.48em;
      font-weight: 400;
      color: var(--text-soft);
      margin-bottom: 0.4rem;
      text-align: center;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    .mid-panel {
      flex-shrink: 0;
      padding: 0.45rem 1.15rem 0.35rem;
    }

    .controls {
      flex-shrink: 0;
      padding: 0.35rem 1.15rem calc(0.65rem + env(safe-area-inset-bottom, 0px));
      min-height: 3.5rem;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .input-wrap {
      position: relative;
    }

    #wordInput {
      width: 100%;
      min-height: 4.5rem;
      max-height: 8.5rem;
      padding: 0.7rem 0.5rem;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", "Yu Gothic", serif;
      font-size: 0.88rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      line-height: 1.65;
      outline: none;
      resize: none;
      overflow-y: auto;
      transition:
        border-color 0.55s ease,
        box-shadow 0.55s ease,
        background 0.55s ease,
        color 0.4s ease;
    }

    #wordInput::placeholder {
      color: rgba(255, 255, 255, 0.25);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", "Yu Gothic", serif;
      font-weight: 300;
      letter-spacing: 0.1em;
    }

    #wordInput.word-sucking {
      color: transparent;
      caret-color: transparent;
    }

    .word-suck-ghost {
      position: fixed;
      z-index: 56;
      pointer-events: none;
      padding: 0.85rem 0.5rem;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", "Yu Gothic", serif;
      font-size: 0.88rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      overflow: hidden;
      opacity: 1;
      transform: translate(0, 0) scale(1);
      transform-origin: center center;
      transition:
        transform 1.5s cubic-bezier(0.45, 0.05, 0.2, 1),
        opacity 1.5s cubic-bezier(0.4, 0, 0.6, 1);
      will-change: transform, opacity;
    }

    #wordInput:hover:not(:disabled) {
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: 0 0 24px rgba(184, 160, 122, 0.06);
    }

    #wordInput:focus {
      border-color: rgba(184, 160, 122, 0.35);
      background: rgba(255, 255, 255, 0.035);
      box-shadow: 0 0 32px rgba(184, 160, 122, 0.1);
    }

    #wordInput:disabled { opacity: 0.28; cursor: not-allowed; }

    .smoke-text {
      position: absolute;
      left: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.92rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      white-space: nowrap;
      z-index: 5;
    }

    .smoke-text.active {
      animation: smoke 1.4s ease-out forwards;
    }

    @keyframes smoke {
      0%   { opacity: 1; transform: translateY(-50%) scale(1); filter: blur(0); }
      40%  { opacity: 0.7; transform: translateY(-80%) scale(1.05); filter: blur(1px); }
      100% { opacity: 0; transform: translateY(-160%) scale(1.2); filter: blur(6px); }
    }

    .color-atelier {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.42rem;
      padding: 0.28rem 1.15rem 0.32rem;
    }

    .color-atelier.locked-hidden {
      display: none;
    }

    .color-wheel-host {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .color-magnifier {
      position: relative;
      z-index: 3;
      width: 48px;
      height: 48px;
      padding: 0;
      border-radius: 50%;
      border: 0.5px solid rgba(255, 255, 255, 0.14);
      cursor: pointer;
      background:
        radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.62) 0%, rgba(255, 255, 255, 0) 44%),
        radial-gradient(circle at 68% 78%, rgba(0, 0, 0, 0.38) 0%, rgba(0, 0, 0, 0) 50%),
        radial-gradient(circle at 48% 52%, color-mix(in srgb, var(--picked-color, #3d4f5f) 78%, white) 0%, var(--picked-color, #3d4f5f) 54%, color-mix(in srgb, var(--picked-color, #3d4f5f) 52%, black) 100%);
      box-shadow:
        inset 0 3px 7px rgba(255, 255, 255, 0.26),
        inset 0 -4px 10px rgba(0, 0, 0, 0.35),
        0 0 20px color-mix(in srgb, var(--picked-color, #3d4f5f) 58%, transparent),
        0 0 38px color-mix(in srgb, var(--picked-color, #3d4f5f) 22%, transparent),
        0 4px 14px rgba(0, 0, 0, 0.38);
      transition:
        transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.45s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .color-magnifier::after {
      content: '';
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, rgba(255, 255, 255, 0.28) 0%, transparent 62%);
      pointer-events: none;
    }

    .color-magnifier:disabled {
      opacity: 0.22;
      cursor: not-allowed;
    }

    .color-wheel-host.open .color-magnifier {
      transform: scale(0.92);
    }

    @media (hover: hover) {
      .color-wheel-host:not(.disabled):hover .color-magnifier:not(:disabled) {
        box-shadow:
          inset 0 3px 7px rgba(255, 255, 255, 0.3),
          inset 0 -4px 10px rgba(0, 0, 0, 0.35),
          0 0 24px color-mix(in srgb, var(--picked-color, #3d4f5f) 65%, transparent),
          0 0 44px color-mix(in srgb, var(--picked-color, #3d4f5f) 28%, transparent),
          0 5px 16px rgba(0, 0, 0, 0.4);
      }
    }

    .color-palette-rail {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.48rem;
      padding: 0.52rem 0.62rem 0.58rem;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.022);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .color-wheel-host.disabled + .color-palette-rail {
      opacity: 0.22;
      pointer-events: none;
    }

    .emotion-swatches {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.28rem;
    }

    .emotion-swatch {
      flex: 1 1 0;
      min-width: 0;
      max-width: 1.35rem;
      aspect-ratio: 1;
      padding: 0;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      cursor: pointer;
      background: var(--swatch-color, #3d4f5f);
      box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.12);
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .emotion-swatch.is-active {
      border-color: rgba(255, 255, 255, 0.32);
      box-shadow:
        0 0 10px color-mix(in srgb, var(--swatch-color) 45%, transparent),
        inset 0 1px 3px rgba(255, 255, 255, 0.18);
      transform: scale(1.08);
    }

    .hue-rail,
    .fine-rails {
      width: 100%;
    }

    .fine-rails {
      display: flex;
      gap: 0.55rem;
    }

    .fine-rails .hue-rail {
      flex: 1 1 0;
      min-width: 0;
    }

    .color-hue-slider,
    .color-fine-slider {
      -webkit-appearance: none;
      appearance: none;
      display: block;
      width: 100%;
      height: 14px;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    .color-hue-slider::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(
        90deg,
        #e74c3c 0%,
        #f1c40f 17%,
        #2ecc71 33%,
        #1abc9c 50%,
        #3498db 67%,
        #9b59b6 83%,
        #e74c3c 100%
      );
      border: 0.5px solid rgba(255, 255, 255, 0.08);
    }

    .color-fine-slider::-webkit-slider-runnable-track {
      height: 2px;
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.1);
      border: 0.5px solid rgba(255, 255, 255, 0.06);
    }

    .color-fine-slider[data-rail="sat"]::-webkit-slider-runnable-track {
      background: linear-gradient(
        90deg,
        color-mix(in srgb, var(--picked-color, #3d4f5f) 12%, #121316) 0%,
        var(--picked-color, #3d4f5f) 100%
      );
    }

    .color-fine-slider[data-rail="light"]::-webkit-slider-runnable-track {
      background: linear-gradient(
        90deg,
        #050508 0%,
        var(--picked-color, #3d4f5f) 52%,
        #f7f4eb 100%
      );
    }

    .color-hue-slider::-webkit-slider-thumb,
    .color-fine-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      margin-top: -5px;
      border-radius: 50%;
      border: 0.5px solid rgba(255, 255, 255, 0.45);
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0) 55%),
        var(--picked-color, #3d4f5f);
      box-shadow: 0 0 8px color-mix(in srgb, var(--picked-color, #3d4f5f) 40%, transparent);
    }

    .color-fine-slider::-webkit-slider-thumb {
      width: 10px;
      height: 10px;
      margin-top: -4px;
    }

    .color-hue-slider::-moz-range-track,
    .color-fine-slider::-moz-range-track {
      height: 3px;
      border-radius: 2px;
      border: none;
    }

    .color-hue-slider::-moz-range-thumb,
    .color-fine-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 0.5px solid rgba(255, 255, 255, 0.45);
      background: var(--picked-color, #3d4f5f);
    }

    .bh-fx-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 55;
    }

    .paint-ball {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 60;
      will-change: transform, left, top, opacity;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.65) 0%, rgba(255, 255, 255, 0) 40%),
        radial-gradient(circle at 70% 80%, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0) 50%),
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--ball-color, #3d4f5f) 80%, white) 0%, var(--ball-color, #3d4f5f) 55%, color-mix(in srgb, var(--ball-color, #3d4f5f) 50%, black) 100%);
      box-shadow:
        inset 0 3px 7px rgba(255, 255, 255, 0.35),
        inset 0 -5px 10px rgba(0, 0, 0, 0.4),
        0 8px 24px rgba(0, 0, 0, 0.45),
        0 0 20px color-mix(in srgb, var(--ball-color, #3d4f5f) 40%, transparent);
    }

    .paint-ball.glow {
      animation: ballGlow 0.2s ease-out forwards;
    }

    .paint-ball.crystallize {
      animation: ballCrystallize 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes ballGlow {
      from { filter: brightness(1.4); }
      to   { filter: brightness(1); }
    }

    @keyframes ballCrystallize {
      0%   { transform: scale(0); opacity: 0; filter: brightness(2.2); }
      55%  { transform: scale(1.22); opacity: 1; filter: brightness(1.6); }
      100% { transform: scale(1); opacity: 1; filter: brightness(1); }
    }

    .condense-text {
      display: none;
    }

    .wheel-overlay {
      position: absolute;
      inset: 0;
      z-index: 160;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .wheel-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(18, 19, 22, 0.62);
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    .phone-shell.wheel-open .wheel-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .wheel-stage {
      position: relative;
      width: min(16rem, 78vw);
      height: min(16rem, 78vw);
      max-width: calc(var(--frame-max) - 2rem);
      max-height: calc(var(--frame-max) - 2rem);
      padding: 1.75rem;
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      transition:
        transform 0.58s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.42s ease;
    }

    .wheel-preview-orb {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2.65rem;
      height: 2.65rem;
      border-radius: 50%;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      background:
        radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0) 42%),
        radial-gradient(circle at 68% 78%, rgba(0, 0, 0, 0.35) 0%, rgba(0, 0, 0, 0) 48%),
        radial-gradient(circle at 48% 52%, color-mix(in srgb, var(--wheel-preview-color, #3d4f5f) 78%, white) 0%, var(--wheel-preview-color, #3d4f5f) 54%, color-mix(in srgb, var(--wheel-preview-color, #3d4f5f) 52%, black) 100%);
      box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 0.22),
        inset 0 -3px 7px rgba(0, 0, 0, 0.32),
        0 0 10px color-mix(in srgb, var(--wheel-preview-color, #3d4f5f) 55%, transparent),
        0 0 22px color-mix(in srgb, var(--wheel-preview-color, #3d4f5f) 22%, transparent);
      transition:
        opacity 0.28s ease,
        transform 0.14s ease,
        box-shadow 0.12s ease,
        background 0.1s ease;
    }

    .wheel-preview-orb.is-active {
      opacity: 1;
    }

    .wheel-preview-orb.is-picking {
      transform: translate(-50%, -50%) scale(1.07);
    }

    .wheel-preview-orb::after {
      content: '';
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, rgba(255, 255, 255, 0.24) 0%, transparent 62%);
      pointer-events: none;
    }

    #wheelCanvas {
      position: relative;
      z-index: 2;
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow:
        0 0 0 0.5px rgba(255, 255, 255, 0.12),
        0 8px 40px rgba(0, 0, 0, 0.45),
        0 0 80px rgba(184, 160, 122, 0.08);
      touch-action: none;
      cursor: crosshair;
    }

    .phone-shell.wheel-open .wheel-stage {
      transform: scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .phone-shell.wheel-closing .wheel-stage {
      transform: scale(0);
      opacity: 0;
      transition-duration: 0.42s;
      transition-timing-function: cubic-bezier(0.55, 0, 0.85, 0.36);
    }

    .phone-shell.wheel-open .wheel-overlay {
      pointer-events: auto;
    }

    #inscapeBtn {
      display: none;
      flex: 1;
      padding: 1.05rem 0;
      border: 0.5px solid rgba(255, 255, 255, 0.14);
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.015);
      color: rgba(232, 230, 226, 0.78);
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.52em;
      text-indent: 0.52em;
      cursor: pointer;
      transition:
        background 0.55s ease,
        border-color 0.55s ease,
        color 0.55s ease,
        box-shadow 0.55s ease;
    }

    #inscapeBtn:hover:not(:disabled) {
      border-color: rgba(184, 160, 122, 0.4);
      color: rgba(232, 230, 226, 0.95);
      background: rgba(184, 160, 122, 0.06);
      box-shadow:
        0 0 28px rgba(184, 160, 122, 0.12),
        inset 0 0 24px rgba(255, 255, 255, 0.02);
    }

    #inscapeBtn:active:not(:disabled) {
      background: rgba(184, 160, 122, 0.1);
      box-shadow: 0 0 16px rgba(184, 160, 122, 0.08);
    }

    #inscapeBtn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .canvas-wrap {
      flex: 1 1 auto;
      position: relative;
      z-index: 2;
      min-height: 0;
      margin: 0 auto;
      padding: 0;
      background: transparent;
      border-radius: 0;
      overflow: hidden;
      box-shadow: none;
      border: none;
      transform: translateZ(0);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 100%;
    }

    .canvas-wrap:not(.is-framed):not(.framing-active) {
      width: fit-content;
      max-width: 100%;
      flex: 0 1 auto;
    }

    .canvas-wrap:not(.is-framed):not(.framing-active) .museum-frame {
      width: auto;
      height: auto;
    }

    .canvas-wrap:not(.is-framed):not(.framing-active) .museum-frame-sculpted {
      width: auto;
      height: auto;
    }

    .canvas-wrap.is-framed,
    .canvas-wrap.framing-active {
      overflow: visible;
    }

    .museum-frame {
      width: 100%;
      height: 100%;
      transform-origin: center center;
      transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .canvas-wrap.is-framed .museum-frame,
    .museum-frame.framing-animate {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .museum-frame.framing-animate {
      transform: scale(0.85);
    }

    /* 通常時：麻布キャンバスのみが闇に浮かぶ（余白・枠・影なし） */
    .museum-frame-sculpted {
      position: relative;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      background: transparent;
      border: none;
      outline: none;
      box-shadow: none;
      transition:
        padding 1.5s cubic-bezier(0.4, 0, 0.2, 1),
        background 1.5s cubic-bezier(0.4, 0, 0.2, 1),
        border-color 1.5s cubic-bezier(0.4, 0, 0.2, 1),
        outline 1.5s cubic-bezier(0.4, 0, 0.2, 1),
        box-shadow 1.5s cubic-bezier(0.4, 0, 0.2, 1),
        width 1.5s cubic-bezier(0.4, 0, 0.2, 1),
        height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 完成準備 or 額装アニメーション時：マット・木枠・金枠を出現 */
    .canvas-wrap.is-framed .museum-frame-sculpted,
    .museum-frame.framing-animate .museum-frame-sculpted {
      width: fit-content;
      height: fit-content;
      max-width: 100%;
      max-height: 100%;
      margin: auto;
      display: block;
      padding: 28px 22px 32px;
      background: #fbf9f5;
      border: 20px solid #1c110a;
      border-top-color: #f3e5ab;
      border-left-color: #d4af37;
      border-right-color: #8a640f;
      border-bottom-color: #5c430a;
      outline: 3px solid #aa7c11;
      outline-offset: -20px;
      box-shadow:

  <script>
    (function () {
      'use strict';

      const STORAGE_KEY = 'inscape_splashes';
      const HISTORY_KEY = 'histories';
      const INSCAPE_HISTORY_KEY = 'inscape_history';
      const GALLERY_KEY = 'inscape_gallery';

      const ZEN_FADE_MS = 2000;

      const EXPORT_H = 1920;
      const SPLAT_WIDTH_MIN_FRAC = 0.25;
      const SPLAT_WIDTH_MID_FRAC = 0.50;
      const SPLAT_WIDTH_MAX_FRAC = 0.70;
      const SPLAT_MID_CHAR_COUNT = 30;
      const SPLAT_TAIL_DECAY_CHARS = 120;
      const SPLAT_EXPECTED_SCALE = 1.02;
      const TAP_RIPPLE_DURATION = 900;
      const TAP_RIPPLE_MAX_FRAC = 0.24;

      const wordInput = document.getElementById('wordInput');
      const smokeText = document.getElementById('smokeText');
      const phoneShell = document.getElementById('phoneShell');
      const colorWheelHost = document.getElementById('colorWheelHost');
      const colorMagnifier = document.getElementById('colorMagnifier');
      const colorAtelier = document.getElementById('colorAtelier');
      const emotionSwatches = document.getElementById('emotionSwatches');
      const hueSlider = document.getElementById('hueSlider');
      const satSlider = document.getElementById('satSlider');
      const lightSlider = document.getElementById('lightSlider');
      const wheelStage = document.getElementById('wheelStage');
      const wheelCanvas = document.getElementById('wheelCanvas');
      const wheelPreviewOrb = document.getElementById('wheelPreviewOrb');
      const wheelBackdrop = document.getElementById('wheelBackdrop');
      const wheelOverlay = document.getElementById('wheelOverlay');
      const inscapeBtn = document.getElementById('inscapeBtn');
      const canvas = document.getElementById('mainCanvas');
      const ctx = canvas.getContext('2d');
      const canvasWrap = document.getElementById('canvasWrap');
      const museumFrame = document.getElementById('museumFrame');
      const shockCanvas = document.getElementById('shockCanvas');
      const shockCtx = shockCanvas.getContext('2d');
      const tooltip = document.getElementById('tooltip');
      const frameBtn = document.getElementById('frameBtn');
      const frameCtaOverlay = document.getElementById('frameCtaOverlay');
      const frameProgress = document.getElementById('frameProgress');
      const frameProgressHint = document.getElementById('frameProgressHint');
      const frameModal = document.getElementById('frameModal');
      const framePreview = document.getElementById('framePreview');
      const frameDownload = document.getElementById('frameDownload');
      const frameShare = document.getElementById('frameShare');
      const frameTweet = document.getElementById('frameTweet');
      const frameModalClose = document.getElementById('frameModalClose');
      const frameCompleteDialog = document.getElementById('frameCompleteDialog');
      const frameCompleteOk = document.getElementById('frameCompleteOk');
      const releaseShareBtn = document.getElementById('releaseShareBtn');
      const dailyLockMessage = document.getElementById('dailyLockMessage');
      const inputWrap = document.getElementById('inputWrap');
      const controlsFooter = document.getElementById('controlsFooter');
      const appEl = document.querySelector('.app');
      const exportRoot = document.getElementById('exportRoot');

      let selectedColor = '#3d4f5f';
      let colorSyncLock = false;
      let splashes = [];
      let audioCtx = null;
      let noiseBuffer = null;
      let activeSuckSound = null;
      let wheelOpen = false;
      let wheelPicking = false;
      let wheelBuilt = false;
      let shockwaves = [];
      let tapRipples = [];
      let ambientLoopId = null;
      let zenTimer = null;
      let zenFadeTimer = null;
      let zenArmed = false;
      let isZenMode = false;
      let framedPngDataUrl = null;
      let framedPngBlob = null;
      let framingCompleted = false;
      let frameProcessing = false;
      let savePreviewObjectUrl = null;
      let lastCanvasExportDataUrl = null;
      let isDiarySubmitting = false;
      let canvasTouchStart = null;
      let lastCanvasTapHandledAt = 0;

      const WORD_MAX_LEN = 10000;
      const OPACITY_FULL_LEN = 400;
      const WHEEL_SIZE = 280;
      const WHEEL_R = WHEEL_SIZE / 2 - 2;

      const EMOTION_BASES = [
        { h: 210, s: 32, l: 28 },
        { h: 265, s: 36, l: 30 },
        { h: 340, s: 44, l: 36 },
        { h: 15, s: 38, l: 34 },
        { h: 175, s: 28, l: 26 },
        { h: 45, s: 42, l: 38 },
        { h: 195, s: 30, l: 24 },
        { h: 300, s: 34, l: 32 },
        { h: 0, s: 0, l: 18 },
        { h: 0, s: 0, l: 52 }
      ];

      function hslToHex(h, s, l) {
        const rgb = hslToRgb(h, s, l);
        return rgbToHex(rgb.r, rgb.g, rgb.b);
      }

      function hexToHsl(hex) {
        if (!hex || hex[0] !== '#') return null;
        let r;
        let g;
        let b;
        if (hex.length === 4) {
          r = parseInt(hex[1] + hex[1], 16);
          g = parseInt(hex[2] + hex[2], 16);
          b = parseInt(hex[3] + hex[3], 16);
        } else if (hex.length >= 7) {
          r = parseInt(hex.slice(1, 3), 16);
          g = parseInt(hex.slice(3, 5), 16);
          b = parseInt(hex.slice(5, 7), 16);
        } else {
          return null;
        }
        r /= 255;
        g /= 255;
        b /= 255;
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        let h = 0;
        let s = 0;
        const l = (max + min) / 2;
        if (max !== min) {
          const d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) {
            case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
            case g: h = ((b - r) / d + 2) / 6; break;
            default: h = ((r - g) / d + 4) / 6;
          }
        }
        return {
          h: Math.round(h * 360),
          s: Math.round(s * 100),
          l: Math.round(l * 100)
        };
      }

      function getColorPickerElement() {
        return colorMagnifier || colorWheelHost;
      }

      function syncColorSlidersFromHex(color) {
        if (!hueSlider || !satSlider || !lightSlider) return;
        const hsl = hexToHsl(color);
        if (!hsl) return;
        colorSyncLock = true;
        hueSlider.value = String(hsl.h);
        satSlider.value = String(Math.max(10, Math.min(90, hsl.s)));
        lightSlider.value = String(Math.max(8, Math.min(62, hsl.l)));
        colorSyncLock = false;
      }

      function applyHslFromControls() {
        if (colorSyncLock || !hueSlider || !satSlider || !lightSlider) return;
        if (colorMagnifier && colorMagnifier.disabled) return;
        const color = hslToHex(
          Number(hueSlider.value),
          Number(satSlider.value),
          Number(lightSlider.value)
        );
        applySelectedColor(color, { syncSliders: false });
      }

      function updateEmotionSwatchActive(color) {
        if (!emotionSwatches) return;
        emotionSwatches.querySelectorAll('.emotion-swatch').forEach((btn) => {
          btn.classList.toggle('is-active', btn.dataset.color === color);
        });
      }

      function buildEmotionSwatches() {
        if (!emotionSwatches) return;
        emotionSwatches.innerHTML = '';
        EMOTION_BASES.forEach((base) => {
          const hex = hslToHex(base.h, base.s, base.l);
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'emotion-swatch';
          btn.dataset.color = hex;
          btn.style.setProperty('--swatch-color', hex);
          btn.setAttribute('aria-label', 'ベースカラー');
          btn.addEventListener('click', () => {
            if (colorMagnifier && colorMagnifier.disabled) return;
            applySelectedColor(hex);
          });
          emotionSwatches.appendChild(btn);
        });
      }

      function bindColorControls() {
        [hueSlider, satSlider, lightSlider].forEach((slider) => {
          if (!slider) return;
          slider.addEventListener('input', applyHslFromControls);
          slider.addEventListener('change', applyHslFromControls);
        });
      }

      function hslToRgb(h, s, l) {
        h = ((h % 360) + 360) % 360;
        s /= 100;
        l /= 100;
        const c = (1 - Math.abs(2 * l - 1)) * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = l - c / 2;
        let r = 0, g = 0, b = 0;
        if (h < 60) { r = c; g = x; }
        else if (h < 120) { r = x; g = c; }
        else if (h < 180) { g = c; b = x; }
        else if (h < 240) { g = x; b = c; }
        else if (h < 300) { r = x; b = c; }
        else { r = c; b = x; }
        return {
          r: Math.round((r + m) * 255),
          g: Math.round((g + m) * 255),
          b: Math.round((b + m) * 255)
        };
      }

      function rgbToHex(r, g, b) {
        return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
      }

      // 中心=漆黒/白、外側=ニュアンスカラー（角度=色相、距離=彩度）
      function wheelColorAt(hueDeg, t) {
        if (t < 0.055) return { r: 0, g: 0, b: 0 };

        const whiteWave = (Math.sin(hueDeg * (Math.PI / 180) * 2.2) + 1) / 2;
        if (t < 0.2) {
          const u = (t - 0.055) / 0.145;
          const target = whiteWave > 0.62 ? 255 : 48;
          const v = Math.round(u * target * (0.35 + whiteWave * 0.65));
          return { r: v, g: v, b: v };
        }

        const u = (t - 0.2) / 0.8;
        const sat = 28 + u * 42;
        const lit = 22 + u * 36;
        return hslToRgb(hueDeg, sat, lit);
      }

      function buildColorWheel() {
        if (wheelBuilt) return;
        const wctx = wheelCanvas.getContext('2d');
        const cx = WHEEL_SIZE / 2;
        const cy = WHEEL_SIZE / 2;
        const img = wctx.createImageData(WHEEL_SIZE, WHEEL_SIZE);
        const d = img.data;

        for (let y = 0; y < WHEEL_SIZE; y++) {
          for (let x = 0; x < WHEEL_SIZE; x++) {
            const dx = x - cx + 0.5;
            const dy = y - cy + 0.5;
            const dist = Math.hypot(dx, dy);
            const i = (y * WHEEL_SIZE + x) * 4;

            if (dist > WHEEL_R) {
              d[i + 3] = 0;
              continue;
            }

            const t = dist / WHEEL_R;
            const hue = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;
            const { r, g, b } = wheelColorAt(hue, t);
            d[i] = r;
            d[i + 1] = g;
            d[i + 2] = b;
            d[i + 3] = 255;
          }
        }

        wctx.putImageData(img, 0, 0);
        wheelBuilt = true;
      }

      function colorFromWheelPoint(clientX, clientY) {
        const rect = wheelCanvas.getBoundingClientRect();
        const scaleX = WHEEL_SIZE / rect.width;
        const scaleY = WHEEL_SIZE / rect.height;
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;
        const cx = WHEEL_SIZE / 2;
        const cy = WHEEL_SIZE / 2;
        const dx = x - cx;
        const dy = y - cy;
        const dist = Math.hypot(dx, dy);
        if (dist > WHEEL_R) return null;
        const t = dist / WHEEL_R;
        const hue = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;
        const { r, g, b } = wheelColorAt(hue, t);
        return rgbToHex(r, g, b);
      }

      function applySelectedColor(color, options) {
        if (!color) return;
        const opts = options || {};
        selectedColor = color;
        colorWheelHost.style.setProperty('--picked-color', color);
        document.documentElement.style.setProperty('--picked-color', color);
        if (opts.syncSliders !== false) {
          syncColorSlidersFromHex(color);
        }
        updateEmotionSwatchActive(color);
      }

      function updateWheelPreviewColor(color) {
        if (!wheelPreviewOrb || !color) return;
        wheelPreviewOrb.style.setProperty('--wheel-preview-color', color);
      }

      function setWheelPreviewState(active, picking) {
        if (!wheelPreviewOrb) return;
        wheelPreviewOrb.classList.toggle('is-active', !!active);
        wheelPreviewOrb.classList.toggle('is-picking', !!picking);
      }

      function openColorWheel() {
        if ((colorMagnifier && colorMagnifier.disabled) || wheelOpen) return;
        buildColorWheel();
        wheelOpen = true;
        phoneShell.classList.remove('wheel-closing');
        phoneShell.classList.add('wheel-open');
        colorWheelHost.classList.add('open');
        updateWheelPreviewColor(selectedColor);
        setWheelPreviewState(true, false);
      }

      function closeColorWheel() {
        if (!wheelOpen) return;
        wheelOpen = false;
        wheelPicking = false;
        phoneShell.classList.add('wheel-closing');
        phoneShell.classList.remove('wheel-open');
        colorWheelHost.classList.remove('open');
        setWheelPreviewState(false, false);
        setTimeout(() => phoneShell.classList.remove('wheel-closing'), 450);
      }

      function pickColorAt(clientX, clientY, commit) {
        const color = colorFromWheelPoint(clientX, clientY);
        if (!color) return null;
        updateWheelPreviewColor(color);
        setWheelPreviewState(true, wheelPicking);
        if (commit) {
          applySelectedColor(color);
        }
        return color;
      }

      // 言葉の長さ → 本音の熱量（短い=淡く、長い=濃く）
      function wordIntensity(len) {
        return Math.min(1, Math.log1p(len) / Math.log1p(OPACITY_FULL_LEN));
      }

      function opacityFromWordLength(len) {
        const normalized = wordIntensity(len);
        const faint = 0.3 + Math.random() * 0.2;
        const bold = 0.9 + Math.random() * 0.1;
        return faint + normalized * (bold - faint);
      }

      /** キャンバス横幅に対するスプラッシュ直径の割合（1〜5字≈25%、30字≈50%、長文→最大70%） */
      function splatWidthFractionFromWordLength(len) {
        const n = Math.max(1, Math.min(len, WORD_MAX_LEN));

        if (n <= SPLAT_MID_CHAR_COUNT) {
          const t = Math.sqrt((n - 1) / (SPLAT_MID_CHAR_COUNT - 1));
          return SPLAT_WIDTH_MIN_FRAC + (SPLAT_WIDTH_MID_FRAC - SPLAT_WIDTH_MIN_FRAC) * t;
        }

        const excess = n - SPLAT_MID_CHAR_COUNT;
        const tail = 1 - Math.exp(-excess / SPLAT_TAIL_DECAY_CHARS);
        return SPLAT_WIDTH_MID_FRAC + (SPLAT_WIDTH_MAX_FRAC - SPLAT_WIDTH_MID_FRAC) * tail;
      }

      function baseSizeFromWordLength(len) {
        const w = canvas.clientWidth || 270;
        let frac = splatWidthFractionFromWordLength(len);
        frac *= 0.985 + Math.random() * 0.03;
        const targetDiameter = w * frac;
        return targetDiameter / SPLAT_EXPECTED_SCALE;
      }

      function getDiaryDayKey() {
        const now = new Date();
        const offsetTime = new Date(now.getTime() - (6 * 60 * 60 * 1000));
        return offsetTime.toLocaleDateString('ja-JP');
      }

      function formatDotDate(d) {
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        return `${y}.${mo}.${da}`;
      }

      function hasPostedToday() {
        try {
          return localStorage.getItem(LAST_DIARY_DATE_KEY) === getDiaryDayKey();
        } catch {
          return false;
        }
      }

      function lockDiaryForToday() {
        try {
          localStorage.setItem(LAST_DIARY_DATE_KEY, getDiaryDayKey());
        } catch (err) {
          console.warn('日記ロックの保存に失敗:', err);
        }
      }

      function applyDailyLockUI() {
        const locked = hasPostedToday();

        if (appEl) appEl.classList.toggle('daily-locked', locked);
        phoneShell.classList.toggle('daily-locked', locked);

        if (locked) {
          if (inputWrap) inputWrap.classList.add('locked-hidden');
          if (colorAtelier) colorAtelier.classList.add('locked-hidden');
          if (controlsFooter) controlsFooter.classList.add('locked-hidden');
          if (dailyLockMessage) {
            dailyLockMessage.classList.add('visible');
            dailyLockMessage.setAttribute('aria-hidden', 'false');
          }
          wordInput.disabled = true;
          if (colorMagnifier) colorMagnifier.disabled = true;
          colorWheelHost.classList.add('disabled');
          canvasWrap.classList.remove('submit-ready');
          closeColorWheel();
        } else {
          if (inputWrap) inputWrap.classList.remove('locked-hidden');
          if (colorAtelier) colorAtelier.classList.remove('locked-hidden');
          if (controlsFooter) controlsFooter.classList.remove('locked-hidden');
          if (dailyLockMessage) {
            dailyLockMessage.classList.remove('visible');
            dailyLockMessage.setAttribute('aria-hidden', 'true');
          }
        }

        updateCanvasSubmitHint();
        return locked;
      }

      function updateCanvasSubmitHint() {
        const ready = canSubmitDiaryNow();
        canvasWrap.classList.toggle('submit-ready', ready);
      }

      function refreshCanvasExportSnapshot() {
        redrawCanvas();
        try {
          lastCanvasExportDataUrl = canvas.toDataURL('image/png');
        } catch (err) {
          console.warn('canvas export snapshot failed:', err);
          lastCanvasExportDataUrl = null;
        }
      }

      function getCanvasDataUrl() {
        if (!lastCanvasExportDataUrl) {
          refreshCanvasExportSnapshot();
        }
        return lastCanvasExportDataUrl;
      }

      function waitForImageLoad(imgEl) {
        if (!imgEl) return Promise.resolve();
        if (imgEl.complete && imgEl.naturalWidth > 0) return Promise.resolve();
        return new Promise((resolve, reject) => {
          imgEl.onload = () => resolve();
          imgEl.onerror = () => reject(new Error('export image load failed'));
        });
      }

      function loadInscapeHistory() {
        try {
          const raw = localStorage.getItem(INSCAPE_HISTORY_KEY);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          return data.map((entry) => ({
            word: entry.word || entry.text || '',
            color: entry.color,
            date: entry.date || formatDate(entry.timestamp),
            timestamp: entry.timestamp || 0
          })).filter((e) => e.color);
        } catch {
          return [];
        }
      }

      function parseHistoryEntryToDate(entry) {
        if (!entry) return null;
        if (entry.timestamp && Number(entry.timestamp) > 0) {
          const d = new Date(entry.timestamp);
          if (!Number.isNaN(d.getTime())) return d;
        }
        if (entry.date) {
          const dateStr = String(entry.date);
          const matched = dateStr.match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
          if (matched) {
            const d = new Date(Number(matched[1]), Number(matched[2]) - 1, Number(matched[3]));
            if (!Number.isNaN(d.getTime())) return d;
          }
          const parsed = Date.parse(dateStr);
          if (!Number.isNaN(parsed)) return new Date(parsed);
        }
        return null;
      }

      function getExportPeriodCaption() {
        const todayStr = formatDotDate(new Date());
        const history = loadInscapeHistory();
        const dates = history
          .map(parseHistoryEntryToDate)
          .filter(Boolean)
          .sort((a, b) => a.getTime() - b.getTime());

        if (dates.length === 0 || dates.length === 1) {
          return `${todayStr} - ${todayStr}`;
        }

        const startStr = formatDotDate(dates[0]);
        return `${startStr} - ${todayStr}`;
      }

      function buildExportWallDisplay() {
        if (!exportRoot) throw new Error('export root missing');

        const aspectW = parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-w')) || canvas.clientWidth || 270;
        const aspectH = parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-h')) || canvas.clientHeight || 480;
        const dataUrl = getCanvasDataUrl();
        if (!dataUrl) throw new Error('canvas export failed');

        exportRoot.innerHTML = '';
        const wall = document.createElement('div');
        wall.className = 'museum-wall-display museum-wall-export';

        const sculpted = document.createElement('div');
        sculpted.className = 'export-frame-sculpted';

        const surface = document.createElement('div');
        surface.className = 'export-art-surface';
        surface.style.aspectRatio = `${aspectW} / ${aspectH}`;

        const artImg = document.createElement('img');
        artImg.className = 'export-art-image';
        artImg.src = dataUrl;
        artImg.alt = '';
        artImg.setAttribute('role', 'presentation');

        const texture = document.createElement('div');
        texture.className = 'paper-texture-overlay';
        texture.setAttribute('aria-hidden', 'true');

        const caption = document.createElement('p');
        caption.className = 'art-period-caption';
        caption.textContent = getExportPeriodCaption();

        surface.appendChild(artImg);
        surface.appendChild(texture);
        sculpted.appendChild(surface);
        wall.appendChild(sculpted);
        wall.appendChild(caption);
        exportRoot.appendChild(wall);

        return { wall, artImg };
      }

      async function captureMuseumWallBlob(wallEl, artImg) {
        if (!wallEl || typeof html2canvas !== 'function') {
          throw new Error('html2canvas not loaded');
        }

        await waitForImageLoad(artImg);

        if (exportRoot) {
          exportRoot.setAttribute('aria-hidden', 'false');
          exportRoot.classList.add('is-capturing');
        }
        await new Promise((resolve) => {
          requestAnimationFrame(() => requestAnimationFrame(() => setTimeout(resolve, 48)));
        });

        try {
          const scale = Math.min(2.5, Math.max(1.5, window.devicePixelRatio || 1.5));
          const artCanvas = await html2canvas(wallEl, {
            scale,
            useCORS: true,
            allowTaint: true,
            backgroundColor: null,
            logging: false,
            imageTimeout: 0,
            onclone: (_doc, clonedEl) => {
              clonedEl.classList.add('museum-wall-export');
            }
          });

          return compositeToMuseumExport(artCanvas);
        } finally {
          if (exportRoot) {
            exportRoot.classList.remove('is-capturing');
            exportRoot.setAttribute('aria-hidden', 'true');
          }
        }
      }

      function drawSpacedText(ctx, text, centerX, y, spacingPx) {
        const chars = text.split('');
        let totalWidth = 0;
        chars.forEach((ch, i) => {
          totalWidth += ctx.measureText(ch).width;
          if (i < chars.length - 1) totalWidth += spacingPx;
        });
        let x = centerX - totalWidth / 2;
        chars.forEach((ch, i) => {
          ctx.fillText(ch, x, y);
          x += ctx.measureText(ch).width + (i < chars.length - 1 ? spacingPx : 0);
        });
      }

      function drawMuseumSpotlightBackground(ctx, w, h) {
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, w, h);

        const spotlight = ctx.createRadialGradient(
          w * 0.5, h * 0.1, 0,
          w * 0.5, h * 0.1, Math.max(w, h) * 0.82
        );
        spotlight.addColorStop(0, 'rgba(255, 255, 255, 0.18)');
        spotlight.addColorStop(0.32, 'rgba(255, 255, 255, 0.07)');
        spotlight.addColorStop(0.7, 'rgba(0, 0, 0, 0)');
        spotlight.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = spotlight;
        ctx.fillRect(0, 0, w, h);

        const warmGlow = ctx.createRadialGradient(
          w * 0.5, h * 0.02, 0,
          w * 0.5, h * 0.02, w * 0.58
        );
        warmGlow.addColorStop(0, 'rgba(255, 252, 240, 0.1)');
        warmGlow.addColorStop(0.45, 'rgba(255, 252, 240, 0.025)');
        warmGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = warmGlow;
        ctx.fillRect(0, 0, w, h);

        const vignette = ctx.createRadialGradient(
          w * 0.5, h * 0.46, Math.min(w, h) * 0.16,
          w * 0.5, h * 0.46, Math.max(w, h) * 0.96
        );
        vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
        vignette.addColorStop(0.52, 'rgba(0, 0, 0, 0.22)');
        vignette.addColorStop(0.82, 'rgba(5, 5, 5, 0.72)');
        vignette.addColorStop(1, 'rgba(5, 5, 5, 0.96)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, w, h);

        const floorFade = ctx.createLinearGradient(0, h * 0.68, 0, h);
        floorFade.addColorStop(0, 'rgba(0, 0, 0, 0)');
        floorFade.addColorStop(1, 'rgba(0, 0, 0, 0.52)');
        ctx.fillStyle = floorFade;
        ctx.fillRect(0, 0, w, h);
      }

      function htmlCanvasToBlob(canvasEl) {
        return new Promise((resolve, reject) => {
          if (!canvasEl || !canvasEl.width || !canvasEl.height) {
            reject(new Error('canvas invalid'));
            return;
          }
          canvasEl.toBlob((blob) => {
            if (blob) resolve(blob);
            else reject(new Error('toBlob failed'));
          }, 'image/png', 1);
        });
      }

      async function compositeToMuseumExport(artCanvas) {
        const final = document.createElement('canvas');
        final.width = EXPORT_W;
        final.height = EXPORT_H;
        const exportCtx = final.getContext('2d');

        drawMuseumSpotlightBackground(exportCtx, EXPORT_W, EXPORT_H);

        const logoReserve = 148;
        const topMargin = 220;
        const sidePad = 96;
        const maxW = EXPORT_W - sidePad * 2;
        const maxH = EXPORT_H - topMargin - logoReserve - 100;

        const scale = Math.min(maxW / artCanvas.width, maxH / artCanvas.height);
        const dw = artCanvas.width * scale;
        const dh = artCanvas.height * scale;
        const dx = (EXPORT_W - dw) / 2;
        const dy = topMargin + (maxH - dh) / 2;

        exportCtx.drawImage(artCanvas, dx, dy, dw, dh);

        exportCtx.save();
        const logoSize = 34;
        exportCtx.font = `300 ${logoSize}px "Times New Roman", Georgia, serif`;
        exportCtx.fillStyle = 'rgba(190, 190, 190, 0.62)';
        exportCtx.textBaseline = 'middle';
        drawSpacedText(exportCtx, 'INSCAPE', EXPORT_W / 2, EXPORT_H - 92, logoSize * 0.44);
        exportCtx.restore();

        return htmlCanvasToBlob(final);
      }

      const SPLAT_IMAGE = 'splat.png';
      const CANVAS_BG = '#f7f4eb';
      const splatImg = new Image();
      const stampCache = {};
      let splatReady = false;
      let splatLoadPromise = null;

      function clearStampCache() {
        Object.keys(stampCache).forEach(k => { delete stampCache[k]; });
      }

      function loadSplatImage() {
        if (splatReady && splatImg.naturalWidth > 0) return Promise.resolve();
        if (splatLoadPromise) return splatLoadPromise;

        splatLoadPromise = new Promise((resolve, reject) => {
          const onReady = () => {
            if (!splatImg.naturalWidth || !splatImg.naturalHeight) {
              splatLoadPromise = null;
              reject(new Error('splat.png: 画像サイズが取得できませんでした'));
              return;
            }
            splatReady = true;
            clearStampCache();
            redrawCanvas();
            resolve();
          };

          const onFail = () => {
            splatLoadPromise = null;
            console.error('splat.png の読み込みに失敗しました。index.html と同じフォルダにあるか確認してください。');
            reject(new Error('splat.png load failed'));
          };

          splatImg.onload = onReady;
          splatImg.onerror = onFail;
          splatImg.src = SPLAT_IMAGE;

          if (splatImg.complete) {
            if (splatImg.naturalWidth > 0) onReady();
            else onFail();
          }
        });

        return splatLoadPromise;
      }

      function ensureSplatLoaded() {
        return loadSplatImage();
      }

      // getImageData 不使用: screen で色染め → multiply で白背景を壁色に溶かす
      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth) return null;
        if (stampCache[color]) return stampCache[color];

        try {
          const w = splatImg.naturalWidth;
          const h = splatImg.naturalHeight;
          const work = document.createElement('canvas');
          work.width = w;
          work.height = h;
          const wctx = work.getContext('2d');

          wctx.fillStyle = color;
          wctx.fillRect(0, 0, w, h);
          wctx.globalCompositeOperation = 'screen';
          wctx.drawImage(splatImg, 0, 0);
          wctx.globalCompositeOperation = 'source-over';

          stampCache[color] = work;
          return work;
        } catch (err) {
          console.error('スタンプ生成エラー:', err);
          return null;
        }
      }

      function fillCanvasBackground() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = CANVAS_BG;
        ctx.fillRect(0, 0, w, h);
      }

      // スタンプ用メタデータ（大きさ・不透明度・角度を毎回ランダム化）
      function createSplashData(wordLen) {
        const intensity = wordIntensity(wordLen);
        const baseSize = baseSizeFromWordLength(wordLen);
        const scaleFactor = 0.92 + Math.random() * 0.18 + intensity * 0.06;
        return {
          v: 8,
          baseSize,
          rotation: Math.random() * Math.PI * 2,
          scaleFactor,
          opacity: opacityFromWordLength(wordLen),
          hitRadius: Math.max(14, baseSize * scaleFactor * 0.22)
        };
      }

      function migrateSplash(s) {
        let baseSize = s.baseSize || 95;
        if (baseSize >= 200) {
          // 旧仕様（220〜410px台）のデータはそのまま維持
        } else if (baseSize > 0 && baseSize < 35) {
          baseSize *= 2.5;
        }
        const scaleFactor = s.scaleFactor ?? (0.9 + Math.random() * 0.45);
        return {
          id: s.id || Date.now().toString(36),
          nx: s.nx,
          ny: s.ny,
          color: s.color,
          word: s.word || '',
          timestamp: s.timestamp,
          v: 8,
          baseSize,
          rotation: s.rotation ?? Math.random() * Math.PI * 2,
          scaleFactor,
          opacity: s.opacity ?? 0.75,
          hitRadius: s.hitRadius || Math.max(14, baseSize * scaleFactor * 0.22),
          drip: null
        };
      }

      function initDrip(splash) {
        const size = splash.baseSize * (splash.scaleFactor || 1);
        splash.drip = {
          offsetX: (Math.random() - 0.5) * size * 0.1,
          offsetY: size * (0.16 + Math.random() * 0.1),
          length: 0,
          maxLength: 22 + Math.random() * 38,
          speed: 0.32 + Math.random() * 0.48,
          width: 1.6 + Math.random() * 2.8,
          active: true
        };
      }

      function updateDrips(dt) {
        let active = false;
        splashes.forEach(s => {
          if (!s.drip || !s.drip.active) return;
          if (s.drip.length < s.drip.maxLength) {
            s.drip.length = Math.min(s.drip.maxLength, s.drip.length + s.drip.speed * dt);
            active = true;
          } else {
            s.drip.active = false;
          }
        });
        return active;
      }

      function spawnShockwave(px, py) {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        shockwaves.push({
          x: px,
          y: py,
          radius: 0,
          maxRadius: Math.min(w, h) * 0.42,
          alpha: 0.52,
          start: performance.now(),
          duration: 520
        });
      }

      function spawnTapRipple(px, py) {
        const w = canvas.clientWidth || 270;
        const h = canvas.clientHeight || 480;
        tapRipples.push({
          x: px,
          y: py,
          start: performance.now(),
          duration: TAP_RIPPLE_DURATION,
          maxRadius: Math.min(w, h) * TAP_RIPPLE_MAX_FRAC
        });
        ensureAmbientLoop();
      }

      function renderShockwaves() {
        const now = performance.now();
        shockwaves = shockwaves.filter(sw => {
          const t = Math.min(1, (now - sw.start) / sw.duration);
          if (t >= 1) return false;
          const radius = sw.maxRadius * easeOutCubic(t);
          const alpha = sw.alpha * (1 - t);
          shockCtx.strokeStyle = `rgba(72, 68, 62, ${alpha})`;
          shockCtx.lineWidth = 2.5 * (1 - t * 0.65);
          shockCtx.beginPath();
          shockCtx.arc(sw.x, sw.y, radius, 0, Math.PI * 2);
          shockCtx.stroke();
          shockCtx.strokeStyle = `rgba(120, 112, 100, ${alpha * 0.35})`;
          shockCtx.lineWidth = 1.2 * (1 - t);
          shockCtx.beginPath();
          shockCtx.arc(sw.x, sw.y, radius * 0.72, 0, Math.PI * 2);
          shockCtx.stroke();
          return true;
        });
        return shockwaves.length > 0;
      }

      function renderTapRipples() {
        const now = performance.now();
        tapRipples = tapRipples.filter(ripple => {
          const t = Math.min(1, (now - ripple.start) / ripple.duration);
          if (t >= 1) return false;
          const radius = ripple.maxRadius * easeOutCubic(t);
          const alpha = 0.6 * (1 - t);
          shockCtx.strokeStyle = `rgba(212, 175, 55, ${alpha})`;
          shockCtx.lineWidth = 1.75;
          shockCtx.beginPath();
          shockCtx.arc(ripple.x, ripple.y, radius, 0, Math.PI * 2);
          shockCtx.stroke();
          shockCtx.strokeStyle = `rgba(243, 229, 171, ${alpha * 0.42})`;
          shockCtx.lineWidth = 1.2;
          shockCtx.beginPath();
          shockCtx.arc(ripple.x, ripple.y, radius * 0.82, 0, Math.PI * 2);
          shockCtx.stroke();
          return true;
        });
        return tapRipples.length > 0;
      }

      function clearAndDrawOverlays() {
        const w = shockCanvas.clientWidth;
        const h = shockCanvas.clientHeight;
        shockCtx.clearRect(0, 0, w, h);
        const shocksActive = renderShockwaves();
        const ripplesActive = renderTapRipples();
        return shocksActive || ripplesActive;
      }

      function drawShockwaves() {
        return clearAndDrawOverlays();
      }

      function triggerCanvasShake() {
        canvasWrap.classList.remove('shaking');
        void canvasWrap.offsetWidth;
        canvasWrap.classList.add('shaking');
        setTimeout(() => canvasWrap.classList.remove('shaking'), 460);
      }

      function ensureAmbientLoop() {
        if (ambientLoopId) return;
        let last = performance.now();
        function frame(now) {
          const dt = Math.min(0.05, (now - last) / 1000);
          last = now;
          const dripsActive = updateDrips(dt);
          const overlaysActive = clearAndDrawOverlays();
          if (dripsActive || overlaysActive) {
            redrawCanvas();
            ambientLoopId = requestAnimationFrame(frame);
          } else {
            ambientLoopId = null;
            shockCtx.clearRect(0, 0, shockCanvas.clientWidth, shockCanvas.clientHeight);
          }
        }
        ambientLoopId = requestAnimationFrame(frame);
      }

      function exitZenMode() {
        clearTimeout(zenTimer);
        clearTimeout(zenFadeTimer);
        zenTimer = null;
        zenFadeTimer = null;

      function migrateHistoriesToRecipes() {

          const raw = localStorage.getItem(HISTORY_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          if (!Array.isArray(data) || !data.length) return;
          if (data[0].image && data[0].timestamp != null && typeof data[0].nx !== 'number') {

      function migrateGalleryStorage() {

          if (!raw) return;

          if (!Array.isArray(data)) return;

          const data = JSON.parse(raw);

      function buildDiaryHistoryFromSplashes(list) {
        return list.map((s) => ({
          word: s.word || '',
          color: s.color,
          date: formatDate(s.timestamp),
          timestamp: s.timestamp || Date.now()
        })).filter((e) => e.color);
      }

      function syncHistoriesFromSplashes() {
        const recipes = splashes.map(({ drip, ...rest }) => rest);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(recipes));
        localStorage.setItem(INSCAPE_HISTORY_KEY, JSON.stringify(buildDiaryHistoryFromSplashes(splashes)));
      }

      function saveRecipeToGallery() {
        syncHistoriesFromSplashes();
        const diaryHistory = buildDiaryHistoryFromSplashes(splashes);
        let gallery = JSON.parse(localStorage.getItem('inscape_gallery')) || [];
        if (!Array.isArray(gallery)) gallery = [];
        gallery.push({
          date: new Date().toLocaleDateString(),
          splats: JSON.parse(localStorage.getItem('histories')) || [],
          history: diaryHistory,
          canvasW: parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-w')) || canvas.clientWidth,
          canvasH: parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-h')) || canvas.clientHeight
        });
        localStorage.setItem('inscape_gallery', JSON.stringify(gallery));

      const FRAME_MAT_PADDING = 28;
      const FRAME_BORDER_WIDTH = 20;

      function updateCanvasAspectVars() {
        const cw = canvas.clientWidth || canvasWrap.clientWidth;
        const ch = canvas.clientHeight || canvasWrap.clientHeight;
        if (cw > 0 && ch > 0) {
          canvasWrap.style.setProperty('--canvas-aspect-w', String(cw));

      function updateFramedArtSize() {
        const aspectW = parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-w')) || canvas.clientWidth || canvasWrap.clientWidth;
        const aspectH = parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-h')) || canvas.clientHeight || canvasWrap.clientHeight;
        if (!aspectW || !aspectH) return;

        const frameInset = 2 * (FRAME_MAT_PADDING + FRAME_BORDER_WIDTH);
        const availW = Math.max(1, canvasWrap.clientWidth - frameInset);
        const availH = Math.max(1, canvasWrap.clientHeight - frameInset);

        let artW = availW;
        let artH = (artW * aspectH) / aspectW;
        if (artH > availH) {
          artH = availH;
          artW = (artH * aspectW) / aspectH;
        }

        canvasWrap.style.setProperty('--framed-art-w', `${Math.round(artW)}px`);
        canvasWrap.style.setProperty('--framed-art-h', `${Math.round(artH)}px`);
      }

      function waitForFrameAnimation(el, durationMs) {
        return new Promise(resolve => {
          let finished = false;
          const done = () => {
            if (finished) return;
            finished = true;
            el.removeEventListener('transitionend', onEnd);
            resolve();
          };
          const onEnd = (e) => {
            if (e.target === el) done();
          };
          el.addEventListener('transitionend', onEnd);
          setTimeout(done, durationMs + 120);
        });
      }

            frameCompleteDialog.setAttribute('aria-hidden', 'true');
            frameCompleteOk.removeEventListener('click', close);
