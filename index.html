          if (splatImg.complete) {
            if (splatImg.naturalWidth > 0) onReady();
            else onFail();
          }
        });

        return splatLoadPromise;
      }

      function ensureSplatLoaded() {
        return loadSplatImage();
      }

      function createGradientStamp(color1, color2) {
        if (!splatReady || !splatImg.naturalWidth) return null;
        const c1 = normalizeSplashHex(color1);
        const c2 = normalizeSplashHex(color2);
        if (!c1) return null;
        const cacheKey = `grad:${c1}|${c2 || c1}`;
        if (stampCache[cacheKey]) return stampCache[cacheKey];

        try {
          const w = splatImg.naturalWidth;
          const h = splatImg.naturalHeight;
          const work = document.createElement('canvas');
          work.width = w;
          work.height = h;
          const wctx = work.getContext('2d');
          const grad = wctx.createLinearGradient(0, 0, w, h);
          grad.addColorStop(0, c1);
          grad.addColorStop(1, c2);
          wctx.fillStyle = grad;
          wctx.fillRect(0, 0, w, h);
          wctx.globalCompositeOperation = 'screen';
          wctx.drawImage(splatImg, 0, 0);
          wctx.globalCompositeOperation = 'source-over';
          stampCache[cacheKey] = work;
          return work;
        } catch (err) {
          console.error('グラデーションスタンプ生成エラー:', err);
          return createColorStamp(c1);
        }
      }

      function getSplashStamp(splash) {
        const primary = normalizeSplashHex(splash.color1 || splash.color);
        if (!primary) return null;
        if (splash.gradient && splash.color2) {
          return createGradientStamp(primary, splash.color2);
        }
        return createColorStamp(primary);
      }

      // getImageData 不使用: screen で色染め → multiply で白背景を壁色に溶かす
      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth) return null;
        const normalized = normalizeSplashHex(color);
        if (!normalized) return null;
        if (stampCache[normalized]) return stampCache[normalized];

        try {
          const w = splatImg.naturalWidth;
          const h = splatImg.naturalHeight;
          const work = document.createElement('canvas');
          work.width = w;
          work.height = h;
          const wctx = work.getContext('2d');

          wctx.fillStyle = normalized;
          wctx.fillRect(0, 0, w, h);
          wctx.globalCompositeOperation = 'screen';
          wctx.drawImage(splatImg, 0, 0);
          wctx.globalCompositeOperation = 'source-over';

          stampCache[normalized] = work;
          return work;
        } catch (err) {
          console.error('スタンプ生成エラー:', err);
          return null;
        }
      }

      function fillCanvasBackground() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = CANVAS_BG;
        ctx.fillRect(0, 0, w, h);
      }

      // チャージ進行度とキャンバス実寸から描画ピクセルサイズを決定
      function createSplashData(chargeProgress, inkOpacity, w, h) {
        const drawSizePx = splashPixelSizeFromProgress(chargeProgress, w, h);
        const opacity = Math.min(CHARGE_OPACITY_MAX, Math.max(CHARGE_OPACITY_MIN, Number(inkOpacity) || CHARGE_OPACITY_MIN));
        return {
          v: 10,
          drawSizePx,
          baseSize: drawSizePx,
          rotation: Math.random() * Math.PI * 2,
          scaleFactor: 1,
          opacity,
          splashPattern: Math.floor(Math.random() * SPLAT_PATTERN_COUNT),
          hitRadius: Math.max(14, drawSizePx * 0.22)
        };
      }

      function migrateSplash(s) {
        let baseSize = s.baseSize || 95;
        if (baseSize >= 200) {
          // 旧仕様（220〜410px台）のデータはそのまま維持
        } else if (baseSize > 0 && baseSize < 35) {
          baseSize *= 2.5;
        }
        const scaleFactor = s.scaleFactor ?? (0.9 + Math.random() * 0.45);
        const drawSizePx = s.drawSizePx ?? (baseSize * scaleFactor);
        return {
          id: s.id || Date.now().toString(36),
          nx: s.nx,
          ny: s.ny,
          color: normalizeSplashHex(s.color1 || s.color),
          color1: normalizeSplashHex(s.color1 || s.color),
          color2: s.color2 ? normalizeSplashHex(s.color2) : null,
          gradient: !!s.gradient && !!s.color2,
          weight: s.weight ?? 1.2,
          word: s.word || '',
          timestamp: s.timestamp,
          v: s.v ?? 10,
          drawSizePx,
          baseSize: drawSizePx,
          rotation: s.rotation ?? Math.random() * Math.PI * 2,
          scaleFactor: s.drawSizePx ? 1 : scaleFactor,
          opacity: s.opacity ?? CHARGE_OPACITY_MIN,
          splashPattern: s.splashPattern ?? 0,
          hitRadius: s.hitRadius || Math.max(14, drawSizePx * 0.22),
          drip: null
        };
      }

      function initDrip(splash) {
        const size = resolveSplashDrawSizePx(splash);
        splash.drip = {
          offsetX: (Math.random() - 0.5) * size * 0.1,
          offsetY: size * (0.16 + Math.random() * 0.1),
          length: 0,
          maxLength: 22 + Math.random() * 38,
          speed: 0.32 + Math.random() * 0.48,
          width: 1.6 + Math.random() * 2.8,
          active: true
        };
      }

      function updateDrips(dt) {
        let active = false;
        splashes.forEach(s => {
          if (!s.drip || !s.drip.active) return;
          if (s.drip.length < s.drip.maxLength) {
            s.drip.length = Math.min(s.drip.maxLength, s.drip.length + s.drip.speed * dt);
            active = true;
          } else {
            s.drip.active = false;
          }
        });
        return active;
      }

      function spawnShockwave(px, py) {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        shockwaves.push({
          x: px,
          y: py,
          radius: 0,
          maxRadius: Math.min(w, h) * 0.42,
          alpha: 0.52,
          start: performance.now(),
          duration: 520
        });
      }

      function spawnTapRipple(px, py) {
        const w = canvas.clientWidth || CANVAS_LOGICAL_W;
        const h = canvas.clientHeight || CANVAS_LOGICAL_H;
        tapRipples.push({
          x: px,
          y: py,
          start: performance.now(),
          duration: TAP_RIPPLE_DURATION,
          maxRadius: Math.min(w, h) * TAP_RIPPLE_MAX_FRAC
        });
        ensureAmbientLoop();
      }

      function renderShockwaves() {
        const now = performance.now();
        shockwaves = shockwaves.filter(sw => {
          const t = Math.min(1, (now - sw.start) / sw.duration);
          if (t >= 1) return false;
          const radius = sw.maxRadius * easeOutCubic(t);
          const alpha = sw.alpha * (1 - t);
          shockCtx.strokeStyle = `rgba(72, 68, 62, ${alpha})`;
          shockCtx.lineWidth = 2.5 * (1 - t * 0.65);
          shockCtx.beginPath();
          shockCtx.arc(sw.x, sw.y, radius, 0, Math.PI * 2);
          shockCtx.stroke();
          shockCtx.strokeStyle = `rgba(120, 112, 100, ${alpha * 0.35})`;
          shockCtx.lineWidth = 1.2 * (1 - t);
          shockCtx.beginPath();
          shockCtx.arc(sw.x, sw.y, radius * 0.72, 0, Math.PI * 2);
          shockCtx.stroke();
          return true;
        });
        return shockwaves.length > 0;
      }

      function renderTapRipples() {
        const now = performance.now();
        tapRipples = tapRipples.filter(ripple => {
          const t = Math.min(1, (now - ripple.start) / ripple.duration);
          if (t >= 1) return false;
          const radius = ripple.maxRadius * easeOutCubic(t);
          const alpha = 0.6 * (1 - t);
          shockCtx.strokeStyle = `rgba(212, 175, 55, ${alpha})`;
          shockCtx.lineWidth = 1.75;
          shockCtx.beginPath();
          shockCtx.arc(ripple.x, ripple.y, radius, 0, Math.PI * 2);
          shockCtx.stroke();
          shockCtx.strokeStyle = `rgba(243, 229, 171, ${alpha * 0.42})`;
          shockCtx.lineWidth = 1.2;
          shockCtx.beginPath();
          shockCtx.arc(ripple.x, ripple.y, radius * 0.82, 0, Math.PI * 2);
          shockCtx.stroke();
          return true;
        });
        return tapRipples.length > 0;
      }

      function clearAndDrawOverlays() {
        const w = shockCanvas.clientWidth;
        const h = shockCanvas.clientHeight;
        shockCtx.clearRect(0, 0, w, h);
        const shocksActive = renderShockwaves();
        const ripplesActive = renderTapRipples();
        return shocksActive || ripplesActive;
      }

      function drawShockwaves() {
        return clearAndDrawOverlays();
      }

      function triggerCanvasShake() {
        canvasWrap.classList.remove('shaking');
        void canvasWrap.offsetWidth;
        canvasWrap.classList.add('shaking');
        setTimeout(() => canvasWrap.classList.remove('shaking'), 460);
      }

      function ensureAmbientLoop() {
        if (ambientLoopId) return;
        let last = performance.now();
        function frame(now) {
          const dt = Math.min(0.05, (now - last) / 1000);
          last = now;
          const dripsActive = updateDrips(dt);
          const overlaysActive = clearAndDrawOverlays();
          if (dripsActive || overlaysActive) {
            redrawCanvas();
            ambientLoopId = requestAnimationFrame(frame);
          } else {
            ambientLoopId = null;
            shockCtx.clearRect(0, 0, shockCanvas.clientWidth, shockCanvas.clientHeight);
          }
        }
        ambientLoopId = requestAnimationFrame(frame);
      }

      function exitZenMode() {
        clearTimeout(zenTimer);
        clearTimeout(zenFadeTimer);
        zenTimer = null;
        zenFadeTimer = null;
        isZenMode = false;
        phoneShell.classList.remove('zen-mode', 'zen-fading');
      }

      function resetZenTimer() {
        if (!zenArmed || frameModal.classList.contains('open') || getGalleryProgress().ready) return;
        exitZenMode();
        zenTimer = setTimeout(() => {
          phoneShell.classList.add('zen-fading');
          zenFadeTimer = setTimeout(() => {
            isZenMode = true;
            phoneShell.classList.remove('zen-fading');
            phoneShell.classList.add('zen-mode');
          }, ZEN_FADE_MS);
        }, ZEN_IDLE_MS);
      }

      function scheduleZenAfterImpact() {
        if (getGalleryProgress().ready) {
          updateFrameButtonState();
          return;
        }
        zenArmed = true;
        resetZenTimer();
      }

      function onUserActivity() {
        if (isZenMode || phoneShell.classList.contains('zen-fading')) {
          exitZenMode();
        }
        if (zenArmed && !frameModal.classList.contains('open') && !getGalleryProgress().ready) {
          resetZenTimer();
        }
      }

      function migrateHistoriesToRecipes() {
        try {
          const raw = localStorage.getItem(HISTORY_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          if (!Array.isArray(data) || !data.length) return;
          if (data[0].image && data[0].timestamp != null && typeof data[0].nx !== 'number') {
            localStorage.removeItem(HISTORY_KEY);
          }
        } catch (_) {}
      }

      function migrateGalleryStorage() {
        try {
          const data = readGalleryStore();
          if (!Array.isArray(data) || !data.length) return;
          const recipeOnly = data.filter(entry => entry && Array.isArray(entry.splats));
          if (recipeOnly.length !== data.length) {
            writeGalleryStore(recipeOnly);
          }
        } catch (_) {}
      }

      function loadHistoryRecipes() {
        try {
          const raw = localStorage.getItem(HISTORY_KEY);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          return data.filter(s => s && typeof s.nx === 'number' && s.color);
        } catch { return []; }
      }

      function saveGallerySnapshot() {
        try {
          syncHistoriesFromSplashes();
          updateFrameButtonState();
        } catch (err) {
          console.warn('履歴保存に失敗:', err);
        }
      }

      function buildDiaryHistoryFromSplashes(list) {
        const points = list.map((s) => ({
          nx: s.nx,
          ny: s.ny,
          x: typeof s.nx === 'number' ? Math.round(s.nx * 100) : undefined,
          y: typeof s.ny === 'number' ? Math.round(s.ny * 100) : undefined,
          color: normalizeSplashHex(s.color1 || s.color),
          baseSize: resolveSplashDrawSizePx(s),
          size: resolveSplashDrawSizePx(s),
          drawSizePx: resolveSplashDrawSizePx(s),
          scaleFactor: s.scaleFactor,
          rotation: s.rotation,
          opacity: s.opacity,
          word: s.word || '',
          timestamp: s.timestamp || Date.now()
        }));
        const entries = list.map((s) => ({
          word: s.word || '',
          color: normalizeSplashHex(s.color1 || s.color),
          date: formatDate(s.timestamp),
          timestamp: s.timestamp || Date.now()
        })).filter((e) => e.color);
        return [{ points, history: entries, updatedAt: Date.now() }];
      }

      function syncHistoriesFromSplashes() {
        const recipes = splashes.map(({ drip, ...rest }) => rest);
        try {
          localStorage.setItem(HISTORY_KEY, JSON.stringify(recipes));
          localStorage.setItem(INSCAPE_HISTORY_KEY, JSON.stringify(buildDiaryHistoryFromSplashes(splashes)));
        } catch (err) {
          console.warn('履歴同期に失敗:', err);
        }
      }

      function normalizeDiaryColor(color) {
        if (!color) return null;
        const raw = String(color).trim();
        const matched = raw.match(/#[0-9A-Fa-f]{6}\b/);
        if (matched) return matched[0].toLowerCase();
        if (/^[0-9A-Fa-f]{6}$/.test(raw)) return `#${raw.toLowerCase()}`;
        return raw;
      }

      function appendDiaryColorLog(word, color, timestamp) {
        const hex = normalizeDiaryColor(color);
        if (!hex) return;
        try {
          let logs = JSON.parse(localStorage.getItem(ALL_DIARIES_KEY)) || [];
          if (!Array.isArray(logs)) logs = [];
          const ts = timestamp || Date.now();
          const entry = {
            word: String(word || '').trim(),
            color: hex,
            date: formatDate(ts),
            timestamp: ts
          };
          const dedupeKey = `${entry.timestamp}|${entry.color}|${entry.word}`;
          if (logs.some((e) => `${e.timestamp || 0}|${e.color}|${e.word || ''}` === dedupeKey)) {
            return;
          }
          logs.push(entry);
          localStorage.setItem(ALL_DIARIES_KEY, JSON.stringify(logs));
        } catch (err) {
          console.warn('カラー日記ログの保存に失敗:', err);
        }
      }

      async function saveRecipeToGallery(prefetchedSnapshot) {
        if (splashes.length < FRAME_ENTRIES_REQUIRED) return;

        try {
          const cycleKey = buildArtworkCycleKey();
          syncHistoriesFromSplashes();
          const splatsRecipes = splashes.map(({ drip, ...rest }) => rest);
          const history = splashes.map((s) => ({
            word: s.word || '',
            color: normalizeSplashHex(s.color1 || s.color),
            date: formatDate(s.timestamp),
            timestamp: s.timestamp || Date.now()
          })).filter((e) => e.color);

          const snapshot = (prefetchedSnapshot && prefetchedSnapshot.artworkImageDataUrl)
            ? prefetchedSnapshot
            : await persistArtworkCanvasSnapshot();
          const { period, periodStart, periodEnd } = computeArtworkPeriodFromSplashes(splashes);

          let gallery = readGalleryStore();
          if (!Array.isArray(gallery)) gallery = [];

          const wordsHash = hashWeekWords(getWeekWordsFromStorage());
          const entry = {
            splats: splatsRecipes,
            history,
            period,
            periodStart,
            periodEnd,
            wordsHash,
            cycleKey,
            completedAt: Date.now(),
            canvasW: snapshot && snapshot.canvasW ? snapshot.canvasW : (parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-w')) || canvas.clientWidth),
            canvasH: snapshot && snapshot.canvasH ? snapshot.canvasH : (parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-h')) || canvas.clientHeight),
            snapshotPixelW: snapshot && snapshot.snapshotPixelW ? snapshot.snapshotPixelW : undefined,
            snapshotPixelH: snapshot && snapshot.snapshotPixelH ? snapshot.snapshotPixelH : undefined,
            artworkImageDataUrl: snapshot ? snapshot.artworkImageDataUrl : undefined
          };

          const existingIdx = gallery.findIndex((item) => {
            if (!item) return false;
            if (item.cycleKey === cycleKey) return true;
            return item.wordsHash === wordsHash;
          });
          if (existingIdx >= 0) {
            gallery[existingIdx] = { ...gallery[existingIdx], ...entry };
          } else {
            gallery.push(entry);
          }

          if (gallery.length > GALLERY_MAX) {
            gallery = gallery.slice(-GALLERY_MAX);
          }

          if (!writeGalleryStore(gallery) && entry.artworkImageDataUrl) {
            delete entry.artworkImageDataUrl;
            delete entry.snapshotPixelW;
            delete entry.snapshotPixelH;
            if (existingIdx >= 0) {
              gallery[existingIdx] = { ...gallery[existingIdx], ...entry };
            } else if (gallery[gallery.length - 1]) {
              gallery[gallery.length - 1] = { ...gallery[gallery.length - 1], ...entry };
            }
            writeGalleryStore(gallery);
          }
        } catch (err) {
          console.warn('回廊レシピ保存に失敗:', err);
        }
      }

      async function persistArtworkCanvasSnapshot() {
        try {
          redrawCanvas();
          const pixelW = canvas.width;
          const pixelH = canvas.height;
          const logicalW = Math.round(canvas.clientWidth) || CANVAS_LOGICAL_W;
          const logicalH = Math.round(canvas.clientHeight) || CANVAS_LOGICAL_H;
          if (pixelW < 1 || pixelH < 1) return null;

          const fabricImage = await loadFabricImage();
          const dataUrl = captureCompositeArtworkDataUrl(pixelW, pixelH, fabricImage);
          if (!dataUrl || dataUrl === 'data:,') return null;
          refreshCanvasExportSnapshot();
          return {
            artworkImageDataUrl: dataUrl,
            canvasW: logicalW,
            canvasH: logicalH,
            snapshotPixelW: pixelW,
            snapshotPixelH: pixelH
          };
        } catch (err) {
          console.warn('作品スナップショットの保存に失敗:', err);
          return null;
        }
      }

      const FRAME_MAT_PADDING = 28;
      const FRAME_BORDER_WIDTH = 20;

      function updateCanvasAspectVars() {
        const cw = canvas.clientWidth || canvasWrap.clientWidth;
        const ch = canvas.clientHeight || canvasWrap.clientHeight;
        if (cw > 0 && ch > 0) {
          canvasWrap.style.setProperty('--canvas-aspect-w', String(cw));
          canvasWrap.style.setProperty('--canvas-aspect-h', String(ch));
        }
      }

      function updateFramedArtSize() {
        const aspectW = parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-w')) || canvas.clientWidth || canvasWrap.clientWidth;
        const aspectH = parseFloat(canvasWrap.style.getPropertyValue('--canvas-aspect-h')) || canvas.clientHeight || canvasWrap.clientHeight;
        if (!aspectW || !aspectH) return;

        const frameInset = 2 * (FRAME_MAT_PADDING + FRAME_BORDER_WIDTH);
        const availW = Math.max(1, canvasWrap.clientWidth - frameInset);
        const availH = Math.max(1, canvasWrap.clientHeight - frameInset);

        let artW = availW;
        let artH = (artW * aspectH) / aspectW;
        if (artH > availH) {
          artH = availH;
          artW = (artH * aspectW) / aspectH;
        }

        canvasWrap.style.setProperty('--framed-art-w', `${Math.round(artW)}px`);
        canvasWrap.style.setProperty('--framed-art-h', `${Math.round(artH)}px`);
      }

      function waitForFrameAnimation(el, durationMs) {
        return new Promise(resolve => {
          let finished = false;
          const done = () => {
            if (finished) return;
            finished = true;
            el.removeEventListener('transitionend', onEnd);
            resolve();
          };
          const onEnd = (e) => {
            if (e.target === el) done();
          };
          el.addEventListener('transitionend', onEnd);
          setTimeout(done, durationMs + 120);
        });
      }

      function showFrameCompleteDialog() {
        return new Promise(resolve => {
          if (!frameCompleteDialog || !frameCompleteOk) {
            resolve();
            return;
          }
          const close = () => {
            frameCompleteDialog.classList.remove('open');
            frameCompleteDialog.setAttribute('aria-hidden', 'true');
            frameCompleteOk.removeEventListener('click', close);
            resolve();
          };
          frameCompleteDialog.classList.add('open');
          frameCompleteDialog.setAttribute('aria-hidden', 'false');
          frameCompleteOk.addEventListener('click', close);
        });
      }

      function dayKeyFromTimestamp(ts) {
        const d = new Date(ts);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }

      function getGalleryEntryCount() {
        const history = loadHistoryRecipes();
        return Math.max(history.length, splashes.length);
      }

      function getGalleryProgress() {
        const entryCount = getGalleryEntryCount();
        return {
          entryCount,
          ready: entryCount >= FRAME_ENTRIES_REQUIRED
        };
      }

      function showFrameCtaReady() {
        exitZenMode();
        zenArmed = false;
        clearTimeout(zenTimer);
        clearTimeout(zenFadeTimer);
        zenTimer = null;
        zenFadeTimer = null;

        updateCanvasAspectVars();
        updateFramedArtSize();
        canvasWrap.classList.add('is-framed');

        frameCtaOverlay.classList.add('visible', 'ready');
        frameCtaOverlay.setAttribute('aria-hidden', 'false');
        frameBtn.classList.add('ready');
        frameBtn.classList.remove('locked', 'processing');
        frameBtn.removeAttribute('disabled');
        frameBtn.removeAttribute('aria-disabled');
        frameProgress.textContent = '7つの記録が揃いました';
        frameProgressHint.classList.remove('visible');
        frameProgressHint.textContent = '';
        bindFrameButtonClick();

        requestAnimationFrame(resizeCanvas);
      }

      function hideFrameCta() {
        frameCtaOverlay.classList.remove('visible', 'ready');
        frameCtaOverlay.setAttribute('aria-hidden', 'true');
        frameBtn.classList.remove('ready', 'locked', 'processing');
        frameBtn.setAttribute('aria-disabled', 'true');
        if (!canvasWrap.classList.contains('framing-active')) {
          canvasWrap.classList.remove('is-framed');
          canvasWrap.style.removeProperty('--framed-art-w');
          canvasWrap.style.removeProperty('--framed-art-h');
          requestAnimationFrame(resizeCanvas);
        }
      }

      function updateFrameButtonState() {
        const entryCount = getGalleryEntryCount();
        const { ready } = getGalleryProgress();

        if (framingCompleted || frameModal.classList.contains('open')) return;

        if (!entryCount) {
          hideFrameCta();
          frameProgressHint.classList.remove('visible');
          frameProgressHint.textContent = '';
          return;
        }

        if (ready) {
          showFrameCtaReady();
          return;
        }

        hideFrameCta();
        frameProgressHint.textContent = `言葉 ${entryCount} / ${FRAME_ENTRIES_REQUIRED}`;
        frameProgressHint.classList.add('visible');
      }

      function clearMainCanvasToWhite() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, w, h);
      }

      function restartAppCycle() {
        splashes = [];
        saveSplashes();
        localStorage.removeItem(HISTORY_KEY);

        if (ambientLoopId) {
          cancelAnimationFrame(ambientLoopId);
          ambientLoopId = null;
        }
        shockwaves = [];
        tapRipples = [];
        shockCtx.clearRect(0, 0, shockCanvas.width, shockCanvas.height);

        framingCompleted = false;
        zenArmed = false;
        exitZenMode();

        hideFrameCta();
        frameProgressHint.classList.remove('visible');
        frameProgressHint.textContent = '';
        frameProgress.textContent = '0 / 7';

        clearCssFrameFromCanvas();
        clearMainCanvasToWhite();

        wordInput.value = '';
        updateUIState();
        updateFrameButtonState();
      }

      function clearCssFrameFromCanvas() {
        museumFrame.classList.remove('framing-animate');
        canvasWrap.classList.remove('framing-active', 'is-framed');
        canvasWrap.style.removeProperty('--framed-art-w');
        canvasWrap.style.removeProperty('--framed-art-h');
        requestAnimationFrame(resizeCanvas);
      }

      function bindFrameButtonClick() {
        if (!frameBtn) return;
        frameBtn.onclick = function(e) {
          if (e) {
            e.preventDefault();
            e.stopPropagation();
          }
          executeFrameArtworkFlow();
        };
      }

      function executeFrameArtworkFlow() {
        if (frameProcessing) return;
        if (!getGalleryProgress().ready) return;

        frameProcessing = true;
        frameBtn.classList.add('processing');
        frameBtn.setAttribute('aria-disabled', 'true');
        frameProgress.textContent = '額装中...';
        hideFrameCta();
        const snapshotPromise = persistArtworkCanvasSnapshot();
        updateCanvasAspectVars();
        updateFramedArtSize();
        canvasWrap.classList.add('framing-active', 'is-framed');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            museumFrame.classList.add('framing-animate');
            resizeCanvas();
          });
        });

        waitForFrameAnimation(museumFrame, 1500).then(async () => {
          try {
            const snapshot = await snapshotPromise;
            await saveRecipeToGallery(snapshot);
          } catch (err) {
            console.warn('額装保存処理:', err);
          }
          frameProgress.textContent = '額装完了';
          return showFrameCompleteDialog();
        }).then(() => {
          if (!frameProcessing) return;
          restartAppCycle();
          frameProcessing = false;
          frameBtn.classList.remove('processing');
        });
      }

      // キャンバス全体（上下左右）にダイナミックに散らす
      function randomSplashPosition(w, h, splashMeta) {
        const half = getSplashMetaHalfExtent(splashMeta);
        const padX = Math.max(8, Math.min(half * 0.18, w * 0.06));
        const padY = Math.max(8, Math.min(half * 0.18, h * 0.06));
        return {
          x: padX + Math.random() * Math.max(1, w - padX * 2),
          y: padY + Math.random() * Math.max(1, h - padY * 2)
        };
      }

      function updateUIState() {
        if (applyDailyLockUI()) return;
        wordInput.disabled = isDiarySubmitting;
        setEmotionPaletteDisabled(isDiarySubmitting);
        updateCanvasSubmitHint();
      }

      function loadSplashes() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const data = raw ? JSON.parse(raw) : [];
          if (!Array.isArray(data)) return [];
          const now = Date.now();
          return data
            .filter(s => now - s.timestamp < RETENTION_MS)
            .slice(-MAX_ENTRIES)
            .map(migrateSplash);
        } catch { return []; }
      }

      function saveSplashes() {
        const data = splashes.map(({ drip, ...rest }) => rest);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function resizeCanvas() {
        const wrap = canvasWrap;
        const dpr = window.devicePixelRatio || 1;
        const isFramed = canvasWrap.classList.contains('is-framed') || museumFrame.classList.contains('framing-animate');
        const artSurface = wrap.querySelector('.art-surface');

        let cw;
        let ch;
        if (isFramed) {
          const styledW = parseFloat(wrap.style.getPropertyValue('--framed-art-w'));
          const styledH = parseFloat(wrap.style.getPropertyValue('--framed-art-h'));
          cw = styledW || (artSurface && artSurface.clientWidth) || wrap.clientWidth;
          ch = styledH || (artSurface && artSurface.clientHeight) || wrap.clientHeight;
        } else if (artSurface && artSurface.clientWidth > 0 && artSurface.clientHeight > 0) {
          cw = artSurface.clientWidth;
          ch = artSurface.clientHeight;
          wrap.style.setProperty('--canvas-aspect-w', String(cw));
          wrap.style.setProperty('--canvas-aspect-h', String(ch));
        } else {
          cw = CANVAS_LOGICAL_W;
          ch = CANVAS_LOGICAL_H;
          wrap.style.setProperty('--canvas-aspect-w', String(cw));
          wrap.style.setProperty('--canvas-aspect-h', String(ch));
        }

        if (cw < 1 || ch < 1) {
          cw = CANVAS_LOGICAL_W;
          ch = CANVAS_LOGICAL_H;
        }

        canvas.width = cw * dpr;
        canvas.height = ch * dpr;
        canvas.style.width = cw + 'px';
        canvas.style.height = ch + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        shockCanvas.width = cw * dpr;
        shockCanvas.height = ch * dpr;
        shockCanvas.style.width = cw + 'px';
        shockCanvas.style.height = ch + 'px';
        shockCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        redrawCanvas();
        drawShockwaves();

        if (isFramed) {
          updateFramedArtSize();
        }
      }

      function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
      function easeInExpo(t) { return t <= 0 ? 0 : Math.pow(2, 10 * t - 10); }
      function easeInCubic(t) { return t * t * t; }
      function easeSlowSpiral(t) { return t * t * (3 - 2 * t); }

      // 85%距離までゆっくり → 残り15%で指数関数的に急加速
      function easeBlackHolePull(t) {
        const distSlow = 0.85;
        const timeSlowEnd = 0.68;
        if (t <= timeSlowEnd) {
          const u = t / timeSlowEnd;
          return distSlow * easeSlowSpiral(u);
        }
        const u = (t - timeSlowEnd) / (1 - timeSlowEnd);
        return distSlow + (1 - distSlow) * easeInExpo(u);
      }

      // 初速爆発 → 着弾直前のタメ → スナップ着弾
      function easeFlightBurst(t) {
        if (t <= 0.07) {
          const u = t / 0.07;
          return 0.58 * u;
        }
        if (t <= 0.84) {
          const u = (t - 0.07) / 0.77;
          return 0.58 + 0.30 * (1 - Math.pow(1 - u, 0.42));
        }
        const u = (t - 0.84) / 0.16;
        if (u < 0.42) {
          return 0.88 + 0.035 * (u / 0.42);
        }
        const snap = (u - 0.42) / 0.58;
        return 0.915 + 0.085 * easeInExpo(snap);
      }

      function ensureAudio() {
        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === 'suspended') audioCtx.resume();
          return audioCtx;
        } catch (_) {
          return null;
        }
      }

      function getNoiseBuffer(ctx) {
        if (noiseBuffer) return noiseBuffer;
        const len = ctx.sampleRate * 2;
        noiseBuffer = ctx.createBuffer(1, len, ctx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
        return noiseBuffer;
      }

      function startSuckSound(durationMs) {
        const ctx = ensureAudio();
        if (!ctx) return;
        stopSuckSound(true);

        const now = ctx.currentTime;
        const dur = durationMs / 1000;

        const src = ctx.createBufferSource();
        src.buffer = getNoiseBuffer(ctx);
        src.loop = true;

        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(160, now);
        filter.frequency.exponentialRampToValueAtTime(520, now + dur * 0.92);
        filter.Q.setValueAtTime(0.8, now);
        filter.Q.linearRampToValueAtTime(1.2, now + dur * 0.85);

        const sub = ctx.createOscillator();
        sub.type = 'sine';
        sub.frequency.setValueAtTime(38, now);
        sub.frequency.linearRampToValueAtTime(58, now + dur * 0.88);
        const subGain = ctx.createGain();
        subGain.gain.setValueAtTime(0.0001, now);
        subGain.gain.exponentialRampToValueAtTime(0.045, now + dur * 0.75);

        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.07, now + dur * 0.35);
        gain.gain.exponentialRampToValueAtTime(0.13, now + dur * 0.88);

        src.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        sub.connect(subGain);
        subGain.connect(ctx.destination);
        src.start(now);
        sub.start(now);

        activeSuckSound = { src, gain, filter, sub, subGain, ctx };
      }

      function stopSuckSound(silent) {
        if (!activeSuckSound) return;
        const { src, gain, sub, subGain, ctx } = activeSuckSound;
        const now = ctx.currentTime;
        try {
          gain.gain.cancelScheduledValues(now);
          gain.gain.setValueAtTime(Math.max(gain.gain.value, 0.0001), now);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + (silent ? 0.05 : 0.07));
          subGain.gain.cancelScheduledValues(now);
          subGain.gain.setValueAtTime(Math.max(subGain.gain.value, 0.0001), now);
          subGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);
          src.stop(now + 0.09);
          sub.stop(now + 0.09);
        } catch (_) {}
        activeSuckSound = null;
      }

      function playLaunchWhoosh() {
        const ctx = ensureAudio();
        if (!ctx) return;
        stopSuckSound(false);

        const now = ctx.currentTime;

        const wind = ctx.createBufferSource();
        wind.buffer = getNoiseBuffer(ctx);
        const windLp = ctx.createBiquadFilter();
        windLp.type = 'lowpass';
        windLp.frequency.setValueAtTime(340, now);
        windLp.frequency.exponentialRampToValueAtTime(72, now + 0.3);
        windLp.Q.value = 0.85;
        const windGain = ctx.createGain();
        windGain.gain.setValueAtTime(0.0001, now);
        windGain.gain.linearRampToValueAtTime(0.16, now + 0.022);
        windGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.36);

        const body = ctx.createOscillator();
        body.type = 'sine';
        body.frequency.setValueAtTime(98, now);
        body.frequency.exponentialRampToValueAtTime(38, now + 0.26);
        const bodyGain = ctx.createGain();
        bodyGain.gain.setValueAtTime(0.0001, now);
        bodyGain.gain.linearRampToValueAtTime(0.14, now + 0.028);
        bodyGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);

        const friction = ctx.createBufferSource();
        friction.buffer = getNoiseBuffer(ctx);
        const frictionBp = ctx.createBiquadFilter();
        frictionBp.type = 'bandpass';
        frictionBp.frequency.setValueAtTime(210, now);
        frictionBp.frequency.exponentialRampToValueAtTime(58, now + 0.28);
        frictionBp.Q.value = 1.15;
        const frictionGain = ctx.createGain();
        frictionGain.gain.setValueAtTime(0.0001, now);
        frictionGain.gain.linearRampToValueAtTime(0.1, now + 0.018);
        frictionGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);

        wind.connect(windLp);
        windLp.connect(windGain);
        windGain.connect(ctx.destination);
        body.connect(bodyGain);
        bodyGain.connect(ctx.destination);
        friction.connect(frictionBp);
        frictionBp.connect(frictionGain);
        frictionGain.connect(ctx.destination);

        wind.start(now);
        wind.stop(now + 0.38);
        body.start(now);
        body.stop(now + 0.36);
        friction.start(now);
        friction.stop(now + 0.34);
      }

      function playImpactSplash() {
        const ctx = ensureAudio();
        if (!ctx) return;

        const now = ctx.currentTime;

        const impact = ctx.createOscillator();
        impact.type = 'sine';
        impact.frequency.setValueAtTime(68, now);
        impact.frequency.exponentialRampToValueAtTime(20, now + 0.24);

        const impactGain = ctx.createGain();
        impactGain.gain.setValueAtTime(0.72, now);
        impactGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);

        const subThud = ctx.createOscillator();
        subThud.type = 'triangle';
        subThud.frequency.setValueAtTime(44, now);
        subThud.frequency.exponentialRampToValueAtTime(16, now + 0.2);

        const subGain = ctx.createGain();
        subGain.gain.setValueAtTime(0.52, now);
        subGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);

        const mass = ctx.createBufferSource();
        mass.buffer = getNoiseBuffer(ctx);
        const massLp = ctx.createBiquadFilter();
        massLp.type = 'lowpass';
        massLp.frequency.setValueAtTime(380, now);
        massLp.frequency.exponentialRampToValueAtTime(85, now + 0.28);
        massLp.Q.value = 0.6;
        const massGain = ctx.createGain();
        massGain.gain.setValueAtTime(0.0001, now);
        massGain.gain.linearRampToValueAtTime(0.42, now + 0.007);
        massGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);

        const viscous = ctx.createBufferSource();
        viscous.buffer = getNoiseBuffer(ctx);
        const viscousBp = ctx.createBiquadFilter();
        viscousBp.type = 'bandpass';
        viscousBp.frequency.setValueAtTime(280, now);
        viscousBp.frequency.exponentialRampToValueAtTime(75, now + 0.22);
        viscousBp.Q.value = 0.75;
        const viscousGain = ctx.createGain();
        viscousGain.gain.setValueAtTime(0.0001, now);
        viscousGain.gain.linearRampToValueAtTime(0.32, now + 0.01);
        viscousGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);

        const rumble = ctx.createBufferSource();
        rumble.buffer = getNoiseBuffer(ctx);
        const rumbleLp = ctx.createBiquadFilter();
        rumbleLp.type = 'lowpass';
        rumbleLp.frequency.value = 140;
        const rumbleGain = ctx.createGain();
        rumbleGain.gain.setValueAtTime(0.28, now);
        rumbleGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);

        impact.connect(impactGain);
        impactGain.connect(ctx.destination);
        subThud.connect(subGain);
        subGain.connect(ctx.destination);
        mass.connect(massLp);
        massLp.connect(massGain);
        massGain.connect(ctx.destination);
        viscous.connect(viscousBp);
        viscousBp.connect(viscousGain);
        viscousGain.connect(ctx.destination);
        rumble.connect(rumbleLp);
        rumbleLp.connect(rumbleGain);
        rumbleGain.connect(ctx.destination);

        impact.start(now);
        impact.stop(now + 0.52);
        subThud.start(now);
        subThud.stop(now + 0.44);
        mass.start(now);
        mass.stop(now + 0.42);
        viscous.start(now + 0.012);
        viscous.stop(now + 0.36);
        rumble.start(now);
        rumble.stop(now + 0.58);
      }

      function hexToRgb(hex) {
        const n = parseInt(hex.replace('#', ''), 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }

      function createPaintBallEl(startX, startY, color, size) {
        const half = size / 2;
        const ball = document.createElement('div');
        ball.className = 'paint-ball';
        ball.style.setProperty('--ball-color', color);
        ball.style.width = size + 'px';
        ball.style.height = size + 'px';
        ball.style.left = (startX - half) + 'px';
        ball.style.top = (startY - half) + 'px';
        document.body.appendChild(ball);
        return ball;
      }

      function wrapTextLines(tctx, text, maxWidth, letterSpacing) {
        const lines = [];
        text.split('\n').forEach((paragraph) => {
          if (!paragraph) {
            lines.push('');
            return;
          }
          let line = '';
          for (const ch of paragraph) {
            const next = line + ch;
            const extra = line.length > 0 ? letterSpacing : 0;
            if (tctx.measureText(next).width + extra > maxWidth && line) {
              lines.push(line);
              line = ch;
            } else {
              line = next;
            }
          }
          if (line) lines.push(line);
        });
        return lines;
      }

      function sampleTextParticles(word, inputRect, color) {
        const style = getComputedStyle(wordInput);
        const fontSize = parseFloat(style.fontSize);
        const fontFamily = style.fontFamily;
        const fontWeight = style.fontWeight;
        const letterSpacing = parseFloat(style.letterSpacing) || fontSize * 0.12;
        const font = `${fontWeight} ${fontSize}px ${fontFamily}`;
        const lineHeight = fontSize * 1.65;

        const w = Math.max(1, Math.ceil(inputRect.width));
        const h = Math.max(1, Math.ceil(inputRect.height));
        const padX = fontSize * 0.55;
        const padTop = fontSize * 0.85;
        const maxLineWidth = w - padX * 2;

        const tc = document.createElement('canvas');
        tc.width = w;
        tc.height = h;
        const tctx = tc.getContext('2d');
        tctx.font = font;
        tctx.fillStyle = '#ffffff';
        tctx.textBaseline = 'top';

        const lines = wrapTextLines(tctx, word, maxLineWidth, letterSpacing);
        let y = padTop;
        for (const line of lines) {
          let x = padX;
          for (const ch of line) {
            tctx.fillText(ch, x, y);
            x += tctx.measureText(ch).width + letterSpacing;
          }
          y += lineHeight;
        }

        const data = tctx.getImageData(0, 0, w, h).data;
        const rgb = hexToRgb(color);
        const particles = [];
        const step = word.length > 800 ? 5 : word.length > 200 ? 4 : word.length > 50 ? 3 : 2;

        for (let py = 0; py < h; py += step) {
          for (let px = 0; px < w; px += step) {
            const i = (py * w + px) * 4;
            if (data[i + 3] > 100) {
              const ox = inputRect.left + px + Math.random() * step;
              const oy = inputRect.top + py + Math.random() * step;
              const startAngle = Math.atan2(oy - (inputRect.top + h * 0.5), ox - (inputRect.left + w * 0.5));
              particles.push({
                ox,
                oy,
                x: ox,
                y: oy,
                size: 1 + Math.random() * 2.2,
                delay: Math.random() * 0.38,
                startAngle,
                burstOffset: Math.random() * Math.PI * 2,
                burstMag: 0.3 + Math.random() * 0.55,
                spin: (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 2.2),
                rgb,
                alpha: 1
              });
            }
          }
        }

        const maxParticles = word.length > 2000 ? 1200 : 900;
        if (particles.length > maxParticles) {
          for (let i = particles.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [particles[i], particles[j]] = [particles[j], particles[i]];
          }
          particles.length = maxParticles;
        }

        return particles;
      }

      function animateWordSuckIn(word, onComplete) {
        const inputRect = wordInput.getBoundingClientRect();
        const pickerEl = getColorPickerElement();
        const indicatorRect = pickerEl.getBoundingClientRect();
        const targetX = indicatorRect.left + indicatorRect.width / 2;
        const targetY = indicatorRect.top + indicatorRect.height / 2;
        const startCX = inputRect.left + inputRect.width / 2;
        const startCY = inputRect.top + inputRect.height / 2;
        const dx = targetX - startCX;
        const dy = targetY - startCY;

        const ghost = document.createElement('div');
        ghost.className = 'word-suck-ghost';
        ghost.textContent = word;
        ghost.style.left = inputRect.left + 'px';
        ghost.style.top = inputRect.top + 'px';
        ghost.style.width = inputRect.width + 'px';
        ghost.style.height = inputRect.height + 'px';
        document.body.appendChild(ghost);

        wordInput.classList.add('word-sucking');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            ghost.style.transform = `translate(${dx}px, ${dy}px) scale(0.5)`;
            ghost.style.opacity = '0';
          });
        });

        setTimeout(() => {
          ghost.remove();
          wordInput.classList.remove('word-sucking');
          wordInput.value = '';
          updateUIState();
          if (onComplete) onComplete();
        }, 1500);
      }

      function animateBlackHoleCondense(word, color, onComplete) {
        const inputRect = wordInput.getBoundingClientRect();
        const pickerEl = getColorPickerElement();
        const indicatorRect = pickerEl.getBoundingClientRect();
        const targetX = indicatorRect.left + indicatorRect.width / 2;
        const targetY = indicatorRect.top + indicatorRect.height / 2;

        const particles = sampleTextParticles(word, inputRect, color);
        if (!particles.length) {
          onComplete(targetX, targetY, null);
          return;
        }

        const fxCanvas = document.createElement('canvas');
        fxCanvas.className = 'bh-fx-canvas';
        fxCanvas.width = window.innerWidth * (window.devicePixelRatio || 1);
        fxCanvas.height = window.innerHeight * (window.devicePixelRatio || 1);
        fxCanvas.style.width = window.innerWidth + 'px';
        fxCanvas.style.height = window.innerHeight + 'px';
        document.body.appendChild(fxCanvas);

        const fxCtx = fxCanvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        fxCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const BURST_MS = 520;
        const SUCK_MS = 2450;
        const FUSE_MS = 380;
        const TOTAL_MS = BURST_MS + SUCK_MS + FUSE_MS;
        const start = performance.now();
        let ballEl = null;

        startSuckSound(TOTAL_MS);

        function drawVortex(intensity) {
          if (intensity <= 0) return;
          const grad = fxCtx.createRadialGradient(targetX, targetY, 0, targetX, targetY, 42 * intensity);
          grad.addColorStop(0, `rgba(0, 0, 0, ${0.35 * intensity})`);
          grad.addColorStop(0.45, `rgba(0, 0, 0, ${0.12 * intensity})`);
          grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
          fxCtx.fillStyle = grad;
          fxCtx.beginPath();
          fxCtx.arc(targetX, targetY, 42 * intensity, 0, Math.PI * 2);
          fxCtx.fill();
        }

        function tick(now) {
          const elapsed = now - start;
          fxCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

          if (elapsed < BURST_MS) {
            const t = elapsed / BURST_MS;
            const burst = Math.sin(t * Math.PI) * 10;
            particles.forEach(p => {
              p.x = p.ox + Math.cos(p.startAngle + p.burstOffset) * burst * p.burstMag;
              p.y = p.oy + Math.sin(p.startAngle + p.burstOffset) * burst * p.burstMag;
              p.alpha = 1;
            });
            drawVortex(t * 0.18);
          } else if (elapsed < BURST_MS + SUCK_MS) {
            const suckT = (elapsed - BURST_MS) / SUCK_MS;
            const vortexStrength = Math.min(1, suckT * 0.75);
            drawVortex(vortexStrength);

            particles.forEach(p => {
              const localT = Math.max(0, Math.min(1, (suckT - p.delay) / (1 - p.delay * 0.45)));
              const e = easeBlackHolePull(localT);
              const startR = Math.hypot(p.ox - targetX, p.oy - targetY);
              const r = startR * (1 - e);
              const theta = p.startAngle + p.spin * Math.PI * 3.2 * e;
              p.x = targetX + r * Math.cos(theta);
              p.y = targetY + r * Math.sin(theta);
              p.alpha = 0.6 + 0.4 * (1 - e * 0.25);
              p.size = Math.max(0.6, p.size * (1 - e * 0.28));
            });
          } else if (elapsed < TOTAL_MS) {
            const fuseT = (elapsed - BURST_MS - SUCK_MS) / FUSE_MS;
            const e = easeInCubic(fuseT);
            drawVortex(1 - fuseT * 0.6);

            particles.forEach(p => {
              p.x = targetX + (p.x - targetX) * (1 - e);
              p.y = targetY + (p.y - targetY) * (1 - e);
              p.alpha = 1 - e;
              p.size = Math.max(0.3, p.size * (1 - e));
            });

            if (!ballEl && fuseT > 0.55) {
              ballEl = createPaintBallEl(targetX, targetY, color, 38);
              ballEl.classList.add('crystallize');
              ballEl.style.opacity = '1';
            }
          } else {
            fxCanvas.remove();
            if (!ballEl) {
              ballEl = createPaintBallEl(targetX, targetY, color, 38);
              ballEl.classList.add('crystallize');
            }
            onComplete(targetX, targetY, ballEl);
            return;
          }

          particles.forEach(p => {
            if (p.alpha <= 0.02) return;
            const { r, g, b } = p.rgb;
            fxCtx.globalAlpha = p.alpha;
            fxCtx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            fxCtx.shadowColor = `rgba(${r}, ${g}, ${b}, 0.85)`;
            fxCtx.shadowBlur = 4;
            fxCtx.beginPath();
            fxCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            fxCtx.fill();
          });
          fxCtx.shadowBlur = 0;
          fxCtx.globalAlpha = 1;

          requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
      }

      function drawSplatterStamp(c, stamp, size, alpha, pattern) {
        const p = pattern ?? 0;
        if (p === 1) {
          c.globalAlpha = alpha;
          c.drawImage(stamp, -size / 2, -size / 2, size, size);
          const spur = size * 0.36;
          const offsets = [[1, 0], [-1, 0], [0, -1], [0.65, 0.65]];
          offsets.forEach(([dx, dy]) => {
            c.globalAlpha = alpha * 0.52;
            c.drawImage(stamp, dx * spur - spur * 0.5, dy * spur - spur * 0.5, spur, spur);
          });
          return;
        }
        if (p === 2) {
          const heavy = size * 1.28;
          c.globalAlpha = alpha * 0.9;
          c.drawImage(stamp, -heavy / 2, -heavy / 2, heavy, heavy);
          c.globalAlpha = alpha * 0.42;
          c.drawImage(stamp, -size / 2, -size / 2, size, size);
          return;
        }
        c.globalAlpha = alpha;
        c.drawImage(stamp, -size / 2, -size / 2, size, size);
      }

      function drawSplatter(splash, w, h, scale, targetCtx) {
        if (!splatReady) return;

        const stamp = getSplashStamp(splash);
        if (!stamp) return;
        const c = targetCtx || ctx;

        const cx = splash.nx * w;
        const cy = splash.ny * h;
        const s = scale !== undefined ? scale : 1;
        const size = resolveSplashDrawSizePx(splash) * s;
        const alpha = splash.opacity ?? CHARGE_OPACITY_MAX;

        c.save();
        c.translate(cx, cy);
        c.rotate(splash.rotation || 0);
        c.globalCompositeOperation = 'multiply';
        drawSplatterStamp(c, stamp, size, alpha, splash.splashPattern ?? 0);
        c.restore();
        c.globalCompositeOperation = 'source-over';
      }

      function drawDrip(splash, w, h) {
        if (!splash.drip || splash.drip.length <= 0.5) return;
        const stamp = getSplashStamp(splash);
        if (!stamp) return;

        const cx = splash.nx * w;
        const cy = splash.ny * h;
        const drip = splash.drip;
        const originX = cx + drip.offsetX;
        const originY = cy + drip.offsetY;
        const dripH = drip.length;
        const dripW = drip.width;
        const color = normalizeSplashHex(splash.color1 || splash.color);

        ctx.save();
        ctx.translate(originX, originY);
        ctx.globalAlpha = (splash.opacity ?? 1) * 0.88;
        ctx.globalCompositeOperation = 'multiply';
        ctx.drawImage(stamp, -dripW / 2, 0, dripW, dripH);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = (splash.opacity ?? 1) * 0.55;
        ctx.fillStyle = color || '#1a2e40';
        ctx.fillRect(-dripW * 0.35, dripH * 0.85, dripW * 0.7, dripH * 0.15);
        ctx.restore();
        ctx.globalCompositeOperation = 'source-over';
      }

      function redrawCanvas() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        fillCanvasBackground();
        splashes.forEach(s => {
          drawSplatter(s, w, h);
          drawDrip(s, w, h);
        });
        try {
          lastCanvasExportDataUrl = canvas.toDataURL('image/png');
        } catch {
          /* export snapshot optional during draw */
        }
      }

      function playBeep() {
        playImpactSplash();
      }

      function vibrate() {
        if (navigator.vibrate) navigator.vibrate(50);
      }

      // ── 激突アニメーション（インクスタンプが拡大） ──
      function animateSplash(splash, w, h, onComplete) {
        let frame = 0;
        const maxFrames = 52;

        function tick() {
          frame++;
          const t = frame / maxFrames;
          const scale = easeOutCubic(Math.min(1, t * 1.15));

          fillCanvasBackground();
          splashes.forEach(s => {
            if (s !== splash) {
              drawSplatter(s, w, h);
              drawDrip(s, w, h);
            }
          });
          drawSplatter(splash, w, h, scale);
          clearAndDrawOverlays();

          if (frame < maxFrames) {
            requestAnimationFrame(tick);
          } else {
            redrawCanvas();
            if (onComplete) onComplete();
          }
        }

        requestAnimationFrame(tick);
      }

      function launchPaintBall(startX, startY, targetX, targetY, color, onImpact, existingBall) {
        const size = 38;
        const half = size / 2;
        const ball = existingBall || createPaintBallEl(startX, startY, color, size);

        function startFlight(fast) {
          ball.style.transform = 'scale(1)';
          playLaunchWhoosh();
          const duration = fast ? 300 : 680;
          const startTime = performance.now();
          let prevE = 0;

          function fly(now) {
            const t = Math.min(1, (now - startTime) / duration);
            const e = fast ? easeFlightBurst(t) : easeOutCubic(t);
            const x = startX + (targetX - startX) * e;
            const y = startY + (targetY - startY) * e - Math.sin(t * Math.PI) * 75;
            const velocity = Math.max(0, e - prevE);
            prevE = e;

            ball.style.transition = 'none';
            ball.style.left = (x - half) + 'px';
            ball.style.top = (y - half) + 'px';
            const stretch = fast ? Math.min(1.45, 1 + velocity * 5.5) : 1;
            const squash = fast ? Math.max(0.78, 2 - stretch) : 1;
            ball.style.transform = `scale(${1 + t * 0.2}) scaleX(${stretch}) scaleY(${squash})`;

            if (t < 1) {
              requestAnimationFrame(fly);
            } else {
              ball.style.transition = 'transform 0.07s ease-out, opacity 0.07s ease-out';
              ball.style.transform = 'scale(2)';
              ball.style.opacity = '0';
              setTimeout(() => {
                ball.remove();
                onImpact();
              }, 70);
            }
          }

          requestAnimationFrame(fly);
        }

        if (existingBall) {
          setTimeout(() => startFlight(true), 480);
          return;
        }

        ball.style.transform = 'scale(0.12)';
        ball.style.opacity = '0';
        ball.classList.add('glow');

        requestAnimationFrame(() => {
          ball.style.transition = 'transform 0.13s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.1s ease';
          ball.style.transform = 'scale(1.14)';
          ball.style.opacity = '1';
        });

        setTimeout(() => startFlight(false), 120);
      }

      function clampTapPosition(x, y, w, h, splashMeta) {
        const half = getSplashMetaHalfExtent(splashMeta);
        const pad = Math.max(8, half * 0.2);
        return {
          x: Math.max(pad, Math.min(w - pad, x)),
          y: Math.max(pad, Math.min(h - pad, y))
        };
      }

      function commitInkLanding(savedWord, payload) {
        const pickedColor = normalizeSplashHex(payload.color);
        if (!pickedColor || isDiarySubmitting) return;

        onUserActivity();
        ensureAudio();
        isDiarySubmitting = true;
        wordInput.disabled = true;
        setEmotionPaletteDisabled(true);
        fadeOutLandingUI();

          ensureSplatLoaded().then(() => {
          const w = canvas.clientWidth;
          const h = canvas.clientHeight;
          const splashMeta = createSplashData(payload.progress, payload.opacity, w, h);
          const pos = randomSplashPosition(w, h, splashMeta);

          vibrate();
          playBeep();
          triggerCanvasShake();
          spawnShockwave(pos.x, pos.y);

          const splash = {
            id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
            nx: pos.x / w,
            ny: pos.y / h,
            word: savedWord,
            timestamp: Date.now(),
            ...splashMeta
          };
          applyColorToSplash(splash, pickedColor);

          initDrip(splash);
          splashes.push(splash);
          const now = Date.now();
          splashes = splashes
            .filter(s => now - s.timestamp < RETENTION_MS)
            .slice(-MAX_ENTRIES);
          saveSplashes();
          syncHistoriesFromSplashes();
          appendDiaryColorLog(savedWord, pickedColor, splash.timestamp);
          wordInput.value = '';

          animateSplash(splash, w, h, () => {
            redrawCanvas();
            refreshCanvasExportSnapshot();
            ensureAmbientLoop();
            saveGallerySnapshot();
            if (getGalleryProgress().ready) {
              updateFrameButtonState();
            } else {
              scheduleZenAfterImpact();
            }
            isDiarySubmitting = false;
            lockDiaryForToday();
            applyDailyLockUI();
            updateUIState();
            showCompletionWhisper(true);
          });
        }).catch((err) => {
          console.error(err);
          isDiarySubmitting = false;
          if (midPanel) midPanel.classList.remove('is-ui-fading');
          if (emotionPalette) emotionPalette.classList.remove('is-ui-fading');
          updateUIState();
        });
      }

      function canSubmitDiaryNow() {
        return false;
      }

      function isCanvasDirectTarget(e) {
        return e.target === canvas;
      }

      function getCanvasLocalCoordsFromClient(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = rect.width > 0 ? canvas.clientWidth / rect.width : 1;
        const scaleY = rect.height > 0 ? canvas.clientHeight / rect.height : 1;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY,
          clientX,
          clientY
        };
      }

      function getCanvasLocalCoordsFromEvent(e) {
        let clientX;
        let clientY;
        if (e.changedTouches && e.changedTouches.length > 0) {
          clientX = e.changedTouches[0].clientX;
          clientY = e.changedTouches[0].clientY;
        } else if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }
        return getCanvasLocalCoordsFromClient(clientX, clientY);
      }

      function handleCanvasTapAt(coords, e) {
        spawnTapRipple(coords.x, coords.y);

        if (isCanvasInteractionLocked()) {
          const s = findSplashAt(coords.x, coords.y);
          if (s) showTooltip(s, coords.clientX, coords.clientY);
          else hideTooltip();
          return;
        }

        const s = findSplashAt(coords.x, coords.y);
        if (s) showTooltip(s, coords.clientX, coords.clientY);
        else hideTooltip();
      }

      function formatDate(ts) {
        const d = new Date(ts);
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        const hr = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${y}/${mo}/${da} ${hr}:${mi}`;
      }

      // 中心付近のみヒット判定
      function findSplashAt(px, py) {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        for (let i = splashes.length - 1; i >= 0; i--) {
          const s = splashes[i];
          const sx = s.nx * w;
          const sy = s.ny * h;
          const dist = Math.hypot(px - sx, py - sy);
          if (dist <= s.hitRadius) return s;
        }
        return null;
      }

      function showTooltip(s, clientX, clientY) {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        const rect = canvas.getBoundingClientRect();
        const sx = clientX != null ? clientX : s.nx * w + rect.left;
        const sy = clientY != null ? clientY : s.ny * h + rect.top;
        tooltip.textContent = formatDate(s.timestamp);
        tooltip.style.left = sx + 'px';
        tooltip.style.top = sy + 'px';
        tooltip.classList.add('visible');
      }

      function hideTooltip() {
        tooltip.classList.remove('visible');
      }

      canvas.addEventListener('click', (e) => {
        if (!isCanvasDirectTarget(e)) return;
        onUserActivity();
        if (Date.now() - lastCanvasTapHandledAt < 500) {
          e.preventDefault();
          return;
        }
        if (e.cancelable) e.preventDefault();
        handleCanvasTapAt(getCanvasLocalCoordsFromEvent(e), e);
      });

      canvas.addEventListener('mousemove', (e) => {
        if (!isCanvasDirectTarget(e)) return;
        onUserActivity();
        const { x, y } = getCanvasLocalCoordsFromEvent(e);
        const s = findSplashAt(x, y);
        if (s) showTooltip(s, e.clientX, e.clientY);
        else hideTooltip();
      });

      canvas.addEventListener('mouseleave', hideTooltip);

      canvas.addEventListener('touchstart', (e) => {
        if (!isCanvasDirectTarget(e)) return;
        onUserActivity();

        const touch = e.touches && e.touches[0];
        if (!touch) return;

        const coords = getCanvasLocalCoordsFromClient(touch.clientX, touch.clientY);
        canvasTouchStart = {
          x: coords.x,
          y: coords.y,
          clientX: coords.clientX,
          clientY: coords.clientY,
          t: Date.now(),
          id: touch.identifier
        };

        if (canSubmitDiaryNow() || isCanvasInteractionLocked()) {
          if (canSubmitDiaryNow() && document.activeElement === wordInput) {
            wordInput.blur();
          }
          e.preventDefault();
        }
      }, { passive: false });

      canvas.addEventListener('touchend', (e) => {
        if (!canvasTouchStart) return;

        const touch = e.changedTouches && e.changedTouches[0];
        if (!touch || touch.identifier !== canvasTouchStart.id) return;

        const coords = getCanvasLocalCoordsFromClient(touch.clientX, touch.clientY);
        const moved = Math.hypot(coords.x - canvasTouchStart.x, coords.y - canvasTouchStart.y);
        const elapsed = Date.now() - canvasTouchStart.t;
        canvasTouchStart = null;

        if (moved > 16 || elapsed > 700) {
          if (isCanvasInteractionLocked()) setTimeout(hideTooltip, 1800);
          return;
        }

        e.preventDefault();
        handleCanvasTapAt(coords, e);
      }, { passive: false });

      canvas.addEventListener('touchcancel', () => {
        canvasTouchStart = null;
      }, { passive: true });

      wordInput.addEventListener('beforeinput', clearWordInputLengthLimit);

      wordInput.addEventListener('input', () => {
        clearWordInputLengthLimit();
        onUserActivity();
        updateUIState();
      });

      wordInput.addEventListener('focus', () => {
        clearWordInputLengthLimit();
        setTimeout(() => {
          wordInput.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }, 320);
      });

      document.addEventListener('mousemove', onUserActivity, { passive: true });
      document.addEventListener('touchstart', onUserActivity, { passive: true });

      window.addEventListener('resize', () => {
        resizeCanvas();
      });

      function bootApp() {
      migrateHistoriesToRecipes();
      migrateGalleryStorage();
      splashes = loadSplashes();
      saveSplashes();
      if (!loadHistoryRecipes().length && splashes.length) {
        syncHistoriesFromSplashes();
      } else if (splashes.length) {
        syncHistoriesFromSplashes();
      }
      loadSplatImage().catch(() => {});
      loadFabricImage().catch(() => {});
      buildEmotionPalette();
      resizeCanvas();
      requestAnimationFrame(() => {
        resizeCanvas();
        refreshCanvasExportSnapshot();
      });
      applyDailyLockUI();
      restoreCompletionWhisperIfNeeded();
      updateUIState();
      updateFrameButtonState();
      bindFrameButtonClick();
      scheduleDiaryDayUnlockCheck();

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) return;
        applyDailyLockUI();
        if (hasPostedToday()) {
          restoreCompletionWhisperIfNeeded();
        } else {
          hideCompletionWhisper();
        }
        updateUIState();
      });

      document.addEventListener('touchstart', () => { ensureAudio(); }, { once: true });
      document.addEventListener('click', () => { ensureAudio(); }, { once: true });
      }

      bootApp();
    })();
  </script>
</body>
</html>
