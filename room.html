<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#08080a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="INSCAPE">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>合言葉の部屋 — INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --room-deep: #08080a;
      --slide-width: min(88vw, 380px);
      --slide-gap: 2.5rem;
      --canvas-fabric-url: url('canvas-fabric.png');
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      background: var(--room-deep);
      color: #e8e6e2;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      background:
        radial-gradient(ellipse 100% 42% at 50% -10%, rgba(201, 169, 98, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 70% 35% at 8% 92%, rgba(38, 28, 48, 0.14) 0%, transparent 48%),
        var(--room-deep);
    }

    .room-shell {
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .room-top {
      flex-shrink: 0;
      z-index: 20;
      padding:
        calc(0.85rem + env(safe-area-inset-top))
        calc(0.65rem + env(safe-area-inset-right))
        0.55rem
        calc(0.65rem + env(safe-area-inset-left));
      background: linear-gradient(180deg, rgba(8, 8, 10, 0.96) 0%, rgba(8, 8, 10, 0.88) 72%, rgba(8, 8, 10, 0) 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .site-nav {
      display: flex;
      align-items: stretch;
      justify-content: flex-start;
      gap: 0.14rem;
      overflow-x: auto;
      overflow-y: hidden;
      flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .site-nav::-webkit-scrollbar { display: none; height: 0; }

    .site-nav-link {
      flex: 0 0 auto;
      min-width: max-content;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.3rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-indent: 0.03em;
      color: rgba(232, 230, 226, 0.38);
      text-decoration: none;
      padding: 0.38rem 0.28rem;
      border: 0.5px solid rgba(255, 255, 255, 0.07);
      border-radius: 2px;
      background: rgba(14, 14, 18, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 0.35s ease, border-color 0.35s ease, background 0.35s ease;
      white-space: nowrap;
      text-align: center;
    }

    .site-nav-link:hover {
      color: rgba(232, 230, 226, 0.72);
      border-color: rgba(184, 160, 122, 0.28);
      background: rgba(20, 20, 24, 0.9);
    }

    .site-nav-link.is-current {
      color: rgba(201, 169, 98, 0.58);
      border-color: rgba(201, 169, 98, 0.2);
      background: rgba(201, 169, 98, 0.06);
      pointer-events: none;
    }

    .room-main {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .room-gate {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1.35rem calc(2rem + env(safe-area-inset-bottom));
    }

    .room-gate.is-hidden {
      display: none;
    }

    .room-gate-form {
      width: 100%;
      max-width: 18rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .room-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .room-field label {
      font-size: 0.52rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-indent: 0.14em;
      color: rgba(232, 230, 226, 0.32);
    }

    .room-field input {
      width: 100%;
      padding: 0.72rem 0.65rem;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.025);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(232, 230, 226, 0.82);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      outline: none;
      transition: border-color 0.35s ease, background 0.35s ease, box-shadow 0.35s ease;
    }

    .room-field input::placeholder {
      color: rgba(232, 230, 226, 0.22);
      letter-spacing: 0.06em;
    }

    .room-field input:focus {
      border-color: rgba(201, 169, 98, 0.32);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 0 24px rgba(201, 169, 98, 0.06);
    }

    .room-enter-btn {
      margin-top: 0.35rem;
      padding: 0.78rem 0.5rem;
      border: 0.5px solid rgba(201, 169, 98, 0.22);
      border-radius: 1px;
      background: rgba(201, 169, 98, 0.05);
      color: rgba(232, 230, 226, 0.62);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-indent: 0.28em;
      cursor: pointer;
      transition: color 0.35s ease, border-color 0.35s ease, background 0.35s ease;
    }

    .room-enter-btn:hover {
      color: rgba(232, 230, 226, 0.88);
      border-color: rgba(201, 169, 98, 0.38);
      background: rgba(201, 169, 98, 0.1);
    }

    .room-timeline-view {
      flex: 1 1 auto;
      min-height: 0;
      display: none;
      flex-direction: column;
    }

    .room-timeline-view.is-active {
      display: flex;
    }

    .room-session-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.35rem 1.25rem 0.65rem;
    }

    .room-session-key {
      font-size: 0.48rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: rgba(201, 169, 98, 0.42);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .room-leave-btn {
      flex-shrink: 0;
      padding: 0.32rem 0.45rem;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 1px;
      background: transparent;
      color: rgba(232, 230, 226, 0.32);
      font-family: inherit;
      font-size: 0.42rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: color 0.3s ease, border-color 0.3s ease;
    }

    .room-leave-btn:hover {
      color: rgba(232, 230, 226, 0.62);
      border-color: rgba(255, 255, 255, 0.16);
    }

    .room-theater-wrap {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .room-theater {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      width: 100%;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scroll-padding-inline: calc((100vw - var(--slide-width)) / 2);
      padding: 1rem calc((100vw - var(--slide-width)) / 2) 2rem;
      gap: var(--slide-gap);
    }

    .room-theater::-webkit-scrollbar { display: none; height: 0; }

    .room-slide {
      flex: 0 0 var(--slide-width);
      width: var(--slide-width);
      scroll-snap-align: center;
      scroll-snap-stop: always;
      position: relative;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .room-slide::before {
      content: '';
      position: absolute;
      top: -6%;
      left: 50%;
      transform: translateX(-50%);
      width: 220%;
      height: 115%;
      background: radial-gradient(ellipse 36% 46% at 50% 0%, rgba(201, 169, 98, 0.1) 0%, rgba(120, 100, 80, 0.04) 30%, transparent 66%);
      pointer-events: none;
      z-index: 0;
    }

    .room-slide-inner { position: relative; z-index: 1; }

    .room-ripple-layer {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
      overflow: hidden;
      border-radius: 1px;
    }

    .room-ripple {
      position: absolute;
      width: 8px;
      height: 8px;
      margin-left: -4px;
      margin-top: -4px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.06) 42%, transparent 72%);
      box-shadow: 0 0 12px rgba(200, 220, 255, 0.08);
      animation: room-ripple-expand 2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      pointer-events: none;
    }

    .room-ripple.is-soft {
      animation-duration: 2.4s;
      animation-delay: 0.12s;
      border-color: rgba(255, 255, 255, 0.1);
      opacity: 0.7;
    }

    @keyframes room-ripple-expand {
      0% { transform: scale(0.25); opacity: 0.5; }
      35% { opacity: 0.28; }
      100% { transform: scale(32); opacity: 0; }
    }

    .museum-wall-display {
      position: relative;
      display: block;
      width: 100%;
      text-align: center;
      overflow: visible;
      padding: 1.55rem 0.5rem 1.1rem;
      background:
        radial-gradient(circle at 50% 10%, rgba(201, 169, 98, 0.08) 0%, rgba(0, 0, 0, 0) 68%),
        rgba(6, 6, 8, 0.72);
      border-radius: 1px;
    }

    .museum-wall-display::before {
      content: '';
      position: absolute;
      inset: -8% -12%;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 6%, rgba(201, 169, 98, 0.05) 0%, rgba(0, 0, 0, 0) 62%);
      opacity: 0.85;
    }

    .museum-wall-display > * { position: relative; z-index: 1; }

    .museum-frame-sculpted {
      position: relative;
      box-sizing: border-box;
      width: 100%;
      margin: 0 auto;
      padding: 28px;
      background: #fbf9f5;
      border: 20px solid #1c110a;
      border-top-color: #f3e5ab;
      border-left-color: #d4af37;
      border-right-color: #8a640f;
      border-bottom-color: #5c430a;
      outline: 3px solid #aa7c11;
      outline-offset: -20px;
      box-shadow:
        inset 0 5px 0 rgba(255, 255, 255, 0.18),
        inset 0 -3px 10px rgba(0, 0, 0, 0.6),
        0 4px 14px rgba(0, 0, 0, 0.5),
        0 18px 36px rgba(0, 0, 0, 0.75);
    }

    .museum-frame-sculpted::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 20px solid transparent;
      border-image: linear-gradient(145deg, rgba(255, 255, 255, 0.08) 0%, transparent 40%, rgba(0, 0, 0, 0.35) 100%) 1;
      opacity: 0.85;
    }

    .art-surface {
      position: relative;
      width: 100%;
      overflow: hidden;
      line-height: 0;
      font-size: 0;
    }

    .room-art-canvas {
      display: block;
      width: 100%;
      height: auto;
      background-color: #f7f4eb;
      background-image:
        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 4px),
        var(--canvas-fabric-url);
      background-blend-mode: multiply;
      background-size: auto, auto, cover;
      box-shadow: inset 5px 5px 15px rgba(0, 0, 0, 0.38), inset -3px -3px 10px rgba(255, 255, 255, 0.55);
    }

    .paper-texture-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background-image: var(--canvas-fabric-url);
      background-size: cover;
      mix-blend-mode: multiply;
      opacity: 0.35;
    }

    .art-meta-caption {
      margin-top: 0.9rem;
      padding: 0 0.35rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.28rem;
      line-height: 1.5;
    }

    .art-date-caption {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Georgia", serif;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-indent: 0.16em;
      color: rgba(110, 120, 145, 0.72);
    }

    .art-display-name {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.48rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-indent: 0.2em;
      color: rgba(201, 169, 98, 0.48);
    }

    .room-theater.is-empty { justify-content: center; }

    .room-empty-glow {
      flex: 0 0 auto;
      width: 5rem;
      height: 5rem;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 169, 98, 0.08) 0%, transparent 70%);
      animation: room-empty-pulse 4s ease-in-out infinite;
    }

    @keyframes room-empty-pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.92); }
      50% { opacity: 0.7; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="room-shell">
    <div class="room-top">
      <nav class="site-nav" aria-label="ナビゲーション">
        <a class="site-nav-link" href="index.html">キャンバス</a>
        <a class="site-nav-link" href="midspace.html">言葉の浮遊層</a>
        <a class="site-nav-link" href="gallery.html">感情の回廊</a>
        <a class="site-nav-link" href="mycolors.html">今日の私の色</a>
        <a class="site-nav-link" href="ocean.html">感情の夜海</a>
        <a class="site-nav-link is-current" href="room.html" aria-current="page">合言葉の部屋</a>
      </nav>
    </div>

    <div class="room-main">
      <section class="room-gate" id="roomGate" aria-label="部屋に入る">
        <form class="room-gate-form" id="roomGateForm">
          <div class="room-field">
            <label for="roomKeyInput">合言葉（Room Key）</label>
            <input type="text" id="roomKeyInput" name="roomKey" placeholder="合言葉を入力" autocomplete="off" maxlength="64" required>
          </div>
          <div class="room-field">
            <label for="displayNameInput">今夜の表示名（Display Name）</label>
            <input type="text" id="displayNameInput" name="displayName" placeholder="余韻の観客" autocomplete="off" maxlength="24" required>
          </div>
          <button type="submit" class="room-enter-btn">部屋に入る</button>
        </form>
      </section>

      <section class="room-timeline-view" id="roomTimelineView" aria-label="合言葉の部屋 — タイムライン">
        <div class="room-session-bar">
          <p class="room-session-key" id="roomSessionLabel"></p>
          <button type="button" class="room-leave-btn" id="roomLeaveBtn">退出</button>
        </div>
        <div class="room-theater-wrap">
          <main class="room-theater" id="roomTheater"></main>
        </div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      const ROOM_TTL_MS = 24 * 60 * 60 * 1000;
      const ROOM_KEY_STORAGE = 'inscape_room_key';
      const ROOM_NAME_STORAGE = 'inscape_room_display_name';
      const SPLAT_IMAGE = 'splat.png';
      const CANVAS_BG = '#f7f4eb';
      const DEFAULT_CANVAS_W = 400;
      const DEFAULT_CANVAS_H = 300;

      const roomGate = document.getElementById('roomGate');
      const roomGateForm = document.getElementById('roomGateForm');
      const roomKeyInput = document.getElementById('roomKeyInput');
      const displayNameInput = document.getElementById('displayNameInput');
      const roomTimelineView = document.getElementById('roomTimelineView');
      const roomSessionLabel = document.getElementById('roomSessionLabel');
      const roomLeaveBtn = document.getElementById('roomLeaveBtn');
      const roomTheater = document.getElementById('roomTheater');

      const splatImg = new Image();
      const stampCache = {};
      let splatReady = false;
      let activeRoomKey = '';
      let activeDisplayName = '';

      /**
       * Room post schema (Firebase / Supabase ready):
       * {
       *   id: string,
       *   roomKey: string,
       *   displayName: string,
       *   colorData: { color: string, splats?: [...], canvasW?, canvasH? },
       *   createdAt: number
       * }
       */

      const MOCK_MEMBER_TEMPLATES = [
        { displayName: '月の欠片', color: 'rgba(155, 89, 182, 0.88)' },
        { displayName: '灯台下', color: 'rgba(52, 152, 219, 0.86)' },
        { displayName: '余韻', color: 'rgba(231, 76, 60, 0.9)' },
        { displayName: '静かな端末', color: 'rgba(26, 188, 156, 0.84)' }
      ];

      function randBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function hashToUnit(str, salt) {
        let h = 0;
        const s = `${str}|${salt}`;
        for (let i = 0; i < s.length; i++) {
          h = ((h << 5) - h + s.charCodeAt(i)) | 0;
        }
        return (Math.abs(h) % 10000) / 10000;
      }

      function parseAlphaFromColor(color) {
        if (typeof color !== 'string') return null;
        const rgba = color.match(/rgba?\(\s*[\d.]+\s*,\s*[\d.]+\s*,\s*[\d.]+\s*,\s*([\d.]+)\s*\)/i);
        if (rgba) return Math.min(1, Math.max(0, parseFloat(rgba[1])));
        return null;
      }

      function buildTodaySingleSplat(color, seed) {
        const s = seed || {};
        const alpha = parseAlphaFromColor(color);
        const idKey = s.id || color;
        return {
          nx: s.nx ?? 0.5,
          ny: s.ny ?? 0.5,
          color,
          baseSize: s.baseSize ?? (250 + hashToUnit(idKey, 'size') * 58),
          rotation: s.rotation ?? (hashToUnit(idKey, 'rot') - 0.5) * 0.22,
          scaleFactor: s.scaleFactor ?? (0.96 + hashToUnit(idKey, 'scale') * 0.1),
          opacity: s.opacity ?? (alpha != null ? alpha : 0.88)
        };
      }

      function createTodayColorData(color, id) {
        const splat = buildTodaySingleSplat(color, { id });
        return { color, splats: [splat], canvasW: DEFAULT_CANVAS_W, canvasH: DEFAULT_CANVAS_H };
      }

      function buildMockRoomPosts(roomKey) {
        const now = Date.now();
        const hourMs = 60 * 60 * 1000;
        const entries = [];

        MOCK_MEMBER_TEMPLATES.forEach((member, i) => {
          const hoursAgo = randBetween(0.5 + i * 2, 4 + i * 4);
          const id = `room-${roomKey}-mock-${i + 1}`;
          entries.push({
            id,
            roomKey,
            displayName: member.displayName,
            colorData: createTodayColorData(member.color, id),
            createdAt: Math.round(now - hoursAgo * hourMs)
          });
        });

        entries.push({
          id: `room-${roomKey}-expired`,
          roomKey,
          displayName: '過去の余韻',
          colorData: createTodayColorData('rgba(120, 120, 120, 0.55)', `room-${roomKey}-expired`),
          createdAt: now - ROOM_TTL_MS - hourMs * 3
        });

        return entries;
      }

      function purgeExpiredRoomPosts(entries, now = Date.now()) {
        if (!Array.isArray(entries)) return [];
        return entries.filter((entry) => {
          const createdAt = Number(entry && entry.createdAt);
          return Number.isFinite(createdAt) && now - createdAt < ROOM_TTL_MS;
        });
      }

      function sortRoomPostsNewestFirst(entries) {
        return [...entries].sort((a, b) => Number(b.createdAt) - Number(a.createdAt));
      }

      function parseColorData(raw) {
        if (!raw) return null;
        if (typeof raw === 'string') {
          try { return JSON.parse(raw); } catch { return null; }
        }
        return typeof raw === 'object' ? raw : null;
      }

      function normalizeRoomPost(entry, roomKey) {
        if (!entry || !entry.id || entry.colorData == null) return null;
        if (entry.roomKey && entry.roomKey !== roomKey) return null;
        const createdAt = Number(entry.createdAt);
        if (!Number.isFinite(createdAt)) return null;
        const displayName = String(entry.displayName || '').trim();
        if (!displayName) return null;

        const colorData = parseColorData(entry.colorData);
        if (!colorData) return null;

        let color = typeof colorData.color === 'string' ? colorData.color.trim() : '';
        if (!color && Array.isArray(colorData.splats) && colorData.splats[0]) {
          color = colorData.splats[0].color;
        }
        if (!color) return null;

        const splat = buildTodaySingleSplat(color, { id: String(entry.id) });
        return {
          id: String(entry.id),
          roomKey,
          displayName,
          colorData: {
            color: splat.color,
            splats: [splat],
            canvasW: colorData.canvasW || DEFAULT_CANVAS_W,
            canvasH: colorData.canvasH || DEFAULT_CANVAS_H
          },
          createdAt
        };
      }

      function sanitizeRoomPosts(rawList, roomKey, now = Date.now()) {
        const normalized = (Array.isArray(rawList) ? rawList : [])
          .map((e) => normalizeRoomPost(e, roomKey))
          .filter(Boolean);
        return sortRoomPostsNewestFirst(purgeExpiredRoomPosts(normalized, now));
      }

      async function fetchMockRoomColors(roomKey) {
        return buildMockRoomPosts(roomKey);
      }

      /** Primary gateway — replace body for Firebase / Supabase */
      async function fetchRoomColors(roomKey) {
        const raw = await fetchMockRoomColors(roomKey);
        return sanitizeRoomPosts(raw, roomKey);
      }

      function formatDotDateFromTimestamp(ts) {
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return '';
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        return `${y}.${mo}.${da}`;
      }

      function saveRoomSession(roomKey, displayName) {
        try {
          sessionStorage.setItem(ROOM_KEY_STORAGE, roomKey);
          sessionStorage.setItem(ROOM_NAME_STORAGE, displayName);
        } catch { /* ignore */ }
      }

      function clearRoomSession() {
        try {
          sessionStorage.removeItem(ROOM_KEY_STORAGE);
          sessionStorage.removeItem(ROOM_NAME_STORAGE);
        } catch { /* ignore */ }
      }

      function loadRoomSession() {
        try {
          const roomKey = sessionStorage.getItem(ROOM_KEY_STORAGE) || '';
          const displayName = sessionStorage.getItem(ROOM_NAME_STORAGE) || '';
          if (roomKey && displayName) return { roomKey, displayName };
        } catch { /* ignore */ }
        return null;
      }

      function loadSplatImage() {
        return new Promise((resolve, reject) => {
          splatImg.onload = () => {
            if (splatImg.naturalWidth > 0) { splatReady = true; resolve(); }
            else reject(new Error('splat.png invalid'));
          };
          splatImg.onerror = () => reject(new Error('splat.png load failed'));
          splatImg.src = SPLAT_IMAGE;
          if (splatImg.complete && splatImg.naturalWidth > 0) {
            splatReady = true;
            resolve();
          }
        });
      }

      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth) return null;
        if (stampCache[color]) return stampCache[color];
        const w = splatImg.naturalWidth;
        const h = splatImg.naturalHeight;
        const work = document.createElement('canvas');
        work.width = w;
        work.height = h;
        const wctx = work.getContext('2d');
        wctx.fillStyle = color;
        wctx.fillRect(0, 0, w, h);
        wctx.globalCompositeOperation = 'screen';
        wctx.drawImage(splatImg, 0, 0);
        wctx.globalCompositeOperation = 'source-over';
        stampCache[color] = work;
        return work;
      }

      function migrateSplash(s) {
        let baseSize = s.baseSize || 220;
        if (baseSize < 150) baseSize *= 2.5;
        return {
          nx: s.nx, ny: s.ny, color: s.color, baseSize,
          rotation: s.rotation ?? 0,
          scaleFactor: s.scaleFactor ?? 1,
          opacity: s.opacity ?? 0.75
        };
      }

      function drawSplatter(c, splash, w, h) {
        const stamp = createColorStamp(splash.color);
        if (!stamp) return;
        const cx = splash.nx * w;
        const cy = splash.ny * h;
        const size = splash.baseSize * (splash.scaleFactor || 1);
        c.save();
        c.translate(cx, cy);
        c.rotate(splash.rotation || 0);
        c.globalAlpha = splash.opacity ?? 1;
        c.globalCompositeOperation = 'multiply';
        c.drawImage(stamp, -size / 2, -size / 2, size, size);
        c.restore();
        c.globalCompositeOperation = 'source-over';
      }

      function renderColorDataToCanvas(canvasEl, colorData) {
        const srcW = colorData.canvasW || DEFAULT_CANVAS_W;
        const srcH = colorData.canvasH || DEFAULT_CANVAS_H;
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        canvasEl.width = Math.round(srcW * dpr);
        canvasEl.height = Math.round(srcH * dpr);
        canvasEl.style.width = '100%';
        canvasEl.style.height = 'auto';
        const c = canvasEl.getContext('2d');
        c.setTransform(dpr, 0, 0, dpr, 0, 0);
        c.fillStyle = CANVAS_BG;
        c.fillRect(0, 0, srcW, srcH);
        const singleSplat = colorData.splats && colorData.splats[0];
        if (!singleSplat) return;
        drawSplatter(c, migrateSplash(singleSplat), srcW, srcH);
      }

      function spawnRipple(layer, clientX, clientY, soft) {
        const rect = layer.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = soft ? 'room-ripple is-soft' : 'room-ripple';
        ripple.style.left = `${clientX - rect.left}px`;
        ripple.style.top = `${clientY - rect.top}px`;
        layer.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
      }

      function bindRippleInteraction(slideEl, rippleLayer) {
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;

        function handlePointer(clientX, clientY) {
          spawnRipple(rippleLayer, clientX, clientY, false);
          spawnRipple(rippleLayer, clientX, clientY, true);
        }

        slideEl.addEventListener('click', (e) => {
          if (e.pointerType === 'touch') return;
          handlePointer(e.clientX, e.clientY);
        });

        slideEl.addEventListener('touchstart', (e) => {
          if (!e.touches || !e.touches.length) return;
          const t = e.touches[0];
          touchStartX = t.clientX;
          touchStartY = t.clientY;
          touchStartTime = Date.now();
        }, { passive: true });

        slideEl.addEventListener('touchend', (e) => {
          if (!e.changedTouches || !e.changedTouches.length) return;
          const t = e.changedTouches[0];
          const dx = Math.abs(t.clientX - touchStartX);
          const dy = Math.abs(t.clientY - touchStartY);
          const dt = Date.now() - touchStartTime;
          if (dx < 14 && dy < 14 && dt < 420) {
            handlePointer(t.clientX, t.clientY);
          }
        }, { passive: true });
      }

      function createFramedSlide(entry) {
        const { colorData, createdAt, displayName } = entry;
        const srcW = colorData.canvasW || DEFAULT_CANVAS_W;
        const srcH = colorData.canvasH || DEFAULT_CANVAS_H;

        const slide = document.createElement('article');
        slide.className = 'room-slide';
        slide.dataset.postId = entry.id;

        const inner = document.createElement('div');
        inner.className = 'room-slide-inner';

        const wallDisplay = document.createElement('div');
        wallDisplay.className = 'museum-wall-display';

        const rippleLayer = document.createElement('div');
        rippleLayer.className = 'room-ripple-layer';
        rippleLayer.setAttribute('aria-hidden', 'true');

        const sculpted = document.createElement('div');
        sculpted.className = 'museum-frame-sculpted';

        const surface = document.createElement('div');
        surface.className = 'art-surface';
        surface.style.aspectRatio = `${srcW} / ${srcH}`;

        const artCanvas = document.createElement('canvas');
        artCanvas.className = 'room-art-canvas';
        renderColorDataToCanvas(artCanvas, colorData);

        const texture = document.createElement('div');
        texture.className = 'paper-texture-overlay';
        texture.setAttribute('aria-hidden', 'true');

        surface.appendChild(artCanvas);
        surface.appendChild(texture);
        sculpted.appendChild(surface);
        wallDisplay.appendChild(sculpted);

        const meta = document.createElement('div');
        meta.className = 'art-meta-caption';

        const dateEl = document.createElement('p');
        dateEl.className = 'art-date-caption';
        dateEl.textContent = formatDotDateFromTimestamp(createdAt);

        const nameEl = document.createElement('p');
        nameEl.className = 'art-display-name';
        nameEl.textContent = displayName;

        meta.appendChild(dateEl);
        meta.appendChild(nameEl);
        wallDisplay.appendChild(meta);
        wallDisplay.appendChild(rippleLayer);

        inner.appendChild(wallDisplay);
        slide.appendChild(inner);
        bindRippleInteraction(slide, rippleLayer);
        return slide;
      }

      function renderTimeline(entries) {
        if (!roomTheater) return;
        roomTheater.classList.remove('is-empty');
        roomTheater.innerHTML = '';

        if (!entries.length) {
          roomTheater.classList.add('is-empty');
          const glow = document.createElement('div');
          glow.className = 'room-empty-glow';
          glow.setAttribute('aria-hidden', 'true');
          roomTheater.appendChild(glow);
          return;
        }

        entries.forEach((entry) => {
          roomTheater.appendChild(createFramedSlide(entry));
        });
      }

      function showGate() {
        roomGate.classList.remove('is-hidden');
        roomTimelineView.classList.remove('is-active');
        activeRoomKey = '';
        activeDisplayName = '';
      }

      async function enterRoom(roomKey, displayName) {
        activeRoomKey = roomKey;
        activeDisplayName = displayName;
        saveRoomSession(roomKey, displayName);

        roomGate.classList.add('is-hidden');
        roomTimelineView.classList.add('is-active');
        if (roomSessionLabel) {
          roomSessionLabel.textContent = `合言葉 — ${roomKey}`;
        }

        const posts = await fetchRoomColors(roomKey);
        renderTimeline(posts);
      }

      async function refreshRoomTimeline() {
        if (!activeRoomKey) return;
        const posts = await fetchRoomColors(activeRoomKey);
        renderTimeline(posts);
      }

      roomGateForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const roomKey = roomKeyInput.value.trim();
        const displayName = displayNameInput.value.trim();
        if (!roomKey || !displayName) return;
        enterRoom(roomKey, displayName);
      });

      roomLeaveBtn.addEventListener('click', () => {
        clearRoomSession();
        showGate();
      });

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && activeRoomKey) {
          refreshRoomTimeline();
        }
      });

      async function init() {
        try { await loadSplatImage(); } catch { /* optional */ }

        const session = loadRoomSession();
        if (session) {
          roomKeyInput.value = session.roomKey;
          displayNameInput.value = session.displayName;
          await enterRoom(session.roomKey, session.displayName);
        }
      }

      init();
    })();
  </script>
</body>
</html>
