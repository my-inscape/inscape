<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050508">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="INSCAPE">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>感情の夜海 — INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ocean-deep: #050508;
      --canvas-fabric-url: url('canvas-fabric.png');
    }

    html, body {
      height: 100%;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      background: var(--ocean-deep);
      color: #e8e6e2;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      background:
        radial-gradient(ellipse 120% 45% at 50% -12%, rgba(38, 52, 88, 0.22) 0%, transparent 52%),
        radial-gradient(ellipse 80% 35% at 12% 88%, rgba(28, 18, 48, 0.18) 0%, transparent 48%),
        radial-gradient(ellipse 70% 30% at 88% 72%, rgba(12, 32, 58, 0.14) 0%, transparent 45%),
        var(--ocean-deep);
    }

    .ocean-shell {
      min-height: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .ocean-top {
      position: sticky;
      top: 0;
      z-index: 20;
      flex-shrink: 0;
      padding:
        calc(0.85rem + env(safe-area-inset-top))
        calc(0.65rem + env(safe-area-inset-right))
        0.55rem
        calc(0.65rem + env(safe-area-inset-left));
      background: linear-gradient(
        180deg,
        rgba(5, 5, 8, 0.96) 0%,
        rgba(5, 5, 8, 0.88) 72%,
        rgba(5, 5, 8, 0) 100%
      );
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .site-nav {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 0.18rem;
    }

    .site-nav-link {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.34rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-indent: 0.04em;
      color: rgba(232, 230, 226, 0.38);
      text-decoration: none;
      padding: 0.4rem 0.14rem;
      border: 0.5px solid rgba(255, 255, 255, 0.07);
      border-radius: 2px;
      background: rgba(10, 11, 16, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 0.35s ease, border-color 0.35s ease, background 0.35s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .site-nav-link:hover {
      color: rgba(232, 230, 226, 0.72);
      border-color: rgba(120, 140, 180, 0.28);
      background: rgba(14, 16, 24, 0.9);
    }

    .site-nav-link.is-current {
      color: rgba(140, 168, 210, 0.58);
      border-color: rgba(100, 130, 180, 0.2);
      background: rgba(40, 56, 88, 0.12);
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .site-nav-link {
        font-size: 0.3rem;
        letter-spacing: 0.02em;
        text-indent: 0.02em;
        padding: 0.36rem 0.1rem;
      }
    }

    .ocean-timeline {
      flex: 1 1 auto;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      padding:
        2.5rem 0
        calc(4rem + env(safe-area-inset-bottom));
    }

    .ocean-timeline::-webkit-scrollbar {
      width: 4px;
    }

    .ocean-timeline::-webkit-scrollbar-track {
      background: transparent;
    }

    .ocean-timeline::-webkit-scrollbar-thumb {
      background: rgba(80, 100, 140, 0.25);
      border-radius: 2px;
    }

    .ocean-stream {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 0 0.85rem;
    }

    .ocean-item {
      width: 100%;
      text-align: center;
      position: relative;
      padding: 3.5rem 0 4rem;
      opacity: 0;
      transform: translateY(28px);
      transition:
        opacity 1.1s cubic-bezier(0.22, 1, 0.36, 1),
        transform 1.1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .ocean-item.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .ocean-item::before {
      content: '';
      position: absolute;
      top: -4%;
      left: 50%;
      transform: translateX(-50%);
      width: 240%;
      height: 120%;
      background:
        radial-gradient(
          ellipse 36% 46% at 50% 0%,
          rgba(180, 200, 240, 0.14) 0%,
          rgba(120, 150, 200, 0.06) 28%,
          rgba(60, 80, 120, 0.03) 48%,
          transparent 68%
        );
      pointer-events: none;
      z-index: 0;
    }

    .ocean-item > * {
      position: relative;
      z-index: 1;
    }

    .museum-wall-display {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 100%;
      text-align: center;
      overflow: visible;
      padding: 1.65rem 0.55rem 1.15rem;
      background:
        radial-gradient(circle at 50% 10%, rgba(200, 215, 255, 0.1) 0%, rgba(0, 0, 0, 0) 68%),
        radial-gradient(ellipse 85% 48% at 50% -5%, rgba(160, 180, 220, 0.05) 0%, transparent 52%),
        rgba(4, 5, 10, 0.72);
      border-radius: 1px;
    }

    .museum-wall-display::before {
      content: '';
      position: absolute;
      inset: -8% -12%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 6%, rgba(180, 200, 240, 0.07) 0%, rgba(0, 0, 0, 0) 62%);
      opacity: 0.85;
    }

    .museum-wall-display > * {
      position: relative;
      z-index: 1;
    }

    .museum-frame-sculpted {
      position: relative;
      box-sizing: border-box;
      width: 100%;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      padding: 32px;
      background: #fbf9f5;
      border: 20px solid #1c110a;
      border-top-color: #f3e5ab;
      border-left-color: #d4af37;
      border-right-color: #8a640f;
      border-bottom-color: #5c430a;
      outline: 3px solid #aa7c11;
      outline-offset: -20px;
      box-shadow:
        inset 0 5px 0 rgba(255, 255, 255, 0.18),
        inset 0 -3px 10px rgba(0, 0, 0, 0.6),
        0 4px 14px rgba(0, 0, 0, 0.5),
        0 18px 36px rgba(0, 0, 0, 0.75),
        0 32px 64px rgba(0, 0, 0, 0.45);
    }

    .museum-frame-sculpted::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 20px solid transparent;
      border-image: linear-gradient(145deg, rgba(255, 255, 255, 0.08) 0%, transparent 40%, rgba(0, 0, 0, 0.35) 100%) 1;
      opacity: 0.85;
    }

    .art-surface {
      position: relative;
      width: 100%;
      height: auto;
      overflow: hidden;
      z-index: 1;
      line-height: 0;
      font-size: 0;
    }

    .ocean-art-canvas {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: top;
      background-color: #f7f4eb;
      background-image:
        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 4px),
        var(--canvas-fabric-url);
      background-blend-mode: multiply;
      background-size: auto, auto, cover;
      box-shadow:
        inset 5px 5px 15px rgba(0, 0, 0, 0.38),
        inset -3px -3px 10px rgba(255, 255, 255, 0.55);
    }

    .paper-texture-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background-image: var(--canvas-fabric-url);
      background-size: cover;
      mix-blend-mode: multiply;
      opacity: 0.35;
    }

    .art-date-caption {
      margin-top: 1rem;
      padding: 0 0.35rem;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Georgia", "Times New Roman", serif;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-indent: 0.18em;
      color: rgba(110, 120, 145, 0.72);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="ocean-shell">
    <div class="ocean-top">
      <nav class="site-nav" aria-label="ナビゲーション">
        <a class="site-nav-link" href="index.html">キャンバス</a>
        <a class="site-nav-link" href="midspace.html">言葉の浮遊層</a>
        <a class="site-nav-link" href="gallery.html">感情の回廊</a>
        <a class="site-nav-link" href="mycolors.html">今日の私の色</a>
        <a class="site-nav-link is-current" href="ocean.html" aria-current="page">感情の夜海</a>
      </nav>
    </div>

    <main class="ocean-timeline" id="oceanTimeline" aria-label="感情の夜海">
      <div class="ocean-stream" id="oceanStream"></div>
    </main>
  </div>

  <script>
    (function () {
      'use strict';

      const SPLAT_IMAGE = 'splat.png';
      const CANVAS_BG = '#f7f4eb';
      const DEFAULT_CANVAS_W = 400;
      const DEFAULT_CANVAS_H = 300;

      const splatImg = new Image();
      const stampCache = {};
      let splatReady = false;

      const EMOTION_PALETTES = [
        ['#c8b8e8', '#9a8ec4'],
        ['#8ec4e8', '#5a9ec8'],
        ['#e8a8b0', '#c86070'],
        ['#a8b0b8', '#707880'],
        ['#d4c0f0', '#9888c8'],
        ['#70a8d8', '#4080b0'],
        ['#f0c8a0', '#d89060'],
        ['#b0d8c8', '#78a898'],
        ['#e0a0c8', '#b06898'],
        ['#a0c8e8', '#6898c0'],
        ['#d8b8a0', '#a88868'],
        ['#c0a8d8', '#9078b0'],
        ['#88b8d0', '#5088a8'],
        ['#e8c0c8', '#c08898'],
        ['#b8c8d8', '#788898'],
        ['#d0b0e8', '#a080c0'],
        ['#98c8e0', '#68a0c8'],
        ['#e8b0a8', '#c07870'],
        ['#a8d0c0', '#70a890'],
        ['#c8a8e0', '#9878b8'],
        ['#80b0d8', '#5088a8'],
        ['#e0c8b8', '#b09888'],
        ['#b0a8e8', '#8078c0'],
        ['#90c0e0', '#6098b8'],
        ['#d8a8c0', '#b07090'],
        ['#a0b8c8', '#688898'],
        ['#e8d0a8', '#c8a878'],
        ['#c0d8e8', '#90b0c8']
      ];

      function randBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function formatDotDate(d) {
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        return `${y}.${mo}.${da}`;
      }

      function generateSplats(primary, secondary, count) {
        const splats = [];
        const n = count || (Math.random() > 0.55 ? 2 : 1);
        const colors = n === 1 ? [primary] : [primary, secondary];

        for (let i = 0; i < n; i++) {
          splats.push({
            nx: randBetween(0.22, 0.78),
            ny: randBetween(0.2, 0.72),
            color: colors[i % colors.length],
            baseSize: randBetween(190, 280),
            rotation: randBetween(-0.4, 0.4),
            scaleFactor: randBetween(0.85, 1.15),
            opacity: randBetween(0.72, 0.92)
          });
        }

        if (n === 2 && Math.random() > 0.4) {
          splats.push({
            nx: randBetween(0.35, 0.65),
            ny: randBetween(0.38, 0.62),
            color: colors[0],
            baseSize: randBetween(120, 180),
            rotation: randBetween(-0.6, 0.6),
            scaleFactor: randBetween(0.6, 0.85),
            opacity: randBetween(0.45, 0.62)
          });
        }

        return splats;
      }

      function generateOceanEntries(count) {
        const entries = [];
        const now = Date.now();
        const dayMs = 86400000;

        for (let i = 0; i < count; i++) {
          const palette = EMOTION_PALETTES[i % EMOTION_PALETTES.length];
          const daysAgo = Math.floor(i * randBetween(0.6, 2.4) + i * 0.3);
          const date = new Date(now - daysAgo * dayMs - randBetween(0, dayMs * 0.8));

          entries.push({
            id: `ocean-${i}`,
            date: formatDotDate(date),
            timestamp: date.getTime(),
            splats: generateSplats(palette[0], palette[1]),
            canvasW: DEFAULT_CANVAS_W,
            canvasH: DEFAULT_CANVAS_H
          });
        }

        return entries.sort((a, b) => b.timestamp - a.timestamp);
      }

      function loadSplatImage() {
        return new Promise((resolve, reject) => {
          splatImg.onload = () => {
            if (splatImg.naturalWidth > 0) {
              splatReady = true;
              resolve();
            } else {
              reject(new Error('splat.png invalid'));
            }
          };
          splatImg.onerror = () => reject(new Error('splat.png load failed'));
          splatImg.src = SPLAT_IMAGE;
          if (splatImg.complete && splatImg.naturalWidth > 0) {
            splatReady = true;
            resolve();
          }
        });
      }

      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth) return null;
        if (stampCache[color]) return stampCache[color];

        const w = splatImg.naturalWidth;
        const h = splatImg.naturalHeight;
        const work = document.createElement('canvas');
        work.width = w;
        work.height = h;
        const wctx = work.getContext('2d');

        wctx.fillStyle = color;
        wctx.fillRect(0, 0, w, h);
        wctx.globalCompositeOperation = 'screen';
        wctx.drawImage(splatImg, 0, 0);
        wctx.globalCompositeOperation = 'source-over';

        stampCache[color] = work;
        return work;
      }

      function migrateSplash(s) {
        let baseSize = s.baseSize || 220;
        if (baseSize < 150) baseSize *= 2.5;
        return {
          nx: s.nx,
          ny: s.ny,
          color: s.color,
          baseSize,
          rotation: s.rotation ?? 0,
          scaleFactor: s.scaleFactor ?? 1,
          opacity: s.opacity ?? 0.75
        };
      }

      function drawSplatter(c, splash, w, h) {
        const stamp = createColorStamp(splash.color);
        if (!stamp) return;

        const cx = splash.nx * w;
        const cy = splash.ny * h;
        const size = splash.baseSize * (splash.scaleFactor || 1);

        c.save();
        c.translate(cx, cy);
        c.rotate(splash.rotation || 0);
        c.globalAlpha = splash.opacity ?? 1;
        c.globalCompositeOperation = 'multiply';
        c.drawImage(stamp, -size / 2, -size / 2, size, size);
        c.restore();
        c.globalCompositeOperation = 'source-over';
      }

      function renderRecipeToCanvas(canvasEl, splats, srcW, srcH) {
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        canvasEl.width = Math.round(srcW * dpr);
        canvasEl.height = Math.round(srcH * dpr);
        canvasEl.style.width = '100%';
        canvasEl.style.height = 'auto';

        const c = canvasEl.getContext('2d');
        c.setTransform(dpr, 0, 0, dpr, 0, 0);
        c.fillStyle = CANVAS_BG;
        c.fillRect(0, 0, srcW, srcH);

        if (!Array.isArray(splats)) return;

        splats.map(migrateSplash).forEach((splash) => {
          drawSplatter(c, splash, srcW, srcH);
        });
      }

      function createFramedArtwork(entry) {
        const srcW = entry.canvasW || DEFAULT_CANVAS_W;
        const srcH = entry.canvasH || DEFAULT_CANVAS_H;

        const item = document.createElement('article');
        item.className = 'ocean-item';
        item.setAttribute('aria-hidden', 'true');

        const wallDisplay = document.createElement('div');
        wallDisplay.className = 'museum-wall-display';

        const sculpted = document.createElement('div');
        sculpted.className = 'museum-frame-sculpted';

        const surface = document.createElement('div');
        surface.className = 'art-surface';
        surface.style.aspectRatio = `${srcW} / ${srcH}`;

        const artCanvas = document.createElement('canvas');
        artCanvas.className = 'ocean-art-canvas';
        renderRecipeToCanvas(artCanvas, entry.splats, srcW, srcH);

        const texture = document.createElement('div');
        texture.className = 'paper-texture-overlay';
        texture.setAttribute('aria-hidden', 'true');

        surface.appendChild(artCanvas);
        surface.appendChild(texture);
        sculpted.appendChild(surface);
        wallDisplay.appendChild(sculpted);

        const caption = document.createElement('p');
        caption.className = 'art-date-caption';
        caption.textContent = entry.date;
        wallDisplay.appendChild(caption);

        item.appendChild(wallDisplay);
        return item;
      }

      function resolveTimelineData() {
        return generateOceanEntries(26);
      }

      function initScrollReveal() {
        const items = document.querySelectorAll('.ocean-item');
        if (!items.length) return;

        if (!('IntersectionObserver' in window)) {
          items.forEach((el) => el.classList.add('is-visible'));
          return;
        }

        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add('is-visible');
                observer.unobserve(entry.target);
              }
            });
          },
          { root: document.getElementById('oceanTimeline'), threshold: 0.18, rootMargin: '0px 0px -8% 0px' }
        );

        items.forEach((el) => observer.observe(el));
      }

      async function init() {
        const stream = document.getElementById('oceanStream');
        if (!stream) return;

        try {
          await loadSplatImage();
        } catch {
          /* canvas stays blank if splat fails */
        }

        const data = resolveTimelineData();
        data.forEach((entry) => {
          stream.appendChild(createFramedArtwork(entry));
        });

        requestAnimationFrame(initScrollReveal);
      }

      init();
    })();
  </script>
</body>
</html>
