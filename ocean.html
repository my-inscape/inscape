<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050508">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="INSCAPE">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>感情の夜海 — INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ocean-deep: #050508;
      --slide-width: min(88vw, 380px);
      --slide-gap: 2.5rem;
      --canvas-fabric-url: url('canvas-fabric.png');
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      background: var(--ocean-deep);
      color: #e8e6e2;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      background:
        radial-gradient(ellipse 120% 45% at 50% -12%, rgba(38, 52, 88, 0.22) 0%, transparent 52%),
        radial-gradient(ellipse 80% 35% at 12% 88%, rgba(28, 18, 48, 0.18) 0%, transparent 48%),
        radial-gradient(ellipse 70% 30% at 88% 72%, rgba(12, 32, 58, 0.14) 0%, transparent 45%),
        var(--ocean-deep);
    }

    .ocean-shell {
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .ocean-top {
      flex-shrink: 0;
      z-index: 20;
      padding:
        calc(0.85rem + env(safe-area-inset-top))
        calc(0.65rem + env(safe-area-inset-right))
        0.55rem
        calc(0.65rem + env(safe-area-inset-left));
      background: linear-gradient(
        180deg,
        rgba(5, 5, 8, 0.96) 0%,
        rgba(5, 5, 8, 0.88) 72%,
        rgba(5, 5, 8, 0) 100%
      );
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .site-nav {
      display: flex;
      align-items: stretch;
      justify-content: flex-start;
      gap: 0.14rem;
      overflow-x: auto;
      overflow-y: hidden;
      flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .site-nav::-webkit-scrollbar {
      display: none;
      height: 0;
    }

    .site-nav-link {
      flex: 0 0 auto;
      min-width: max-content;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.3rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-indent: 0.03em;
      color: rgba(232, 230, 226, 0.38);
      text-decoration: none;
      padding: 0.38rem 0.24rem;
      border: 0.5px solid rgba(255, 255, 255, 0.07);
      border-radius: 2px;
      background: rgba(10, 11, 16, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 0.35s ease, border-color 0.35s ease, background 0.35s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .site-nav-link:hover {
      color: rgba(232, 230, 226, 0.72);
      border-color: rgba(120, 140, 180, 0.28);
      background: rgba(14, 16, 24, 0.9);
    }

    .site-nav-link.is-current {
      color: rgba(140, 168, 210, 0.58);
      border-color: rgba(100, 130, 180, 0.2);
      background: rgba(40, 56, 88, 0.12);
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .site-nav-link {
        font-size: 0.28rem;
        letter-spacing: 0.02em;
        text-indent: 0.02em;
        padding: 0.34rem 0.18rem;
      }
    }

    .ocean-theater-wrap {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .ocean-theater {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      width: 100%;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scroll-padding-inline: calc((100vw - var(--slide-width)) / 2);
      padding:
        1.5rem
        calc((100vw - var(--slide-width)) / 2)
        2rem;
      gap: var(--slide-gap);
    }

    .ocean-theater::-webkit-scrollbar {
      height: 0;
      display: none;
    }

    .ocean-slide {
      flex: 0 0 var(--slide-width);
      width: var(--slide-width);
      scroll-snap-align: center;
      scroll-snap-stop: always;
      position: relative;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .ocean-slide::before {
      content: '';
      position: absolute;
      top: -6%;
      left: 50%;
      transform: translateX(-50%);
      width: 220%;
      height: 115%;
      background:
        radial-gradient(
          ellipse 36% 46% at 50% 0%,
          rgba(180, 200, 240, 0.13) 0%,
          rgba(120, 150, 200, 0.05) 30%,
          transparent 66%
        );
      pointer-events: none;
      z-index: 0;
    }

    .ocean-slide-inner {
      position: relative;
      z-index: 1;
    }

    .ocean-ripple-layer {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
      overflow: hidden;
      border-radius: 1px;
    }

    .ocean-ripple {
      position: absolute;
      width: 8px;
      height: 8px;
      margin-left: -4px;
      margin-top: -4px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: radial-gradient(
        circle,
        rgba(255, 255, 255, 0.2) 0%,
        rgba(255, 255, 255, 0.06) 42%,
        transparent 72%
      );
      box-shadow: 0 0 12px rgba(200, 220, 255, 0.08);
      animation: ocean-ripple-expand 2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      pointer-events: none;
    }

    .ocean-ripple.is-soft {
      animation-duration: 2.4s;
      animation-delay: 0.12s;
      border-color: rgba(255, 255, 255, 0.1);
      opacity: 0.7;
    }

    @keyframes ocean-ripple-expand {
      0% {
        transform: scale(0.25);
        opacity: 0.5;
      }
      35% {
        opacity: 0.28;
      }
      100% {
        transform: scale(32);
        opacity: 0;
      }
    }

    .museum-wall-display {
      position: relative;
      display: block;
      width: 100%;
      text-align: center;
      overflow: visible;
      padding: 1.55rem 0.5rem 1.1rem;
      background:
        radial-gradient(circle at 50% 10%, rgba(200, 215, 255, 0.1) 0%, rgba(0, 0, 0, 0) 68%),
        radial-gradient(ellipse 85% 48% at 50% -5%, rgba(160, 180, 220, 0.05) 0%, transparent 52%),
        rgba(4, 5, 10, 0.72);
      border-radius: 1px;
    }

    .museum-wall-display::before {
      content: '';
      position: absolute;
      inset: -8% -12%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 6%, rgba(180, 200, 240, 0.07) 0%, rgba(0, 0, 0, 0) 62%);
      opacity: 0.85;
    }

    .museum-wall-display > * {
      position: relative;
      z-index: 1;
    }

    .museum-frame-sculpted {
      position: relative;
      box-sizing: border-box;
      width: 100%;
      margin: 0 auto;
      padding: 28px;
      background: #fbf9f5;
      border: 20px solid #1c110a;
      border-top-color: #f3e5ab;
      border-left-color: #d4af37;
      border-right-color: #8a640f;
      border-bottom-color: #5c430a;
      outline: 3px solid #aa7c11;
      outline-offset: -20px;
      box-shadow:
        inset 0 5px 0 rgba(255, 255, 255, 0.18),
        inset 0 -3px 10px rgba(0, 0, 0, 0.6),
        0 4px 14px rgba(0, 0, 0, 0.5),
        0 18px 36px rgba(0, 0, 0, 0.75),
        0 32px 64px rgba(0, 0, 0, 0.45);
    }

    .museum-frame-sculpted::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 20px solid transparent;
      border-image: linear-gradient(145deg, rgba(255, 255, 255, 0.08) 0%, transparent 40%, rgba(0, 0, 0, 0.35) 100%) 1;
      opacity: 0.85;
    }

    .art-surface {
      position: relative;
      width: 100%;
      overflow: hidden;
      line-height: 0;
      font-size: 0;
    }

    .ocean-art-canvas {
      display: block;
      width: 100%;
      height: auto;
      background-color: #f7f4eb;
      background-image:
        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 4px),
        var(--canvas-fabric-url);
      background-blend-mode: multiply;
      background-size: auto, auto, cover;
      box-shadow:
        inset 5px 5px 15px rgba(0, 0, 0, 0.38),
        inset -3px -3px 10px rgba(255, 255, 255, 0.55);
    }

    .paper-texture-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background-image: var(--canvas-fabric-url);
      background-size: cover;
      mix-blend-mode: multiply;
      opacity: 0.35;
    }

    .art-date-caption {
      margin-top: 0.95rem;
      padding: 0 0.35rem;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Georgia", "Times New Roman", serif;
      font-size: 0.76rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-indent: 0.18em;
      color: rgba(110, 120, 145, 0.72);
      line-height: 1.6;
    }

    .ocean-theater.is-empty {
      justify-content: center;
    }

    .ocean-empty-glow {
      flex: 0 0 auto;
      width: 6rem;
      height: 6rem;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(100, 130, 180, 0.08) 0%, transparent 70%);
      animation: ocean-empty-pulse 4s ease-in-out infinite;
    }

    @keyframes ocean-empty-pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.92); }
      50% { opacity: 0.7; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="ocean-shell">
    <div class="ocean-top">
      <nav class="site-nav" aria-label="ナビゲーション">
        <a class="site-nav-link" href="index.html">キャンバス</a>
        <a class="site-nav-link" href="midspace.html">言葉の浮遊層</a>
        <a class="site-nav-link" href="gallery.html">感情の回廊</a>
        <a class="site-nav-link" href="mycolors.html">今日の私の色</a>
        <a class="site-nav-link is-current" href="ocean.html" aria-current="page">感情の夜海</a>
        <a class="site-nav-link" href="room.html">合言葉の部屋</a>
        <a class="site-nav-link" href="case.html">プロダクトプレビュー</a>
      </nav>
    </div>

    <div class="ocean-theater-wrap">
      <main
        class="ocean-theater"
        id="oceanTheater"
        aria-label="感情の夜海 — 横スクロールタイムライン"
      ></main>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      /* ── Global color timeline constants ── */
      const OCEAN_TTL_MS = 24 * 60 * 60 * 1000;
      const SPLAT_IMAGE = 'splat.png';
      const CANVAS_BG = '#f7f4eb';
      const DEFAULT_CANVAS_W = 400;
      const DEFAULT_CANVAS_H = 300;

      const splatImg = new Image();
      const stampCache = {};
      let splatReady = false;

      /**
       * Server-shared schema (Firebase / Supabase ready):
       * {
       *   id: string,
       *   colorData: {
       *     color: string,           // e.g. "rgba(142, 68, 173, 0.88)" — today's single emotion
       *     canvasW?: number,
       *     canvasH?: number
       *   },
       *   createdAt: number          // Unix ms
       * }
       */

      /** Today's single-emotion palette — one color per anonymous post */
      const TODAYS_EMOTION_COLORS = [
        'rgba(142, 68, 173, 0.88)',
        'rgba(231, 76, 60, 0.9)',
        'rgba(52, 152, 219, 0.85)',
        'rgba(46, 204, 113, 0.82)',
        'rgba(241, 196, 15, 0.78)',
        'rgba(155, 89, 182, 0.86)',
        'rgba(230, 126, 34, 0.88)',
        'rgba(26, 188, 156, 0.84)',
        'rgba(192, 57, 43, 0.9)',
        'rgba(41, 128, 185, 0.87)',
        'rgba(127, 140, 141, 0.75)',
        'rgba(211, 84, 0, 0.86)',
        'rgba(142, 68, 173, 0.72)',
        'rgba(236, 112, 99, 0.88)',
        'rgba(93, 173, 226, 0.83)',
        'rgba(88, 214, 141, 0.8)',
        'rgba(165, 105, 189, 0.85)',
        'rgba(52, 73, 94, 0.78)',
        'rgba(245, 183, 177, 0.82)',
        'rgba(174, 214, 241, 0.86)',
        'rgba(169, 50, 38, 0.9)',
        'rgba(108, 52, 131, 0.87)',
        'rgba(39, 174, 96, 0.84)',
        'rgba(243, 156, 18, 0.8)',
        'rgba(149, 165, 166, 0.72)'
      ];

      function randBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function parseAlphaFromColor(color) {
        if (typeof color !== 'string') return null;
        const rgba = color.match(/rgba?\(\s*[\d.]+\s*,\s*[\d.]+\s*,\s*[\d.]+\s*,\s*([\d.]+)\s*\)/i);
        if (rgba) return Math.min(1, Math.max(0, parseFloat(rgba[1])));
        return null;
      }

      function hashToUnit(str, salt) {
        let h = 0;
        const s = `${str}|${salt}`;
        for (let i = 0; i < s.length; i++) {
          h = ((h << 5) - h + s.charCodeAt(i)) | 0;
        }
        return (Math.abs(h) % 10000) / 10000;
      }

      /** One centered burst — like a single color ball hit on today's canvas */
      function buildTodaySingleSplat(color, seed) {
        const s = seed || {};
        const alpha = parseAlphaFromColor(color);
        const idKey = s.id || color;

        return {
          nx: s.nx ?? 0.5,
          ny: s.ny ?? 0.5,
          color,
          baseSize: s.baseSize ?? (250 + hashToUnit(idKey, 'size') * 58),
          rotation: s.rotation ?? (hashToUnit(idKey, 'rot') - 0.5) * 0.22,
          scaleFactor: s.scaleFactor ?? (0.96 + hashToUnit(idKey, 'scale') * 0.1),
          opacity: s.opacity ?? (alpha != null ? alpha : 0.88)
        };
      }

      function createTodayColorData(color, id) {
        const splat = buildTodaySingleSplat(color, { id });
        return {
          color,
          splats: [splat],
          canvasW: DEFAULT_CANVAS_W,
          canvasH: DEFAULT_CANVAS_H
        };
      }

      /** Mock: 25 entries within 24h + 2 expired (filtered on load) */
      function buildMockGlobalColors() {
        const now = Date.now();
        const hourMs = 60 * 60 * 1000;
        const entries = [];

        for (let i = 0; i < 25; i++) {
          const color = TODAYS_EMOTION_COLORS[i % TODAYS_EMOTION_COLORS.length];
          const hoursAgo = randBetween(0.15, 23.8);
          entries.push({
            id: `ocean-mock-${String(i + 1).padStart(3, '0')}`,
            colorData: createTodayColorData(color, `ocean-mock-${String(i + 1).padStart(3, '0')}`),
            createdAt: Math.round(now - hoursAgo * hourMs)
          });
        }

        entries.push({
          id: 'ocean-mock-expired-01',
          colorData: createTodayColorData('rgba(120, 120, 120, 0.6)', 'ocean-mock-expired-01'),
          createdAt: now - OCEAN_TTL_MS - hourMs * 2
        });

        entries.push({
          id: 'ocean-mock-expired-02',
          colorData: createTodayColorData('rgba(90, 90, 90, 0.55)', 'ocean-mock-expired-02'),
          createdAt: now - OCEAN_TTL_MS - hourMs * 10
        });

        return entries;
      }

      const MOCK_OCEAN_COLORS = buildMockGlobalColors();

      function purgeExpiredColors(entries, now = Date.now()) {
        if (!Array.isArray(entries)) return [];
        return entries.filter((entry) => {
          const createdAt = Number(entry && entry.createdAt);
          return Number.isFinite(createdAt) && now - createdAt < OCEAN_TTL_MS;
        });
      }

      function sortColorsNewestFirst(entries) {
        return [...entries].sort((a, b) => Number(b.createdAt) - Number(a.createdAt));
      }

      function parseColorData(raw) {
        if (!raw) return null;
        if (typeof raw === 'string') {
          try {
            return JSON.parse(raw);
          } catch {
            return null;
          }
        }
        return typeof raw === 'object' ? raw : null;
      }

      function resolveTodaySingleSplat(colorData, entryId) {
        if (!colorData) return null;

        if (typeof colorData.color === 'string' && colorData.color.trim()) {
          const existing = Array.isArray(colorData.splats) && colorData.splats[0];
          return buildTodaySingleSplat(colorData.color.trim(), {
            id: entryId,
            ...(existing || {})
          });
        }

        if (Array.isArray(colorData.splats) && colorData.splats.length) {
          const first = colorData.splats[0];
          if (first && first.color) {
            return buildTodaySingleSplat(first.color, {
              id: entryId,
              nx: 0.5,
              ny: 0.5,
              baseSize: first.baseSize,
              rotation: first.rotation,
              scaleFactor: first.scaleFactor,
              opacity: first.opacity
            });
          }
        }

        return null;
      }

      function normalizeColorEntry(entry) {
        if (!entry || !entry.id || entry.colorData == null) return null;
        const createdAt = Number(entry.createdAt);
        if (!Number.isFinite(createdAt)) return null;

        const colorData = parseColorData(entry.colorData);
        if (!colorData) return null;

        const singleSplat = resolveTodaySingleSplat(colorData, String(entry.id));
        if (!singleSplat) return null;

        return {
          id: String(entry.id),
          colorData: {
            color: singleSplat.color,
            splats: [singleSplat],
            canvasW: colorData.canvasW || DEFAULT_CANVAS_W,
            canvasH: colorData.canvasH || DEFAULT_CANVAS_H
          },
          createdAt
        };
      }

      function sanitizeColorList(rawList, now = Date.now()) {
        const normalized = (Array.isArray(rawList) ? rawList : [])
          .map(normalizeColorEntry)
          .filter(Boolean);
        return sortColorsNewestFirst(purgeExpiredColors(normalized, now));
      }

      /**
       * Replace the body of this function when connecting Firebase / Supabase.
       * Must return Promise<Array<{ id, colorData, createdAt }>>.
       */
      async function fetchMockGlobalColors() {
        return MOCK_OCEAN_COLORS;
      }

      /**
       * Primary data gateway — swap implementation here for production API.
       */
      async function fetchGlobalColors() {
        const raw = await fetchMockGlobalColors();
        return sanitizeColorList(raw);
      }

      function formatDotDateFromTimestamp(ts) {
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return '';
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        return `${y}.${mo}.${da}`;
      }

      function loadSplatImage() {
        return new Promise((resolve, reject) => {
          splatImg.onload = () => {
            if (splatImg.naturalWidth > 0) {
              splatReady = true;
              resolve();
            } else {
              reject(new Error('splat.png invalid'));
            }
          };
          splatImg.onerror = () => reject(new Error('splat.png load failed'));
          splatImg.src = SPLAT_IMAGE;
          if (splatImg.complete && splatImg.naturalWidth > 0) {
            splatReady = true;
            resolve();
          }
        });
      }

      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth) return null;
        if (stampCache[color]) return stampCache[color];

        const w = splatImg.naturalWidth;
        const h = splatImg.naturalHeight;
        const work = document.createElement('canvas');
        work.width = w;
        work.height = h;
        const wctx = work.getContext('2d');

        wctx.fillStyle = color;
        wctx.fillRect(0, 0, w, h);
        wctx.globalCompositeOperation = 'screen';
        wctx.drawImage(splatImg, 0, 0);
        wctx.globalCompositeOperation = 'source-over';

        stampCache[color] = work;
        return work;
      }

      function migrateSplash(s) {
        let baseSize = s.baseSize || 220;
        if (baseSize < 150) baseSize *= 2.5;
        return {
          nx: s.nx,
          ny: s.ny,
          color: s.color,
          baseSize,
          rotation: s.rotation ?? 0,
          scaleFactor: s.scaleFactor ?? 1,
          opacity: s.opacity ?? 0.75
        };
      }

      function drawSplatter(c, splash, w, h) {
        const stamp = createColorStamp(splash.color);
        if (!stamp) return;

        const cx = splash.nx * w;
        const cy = splash.ny * h;
        const size = splash.baseSize * (splash.scaleFactor || 1);

        c.save();
        c.translate(cx, cy);
        c.rotate(splash.rotation || 0);
        c.globalAlpha = splash.opacity ?? 1;
        c.globalCompositeOperation = 'multiply';
        c.drawImage(stamp, -size / 2, -size / 2, size, size);
        c.restore();
        c.globalCompositeOperation = 'source-over';
      }

      function renderColorDataToCanvas(canvasEl, colorData) {
        const srcW = colorData.canvasW || DEFAULT_CANVAS_W;
        const srcH = colorData.canvasH || DEFAULT_CANVAS_H;
        const dpr = Math.min(2, window.devicePixelRatio || 1);

        canvasEl.width = Math.round(srcW * dpr);
        canvasEl.height = Math.round(srcH * dpr);
        canvasEl.style.width = '100%';
        canvasEl.style.height = 'auto';

        const c = canvasEl.getContext('2d');
        c.setTransform(dpr, 0, 0, dpr, 0, 0);
        c.fillStyle = CANVAS_BG;
        c.fillRect(0, 0, srcW, srcH);

        const singleSplat = colorData.splats && colorData.splats[0];
        if (!singleSplat) return;

        drawSplatter(c, migrateSplash(singleSplat), srcW, srcH);
      }

      function spawnRipple(layer, clientX, clientY, soft) {
        const rect = layer.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        const ripple = document.createElement('span');
        ripple.className = soft ? 'ocean-ripple is-soft' : 'ocean-ripple';
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        layer.appendChild(ripple);

        ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
      }

      function bindRippleInteraction(slideEl, rippleLayer) {
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;

        function handlePointer(clientX, clientY) {
          spawnRipple(rippleLayer, clientX, clientY, false);
          spawnRipple(rippleLayer, clientX, clientY, true);
        }

        slideEl.addEventListener('click', (e) => {
          if (e.pointerType === 'touch') return;
          handlePointer(e.clientX, e.clientY);
        });

        slideEl.addEventListener('touchstart', (e) => {
          if (!e.touches || !e.touches.length) return;
          const t = e.touches[0];
          touchStartX = t.clientX;
          touchStartY = t.clientY;
          touchStartTime = Date.now();
        }, { passive: true });

        slideEl.addEventListener('touchend', (e) => {
          if (!e.changedTouches || !e.changedTouches.length) return;
          const t = e.changedTouches[0];
          const dx = Math.abs(t.clientX - touchStartX);
          const dy = Math.abs(t.clientY - touchStartY);
          const dt = Date.now() - touchStartTime;
          if (dx < 14 && dy < 14 && dt < 420) {
            handlePointer(t.clientX, t.clientY);
          }
        }, { passive: true });
      }

      function createFramedSlide(entry) {
        const { colorData, createdAt } = entry;
        const srcW = colorData.canvasW || DEFAULT_CANVAS_W;
        const srcH = colorData.canvasH || DEFAULT_CANVAS_H;

        const slide = document.createElement('article');
        slide.className = 'ocean-slide';
        slide.dataset.colorId = entry.id;

        const inner = document.createElement('div');
        inner.className = 'ocean-slide-inner';

        const wallDisplay = document.createElement('div');
        wallDisplay.className = 'museum-wall-display';

        const rippleLayer = document.createElement('div');
        rippleLayer.className = 'ocean-ripple-layer';
        rippleLayer.setAttribute('aria-hidden', 'true');

        const sculpted = document.createElement('div');
        sculpted.className = 'museum-frame-sculpted';

        const surface = document.createElement('div');
        surface.className = 'art-surface';
        surface.style.aspectRatio = `${srcW} / ${srcH}`;

        const artCanvas = document.createElement('canvas');
        artCanvas.className = 'ocean-art-canvas';
        renderColorDataToCanvas(artCanvas, colorData);

        const texture = document.createElement('div');
        texture.className = 'paper-texture-overlay';
        texture.setAttribute('aria-hidden', 'true');

        surface.appendChild(artCanvas);
        surface.appendChild(texture);
        sculpted.appendChild(surface);
        wallDisplay.appendChild(sculpted);

        const caption = document.createElement('p');
        caption.className = 'art-date-caption';
        caption.textContent = formatDotDateFromTimestamp(createdAt);
        wallDisplay.appendChild(caption);

        wallDisplay.appendChild(rippleLayer);
        inner.appendChild(wallDisplay);
        slide.appendChild(inner);

        bindRippleInteraction(slide, rippleLayer);
        return slide;
      }

      function renderEmptyTheater(theater) {
        theater.classList.add('is-empty');
        theater.innerHTML = '';
        const glow = document.createElement('div');
        glow.className = 'ocean-empty-glow';
        glow.setAttribute('aria-hidden', 'true');
        theater.appendChild(glow);
      }

      function renderTimeline(entries) {
        const theater = document.getElementById('oceanTheater');
        if (!theater) return;

        theater.classList.remove('is-empty');
        theater.innerHTML = '';

        if (!entries.length) {
          renderEmptyTheater(theater);
          return;
        }

        entries.forEach((entry) => {
          theater.appendChild(createFramedSlide(entry));
        });
      }

      async function refreshOceanTimeline() {
        const colors = await fetchGlobalColors();
        renderTimeline(colors);
      }

      async function initOceanTimeline() {
        const theater = document.getElementById('oceanTheater');
        if (!theater) return;

        try {
          await loadSplatImage();
        } catch {
          /* splat texture optional fallback */
        }

        await refreshOceanTimeline();

        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            refreshOceanTimeline();
          }
        });
      }

      initOceanTimeline();
    })();
  </script>
</body>
