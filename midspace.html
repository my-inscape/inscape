<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>言葉の浮遊層 — INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      background: #030303;
      color: #e8e6e2;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      background:
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #030303;
    }

    .midspace-shell {
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .corridor-top {
      position: relative;
      z-index: 10;
      flex-shrink: 0;
      padding:
        calc(0.85rem + env(safe-area-inset-top))
        calc(0.65rem + env(safe-area-inset-right))
        0.65rem
        calc(0.65rem + env(safe-area-inset-left));
    }

    .site-nav {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 0.22rem;
      margin-bottom: 0.85rem;
    }

    .site-nav-link,
    .back-link {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.36rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      text-indent: 0.05em;
      color: rgba(232, 230, 226, 0.45);
      text-decoration: none;
      padding: 0.42rem 0.22rem;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      background: rgba(18, 19, 22, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .site-nav-link:hover,
    .back-link:hover {
      color: rgba(232, 230, 226, 0.82);
      border-color: rgba(184, 160, 122, 0.35);
      background: rgba(24, 25, 28, 0.88);
    }

    .site-nav-link.is-current {
      color: rgba(201, 169, 98, 0.62);
      border-color: rgba(201, 169, 98, 0.22);
      background: rgba(201, 169, 98, 0.06);
      pointer-events: none;
    }

    .back-link {
      margin-bottom: 0;
    }

    .museum-header {
      text-align: center;
      margin-top: 1.1rem;
    }

    .museum-title {
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.48em;
      text-indent: 0.48em;
      color: rgba(232, 230, 226, 0.42);
      margin-bottom: 0.45rem;
    }

    .museum-subtitle {
      font-size: 0.48rem;
      letter-spacing: 0.32em;
      color: rgba(232, 230, 226, 0.22);
    }

    .midspace-stage {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }

    .vault-orbs-layer {
      position: absolute;
      inset: 0;
      z-index: 5;
      overflow: visible;
      pointer-events: none;
    }

    .vault-orbs-layer::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 38%;
      transform: translate(-50%, -50%);
      width: min(72vw, 18rem);
      height: min(38vh, 14rem);
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(201, 169, 98, 0.04) 0%, transparent 72%);
      pointer-events: none;
      z-index: 0;
    }

    .vault-orbs-layer .vault-orb {
      pointer-events: auto;
      z-index: 5;
    }

    .vault-orb {
      position: absolute;
      border-radius: 50%;
      border: none;
      padding: 0;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.6);
      z-index: 5;
      will-change: transform, opacity;
      animation:
        vaultOrbIn 0.85s cubic-bezier(0.34, 1.2, 0.64, 1) var(--in-delay, 0s) forwards,
        vaultFloat var(--float-dur, 9s) ease-in-out var(--float-delay, 0s) infinite;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.4) 0%, transparent 42%),
        radial-gradient(circle at 72% 78%, rgba(0, 0, 0, 0.35) 0%, transparent 48%),
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--orb-color) 65%, white) 0%, var(--orb-color) 58%, color-mix(in srgb, var(--orb-color) 40%, black) 100%);
      box-shadow:
        inset 0 1px 4px rgba(255, 255, 255, 0.2),
        0 4px 14px rgba(0, 0, 0, 0.35),
        0 0 12px color-mix(in srgb, var(--orb-color) 22%, transparent);
      transition: transform 0.35s ease, box-shadow 0.35s ease, opacity 0.35s ease;
    }

    .vault-orb:hover,
    .vault-orb:focus-visible {
      z-index: 6;
      opacity: 0.58 !important;
      filter: brightness(1.12);
      box-shadow:
        inset 0 1px 6px rgba(255, 255, 255, 0.28),
        0 0 24px color-mix(in srgb, var(--orb-color) 40%, transparent);
      outline: none;
    }

    @keyframes vaultOrbIn {
      to { opacity: var(--orb-opacity, 0.4); transform: scale(1); }
    }

    @keyframes vaultFloat {
      0%   { translate: var(--fx0, 0px) var(--fy0, 0px); }
      18%  { translate: var(--fx1, 3px) var(--fy1, -6px); }
      38%  { translate: var(--fx2, -5px) var(--fy2, 3px); }
      55%  { translate: var(--fx3, 4px) var(--fy3, 5px); }
      72%  { translate: var(--fx4, -3px) var(--fy4, -4px); }
      88%  { translate: var(--fx5, 4px) var(--fy5, 2px); }
      100% { translate: var(--fx0, 0px) var(--fy0, 0px); }
    }

    .vault-tagline {
      position: absolute;
      bottom: calc(1.1rem + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: min(92vw, 22rem);
      text-align: center;
      font-size: 0.56rem;
      font-weight: 300;
      line-height: 2;
      letter-spacing: 0.12em;
      color: rgba(201, 169, 98, 0.38);
      pointer-events: none;
    }

    .no-data {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      color: rgba(232, 230, 226, 0.28);
      line-height: 2.2;
      letter-spacing: 0.1em;
      font-size: 0.68rem;
      font-weight: 300;
      pointer-events: none;
    }

    .no-data.hidden {
      display: none;
    }

    .memory-popover {
      position: fixed;
      z-index: 10020;
      max-width: min(88vw, 18rem);
      padding: 1rem 1.1rem;
      background: rgba(14, 13, 16, 0.94);
      border: 0.5px solid rgba(201, 169, 98, 0.22);
      border-radius: 2px;
      box-shadow:
        0 16px 48px rgba(0, 0, 0, 0.75),
        0 0 32px rgba(201, 169, 98, 0.08);
      opacity: 0;
      visibility: hidden;
      transform: translate(-50%, -50%) scale(0.92);
      transition: opacity 0.35s ease, visibility 0.35s ease, transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
      pointer-events: none;
    }

    .memory-popover.visible {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    .memory-popover-date {
      font-size: 0.52rem;
      letter-spacing: 0.22em;
      color: rgba(201, 169, 98, 0.65);
      margin-bottom: 0.75rem;
    }

    .memory-popover-text {
      font-size: 0.78rem;
      font-weight: 300;
      line-height: 1.85;
      letter-spacing: 0.06em;
      color: rgba(232, 230, 226, 0.78);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 40vh;
      overflow-y: auto;
    }

    .memory-popover-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-bottom: 0.65rem;
      box-shadow: 0 0 12px color-mix(in srgb, var(--pop-color) 60%, transparent);
      background: var(--pop-color);
    }

    .memory-popover-close {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 0.55rem 0.5rem;
      border: 0.5px solid rgba(201, 169, 98, 0.22);
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(232, 230, 226, 0.55);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.52rem;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-indent: 0.32em;
      cursor: pointer;
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }

    .memory-popover-close:hover {
      color: rgba(232, 230, 226, 0.85);
      border-color: rgba(201, 169, 98, 0.4);
      background: rgba(201, 169, 98, 0.08);
    }
  </style>
</head>
<body>
  <div class="midspace-shell">
    <div class="corridor-top">
      <nav class="site-nav" aria-label="ナビゲーション">
        <a class="site-nav-link" href="index.html">キャンバス</a>
        <a class="site-nav-link" href="gallery.html">感情の回廊</a>
        <a class="site-nav-link is-current" href="midspace.html" aria-current="page">言葉の浮遊層</a>
        <a class="site-nav-link" href="mycolors.html">今日の私の色</a>
      </nav>

      <header class="museum-header">
        <h1 class="museum-title">言葉の浮遊層</h1>
        <p class="museum-subtitle">MIDSPACE — WORDS ADRIFT</p>
      </header>
    </div>

    <main class="midspace-stage" id="midspaceStage">
      <div class="vault-orbs-layer" id="vaultOrbs" aria-hidden="true"></div>
      <p class="no-data hidden" id="noData">まだ記録された感情がありません。<br>キャンバスで言葉を紡いでください。</p>
      <p class="vault-tagline">静かに浮かぶ色を、そっと触れてみてください。</p>
    </main>
  </div>

  <div class="memory-popover" id="memoryPopover" role="dialog" aria-hidden="true">
    <div class="memory-popover-dot"></div>
    <p class="memory-popover-date"></p>
    <p class="memory-popover-text"></p>
    <button type="button" class="memory-popover-close" id="memoryPopoverClose">閉じる</button>
  </div>

  <script>
    (function () {
      'use strict';

      const INSCAPE_HISTORY_KEY = 'inscape_history';
      const MIDSPACE_MAX_DAYS = 6;
      const ORB_MIN = 15;
      const ORB_MAX = 25;

      const vaultOrbs = document.getElementById('vaultOrbs');
      const midspaceStage = document.getElementById('midspaceStage');
      const noData = document.getElementById('noData');
      const memoryPopover = document.getElementById('memoryPopover');

      function formatHistoryDate(ts, fallback) {
        if (!ts) return fallback || '';
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return fallback || '';
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        const hr = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${y}/${mo}/${da} ${hr}:${mi}`;
      }

      function loadInscapeHistory() {
        try {
          const raw = localStorage.getItem(INSCAPE_HISTORY_KEY);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          return data.map((entry) => ({
            word: entry.word || entry.text || '',
            color: entry.color,
            date: entry.date || formatHistoryDate(entry.timestamp, ''),
            timestamp: entry.timestamp || 0
          })).filter((e) => e.color);
        } catch {
          return [];
        }
      }

      function getMidspaceEntries() {
        const history = loadInscapeHistory();
        return history.slice(-MIDSPACE_MAX_DAYS);
      }

      function randBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function applyOrbFloatVars(orb) {
        const amp = randBetween(3, 9);
        orb.style.setProperty('--float-dur', `${randBetween(6, 11).toFixed(2)}s`);
        orb.style.setProperty('--float-delay', `-${randBetween(1.5, 14).toFixed(2)}s`);
        orb.style.setProperty('--orb-opacity', `${randBetween(0.36, 0.44).toFixed(2)}`);
        orb.style.setProperty('--fx0', '0px');
        orb.style.setProperty('--fy0', '0px');
        for (let k = 1; k <= 5; k++) {
          orb.style.setProperty(`--fx${k}`, `${(Math.random() - 0.5) * amp * 2}px`);
          orb.style.setProperty(`--fy${k}`, `${(Math.random() - 0.5) * amp * 2}px`);
        }
        orb.style.setProperty('--in-delay', `${randBetween(0, 0.45).toFixed(2)}s`);
      }

      function getRandomScatterSlots(count, layerEl) {
        const layerRect = layerEl.getBoundingClientRect();
        const slots = [];
        const edgePad = 12;

        const focalX = layerRect.width * 0.5;
        const focalY = layerRect.height * 0.38;
        const spreadX = layerRect.width * 0.2;
        const spreadY = layerRect.height * 0.13;

        for (let i = 0; i < count; i++) {
          const size = randBetween(ORB_MIN, ORB_MAX);
          const half = size / 2 + edgePad;
          let placed = false;

          for (let attempt = 0; attempt < 90 && !placed; attempt++) {
            let x = focalX + randBetween(-spreadX, spreadX);
            let y = focalY + randBetween(-spreadY, spreadY);
            x = Math.max(half, Math.min(layerRect.width - half, x));
            y = Math.max(half, Math.min(layerRect.height - half, y));

            const crowded = slots.some((s) => {
              return Math.hypot(s.x - x, s.y - y) < (s.size + size) * 0.5 + randBetween(6, 14);
            });
            if (!crowded) {
              slots.push({ x, y, size });
              placed = true;
            }
          }

          if (!placed) {
            let x = focalX + randBetween(-spreadX * 0.7, spreadX * 0.7);
            let y = focalY + randBetween(-spreadY * 0.7, spreadY * 0.7);
            x = Math.max(half, Math.min(layerRect.width - half, x));
            y = Math.max(half, Math.min(layerRect.height - half, y));
            slots.push({ x, y, size });
          }
        }

        return slots.map((s) => ({
          left: `${((s.x / layerRect.width) * 100).toFixed(2)}%`,
          top: `${((s.y / layerRect.height) * 100).toFixed(2)}%`,
          size: s.size
        }));
      }

      function hideMemoryPopover() {
        if (!memoryPopover) return;
        memoryPopover.classList.remove('visible');
        memoryPopover.setAttribute('aria-hidden', 'true');
      }

      function showMemoryPopover(entry, anchorEl) {
        if (!memoryPopover) return;
        hideMemoryPopover();

        const dot = memoryPopover.querySelector('.memory-popover-dot');
        const dateEl = memoryPopover.querySelector('.memory-popover-date');
        const textEl = memoryPopover.querySelector('.memory-popover-text');

        if (dot) dot.style.setProperty('--pop-color', entry.color || '#888');
        if (dateEl) dateEl.textContent = entry.date || '—';
        if (textEl) {
          textEl.textContent = entry.word && entry.word.trim()
            ? entry.word
            : '言葉の記録はありません。';
        }

        const rect = anchorEl.getBoundingClientRect();
        let left = rect.left + rect.width / 2;
        let top = rect.top - 12;
        const margin = 12;
        const popW = 288;
        if (left - popW / 2 < margin) left = margin + popW / 2;
        if (left + popW / 2 > window.innerWidth - margin) left = window.innerWidth - margin - popW / 2;
        if (top < margin + 80) top = rect.bottom + 16;

        memoryPopover.style.left = `${left}px`;
        memoryPopover.style.top = `${top}px`;
        memoryPopover.setAttribute('aria-hidden', 'false');
        memoryPopover.classList.add('visible');
      }

      function spawnMidspaceOrbs(entries) {
        if (!vaultOrbs) return;
        vaultOrbs.innerHTML = '';

        if (!entries.length) {
          vaultOrbs.setAttribute('aria-hidden', 'true');
          if (noData) noData.classList.remove('hidden');
          return;
        }

        if (noData) noData.classList.add('hidden');
        vaultOrbs.setAttribute('aria-hidden', 'false');

        const scatterSlots = getRandomScatterSlots(entries.length, vaultOrbs);

        entries.forEach((entry, i) => {
          const orb = document.createElement('button');
          orb.type = 'button';
          orb.className = 'vault-orb';
          const slot = scatterSlots[i] || scatterSlots[scatterSlots.length - 1];
          const size = slot.size || randBetween(ORB_MIN, ORB_MAX);

          orb.style.setProperty('--orb-color', entry.color || '#5a6a7a');
          orb.style.width = `${size}px`;
          orb.style.height = `${size}px`;
          orb.style.left = slot.left;
          orb.style.top = slot.top;

          applyOrbFloatVars(orb);
          orb.setAttribute('aria-label', '過去の感情を見る');

          orb.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            showMemoryPopover(entry, orb);
          });

          vaultOrbs.appendChild(orb);
        });
      }

      function layoutMidspaceOrbs() {
        spawnMidspaceOrbs(getMidspaceEntries());
      }

      function bindEvents() {
        const memoryPopoverClose = document.getElementById('memoryPopoverClose');

        if (memoryPopoverClose) {
          memoryPopoverClose.addEventListener('click', (e) => {
            e.stopPropagation();
            hideMemoryPopover();
          });
        }

        if (memoryPopover) {
          memoryPopover.addEventListener('click', (e) => e.stopPropagation());
        }

        document.addEventListener('click', (e) => {
          if (memoryPopover && memoryPopover.classList.contains('visible') &&
              !memoryPopover.contains(e.target) &&
              !e.target.closest('.vault-orb')) {
            hideMemoryPopover();
          }
        });

        document.addEventListener('keydown', (e) => {
          if (e.key !== 'Escape') return;
          if (memoryPopover && memoryPopover.classList.contains('visible')) {
            hideMemoryPopover();
          }
        });

        window.addEventListener('resize', () => {
          layoutMidspaceOrbs();
        });
      }

      bindEvents();
      layoutMidspaceOrbs();
    })();
  </script>
</body>
</html>
