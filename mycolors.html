<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="INSCAPE">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>今日の私の色 — INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --canvas-fabric-url: url('canvas-fabric.png');
    }

    html, body {
      height: 100%;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      background: #0a0a0a;
      color: #e8e6e2;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.012) 0px,
          rgba(255, 255, 255, 0.012) 1px,
          transparent 1px,
          transparent 5px
        ),
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #0a0a0a;
    }

    .mycolors-shell {
      min-height: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #0a0a0a;
    }

    .page-header {
      flex-shrink: 0;
      padding:
        calc(0.85rem + env(safe-area-inset-top))
        calc(0.65rem + env(safe-area-inset-right))
        1.25rem
        calc(0.65rem + env(safe-area-inset-left));
    }

    .site-nav {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 0.22rem;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
    }

    .site-nav-link {
      flex: 1 1 0;
      min-width: 3.4rem;
      max-width: 5.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.3rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-indent: 0.03em;
      color: rgba(232, 230, 226, 0.42);
      text-decoration: none;
      padding: 0.38rem 0.24rem;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.02);
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .site-nav-link:hover {
      color: rgba(232, 230, 226, 0.78);
      border-color: rgba(184, 160, 122, 0.28);
      background: rgba(255, 255, 255, 0.04);
    }

    .site-nav-link.is-current {
      color: rgba(201, 169, 98, 0.62);
      border-color: rgba(201, 169, 98, 0.22);
      background: rgba(201, 169, 98, 0.06);
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .site-nav {
        gap: 0.12rem;
      }

      .site-nav-link {
        font-size: 0.28rem;
        letter-spacing: 0.02em;
        text-indent: 0.02em;
        padding: 0.34rem 0.18rem;
      }
    }

    .page-title {
      text-align: center;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-indent: 0.28em;
      color: rgba(232, 230, 226, 0.38);
      margin-bottom: 0.35rem;
    }

    .page-subtitle {
      text-align: center;
      font-family: "Times New Roman", Georgia, serif;
      font-size: 0.48rem;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-indent: 0.32em;
      color: rgba(160, 160, 160, 0.32);
    }

    .catalog-scroll {
      flex: 1 1 auto;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
    }

    .colors-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      padding: 0.75rem 1.25rem 1.5rem;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }

    .color-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      color: inherit;
      flex: 0 0 auto;
      width: 4.25rem;
    }

    .color-cell.is-active .color-swatch {
      transform: scale(1.06);
      box-shadow:
        inset 0 2px 6px rgba(255, 255, 255, 0.22),
        inset 0 -4px 12px rgba(0, 0, 0, 0.28),
        0 16px 40px rgba(0, 0, 0, 0.55),
        0 0 28px color-mix(in srgb, var(--swatch-color) 22%, transparent);
    }

    .color-swatch {
      width: 4.25rem;
      height: 4.25rem;
      border-radius: 50%;
      background-color: var(--swatch-color, #5a6a7a);
      background-image:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.42) 0%, transparent 42%),
        radial-gradient(circle at 72% 78%, rgba(0, 0, 0, 0.38) 0%, transparent 48%),
        radial-gradient(circle at 50% 55%, color-mix(in srgb, var(--swatch-color) 88%, white) 0%, var(--swatch-color) 52%, color-mix(in srgb, var(--swatch-color) 55%, black) 100%);
      box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 0.16),
        inset 0 -4px 10px rgba(0, 0, 0, 0.25),
        0 12px 32px rgba(0, 0, 0, 0.48),
        0 0 20px color-mix(in srgb, var(--swatch-color) 14%, transparent);
      transition: transform 0.45s cubic-bezier(0.34, 1.1, 0.64, 1), box-shadow 0.45s ease;
    }

    .color-cell:hover .color-swatch,
    .color-cell:focus-visible .color-swatch {
      transform: scale(1.07);
      box-shadow:
        inset 0 1px 4px rgba(255, 255, 255, 0.18),
        0 14px 36px rgba(0, 0, 0, 0.55),
        0 0 24px color-mix(in srgb, var(--swatch-color) 18%, transparent);
      outline: none;
    }

    .color-date {
      font-family: "Times New Roman", Georgia, "Hiragino Mincho ProN", serif;
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      color: rgba(150, 150, 150, 0.48);
      line-height: 1;
    }

    .emotion-bubble-overlay {
      position: fixed;
      inset: 0;
      z-index: 10030;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(1.25rem + env(safe-area-inset-top))
        calc(1.25rem + env(safe-area-inset-right))
        calc(1.25rem + env(safe-area-inset-bottom))
        calc(1.25rem + env(safe-area-inset-left));
      background: rgba(0, 0, 0, 0.42);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .emotion-bubble-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .emotion-bubble {
      position: relative;
      width: min(88vw, 20rem);
      padding: 2.1rem 1.75rem 1.85rem;
      background: rgba(16, 15, 14, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255, 255, 255, 0.11);
      border-radius: 3px;
      box-shadow:
        0 28px 72px rgba(0, 0, 0, 0.58),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
      transform: translateY(18px) scale(0.96);
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.34, 1.12, 0.64, 1), opacity 0.5s ease;
    }

    .emotion-bubble-overlay.active .emotion-bubble {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .emotion-bubble-close {
      position: absolute;
      top: 0.65rem;
      right: 0.65rem;
      width: 1.75rem;
      height: 1.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(200, 198, 194, 0.55);
      font-family: "Times New Roman", Georgia, serif;
      font-size: 0.95rem;
      line-height: 1;
      cursor: pointer;
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .emotion-bubble-close:hover {
      color: rgba(232, 230, 226, 0.88);
      border-color: rgba(201, 169, 98, 0.28);
      background: rgba(201, 169, 98, 0.08);
    }

    .emotion-bubble-datetime {
      font-family: "Times New Roman", Georgia, serif;
      font-size: 0.5rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: rgba(201, 169, 98, 0.48);
      text-align: center;
      margin-bottom: 1.15rem;
    }

    .emotion-bubble-word {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: 0.74rem;
      font-weight: 300;
      line-height: 2.05;
      letter-spacing: 0.06em;
      color: rgba(232, 230, 226, 0.86);
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
      padding: 0 0.25rem;
    }

    .empty-state {
      display: none;
      text-align: center;
      padding: 4rem 2rem 3rem;
      font-size: 0.68rem;
      font-weight: 300;
      line-height: 2.2;
      letter-spacing: 0.1em;
      color: rgba(232, 230, 226, 0.22);
    }

    .empty-state.visible { display: block; }

    .artwork-modal {
      position: fixed;
      inset: 0;
      z-index: 10040;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(0.85rem + env(safe-area-inset-top))
        calc(0.85rem + env(safe-area-inset-right))
        calc(0.85rem + env(safe-area-inset-bottom))
        calc(0.85rem + env(safe-area-inset-left));
      background:
        radial-gradient(ellipse 70% 55% at 50% 45%, rgba(20, 18, 16, 0.97) 0%, rgba(3, 3, 4, 0.98) 100%);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.45s ease, visibility 0.45s ease;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .artwork-modal.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .artwork-modal-inner {
      width: min(92vw, 22rem);
      text-align: center;
      transform: translateY(18px) scale(0.96);
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.34, 1.15, 0.64, 1), opacity 0.45s ease;
    }

    .artwork-modal.active .artwork-modal-inner {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .museum-wall-display {
      position: relative;
      display: inline-block;
      width: 100%;
      text-align: center;
      overflow: visible;
      padding: 2rem 1rem 1.5rem;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.18) 0%, rgba(0, 0, 0, 0) 70%),
        radial-gradient(ellipse 88% 52% at 50% -6%, rgba(255, 252, 240, 0.09) 0%, transparent 55%),
        #0a0a0a;
      border-radius: 1px;
    }

    .museum-wall-display::before {
      content: '';
      position: absolute;
      inset: -8% -14%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 6%, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0) 62%),
        radial-gradient(ellipse 65% 38% at 50% 0%, rgba(201, 169, 98, 0.05) 0%, transparent 58%);
      opacity: 0.9;
    }

    .museum-wall-display > * {
      position: relative;
      z-index: 1;
    }

    .export-frame-sculpted {
      position: relative;
      box-sizing: border-box;
      width: 100%;
      margin: 0 auto;
      padding: 40px;
      background: #fbf9f5;
      border: 24px solid #1c110a;
      border-top-color: #f3e5ab;
      border-left-color: #d4af37;
      border-right-color: #8a640f;
      border-bottom-color: #5c430a;
      outline: 4px solid #aa7c11;
      outline-offset: -24px;
      box-shadow:
        inset 0 5px 0 rgba(255, 255, 255, 0.2),
        inset 0 -3px 10px rgba(0, 0, 0, 0.65),
        0 4px 14px rgba(0, 0, 0, 0.42),
        0 20px 40px rgba(0, 0, 0, 0.8),
        0 36px 72px rgba(0, 0, 0, 0.52);
    }

    .export-frame-sculpted::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 24px solid transparent;
      border-image: linear-gradient(145deg, rgba(255, 255, 255, 0.08) 0%, transparent 40%, rgba(0, 0, 0, 0.35) 100%) 1;
      opacity: 0.85;
    }

    .export-art-surface {
      position: relative;
      width: 100%;
      overflow: hidden;
      line-height: 0;
      font-size: 0;
      z-index: 1;
      aspect-ratio: 4 / 3;
    }

    .export-art-surface canvas {
      display: block;
      width: 100%;
      height: 100%;
      background-color: #f7f4eb;
      background-image:
        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 4px),
        var(--canvas-fabric-url);
      background-blend-mode: multiply;
      background-size: auto, auto, cover;
      box-shadow:
        inset 5px 5px 15px rgba(0, 0, 0, 0.4),
        inset -3px -3px 10px rgba(255, 255, 255, 0.6);
    }

    .export-art-surface .paper-texture-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background-image: var(--canvas-fabric-url);
      background-size: cover;
      mix-blend-mode: multiply;
      opacity: 0.35;
    }

    .art-period-caption {
      margin-top: 1.1rem;
      padding: 0 0.35rem;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Georgia", "Times New Roman", serif;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-indent: 0.16em;
      color: rgba(136, 136, 136, 0.92);
      line-height: 1.65;
    }

    .modal-art-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
      margin-top: 1.35rem;
    }

    .save-art-btn,
    .modal-close-btn {
      display: inline-block;
      width: 100%;
      max-width: 17rem;
      padding: 0.65rem 1rem;
      border: 0.5px solid rgba(201, 169, 98, 0.28);
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.03);
      color: rgba(232, 230, 226, 0.62);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.52rem;
      font-weight: 400;
      letter-spacing: 0.24em;
      text-indent: 0.24em;
      cursor: pointer;
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .save-art-btn:hover,
    .modal-close-btn:hover {
      color: rgba(232, 230, 226, 0.88);
      border-color: rgba(201, 169, 98, 0.45);
      background: rgba(201, 169, 98, 0.08);
    }

    .save-art-btn:disabled {
      opacity: 0.45;
      cursor: wait;
    }

    .modal-close-btn {
      border-color: rgba(255, 255, 255, 0.1);
      color: rgba(232, 230, 226, 0.42);
      letter-spacing: 0.28em;
      text-indent: 0.28em;
    }

    .privacy-diary-preview {
      margin-top: 1.15rem;
      padding: 0 0.35rem;
      font-size: 0.72rem;
      font-weight: 300;
      line-height: 1.85;
      letter-spacing: 0.06em;
      color: rgba(232, 230, 226, 0.42);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 22vh;
      overflow-y: auto;
    }

    .save-preview-overlay {
      position: fixed;
      inset: 0;
      z-index: 10060;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(0.85rem + env(safe-area-inset-top))
        calc(0.85rem + env(safe-area-inset-right))
        calc(0.85rem + env(safe-area-inset-bottom))
        calc(0.85rem + env(safe-area-inset-left));
      background:
        radial-gradient(ellipse 70% 55% at 50% 45%, rgba(20, 18, 16, 0.97) 0%, rgba(3, 3, 4, 0.98) 100%);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    .save-preview-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .save-preview-panel {
      position: relative;
      width: min(92vw, 400px);
      max-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(18px) scale(0.96);
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.34, 1.15, 0.64, 1), opacity 0.45s ease;
    }

    .save-preview-overlay.active .save-preview-panel {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .save-preview-close {
      align-self: flex-end;
      margin-bottom: 0.85rem;
      font-size: 0.48rem;
      letter-spacing: 0.18em;
      color: rgba(232, 230, 226, 0.32);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.45rem 0.5rem;
    }

    .save-preview-hint {
      width: 100%;
      margin-bottom: 1rem;
      text-align: center;
      font-size: 0.58rem;
      font-weight: 300;
      line-height: 2;
      letter-spacing: 0.12em;
      color: rgba(201, 169, 98, 0.62);
    }

    .save-preview-image-wrap {
      width: 100%;
      aspect-ratio: 9 / 16;
      max-height: min(72vh, calc(92vw * 16 / 9));
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.85);
      background: #0a0a0a;
    }

    .save-preview-image-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      -webkit-touch-callout: default;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <div class="mycolors-shell">
    <header class="page-header">
      <nav class="site-nav" aria-label="ナビゲーション">
        <a class="site-nav-link" href="index.html">キャンバス</a>
        <a class="site-nav-link" href="gallery.html">感情の回廊</a>
        <a class="site-nav-link is-current" href="mycolors.html" aria-current="page">今日の私の色</a>
        <a class="site-nav-link" href="case.html">プロダクトプレビュー</a>
      </nav>
      <h1 class="page-title">今日の私の色</h1>
      <p class="page-subtitle">My Colors</p>
    </header>

    <main class="catalog-scroll">
      <div class="colors-grid" id="colorsGrid" aria-label="感情の色の図録"></div>
      <p class="empty-state" id="emptyState">まだ色の記録がありません。<br>キャンバスで言葉を紡ぐと、ここに静かに蓄えられます。</p>
    </main>
  </div>

  <div class="emotion-bubble-overlay" id="emotionBubbleOverlay" aria-hidden="true" role="dialog" aria-label="紡いだ言葉" aria-modal="true">
    <div class="emotion-bubble" id="emotionBubble" role="document">
      <button type="button" class="emotion-bubble-close" id="emotionBubbleClose" aria-label="閉じる">×</button>
      <p class="emotion-bubble-datetime" id="emotionBubbleDatetime"></p>
      <p class="emotion-bubble-word" id="emotionBubbleWord"></p>
    </div>
  </div>

  <div class="artwork-modal" id="artworkModal" aria-hidden="true" role="dialog" aria-label="その日の絵画">
    <div class="artwork-modal-inner">
      <div class="museum-wall-display" id="modalWallDisplay">
        <div class="export-frame-sculpted">
          <div class="export-art-surface">
            <canvas id="modalArtCanvas" width="400" height="300" aria-hidden="true"></canvas>
            <div class="paper-texture-overlay" aria-hidden="true"></div>
          </div>
        </div>
        <p class="art-period-caption" id="modalCaption"></p>
      </div>
      <p class="privacy-diary-preview privacy-export-hidden" id="modalDiaryText" data-export-hide aria-hidden="true"></p>
      <div class="modal-art-actions">
        <button type="button" class="save-art-btn" id="saveColorBtn">この絵画を保存する</button>
        <button type="button" class="modal-close-btn" id="artworkModalClose">閉じる</button>
      </div>
    </div>
  </div>

  <div class="save-preview-overlay" id="savePreviewOverlay" aria-hidden="true" role="dialog" aria-label="保存プレビュー">
    <div class="save-preview-panel">
      <button type="button" class="save-preview-close" id="savePreviewClose" aria-label="閉じる">CLOSE</button>
      <p class="save-preview-hint">画像を長押しして<br>「写真に追加」を選択して保存してください</p>
      <div class="save-preview-image-wrap">
        <img id="savePreviewImage" alt="INSCAPE — 額装作品" draggable="false">
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      const INSCAPE_HISTORY_KEY = 'inscape_history';
      const HISTORY_KEY = 'histories';
      const SPLASHES_KEY = 'inscape_splashes';
      const ALL_DIARIES_KEY = 'inscape_all_diaries';
      const GALLERY_KEY = 'inscape_gallery';
      const SPLAT_IMAGE = 'splat.png';
      const CANVAS_BG = '#f7f4eb';
      const EXPORT_W = 1080;
      const EXPORT_H = 1920;

      const colorsGrid = document.getElementById('colorsGrid');
      const emptyState = document.getElementById('emptyState');
      const emotionBubbleOverlay = document.getElementById('emotionBubbleOverlay');
      const emotionBubble = document.getElementById('emotionBubble');
      const emotionBubbleClose = document.getElementById('emotionBubbleClose');
      const emotionBubbleDatetime = document.getElementById('emotionBubbleDatetime');
      const emotionBubbleWord = document.getElementById('emotionBubbleWord');
      const artworkModal = document.getElementById('artworkModal');
      const modalWallDisplay = document.getElementById('modalWallDisplay');
      const modalArtCanvas = document.getElementById('modalArtCanvas');
      const modalCaption = document.getElementById('modalCaption');
      const modalDiaryText = document.getElementById('modalDiaryText');
      const saveColorBtn = document.getElementById('saveColorBtn');
      const artworkModalClose = document.getElementById('artworkModalClose');

      const splatImg = new Image();
      const stampCache = {};
      let splatReady = false;
      let savePreviewObjectUrl = null;
      let currentEntry = null;

      function parseEntryDate(entry) {
        if (!entry) return null;
        if (entry.timestamp && Number(entry.timestamp) > 0) {
          const d = new Date(entry.timestamp);
          if (!Number.isNaN(d.getTime())) return d;
        }
        if (entry.date) {
          const dateStr = String(entry.date);
          const matched = dateStr.match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
          if (matched) {
            const d = new Date(Number(matched[1]), Number(matched[2]) - 1, Number(matched[3]));
            if (!Number.isNaN(d.getTime())) return d;
          }
          const parsed = Date.parse(dateStr);
          if (!Number.isNaN(parsed)) return new Date(parsed);
        }
        return null;
      }

      function formatShortDate(entry) {
        const d = parseEntryDate(entry);
        if (!d) return '—';
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        return `${mo}.${da}`;
      }

      function formatFullDate(entry) {
        const d = parseEntryDate(entry);
        if (!d) return entry.date || '—';
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        return `${y}.${mo}.${da}`;
      }

      function normalizeHex(color) {
        if (!color) return null;
        const raw = String(color).trim();
        const matched = raw.match(/#[0-9A-Fa-f]{6}\b/);
        if (matched) return matched[0].toLowerCase();
        if (/^[0-9A-Fa-f]{6}$/.test(raw)) return `#${raw.toLowerCase()}`;
        return null;
      }

      function formatHistoryDate(ts, fallback) {
        if (!ts) return fallback || '';
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return fallback || '';
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        const hr = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${y}/${mo}/${da} ${hr}:${mi}`;
      }

      function mapColorEntry(source) {
        const color = normalizeHex(source && source.color);
        if (!color) return null;
        return {
          word: (source.word || source.text || '').trim(),
          color,
          date: source.date || formatHistoryDate(source.timestamp, ''),
          timestamp: source.timestamp || 0
        };
      }

      function expandHistorySessions(data) {
        const flat = [];
        if (!Array.isArray(data)) return flat;

        data.forEach((item) => {
          if (!item || typeof item !== 'object') return;

          if (Array.isArray(item.points) || Array.isArray(item.history)) {
            if (Array.isArray(item.points) && item.points.length) {
              item.points.forEach((point) => {
                const entry = mapColorEntry({
                  word: point.word,
                  color: point.color,
                  timestamp: point.timestamp,
                  date: point.date
                });
                if (entry) flat.push(entry);
              });
            } else if (Array.isArray(item.history)) {
              item.history.forEach((historyEntry) => {
                const entry = mapColorEntry(historyEntry);
                if (entry) flat.push(entry);
              });
            }
            return;
          }

          const legacy = mapColorEntry(item);
          if (legacy) flat.push(legacy);
        });

        return flat;
      }

      function loadFallbackColors() {
        const keys = [HISTORY_KEY, SPLASHES_KEY];
        for (let i = 0; i < keys.length; i++) {
          try {
            const raw = localStorage.getItem(keys[i]);
            if (!raw) continue;
            const data = JSON.parse(raw);
            if (!Array.isArray(data)) continue;
            const entries = data
              .map((s) => mapColorEntry({
                word: s.word,
                color: s.color,
                timestamp: s.timestamp
              }))
              .filter(Boolean);
            if (entries.length) return entries;
          } catch {
            continue;
          }
        }
        return [];
      }

      function safeParseJson(raw, fallback) {
        try {
          return JSON.parse(raw);
        } catch {
          return fallback;
        }
      }

      function collectEntriesFromRaw(raw) {
        const results = [];
        if (!raw) return results;
        const data = safeParseJson(raw, null);
        if (Array.isArray(data)) {
          data.forEach((item) => {
            try {
              const entry = mapColorEntry(item);
              if (entry) results.push(entry);
            } catch (_) {}
          });
          return results;
        }
        if (data && typeof data === 'object') {
          const entry = mapColorEntry(data);
          if (entry) results.push(entry);
        }
        return results;
      }

      function loadAllDiaries() {
        const merged = [];

        function absorb(entries) {
          if (!Array.isArray(entries)) return;
          entries.forEach((entry) => {
            try {
              const mapped = mapColorEntry(entry);
              if (mapped) merged.push(mapped);
            } catch (_) {}
          });
        }

        try {
          absorb(collectEntriesFromRaw(localStorage.getItem(ALL_DIARIES_KEY)));
        } catch (err) {
          console.warn('inscape_all_diaries の読み込みに失敗:', err);
        }

        try {
          const historyRaw = localStorage.getItem(INSCAPE_HISTORY_KEY);
          if (historyRaw) {
            absorb(expandHistorySessions(safeParseJson(historyRaw, [])));
          }
        } catch (err) {
          console.warn('inscape_history の読み込みに失敗:', err);
        }

        try {
          absorb(collectEntriesFromRaw(localStorage.getItem(SPLASHES_KEY)));
        } catch (err) {
          console.warn('inscape_splashes の読み込みに失敗:', err);
        }

        try {
          absorb(collectEntriesFromRaw(localStorage.getItem(HISTORY_KEY)));
        } catch (err) {
          console.warn('histories の読み込みに失敗:', err);
        }

        try {
          const galleryRaw = localStorage.getItem(GALLERY_KEY);
          if (galleryRaw) {
            const gallery = safeParseJson(galleryRaw, []);
            if (Array.isArray(gallery)) {
              gallery.forEach((item) => {
                if (!item || typeof item !== 'object') return;
                if (Array.isArray(item.points)) absorb(item.points);
                if (Array.isArray(item.history)) absorb(item.history);
                if (Array.isArray(item.splats)) absorb(item.splats);
              });
            }
          }
        } catch (err) {
          console.warn('inscape_gallery の読み込みに失敗:', err);
        }

        const deduped = dedupeColorEntries(merged);

        try {
          if (deduped.length) {
            const existing = safeParseJson(localStorage.getItem(ALL_DIARIES_KEY), []);
            const existingCount = Array.isArray(existing) ? existing.length : 0;
            if (deduped.length > existingCount) {
              localStorage.setItem(ALL_DIARIES_KEY, JSON.stringify(deduped));
            }
          }
        } catch (err) {
          console.warn('カラー日記ログの同期に失敗:', err);
        }

        return deduped;
      }

      function migrateDiariesFromHistory() {
        return loadAllDiaries();
      }

      function loadInscapeHistory() {
        return loadAllDiaries();
      }

      function dedupeColorEntries(entries) {
        const seen = new Set();
        return entries.filter((entry) => {
          const key = `${entry.timestamp || 0}|${entry.color}|${entry.word}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      function getCatalogEntries() {
        try {
          const entries = dedupeColorEntries(loadAllDiaries())
            .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
          return entries.reverse();
        } catch (err) {
          console.warn('カタログデータの取得に失敗:', err);
          return [];
        }
      }

      function entryKey(entry) {
        return `${entry.timestamp || 0}|${entry.color}|${entry.word || ''}`;
      }

      function formatDetailDate(entry) {
        const d = parseEntryDate(entry);
        if (!d) return entry.date || '—';
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        const hr = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${y}.${mo}.${da} ${hr}:${mi}`;
      }

      function highlightColorBall(entry) {
        if (!entry) return;
        const key = entryKey(entry);
        colorsGrid?.querySelectorAll('.color-cell').forEach((cell) => {
          cell.classList.toggle('is-active', cell.dataset.entryKey === key);
        });
      }

      function clearColorBallHighlight() {
        colorsGrid?.querySelectorAll('.color-cell').forEach((cell) => {
          cell.classList.remove('is-active');
        });
      }

      function openEmotionBubble(entry) {
        if (!emotionBubbleOverlay || !entry) return;
        highlightColorBall(entry);

        if (emotionBubbleDatetime) {
          emotionBubbleDatetime.textContent = formatDetailDate(entry);
        }
        if (emotionBubbleWord) {
          emotionBubbleWord.textContent = entry.word || '（言葉の記録なし）';
        }

        emotionBubbleOverlay.classList.add('active');
        emotionBubbleOverlay.setAttribute('aria-hidden', 'false');
      }

      function closeEmotionBubble() {
        if (!emotionBubbleOverlay) return;
        emotionBubbleOverlay.classList.remove('active');
        emotionBubbleOverlay.setAttribute('aria-hidden', 'true');
        clearColorBallHighlight();
      }

      function loadSplatImage() {
        return new Promise((resolve, reject) => {
          splatImg.onload = () => {
            if (splatImg.naturalWidth > 0) {
              splatReady = true;
              resolve();
            } else {
              reject(new Error('splat invalid'));
            }
          };
          splatImg.onerror = () => reject(new Error('splat load failed'));
          splatImg.src = SPLAT_IMAGE;
          if (splatImg.complete && splatImg.naturalWidth > 0) {
            splatReady = true;
            resolve();
          }
        });
      }

      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth) return null;
        if (stampCache[color]) return stampCache[color];

        const w = splatImg.naturalWidth;
        const h = splatImg.naturalHeight;
        const work = document.createElement('canvas');
        work.width = w;
        work.height = h;
        const wctx = work.getContext('2d');

        wctx.fillStyle = color;
        wctx.fillRect(0, 0, w, h);
        wctx.globalCompositeOperation = 'screen';
        wctx.drawImage(splatImg, 0, 0);
        wctx.globalCompositeOperation = 'source-over';

        stampCache[color] = work;
        return work;
      }

      function renderDayArtwork(entry) {
        if (!modalArtCanvas || !entry) return;
        const ctx = modalArtCanvas.getContext('2d');
        const w = modalArtCanvas.width;
        const h = modalArtCanvas.height;

        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
        ctx.fillStyle = CANVAS_BG;
        ctx.fillRect(0, 0, w, h);

        const stamp = createColorStamp(entry.color);
        if (!stamp) return;

        const seed = entry.timestamp || 1;
        const rotation = ((seed % 360) / 360) * Math.PI * 2 * 0.15 - 0.35;
        const size = Math.min(w, h) * 0.62;

        ctx.save();
        ctx.translate(w * 0.5, h * 0.5);
        ctx.rotate(rotation);
        ctx.globalAlpha = 0.9;
        ctx.globalCompositeOperation = 'multiply';
        ctx.drawImage(stamp, -size / 2, -size / 2, size, size);
        ctx.restore();
      }

      function drawSpacedText(ctx, text, centerX, y, spacingPx) {
        const chars = text.split('');
        let totalWidth = 0;
        chars.forEach((ch, i) => {
          totalWidth += ctx.measureText(ch).width;
          if (i < chars.length - 1) totalWidth += spacingPx;
        });
        let x = centerX - totalWidth / 2;
        chars.forEach((ch, i) => {
          ctx.fillText(ch, x, y);
          x += ctx.measureText(ch).width + (i < chars.length - 1 ? spacingPx : 0);
        });
      }

      function drawMuseumSpotlightBackground(ctx, w, h) {
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, w, h);

        const spotlight = ctx.createRadialGradient(
          w * 0.5, h * 0.1, 0,
          w * 0.5, h * 0.1, Math.max(w, h) * 0.82
        );
        spotlight.addColorStop(0, 'rgba(255, 255, 255, 0.18)');
        spotlight.addColorStop(0.32, 'rgba(255, 255, 255, 0.07)');
        spotlight.addColorStop(0.7, 'rgba(0, 0, 0, 0)');
        spotlight.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = spotlight;
        ctx.fillRect(0, 0, w, h);

        const warmGlow = ctx.createRadialGradient(
          w * 0.5, h * 0.02, 0,
          w * 0.5, h * 0.02, w * 0.58
        );
        warmGlow.addColorStop(0, 'rgba(255, 252, 240, 0.1)');
        warmGlow.addColorStop(0.45, 'rgba(255, 252, 240, 0.025)');
        warmGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = warmGlow;
        ctx.fillRect(0, 0, w, h);

        const vignette = ctx.createRadialGradient(
          w * 0.5, h * 0.46, Math.min(w, h) * 0.16,
          w * 0.5, h * 0.46, Math.max(w, h) * 0.96
        );
        vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
        vignette.addColorStop(0.52, 'rgba(0, 0, 0, 0.22)');
        vignette.addColorStop(0.82, 'rgba(5, 5, 5, 0.72)');
        vignette.addColorStop(1, 'rgba(5, 5, 5, 0.96)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, w, h);

        const floorFade = ctx.createLinearGradient(0, h * 0.68, 0, h);
        floorFade.addColorStop(0, 'rgba(0, 0, 0, 0)');
        floorFade.addColorStop(1, 'rgba(0, 0, 0, 0.52)');
        ctx.fillStyle = floorFade;
        ctx.fillRect(0, 0, w, h);
      }

      function htmlCanvasToBlob(canvasEl) {
        return new Promise((resolve, reject) => {
          if (!canvasEl || !canvasEl.width || !canvasEl.height) {
            reject(new Error('canvas invalid'));
            return;
          }
          canvasEl.toBlob((blob) => {
            if (blob) resolve(blob);
            else reject(new Error('toBlob failed'));
          }, 'image/png', 1);
        });
      }

      async function compositeToMuseumExport(artCanvas) {
        const final = document.createElement('canvas');
        final.width = EXPORT_W;
        final.height = EXPORT_H;
        const ctx = final.getContext('2d');

        drawMuseumSpotlightBackground(ctx, EXPORT_W, EXPORT_H);

        const logoReserve = 148;
        const topMargin = 220;
        const sidePad = 96;
        const maxW = EXPORT_W - sidePad * 2;
        const maxH = EXPORT_H - topMargin - logoReserve - 100;

        const scale = Math.min(maxW / artCanvas.width, maxH / artCanvas.height);
        const dw = artCanvas.width * scale;
        const dh = artCanvas.height * scale;
        const dx = (EXPORT_W - dw) / 2;
        const dy = topMargin + (maxH - dh) / 2;

        ctx.drawImage(artCanvas, dx, dy, dw, dh);

        ctx.save();
        const logoSize = 34;
        ctx.font = `300 ${logoSize}px "Times New Roman", Georgia, serif`;
        ctx.fillStyle = 'rgba(190, 190, 190, 0.62)';
        ctx.textBaseline = 'middle';
        drawSpacedText(ctx, 'INSCAPE', EXPORT_W / 2, EXPORT_H - 92, logoSize * 0.44);
        ctx.restore();

        return htmlCanvasToBlob(final);
      }

      function stripPrivacyFromClone(clonedRoot) {
        if (!clonedRoot) return;
        clonedRoot.querySelectorAll(
          '.modal-art-actions, .save-art-btn, .modal-close-btn, ' +
          '.privacy-diary-preview, [data-export-hide], .privacy-export-hidden'
        ).forEach((node) => node.remove());
      }

      async function captureFramedArtworkBlob() {
        if (!modalWallDisplay) throw new Error('frame target missing');
        if (typeof html2canvas !== 'function') throw new Error('html2canvas not loaded');

        const scale = Math.min(2.5, Math.max(1.5, window.devicePixelRatio || 1.5));
        const artCanvas = await html2canvas(modalWallDisplay, {
          scale,
          useCORS: true,
          allowTaint: true,
          backgroundColor: null,
          logging: false,
          onclone: (_doc, clonedEl) => {
            stripPrivacyFromClone(clonedEl);
          }
        });

        return compositeToMuseumExport(artCanvas);
      }

      function closeSavePreview() {
        const overlay = document.getElementById('savePreviewOverlay');
        const img = document.getElementById('savePreviewImage');
        if (overlay) {
          overlay.classList.remove('active');
          overlay.setAttribute('aria-hidden', 'true');
        }
        if (img) img.removeAttribute('src');
        if (savePreviewObjectUrl) {
          URL.revokeObjectURL(savePreviewObjectUrl);
          savePreviewObjectUrl = null;
        }
      }

      function showSavePreview(blob) {
        const overlay = document.getElementById('savePreviewOverlay');
        const img = document.getElementById('savePreviewImage');
        if (!overlay || !img || !blob) return;

        closeSavePreview();
        savePreviewObjectUrl = URL.createObjectURL(blob);
        img.src = savePreviewObjectUrl;
        overlay.classList.add('active');
        overlay.setAttribute('aria-hidden', 'false');
      }

      async function saveColorArtwork(triggerBtn) {
        const prevLabel = triggerBtn ? triggerBtn.textContent : '';
        if (triggerBtn) {
          triggerBtn.disabled = true;
          triggerBtn.textContent = '保存を準備中…';
        }

        try {
          const blob = await captureFramedArtworkBlob();
          showSavePreview(blob);
        } catch (err) {
          console.warn('額装画像の保存に失敗:', err);
        } finally {
          if (triggerBtn) {
            triggerBtn.disabled = false;
            triggerBtn.textContent = prevLabel || 'この絵画を保存する';
          }
        }
      }

      function openArtworkModal(entry) {
        if (!artworkModal || !entry) return;
        currentEntry = entry;
        renderDayArtwork(entry);
        if (modalCaption) modalCaption.textContent = formatFullDate(entry);
        if (modalDiaryText) {
          const hasWord = entry.word && entry.word.trim();
          modalDiaryText.textContent = hasWord ? entry.word : '';
          modalDiaryText.style.display = hasWord ? '' : 'none';
          modalDiaryText.setAttribute('aria-hidden', hasWord ? 'false' : 'true');
        }
        artworkModal.classList.add('active');
        artworkModal.setAttribute('aria-hidden', 'false');
      }

      function closeArtworkModal() {
        if (!artworkModal) return;
        artworkModal.classList.remove('active');
        artworkModal.setAttribute('aria-hidden', 'true');
        currentEntry = null;
      }

      function createColorCell(entry) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'color-cell';
        btn.dataset.entryKey = entryKey(entry);
        btn.setAttribute('aria-label', `${formatFullDate(entry)}の感情の色`);

        const swatch = document.createElement('span');
        swatch.className = 'color-swatch';
        swatch.style.setProperty('--swatch-color', entry.color);
        swatch.style.backgroundColor = entry.color;

        const dateEl = document.createElement('span');
        dateEl.className = 'color-date';
        dateEl.textContent = formatShortDate(entry);

        btn.appendChild(swatch);
        btn.appendChild(dateEl);
        btn.addEventListener('click', () => openEmotionBubble(entry));

        return btn;
      }

      function renderCatalog() {
        if (!colorsGrid) return;

        let entries = [];
        try {
          entries = getCatalogEntries();
        } catch (err) {
          console.error('カタログの描画準備に失敗:', err);
        }

        colorsGrid.innerHTML = '';

        if (!entries.length) {
          if (emptyState) emptyState.classList.add('visible');
          closeEmotionBubble();
          return;
        }

        if (emptyState) emptyState.classList.remove('visible');

        try {
          entries.forEach((entry) => {
            colorsGrid.appendChild(createColorCell(entry));
          });
        } catch (err) {
          console.warn('カラーボールの描画に失敗:', err);
        }
      }

      function bindEvents() {
        if (emotionBubbleClose) {
          emotionBubbleClose.addEventListener('click', (e) => {
            e.stopPropagation();
            closeEmotionBubble();
          });
        }
        if (emotionBubbleOverlay) {
          emotionBubbleOverlay.addEventListener('click', (e) => {
            if (e.target === emotionBubbleOverlay) closeEmotionBubble();
          });
        }
        if (emotionBubble) {
          emotionBubble.addEventListener('click', (e) => e.stopPropagation());
        }

        if (saveColorBtn) {
          saveColorBtn.addEventListener('click', () => saveColorArtwork(saveColorBtn));
        }
        if (artworkModalClose) {
          artworkModalClose.addEventListener('click', closeArtworkModal);
        }
        if (artworkModal) {
          artworkModal.addEventListener('click', (e) => {
            if (e.target === artworkModal) closeArtworkModal();
          });
        }

        const savePreviewClose = document.getElementById('savePreviewClose');
        const savePreviewOverlay = document.getElementById('savePreviewOverlay');
        const savePreviewPanel = savePreviewOverlay && savePreviewOverlay.querySelector('.save-preview-panel');

        if (savePreviewClose) {
          savePreviewClose.addEventListener('click', (e) => {
            e.stopPropagation();
            closeSavePreview();
          });
        }
        if (savePreviewOverlay) {
          savePreviewOverlay.addEventListener('click', (e) => {
            if (e.target === savePreviewOverlay) closeSavePreview();
          });
        }
        if (savePreviewPanel) {
          savePreviewPanel.addEventListener('click', (e) => e.stopPropagation());
        }

        document.addEventListener('keydown', (e) => {
          if (e.key !== 'Escape') return;
          const saveOverlay = document.getElementById('savePreviewOverlay');
          if (saveOverlay && saveOverlay.classList.contains('active')) {
            closeSavePreview();
            return;
          }
          if (emotionBubbleOverlay && emotionBubbleOverlay.classList.contains('active')) {
            closeEmotionBubble();
            return;
          }
          if (artworkModal && artworkModal.classList.contains('active')) {
            closeArtworkModal();
          }
        });
      }

      bindEvents();
      try {
        renderCatalog();
      } catch (err) {
        console.error('初期描画に失敗:', err);
        if (emptyState) emptyState.classList.add('visible');
      }
      window.addEventListener('pageshow', () => {
        try { renderCatalog(); } catch (_) {}
      });
      window.addEventListener('storage', (e) => {
        if (!e.key || [
          ALL_DIARIES_KEY,
          INSCAPE_HISTORY_KEY,
          SPLASHES_KEY,
          HISTORY_KEY,
          GALLERY_KEY
        ].includes(e.key)) {
          try { renderCatalog(); } catch (_) {}
        }
      });
      loadSplatImage()
        .then(() => {
          try { renderCatalog(); } catch (_) {}
        })
        .catch(() => {});
    })();
  </script>
