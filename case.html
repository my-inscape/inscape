<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#030303">
  <title>プロダクトプレビュー — INSCAPE</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", serif;
      color: #e8e6e2;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background:
        repeating-linear-gradient(
          93deg,
          transparent 0,
          transparent 32px,
          rgba(255, 248, 235, 0.018) 32px,
          rgba(255, 248, 235, 0.018) 33px
        ),
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #030303;
    }

    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      flex-shrink: 0;
      padding: calc(0.85rem + env(safe-area-inset-top)) 0.65rem 0.5rem;
      background: linear-gradient(180deg, rgba(13, 13, 17, 0.96) 0%, rgba(13, 13, 17, 0) 100%);
    }

    .nav {
      display: flex;
      gap: 0.22rem;
      overflow-x: visible;
      scrollbar-width: none;
      justify-content: center;
      flex-wrap: wrap;
    }

    .nav a {
      flex: 1 1 0;
      min-width: 3.4rem;
      max-width: 5.2rem;
      text-align: center;
      font-size: 0.28rem;
      letter-spacing: 0.03em;
      color: rgba(232, 230, 226, 0.36);
      text-decoration: none;
      padding: 0.36rem 0.22rem;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      background: rgba(16, 16, 22, 0.78);
      white-space: nowrap;
    }

    .nav a.is-current {
      color: rgba(201, 169, 98, 0.56);
      border-color: rgba(201, 169, 98, 0.18);
      pointer-events: none;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 8px calc(12px + env(safe-area-inset-bottom));
    }

    .case-container {
      position: relative;
      width: 240px !important;
      height: 440px !important;
      min-width: 240px !important;
      max-width: 240px !important;
      min-height: 440px !important;
      max-height: 440px !important;
      flex-shrink: 0;
      flex-grow: 0;
      box-sizing: border-box;
      background-color: #f8f9fa;
      border-radius: 36px !important;
      overflow: hidden !important;
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow:
        0 4px 14px rgba(0, 0, 0, 0.12),
        0 22px 48px rgba(0, 0, 0, 0.38),
        inset 0 2px 0 rgba(255, 255, 255, 0.95),
        inset 0 -3px 10px rgba(0, 0, 0, 0.05),
        inset 3px 0 8px rgba(255, 255, 255, 0.4),
        inset -3px 0 8px rgba(0, 0, 0, 0.04);
    }

    .camera-hole {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 75px;
      height: 75px;
      border-radius: 18px;
      z-index: 3;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          93deg,
          transparent 0,
          transparent 32px,
          rgba(255, 248, 235, 0.018) 32px,
          rgba(255, 248, 235, 0.018) 33px
        ),
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #030303;
      box-shadow:
        inset 0 3px 8px rgba(0, 0, 0, 0.45),
        inset 0 -1px 3px rgba(255, 255, 255, 0.12),
        inset 2px 0 5px rgba(0, 0, 0, 0.2),
        inset -1px 0 3px rgba(255, 255, 255, 0.08);
    }

    #caseCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 240px !important;
      height: 440px !important;
      min-width: 240px !important;
      max-width: 240px !important;
      min-height: 440px !important;
      max-height: 440px !important;
      display: block;
      background: transparent;
      z-index: 1;
    }

    .note {
      margin-top: 1.65rem;
      max-width: 18rem;
      text-align: center;
      font-size: 0.52rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      line-height: 1.85;
      color: rgba(232, 228, 220, 0.62);
      opacity: 0.72;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <nav class="nav" aria-label="ナビゲーション">
        <a href="index.html">キャンバス</a>
        <a href="gallery.html">感情の回廊</a>
        <a href="mycolors.html">今日の私の色</a>
        <a class="is-current" href="case.html" aria-current="page">プロダクトプレビュー</a>
      </nav>
    </header>

    <main class="main">
      <div class="case-container" id="caseContainer">
        <div class="camera-hole" aria-hidden="true"></div>
        <canvas id="caseCanvas" width="240" height="440"></canvas>
      </div>
      <p class="note">※実際の製品は、あなただけの本当の色がプリントされた『クリアケース（透明）』として完成します。</p>
    </main>
  </div>

  <script>
    (function () {
      'use strict';

      var INSCAPE_HISTORY_KEY = 'inscape_history';
      var HISTORY_KEY = 'histories';
      var LIVE_KEY = 'inscape_splashes';
      var GALLERY_KEY = 'inscape_gallery';
      var SELECTED_ARTWORK_KEY = 'inscape_selected_artwork';
      var CASE_SESSION_KEY = 'inscape_case_session';
      var SPLAT_IMAGE = 'splat.png';
      var SRC_W = 270;
      var SRC_H = 480;
      var CASE_W = 240;
      var CASE_H = 440;

      var canvas = document.getElementById('caseCanvas');
      var splatImg = new Image();
      var stampCache = {};
      var splatReady = false;
      var renderToken = 0;

      function safeRender() {
        try {
          render();
        } catch (err) {
          /* 実機でも描画が止まらないよう全体を保護 */
        }
      }

      splatImg.onload = function () {
        if (splatImg.naturalWidth > 0) {
          splatReady = true;
          stampCache = {};
          safeRender();
        }
      };
      splatImg.onerror = function () { splatReady = false; };
      splatImg.src = SPLAT_IMAGE;
      if (splatImg.complete && splatImg.naturalWidth > 0) splatReady = true;

      function loadJson(key) {
        try {
          var raw = localStorage.getItem(key);
          if (!raw) return [];
          var data = JSON.parse(raw);
          return Array.isArray(data) ? data : [];
        } catch (e) {
          return [];
        }
      }

      function readJsonStorage(key) {
        try {
          var raw = localStorage.getItem(key);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch (e) {
          return null;
        }
      }

      function readSessionPayload() {
        try {
          var raw = sessionStorage.getItem(CASE_SESSION_KEY);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch (e) {
          return null;
        }
      }

      function clearSelectionState() {
        try {
          localStorage.removeItem(SELECTED_ARTWORK_KEY);
          sessionStorage.removeItem(CASE_SESSION_KEY);
        } catch (e) { /* noop */ }
      }

      function hasGallerySelectionIntent(params) {
        return params.has('idx') || params.has('id') || params.has('wh') || params.has('wordsHash');
      }

      function paramsMatchPayload(params, payload) {
        if (!payload) return false;
        var idxStr = params.get('idx');
        if (idxStr === null || idxStr === '') idxStr = params.get('id');
        if (idxStr !== null && idxStr !== '' && String(payload.idx) === idxStr) return true;
        var wh = params.get('wh') || params.get('wordsHash');
        if (wh && payload.wordsHash === wh) return true;
        return false;
      }

      function resolveGalleryItem(params) {
        var gallery = loadJson(GALLERY_KEY);
        var idxStr = params.get('idx');
        if (idxStr === null || idxStr === '') idxStr = params.get('id');
        if (idxStr !== null && idxStr !== '') {
          var idx = parseInt(idxStr, 10);
          if (!isNaN(idx) && gallery[idx]) return gallery[idx];
        }

        var wordsHash = params.get('wh') || params.get('wordsHash');
        if (wordsHash) {
          for (var g = 0; g < gallery.length; g++) {
            if (gallery[g] && gallery[g].wordsHash === wordsHash) return gallery[g];
          }
        }

        var session = readSessionPayload();
        if (session && paramsMatchPayload(params, session)) {
          if (typeof session.idx === 'number' && !isNaN(session.idx) && gallery[session.idx]) {
            return gallery[session.idx];
          }
          if (session.splats && session.splats.length) return session;
        }

        var stored = readJsonStorage(SELECTED_ARTWORK_KEY);
        if (stored && paramsMatchPayload(params, stored)) {
          if (typeof stored.idx === 'number' && !isNaN(stored.idx) && gallery[stored.idx]) {
            return gallery[stored.idx];
          }
          if (stored.splats && stored.splats.length) return stored;
        }

        return null;
      }

      function isRecipe(item) {
        if (!item || !item.color) return false;
        if (typeof item.nx === 'number' && !isNaN(item.nx)) return true;
        if (item.x != null && !isNaN(Number(item.x))) return true;
        if (item.y != null && !isNaN(Number(item.y))) return true;
        return false;
      }

      function collectRecipes(list) {
        var out = [];
        if (!Array.isArray(list)) return out;
        for (var i = 0; i < list.length; i++) {
          if (isRecipe(list[i])) out.push(list[i]);
        }
        return out;
      }

      function normalizeCoord(val, srcMax) {
        if (val == null || val === '') return 0.5;
        var n = Number(val);
        if (isNaN(n)) return 0.5;
        if (n >= 0 && n <= 1) return n;
        if (n > 1 && n <= 100) return n / 100;
        if (n > 100 && n <= srcMax * 1.25) return n / srcMax;
        if (n > srcMax * 1.25) return Math.min(1, Math.max(0, n / (srcMax * 10)));
        return 0.5;
      }

      function collectLegacyPoints() {
        var history = loadJson(INSCAPE_HISTORY_KEY);
        var points = [];
        for (var h = 0; h < history.length; h++) {
          var e = history[h];
          if (!e) continue;
          if (e.points && Array.isArray(e.points)) {
            for (var p = 0; p < e.points.length; p++) {
              if (e.points[p] && e.points[p].color) points.push(e.points[p]);
            }
          }
          if (isRecipe(e) && e.color) points.push(e);
        }
        return points;
      }

      function getLivePoints() {
        var live = collectRecipes(loadJson(LIVE_KEY));
        if (live.length) return live;
        var recipes = collectRecipes(loadJson(HISTORY_KEY));
        if (recipes.length) return recipes;
        return collectLegacyPoints();
      }

      function resolveSplashDrawSize(s) {
        if (typeof s.drawSizePx === 'number' && s.drawSizePx > 0) return s.drawSizePx;
        var baseSize = s.baseSize || s.size || 95;
        return baseSize * (s.scaleFactor != null ? s.scaleFactor : 1);
      }

      function migrateSplash(s) {
        var baseSize = s.baseSize || s.size || 95;
        if (baseSize >= 200) {
          /* 旧仕様の大きいデータはそのまま */
        } else if (baseSize > 0 && baseSize < 35) {
          baseSize = baseSize * 2.5;
        }

        var nx = typeof s.nx === 'number' ? s.nx : null;
        var ny = typeof s.ny === 'number' ? s.ny : null;
        if (nx == null || isNaN(nx)) nx = normalizeCoord(s.x, SRC_W);
        else nx = normalizeCoord(nx, SRC_W);
        if (ny == null || isNaN(ny)) ny = normalizeCoord(s.y, SRC_H);
        else ny = normalizeCoord(ny, SRC_H);

        return {
          nx: Math.min(1, Math.max(0, nx)),
          ny: Math.min(1, Math.max(0, ny)),
          color: s.color || s.color1,
          baseSize: baseSize,
          drawSizePx: resolveSplashDrawSize(s),
          rotation: s.rotation != null ? s.rotation : 0,
          scaleFactor: s.scaleFactor != null ? s.scaleFactor : 1,
          opacity: s.opacity != null ? s.opacity : 0.75
        };
      }

      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth || !color) return null;
        if (stampCache[color]) return stampCache[color];
        var w = splatImg.naturalWidth;
        var h = splatImg.naturalHeight;
        var work = document.createElement('canvas');
        work.width = w;
        work.height = h;
        var wctx = work.getContext('2d');
        wctx.fillStyle = color;
        wctx.fillRect(0, 0, w, h);
        wctx.globalCompositeOperation = 'screen';
        wctx.drawImage(splatImg, 0, 0);
        wctx.globalCompositeOperation = 'source-over';
        stampCache[color] = work;
        return work;
      }

      function drawSplatter(c, splash, w, h) {
        var stamp = createColorStamp(splash.color);
        if (!stamp) return;
        var cx = splash.nx * w;
        var cy = splash.ny * h;
        var size = splash.drawSizePx || (splash.baseSize * (splash.scaleFactor || 1));
        c.save();
        c.translate(cx, cy);
        c.rotate(splash.rotation || 0);
        c.globalAlpha = splash.opacity != null ? splash.opacity : 1;
        c.globalCompositeOperation = 'multiply';
        c.drawImage(stamp, -size / 2, -size / 2, size, size);
        c.restore();
        c.globalCompositeOperation = 'source-over';
      }

      function prepareCaseCanvas() {
        canvas.width = CASE_W;
        canvas.height = CASE_H;
        canvas.style.width = CASE_W + 'px';
        canvas.style.height = CASE_H + 'px';
        var ctx = canvas.getContext('2d');
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, CASE_W, CASE_H);
        return ctx;
      }

      function drawScaledInk(ctx, srcW, srcH, points) {
        var fitScale = Math.min(CASE_W / srcW, CASE_H / srcH);
        var offsetX = (CASE_W - srcW * fitScale) / 2;
        var offsetY = (CASE_H - srcH * fitScale) / 2;
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(fitScale, fitScale);
        for (var i = 0; i < points.length; i++) {
          if (!points[i] || !points[i].color) continue;
          drawSplatter(ctx, migrateSplash(points[i]), srcW, srcH);
        }
        ctx.restore();
      }

      function extractInkPointsFromItem(item) {
        if (!item) return { points: [], srcW: SRC_W, srcH: SRC_H };
        var points = item.splats && item.splats.length ? collectRecipes(item.splats) : [];
        var srcW = item.canvasW > 0 ? item.canvasW : SRC_W;
        var srcH = item.canvasH > 0 ? item.canvasH : SRC_H;
        return { points: points, srcW: srcW, srcH: srcH };
      }

      function renderInkOnly(points, srcW, srcH) {
        var ctx = prepareCaseCanvas();
        if (!points.length) return;
        drawScaledInk(ctx, srcW, srcH, points);
      }

      function render() {
        if (!canvas) return;

        var params = new URLSearchParams(location.search);
        var hasIntent = hasGallerySelectionIntent(params);
        var token = ++renderToken;
        renderToken = token;

        if (!hasIntent) {
          clearSelectionState();
          renderInkOnly(getLivePoints(), SRC_W, SRC_H);
          return;
        }

        var galleryItem = resolveGalleryItem(params);
        if (!galleryItem) {
          clearSelectionState();
          renderInkOnly(getLivePoints(), SRC_W, SRC_H);
          return;
        }

        var ink = extractInkPointsFromItem(galleryItem);
        renderInkOnly(ink.points, ink.srcW, ink.srcH);
        clearSelectionState();
      }

      safeRender();
      window.addEventListener('storage', safeRender);
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') safeRender();
      });
      window.addEventListener('pageshow', safeRender);
    })();
  </script>
</body>
</html>
