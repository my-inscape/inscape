<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#030303">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="INSCAPE">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>プロダクトプレビュー — INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", serif;
      color: #e8e6e2;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background:
        repeating-linear-gradient(
          93deg,
          transparent 0,
          transparent 32px,
          rgba(255, 248, 235, 0.018) 32px,
          rgba(255, 248, 235, 0.018) 33px
        ),
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #030303;
    }

    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      flex-shrink: 0;
      padding: calc(0.85rem + env(safe-area-inset-top)) 0.65rem 0.5rem;
      background: linear-gradient(180deg, rgba(13, 13, 17, 0.96) 0%, rgba(13, 13, 17, 0) 100%);
    }

    .nav {
      display: flex;
      gap: 0.12rem;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav::-webkit-scrollbar { display: none; }

    .nav a {
      flex: 0 0 auto;
      font-size: 0.28rem;
      letter-spacing: 0.03em;
      color: rgba(232, 230, 226, 0.36);
      text-decoration: none;
      padding: 0.36rem 0.22rem;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      background: rgba(16, 16, 22, 0.78);
      white-space: nowrap;
    }

    .nav a:hover { color: rgba(232, 230, 226, 0.72); }

    .nav a.is-current {
      color: rgba(201, 169, 98, 0.56);
      border-color: rgba(201, 169, 98, 0.18);
      pointer-events: none;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
    }

    .case-container {
      position: relative;
      width: 260px;
      height: 559px;
      max-width: min(46vw, 16.25rem);
      max-height: min(78dvh, 35rem);
      aspect-ratio: 260 / 559;
      overflow: hidden;
      border-radius: 40px;
      background-color: #ffffff !important;
      box-shadow:
        0 8px 24px rgba(0, 0, 0, 0.35),
        0 28px 56px rgba(0, 0, 0, 0.48);
    }

    #caseCanvas,
    .case-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      border-radius: inherit;
    }

    #caseCanvas { z-index: 1; }

    .case-overlay {
      z-index: 2;
      object-fit: fill;
      opacity: 1;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .note {
      margin-top: 1.65rem;
      max-width: 18rem;
      text-align: center;
      font-size: 0.52rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      line-height: 1.85;
      color: rgba(232, 228, 220, 0.62);
      opacity: 0.72;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <nav class="nav" aria-label="ナビゲーション">
        <a href="index.html">キャンバス</a>
        <a href="midspace.html">言葉の浮遊層</a>
        <a href="gallery.html">感情の回廊</a>
        <a href="mycolors.html">今日の私の色</a>
        <a href="ocean.html">感情の夜海</a>
        <a href="room.html">合言葉の部屋</a>
        <a class="is-current" href="case.html" aria-current="page">プロダクトプレビュー</a>
      </nav>
    </header>

    <main class="main" aria-label="プロダクトプレビュー">
      <div class="case-container" id="caseContainer">
        <canvas id="caseCanvas" aria-hidden="true"></canvas>
        <img src="clear-case-original.png" class="case-overlay" id="caseOverlay" width="360" height="664" alt="Clear Case" draggable="false" decoding="sync" loading="eager">
      </div>
      <p class="note">※実際の製品は、あなただけの本当の色がプリントされた『クリアケース（透明）』として完成します。</p>
    </main>
  </div>

  <script>
    (function () {
      'use strict';

      const KEYS = {
        history: 'inscape_history',
        gallery: 'inscape_gallery',
        recipes: 'histories',
        live: 'inscape_splashes'
      };

      const SPLAT = 'splat.png';
      const CANVAS_BG = '#ffffff';
      const REF_W = 270;
      const REF_H = 480;
      const LEGACY_W = 400;
      const LEGACY_H = 300;
      const MAX_DAYS = 7;
      const LIVE_MS = 7 * 24 * 60 * 60 * 1000;

      const box = document.getElementById('caseContainer');
      const canvas = document.getElementById('caseCanvas');
      const overlay = document.getElementById('caseOverlay');

      const splatImg = new Image();
      const stampCache = {};
      let splatReady = false;
      let galleryItem = null;
      let renderRetries = 0;

      function loadJson(key) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : [];
        } catch {
          return [];
        }
      }

      function parseDateKey(str) {
        if (!str) return '';
        const m = String(str).match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
        if (!m) return String(str).trim();
        return `${m[1]}.${m[2].padStart(2, '0')}.${m[3].padStart(2, '0')}`;
      }

      function entryDay(entry) {
        if (entry.timestamp > 0) {
          const d = new Date(entry.timestamp);
          if (!isNaN(d)) return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }
        if (entry.date) {
          const m = String(entry.date).match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
          if (m) return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
        }
        return '';
      }

      function urlParams() {
        const p = new URLSearchParams(location.search);
        const idx = p.get('idx');
        return {
          date: p.get('date') || '',
          idx: idx !== null && idx !== '' ? parseInt(idx, 10) : -1
        };
      }

      function galleryDates(item) {
        const keys = new Set();
        if (!item) return keys;
        keys.add(parseDateKey(item.date));
        (item.history || []).forEach((e) => keys.add(parseDateKey(e.date)));
        (item.splats || []).forEach((s) => {
          if (!s.timestamp) return;
          const d = new Date(s.timestamp);
          if (!isNaN(d)) keys.add(`${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`);
        });
        keys.delete('');
        return keys;
      }

      function pickGallery() {
        const { date, idx } = urlParams();
        if (!date && idx < 0) return null;
        const list = loadJson(KEYS.gallery);
        const key = parseDateKey(date);
        if (idx >= 0 && idx < list.length) {
          const item = list[idx];
          if (item?.splats?.length && (!key || galleryDates(item).has(key))) return item;
        }
        if (key) {
          for (let i = list.length - 1; i >= 0; i--) {
            if (list[i]?.splats?.length && galleryDates(list[i]).has(key)) return list[i];
          }
        }
        return null;
      }

      function initGallery() {
        const { date, idx } = urlParams();
        galleryItem = (date || idx >= 0) ? pickGallery() : null;
      }

      function toNorm(v) {
        if (typeof v !== 'number' || isNaN(v)) return null;
        if (v > 1) return v / 100;
        return v;
      }

      function normalizeSplash(raw, isGallery) {
        let nx = toNorm(raw.nx);
        let ny = toNorm(raw.ny);
        if (nx === null) nx = toNorm(raw.x);
        if (ny === null) ny = toNorm(raw.y);

        let baseSize = raw.baseSize || (isGallery ? 220 : 95);
        if (baseSize > 0 && baseSize < 35) baseSize *= 2.5;
        if (isGallery && baseSize < 150) baseSize *= 2.5;

        return {
          nx,
          ny,
          color: String(raw.color || '').trim(),
          baseSize,
          rotation: raw.rotation ?? 0,
          scaleFactor: raw.scaleFactor ?? 1,
          opacity: typeof raw.opacity === 'number' ? raw.opacity : 1
        };
      }

      function loadHistoryColors() {
        return loadJson(KEYS.history)
          .filter((e) => e && e.color)
          .map((e) => ({
            color: String(e.color).trim(),
            date: e.date || '',
            timestamp: e.timestamp || 0,
            word: e.word || e.text || ''
          }));
      }

      function sevenDays() {
        const map = new Map();
        loadHistoryColors().forEach((e) => {
          const k = entryDay(e);
          if (!k) return;
          const prev = map.get(k);
          if (!prev || (e.timestamp || 0) >= (prev.timestamp || 0)) map.set(k, e);
        });
        return [...map.values()].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0)).slice(-MAX_DAYS);
      }

      function loadRecipes() {
        return loadJson(KEYS.recipes).filter((s) => s && s.color);
      }

      function liveSplashes() {
        const now = Date.now();
        return loadJson(KEYS.live)
          .filter((s) => s?.color && (!s.timestamp || now - s.timestamp < LIVE_MS))
          .map((s) => normalizeSplash(s, false));
      }

      function rng(seed) {
        let t = seed >>> 0;
        return () => {
          t += 0x6d2b79f5;
          let r = Math.imul(t ^ (t >>> 15), 1 | t);
          r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
          return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
        };
      }

      function synthSplash(entry, i, total) {
        const r = rng(Number(entry.timestamp) || i + 1);
        const a = (i / Math.max(1, total)) * Math.PI * 2 - Math.PI / 2 + r() * 0.35;
        const rad = 0.2 + r() * 0.16;
        return {
          nx: 0.5 + Math.cos(a) * rad,
          ny: 0.5 + Math.sin(a) * rad,
          color: entry.color,
          baseSize: 88 + r() * 24,
          rotation: r() * Math.PI * 2,
          scaleFactor: 0.92 + r() * 0.18,
          opacity: 0.75 + r() * 0.2
        };
      }

      function findRecipe(entry, list) {
        const day = entryDay(entry);
        const exact = list.find((r) => r.timestamp && entry.timestamp && r.timestamp === entry.timestamp);
        if (exact) return exact;
        const same = list.filter((r) => {
          if (!r.timestamp) return false;
          const d = new Date(r.timestamp);
          if (isNaN(d)) return false;
          const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
          return k === day;
        }).sort((a, b) => Math.abs((a.timestamp || 0) - (entry.timestamp || 0)) - Math.abs((b.timestamp || 0) - (entry.timestamp || 0)));
        return same[0] || null;
      }

      function resolveFromHistory() {
        const recipes = loadRecipes();
        const validRecipes = recipes
          .map((r) => normalizeSplash(r, false))
          .filter((s) => s.color && typeof s.nx === 'number' && typeof s.ny === 'number');
        if (validRecipes.length) return validRecipes;

        const days = sevenDays();
        if (!days.length) return liveSplashes();

        return days.map((entry, i) => {
          const recipe = findRecipe(entry, recipes);
          if (!recipe) return synthSplash(entry, i, days.length);
          const m = normalizeSplash(recipe, false);
          m.color = entry.color || m.color;
          return m;
        }).filter((s) => s.color && typeof s.nx === 'number' && typeof s.ny === 'number');
      }

      function getDrawPayload() {
        if (galleryItem?.splats?.length) {
          const splashes = galleryItem.splats
            .map((s) => normalizeSplash(s, true))
            .filter((s) => s.color && typeof s.nx === 'number' && typeof s.ny === 'number');
          return { splashes, item: galleryItem };
        }
        return { splashes: resolveFromHistory(), item: null };
      }

      function loadSplat() {
        if (splatReady) return Promise.resolve();
        return new Promise((resolve) => {
          splatImg.onload = () => {
            splatReady = splatImg.naturalWidth > 0;
            resolve();
          };
          splatImg.onerror = () => resolve();
          splatImg.src = SPLAT;
          if (splatImg.complete && splatImg.naturalWidth > 0) {
            splatReady = true;
            resolve();
          }
        });
      }

      function createColorStamp(color) {
        if (!splatReady || !color) return null;
        if (stampCache[color]) return stampCache[color];

        const w = splatImg.naturalWidth;
        const h = splatImg.naturalHeight;
        const work = document.createElement('canvas');
        work.width = w;
        work.height = h;
        const wctx = work.getContext('2d');

        wctx.fillStyle = color;
        wctx.fillRect(0, 0, w, h);
        wctx.globalCompositeOperation = 'screen';
        wctx.drawImage(splatImg, 0, 0);
        wctx.globalCompositeOperation = 'source-over';

        stampCache[color] = work;
        return work;
      }

      function drawSplatter(ctx, splash, artW, artH) {
        if (!splash.color || typeof splash.nx !== 'number' || typeof splash.ny !== 'number') return;

        const stamp = createColorStamp(splash.color);
        const cx = splash.nx * artW;
        const cy = splash.ny * artH;
        const size = splash.baseSize * (splash.scaleFactor || 1);

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(splash.rotation || 0);
        ctx.globalAlpha = splash.opacity ?? 1;

        if (stamp) {
          ctx.globalCompositeOperation = 'multiply';
          ctx.drawImage(stamp, -size / 2, -size / 2, size, size);
        } else {
          const half = size / 2;
          const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, half);
          grad.addColorStop(0, splash.color);
          grad.addColorStop(0.5, splash.color);
          grad.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(0, 0, half, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
        ctx.globalCompositeOperation = 'source-over';
      }

      function isPortrait916(w, h) {
        if (!w || !h) return false;
        return Math.abs((w / h) - (REF_W / REF_H)) < 0.04;
      }

      function getLegacySize(item) {
        let legacyW = item?.canvasW > 0 ? Math.round(item.canvasW) : REF_W;
        let legacyH = item?.canvasH > 0 ? Math.round(item.canvasH) : REF_H;
        if (!legacyW || !legacyH) {
          legacyW = LEGACY_W;
          legacyH = LEGACY_H;
        }
        return { legacyW, legacyH };
      }

      function paintSplashes(ctx, splashes, destW, destH, item) {
        ctx.fillStyle = CANVAS_BG;
        ctx.fillRect(0, 0, destW, destH);
        if (!splashes.length) return;

        const { legacyW, legacyH } = getLegacySize(item);
        const needsRemap = item && (
          !isPortrait916(legacyW, legacyH) ||
          legacyW !== REF_W ||
          legacyH !== REF_H
        );

        if (!needsRemap) {
          const scale = destW / REF_W;
          splashes.forEach((splash) => {
            const scaled = {
              ...splash,
              baseSize: splash.baseSize * scale
            };
            drawSplatter(ctx, scaled, destW, destH);
          });
          return;
        }

        const off = document.createElement('canvas');
        off.width = legacyW;
        off.height = legacyH;
        const offCtx = off.getContext('2d');
        offCtx.fillStyle = CANVAS_BG;
        offCtx.fillRect(0, 0, legacyW, legacyH);
        splashes.forEach((splash) => drawSplatter(offCtx, splash, legacyW, legacyH));
        ctx.drawImage(off, 0, 0, destW, destH);
      }

      function render() {
        if (!canvas || !box) return;

        const rect = box.getBoundingClientRect();
        const destW = Math.round(rect.width);
        const destH = Math.round(rect.height);

        if (destW < 2 || destH < 2) {
          if (renderRetries++ < 30) requestAnimationFrame(render);
          return;
        }
        renderRetries = 0;

        const dpr = Math.min(2, window.devicePixelRatio || 1);
        canvas.width = Math.round(destW * dpr);
        canvas.height = Math.round(destH * dpr);
        canvas.style.width = destW + 'px';
        canvas.style.height = destH + 'px';

        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const { splashes, item } = getDrawPayload();
        paintSplashes(ctx, splashes, destW, destH, item);
      }

      function fitContainer() {
        if (!box || !overlay?.naturalWidth) return;
        box.style.aspectRatio = `${overlay.naturalWidth} / ${overlay.naturalHeight}`;
        box.style.width = 'min(46vw, 16.25rem)';
        box.style.height = 'auto';
      }

      function waitOverlay() {
        if (!overlay) return Promise.resolve();
        if (overlay.complete && overlay.naturalWidth) return Promise.resolve();
        return new Promise((resolve) => {
          overlay.addEventListener('load', resolve, { once: true });
          overlay.addEventListener('error', resolve, { once: true });
        });
      }

      async function boot() {
        initGallery();
        await Promise.all([loadSplat(), waitOverlay()]);
        fitContainer();
        render();
        requestAnimationFrame(render);
      }

      if (box && typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(render).observe(box);
      }

      window.addEventListener('resize', render);
      window.addEventListener('storage', (e) => {
        if (Object.values(KEYS).includes(e.key)) {
          initGallery();
          render();
        }
      });
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          initGallery();
          render();
        }
      });

      boot();
    })();
  </script>
</body>
</html>
