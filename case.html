<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#030303">
  <title>プロダクトプレビュー — INSCAPE</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", serif;
      color: #e8e6e2;
    }

    body {
      background:
        repeating-linear-gradient(
          93deg,
          transparent 0,
          transparent 32px,
          rgba(255, 248, 235, 0.018) 32px,
          rgba(255, 248, 235, 0.018) 33px
        ),
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #030303;
    }

    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      flex-shrink: 0;
      padding: calc(0.85rem + env(safe-area-inset-top)) 0.65rem 0.5rem;
      background: linear-gradient(180deg, rgba(13, 13, 17, 0.96) 0%, rgba(13, 13, 17, 0) 100%);
    }

    .nav {
      display: flex;
      gap: 0.12rem;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav::-webkit-scrollbar { display: none; }

    .nav a {
      flex: 0 0 auto;
      font-size: 0.28rem;
      letter-spacing: 0.03em;
      color: rgba(232, 230, 226, 0.36);
      text-decoration: none;
      padding: 0.36rem 0.22rem;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      background: rgba(16, 16, 22, 0.78);
      white-space: nowrap;
    }

    .nav a.is-current {
      color: rgba(201, 169, 98, 0.56);
      border-color: rgba(201, 169, 98, 0.18);
      pointer-events: none;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
    }

    .case-container {
      position: relative;
      width: 315px;
      height: 560px;
      max-width: min(52vw, 19.7rem);
      max-height: min(78dvh, 35rem);
      margin: 0 auto;
      background-image: url('white-case.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      overflow: hidden;
      border-radius: 40px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35), 0 28px 56px rgba(0, 0, 0, 0.48);
    }

    #caseCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
      border-radius: inherit;
    }

    .note {
      margin-top: 1.65rem;
      max-width: 18rem;
      text-align: center;
      font-size: 0.52rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      line-height: 1.85;
      color: rgba(232, 228, 220, 0.62);
      opacity: 0.72;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <nav class="nav" aria-label="ナビゲーション">
        <a href="index.html">キャンバス</a>
        <a href="midspace.html">言葉の浮遊層</a>
        <a href="gallery.html">感情の回廊</a>
        <a href="mycolors.html">今日の私の色</a>
        <a href="ocean.html">感情の夜海</a>
        <a href="room.html">合言葉の部屋</a>
        <a class="is-current" href="case.html" aria-current="page">プロダクトプレビュー</a>
      </nav>
    </header>

    <main class="main">
      <div class="case-container" id="caseContainer">
        <canvas id="caseCanvas"></canvas>
      </div>
      <p class="note">※実際の製品は、あなただけの本当の色がプリントされた『クリアケース（透明）』として完成します。</p>
    </main>
  </div>

  <script>
    (function () {
      'use strict';

      var INSCAPE_HISTORY_KEY = 'inscape_history';
      var HISTORY_KEY = 'histories';
      var LIVE_KEY = 'inscape_splashes';
      var GALLERY_KEY = 'inscape_gallery';
      var SRC_W = 270;
      var SRC_H = 480;

      var box = document.getElementById('caseContainer');
      var canvas = document.getElementById('caseCanvas');

      function loadJson(key) {
        try {
          var raw = localStorage.getItem(key);
          if (!raw) return [];
          var data = JSON.parse(raw);
          return Array.isArray(data) ? data : [];
        } catch (e) {
          return [];
        }
      }

      function getPoints() {
        var history = loadJson(INSCAPE_HISTORY_KEY);
        var points = [];
        var h, e, p;

        for (h = 0; h < history.length; h++) {
          e = history[h];
          if (!e) continue;
          if (e.points && Array.isArray(e.points)) {
            e.points.forEach(function (pt) {
              if (pt && pt.color) points.push(pt);
            });
          }
        }
        if (points.length) return points;

        var gallery = loadJson(GALLERY_KEY);
        var params = new URLSearchParams(location.search);
        var idx = params.get('idx');
        if (idx !== null && idx !== '' && gallery[parseInt(idx, 10)]) {
          var item = gallery[parseInt(idx, 10)];
          if (item && item.splats && item.splats.length) return item.splats;
        }

        var live = loadJson(LIVE_KEY);
        var out = [];
        live.forEach(function (s) {
          if (s && s.color) out.push(s);
        });
        if (out.length) return out;

        var recipes = loadJson(HISTORY_KEY);
        recipes.forEach(function (s) {
          if (s && s.color) out.push(s);
        });
        return out;
      }

      function pointNx(point) {
        if (typeof point.nx === 'number') return point.nx;
        if (point.x != null) return point.x / 100;
        return 0.5;
      }

      function pointNy(point) {
        if (typeof point.ny === 'number') return point.ny;
        if (point.y != null) return point.y / 100;
        return 0.5;
      }

      function pointSize(point, scale) {
        var size = point.baseSize || point.size || 80;
        if (size < 150) size = size * 2.5;
        return size * (point.scaleFactor != null ? point.scaleFactor : 1) * scale;
      }

      function drawSplatter(ctx, point, cx, cy, radius, rotation, opacity) {
        var color = point.color;
        var b, ang, dist, br;
        ctx.fillStyle = color;
        ctx.globalAlpha = opacity;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();
        for (b = 0; b < 5; b++) {
          ang = rotation + b * 1.1;
          dist = radius * (0.55 + b * 0.13);
          br = radius * (0.28 + b * 0.05);
          ctx.beginPath();
          ctx.arc(cx + Math.cos(ang) * dist, cy + Math.sin(ang) * dist, br, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function render() {
        if (!canvas || !box) return;

        var w = Math.round(box.clientWidth) || 315;
        var h = Math.round(box.clientHeight) || 560;
        var dpr = Math.min(2, window.devicePixelRatio || 1);

        canvas.width = Math.round(w * dpr);
        canvas.height = Math.round(h * dpr);
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';

        var ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, w, h);

        var points = getPoints();
        if (!points.length) return;

        var fitScale = Math.min(w / SRC_W, h / SRC_H);
        var offsetX = (w - SRC_W * fitScale) / 2;
        var offsetY = (h - SRC_H * fitScale) / 2;

        points.forEach(function (point) {
          if (!point || !point.color) return;
          var nx = pointNx(point);
          var ny = pointNy(point);
          var cx = offsetX + nx * SRC_W * fitScale;
          var cy = offsetY + ny * SRC_H * fitScale;
          var radius = pointSize(point, fitScale) * 0.35;
          var rotation = point.rotation != null ? point.rotation : 0;
          var opacity = point.opacity != null ? point.opacity : 0.85;
          drawSplatter(ctx, point, cx, cy, radius, rotation, opacity);
        });

        ctx.globalAlpha = 1;
      }

      render();

      if (box && typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(render).observe(box);
      }
      window.addEventListener('resize', render);
      window.addEventListener('storage', render);
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') render();
      });
    })();
  </script>
</body>
</html>
