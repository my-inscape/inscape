<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#030303">
  <title>プロダクトプレビュー — INSCAPE</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", serif;
      color: #e8e6e2;
    }

    body {
      background:
        repeating-linear-gradient(
          93deg,
          transparent 0,
          transparent 32px,
          rgba(255, 248, 235, 0.018) 32px,
          rgba(255, 248, 235, 0.018) 33px
        ),
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #030303;
    }

    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      flex-shrink: 0;
      padding: calc(0.85rem + env(safe-area-inset-top)) 0.65rem 0.5rem;
      background: linear-gradient(180deg, rgba(13, 13, 17, 0.96) 0%, rgba(13, 13, 17, 0) 100%);
    }

    .nav {
      display: flex;
      gap: 0.12rem;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav::-webkit-scrollbar { display: none; }

    .nav a {
      flex: 0 0 auto;
      font-size: 0.28rem;
      letter-spacing: 0.03em;
      color: rgba(232, 230, 226, 0.36);
      text-decoration: none;
      padding: 0.36rem 0.22rem;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      background: rgba(16, 16, 22, 0.78);
      white-space: nowrap;
    }

    .nav a.is-current {
      color: rgba(201, 169, 98, 0.56);
      border-color: rgba(201, 169, 98, 0.18);
      pointer-events: none;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
    }

    .case-container {
      position: relative;
      width: 260px;
      height: 559px;
      max-width: min(46vw, 16.25rem);
      max-height: min(78dvh, 35rem);
      aspect-ratio: 260 / 559;
      overflow: hidden;
      border-radius: 40px;
      background-color: #ffffff !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35), 0 28px 56px rgba(0, 0, 0, 0.48);
    }

    #caseCanvas,
    .case-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      border-radius: inherit;
    }

    #caseCanvas { z-index: 1; }

    .case-overlay {
      z-index: 2;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .note {
      margin-top: 1.65rem;
      max-width: 18rem;
      text-align: center;
      font-size: 0.52rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      line-height: 1.85;
      color: rgba(232, 228, 220, 0.62);
      opacity: 0.72;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <nav class="nav" aria-label="ナビゲーション">
        <a href="index.html">キャンバス</a>
        <a href="midspace.html">言葉の浮遊層</a>
        <a href="gallery.html">感情の回廊</a>
        <a href="mycolors.html">今日の私の色</a>
        <a href="ocean.html">感情の夜海</a>
        <a href="room.html">合言葉の部屋</a>
        <a class="is-current" href="case.html" aria-current="page">プロダクトプレビュー</a>
      </nav>
    </header>

    <main class="main">
      <div class="case-container" id="caseContainer">
        <canvas id="caseCanvas"></canvas>
        <img src="clear-case-original.png" class="case-overlay" id="caseOverlay" alt="Clear Case" width="360" height="664" decoding="sync" loading="eager">
      </div>
      <p class="note">※実際の製品は、あなただけの本当の色がプリントされた『クリアケース（透明）』として完成します。</p>
    </main>
  </div>

  <script>
    (function () {
      'use strict';

      var GALLERY_KEY = 'inscape_gallery';
      var HISTORY_KEY = 'histories';
      var LIVE_KEY = 'inscape_splashes';
      var SPLAT_IMAGE = 'splat.png';
      var CANVAS_BG = '#f7f4eb';
      var SRC_W = 270;
      var SRC_H = 480;

      var box = document.getElementById('caseContainer');
      var canvas = document.getElementById('caseCanvas');
      var overlay = document.getElementById('caseOverlay');

      var splatImg = new Image();
      var stampCache = {};
      var splatReady = false;

      function loadJson(key) {
        try {
          var raw = localStorage.getItem(key);
          if (!raw) return [];
          var data = JSON.parse(raw);
          return Array.isArray(data) ? data : [];
        } catch (e) {
          return [];
        }
      }

      function parseDateKey(str) {
        if (!str) return '';
        var m = String(str).match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
        if (!m) return String(str).trim();
        return m[1] + '.' + m[2].padStart(2, '0') + '.' + m[3].padStart(2, '0');
      }

      function pickGalleryItem() {
        var p = new URLSearchParams(location.search);
        var date = p.get('date') || '';
        var idxRaw = p.get('idx');
        var idx = idxRaw !== null && idxRaw !== '' ? parseInt(idxRaw, 10) : -1;
        if (!date && idx < 0) return null;

        var list = loadJson(GALLERY_KEY);
        var key = parseDateKey(date);

        if (idx >= 0 && idx < list.length) {
          var direct = list[idx];
          if (direct && direct.splats && direct.splats.length) return direct;
        }
        if (key) {
          for (var i = list.length - 1; i >= 0; i--) {
            var item = list[i];
            if (!item || !item.splats || !item.splats.length) continue;
            if (parseDateKey(item.date) === key) return item;
          }
        }
        return null;
      }

      function getSplats() {
        var galleryItem = pickGalleryItem();
        if (galleryItem && galleryItem.splats && galleryItem.splats.length) {
          return galleryItem.splats;
        }
        var live = loadJson(LIVE_KEY);
        var filtered = [];
        for (var i = 0; i < live.length; i++) {
          if (live[i] && live[i].color && typeof live[i].nx === 'number') {
            filtered.push(live[i]);
          }
        }
        if (filtered.length) return filtered;

        var recipes = loadJson(HISTORY_KEY);
        filtered = [];
        for (var j = 0; j < recipes.length; j++) {
          if (recipes[j] && recipes[j].color && typeof recipes[j].nx === 'number') {
            filtered.push(recipes[j]);
          }
        }
        return filtered;
      }

      function loadSplatImage() {
        if (splatReady) return Promise.resolve();
        return new Promise(function (resolve, reject) {
          splatImg.onload = function () {
            if (splatImg.naturalWidth > 0) {
              splatReady = true;
              resolve();
            } else {
              reject(new Error('splat invalid'));
            }
          };
          splatImg.onerror = function () { reject(new Error('splat failed')); };
          splatImg.src = SPLAT_IMAGE;
          if (splatImg.complete && splatImg.naturalWidth > 0) {
            splatReady = true;
            resolve();
          }
        });
      }

      /* gallery.html と同一のスタンプ生成・描画 */
      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth || !color) return null;
        if (stampCache[color]) return stampCache[color];
        var w = splatImg.naturalWidth;
        var h = splatImg.naturalHeight;
        var work = document.createElement('canvas');
        work.width = w;
        work.height = h;
        var wctx = work.getContext('2d');
        wctx.fillStyle = color;
        wctx.fillRect(0, 0, w, h);
        wctx.globalCompositeOperation = 'screen';
        wctx.drawImage(splatImg, 0, 0);
        wctx.globalCompositeOperation = 'source-over';
        stampCache[color] = work;
        return work;
      }

      function drawSplatter(ctx, splash, w, h) {
        var color = splash.color;
        if (!color) return;
        var stamp = createColorStamp(color);
        if (!stamp) return;

        var nx = typeof splash.nx === 'number' ? splash.nx : (splash.x != null ? splash.x / 100 : 0.5);
        var ny = typeof splash.ny === 'number' ? splash.ny : (splash.y != null ? splash.y / 100 : 0.5);
        var baseSize = splash.baseSize || splash.size || 220;
        if (baseSize < 150) baseSize = baseSize * 2.5;
        var size = baseSize * (splash.scaleFactor != null ? splash.scaleFactor : 1);
        var rotation = splash.rotation != null ? splash.rotation : 0;
        var opacity = splash.opacity != null ? splash.opacity : 0.75;

        var cx = nx * w;
        var cy = ny * h;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rotation);
        ctx.globalAlpha = opacity;
        ctx.globalCompositeOperation = 'multiply';
        ctx.drawImage(stamp, -size / 2, -size / 2, size, size);
        ctx.restore();
        ctx.globalCompositeOperation = 'source-over';
      }

      function render() {
        if (!canvas || !box) return;

        var rect = box.getBoundingClientRect();
        var displayW = Math.round(rect.width);
        var displayH = Math.round(rect.height);
        if (displayW < 2 || displayH < 2) {
          requestAnimationFrame(render);
          return;
        }

        var dpr = Math.min(2, window.devicePixelRatio || 1);
        canvas.width = Math.round(displayW * dpr);
        canvas.height = Math.round(displayH * dpr);
        canvas.style.width = displayW + 'px';
        canvas.style.height = displayH + 'px';

        var ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.fillStyle = CANVAS_BG;
        ctx.fillRect(0, 0, displayW, displayH);

        var splats = getSplats();
        if (splats.length > 0) {
          var art = document.createElement('canvas');
          art.width = SRC_W;
          art.height = SRC_H;
          var artCtx = art.getContext('2d');
          artCtx.fillStyle = CANVAS_BG;
          artCtx.fillRect(0, 0, SRC_W, SRC_H);

          for (var i = 0; i < splats.length; i++) {
            drawSplatter(artCtx, splats[i], SRC_W, SRC_H);
          }

          /* 横幅を基準に均等スケール（引き伸ばし防止） */
          var scale = displayW / SRC_W;
          var drawW = displayW;
          var drawH = SRC_H * scale;
          var offsetX = 0;
          var offsetY = (displayH - drawH) / 2;
          if (drawH > displayH) {
            scale = displayH / SRC_H;
            drawH = displayH;
            drawW = SRC_W * scale;
            offsetX = (displayW - drawW) / 2;
            offsetY = 0;
          }
          ctx.drawImage(art, offsetX, offsetY, drawW, drawH);
        }

        /* 左上カメラユニットのみピンポイント型抜き */
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        var cameraW = canvas.width * 0.42;
        var cameraH = canvas.height * 0.22;
        ctx.clearRect(0, 0, cameraW, cameraH);
        ctx.restore();
      }

      function fitContainer() {
        if (!box || !overlay || !overlay.naturalWidth) return;
        box.style.aspectRatio = overlay.naturalWidth + ' / ' + overlay.naturalHeight;
        box.style.width = 'min(46vw, 16.25rem)';
        box.style.height = 'auto';
      }

      function boot() {
        loadSplatImage()
          .catch(function () {})
          .then(function () {
            if (overlay && !overlay.complete) {
              overlay.addEventListener('load', function () {
                fitContainer();
                render();
              }, { once: true });
            }
            fitContainer();
            render();
          });
      }

      if (box && typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(render).observe(box);
      }
      window.addEventListener('resize', render);
      window.addEventListener('storage', render);
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') render();
      });

      boot();
    })();
  </script>
</body>
</html>
