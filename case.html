<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D0D11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="INSCAPE">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>プロダクトプレビュー — INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --page-bg: #0d0d11;
      --canvas-bg: #f7f4eb;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", serif;
      background: var(--page-bg);
      color: #e8e6e2;
    }

    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      flex-shrink: 0;
      padding: calc(0.85rem + env(safe-area-inset-top)) 0.65rem 0.5rem;
      background: linear-gradient(180deg, rgba(13, 13, 17, 0.96) 0%, rgba(13, 13, 17, 0) 100%);
    }

    .nav {
      display: flex;
      gap: 0.12rem;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav::-webkit-scrollbar { display: none; }

    .nav a {
      flex: 0 0 auto;
      font-size: 0.28rem;
      letter-spacing: 0.03em;
      color: rgba(232, 230, 226, 0.36);
      text-decoration: none;
      padding: 0.36rem 0.22rem;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      background: rgba(16, 16, 22, 0.78);
      white-space: nowrap;
    }

    .nav a:hover { color: rgba(232, 230, 226, 0.72); }

    .nav a.is-current {
      color: rgba(201, 169, 98, 0.56);
      border-color: rgba(201, 169, 98, 0.18);
      pointer-events: none;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
    }

    .case-container {
      position: relative;
      width: 260px;
      height: 559px;
      max-width: min(46vw, 16.25rem);
      max-height: min(78dvh, 35rem);
      aspect-ratio: 260 / 559;
      overflow: hidden;
      border-radius: 40px;
      background: var(--canvas-bg);
      isolation: isolate;
    }

    #caseCanvas,
    .case-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #caseCanvas {
      z-index: 1;
      background: transparent;
    }

    .case-overlay {
      z-index: 2;
      object-fit: fill;
      mix-blend-mode: multiply;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .note {
      margin-top: 1.65rem;
      max-width: 16.5rem;
      text-align: center;
      font-size: 0.52rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      line-height: 1.85;
      color: rgba(232, 230, 226, 0.5);
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <nav class="nav" aria-label="ナビゲーション">
        <a href="index.html">キャンバス</a>
        <a href="midspace.html">言葉の浮遊層</a>
        <a href="gallery.html">感情の回廊</a>
        <a href="mycolors.html">今日の私の色</a>
        <a href="ocean.html">感情の夜海</a>
        <a href="room.html">合言葉の部屋</a>
        <a class="is-current" href="case.html" aria-current="page">プロダクトプレビュー</a>
      </nav>
    </header>

    <main class="main" aria-label="プロダクトプレビュー">
      <div class="case-container" id="caseContainer">
        <canvas id="caseCanvas" aria-hidden="true"></canvas>
        <img
          src="clear-case-original.png"
          class="case-overlay"
          id="caseOverlay"
          width="360"
          height="664"
          alt="Clear Case"
          draggable="false"
          decoding="sync"
          loading="eager"
        >
      </div>
      <p class="note">※7日間アプリを続けると、あなただけの本当の色に変わります</p>
    </main>
  </div>

  <script>
    (function () {
      'use strict';

      const KEYS = {
        history: 'inscape_history',
        gallery: 'inscape_gallery',
        recipes: 'histories',
        live: 'inscape_splashes'
      };

      const SPLAT = 'splat.png';
      const SRC_W = 270;
      const SRC_H = 480;
      const MAX_DAYS = 7;
      const LIVE_MS = 7 * 24 * 60 * 60 * 1000;

      const SAMPLE = [
        { nx: 0.28, ny: 0.34, color: '#3d2868', word: '静けさ', baseSize: 88, scaleFactor: 1.04, rotation: -0.4, opacity: 0.82 },
        { nx: 0.62, ny: 0.28, color: '#8b5a9a', word: '余白', baseSize: 72, scaleFactor: 0.98, rotation: 1.1, opacity: 0.76 },
        { nx: 0.48, ny: 0.58, color: '#c86b9a', word: '記憶', baseSize: 102, scaleFactor: 1.08, rotation: 0.25, opacity: 0.88 },
        { nx: 0.22, ny: 0.68, color: '#5a8ec8', word: '夜', baseSize: 78, scaleFactor: 1.02, rotation: -1.2, opacity: 0.74 },
        { nx: 0.74, ny: 0.62, color: '#e8a8c8', word: '光', baseSize: 66, scaleFactor: 0.96, rotation: 0.85, opacity: 0.7 },
        { nx: 0.38, ny: 0.46, color: '#6b4a8e', word: '結晶', baseSize: 94, scaleFactor: 1.06, rotation: -0.15, opacity: 0.84 },
        { nx: 0.56, ny: 0.76, color: '#2a4a6e', word: '深海', baseSize: 84, scaleFactor: 1.0, rotation: 2.1, opacity: 0.78 }
      ];

      const box = document.getElementById('caseContainer');
      const canvas = document.getElementById('caseCanvas');
      const overlay = document.getElementById('caseOverlay');

      const splatImg = new Image();
      const stamps = {};
      let splatOk = false;
      let splatPromise = null;
      let queued = false;
      let retries = 0;
      let galleryItem = null;

      function parseDateKey(str) {
        if (!str) return '';
        const m = String(str).match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
        if (!m) return String(str).trim();
        return `${m[1]}.${m[2].padStart(2, '0')}.${m[3].padStart(2, '0')}`;
      }

      function urlParams() {
        const p = new URLSearchParams(location.search);
        const idx = p.get('idx');
        return { date: p.get('date') || '', idx: idx !== null && idx !== '' ? parseInt(idx, 10) : -1 };
      }

      function galleryDates(item) {
        const keys = new Set();
        if (!item) return keys;
        keys.add(parseDateKey(item.date));
        (item.history || []).forEach((e) => keys.add(parseDateKey(e.date)));
        (item.splats || []).forEach((s) => {
          if (!s.timestamp) return;
          const d = new Date(s.timestamp);
          if (!isNaN(d)) keys.add(`${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`);
        });
        keys.delete('');
        return keys;
      }

      function loadGallery() {
        try {
          const raw = localStorage.getItem(KEYS.gallery);
          return raw ? JSON.parse(raw) : [];
        } catch { return []; }
      }

      function pickGallery() {
        const { date, idx } = urlParams();
        if (!date && idx < 0) return null;
        const list = loadGallery();
        const key = parseDateKey(date);
        if (idx >= 0 && idx < list.length) {
          const item = list[idx];
          if (item?.splats?.length && (!key || galleryDates(item).has(key))) return item;
        }
        if (key) {
          for (let i = list.length - 1; i >= 0; i--) {
            if (list[i]?.splats?.length && galleryDates(list[i]).has(key)) return list[i];
          }
        }
        return null;
      }

      function initGallery() {
        const { date, idx } = urlParams();
        galleryItem = (date || idx >= 0) ? pickGallery() : null;
      }

      function rng(seed) {
        let t = seed >>> 0;
        return () => {
          t += 0x6d2b79f5;
          let r = Math.imul(t ^ (t >>> 15), 1 | t);
          r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
          return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
        };
      }

      function entryDay(entry) {
        if (entry.timestamp > 0) {
          const d = new Date(entry.timestamp);
          if (!isNaN(d)) return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }
        if (entry.date) {
          const m = String(entry.date).match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
          if (m) return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
        }
        return `ts-${entry.timestamp || entry.date || Math.random()}`;
      }

      function loadHistory() {
        try {
          const raw = localStorage.getItem(KEYS.history);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          return data
            .map((e) => ({
              word: e.word || e.text || '',
              color: e.color,
              date: e.date || '',
              timestamp: e.timestamp || 0,
              nx: typeof e.nx === 'number' ? e.nx : null,
              ny: typeof e.ny === 'number' ? e.ny : null,
              x: typeof e.x === 'number' ? e.x : null,
              y: typeof e.y === 'number' ? e.y : null,
              baseSize: e.baseSize,
              scaleFactor: e.scaleFactor,
              rotation: e.rotation,
              opacity: e.opacity
            }))
            .filter((e) => e.color && String(e.color).trim());
        } catch { return []; }
      }

      function sevenDays() {
        const map = new Map();
        loadHistory().forEach((e) => {
          const k = entryDay(e);
          const prev = map.get(k);
          if (!prev || (e.timestamp || 0) >= (prev.timestamp || 0)) map.set(k, e);
        });
        return [...map.values()].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0)).slice(-MAX_DAYS);
      }

      function migrate(s) {
        let baseSize = s.baseSize || 95;
        if (baseSize > 0 && baseSize < 35) baseSize *= 2.5;
        return {
          nx: s.nx, ny: s.ny, color: s.color, word: s.word || '', timestamp: s.timestamp || 0,
          baseSize, rotation: s.rotation ?? 0, scaleFactor: s.scaleFactor ?? 1,
          opacity: s.opacity ?? 0.75, canvasW: s.canvasW || SRC_W
        };
      }

      function migrateGallery(s) {
        let baseSize = s.baseSize || 220;
        if (baseSize < 150) baseSize *= 2.5;
        return { nx: s.nx, ny: s.ny, color: s.color, baseSize, rotation: s.rotation ?? 0, scaleFactor: s.scaleFactor ?? 1, opacity: s.opacity ?? 0.75 };
      }

      function liveSplashes() {
        try {
          const raw = localStorage.getItem(KEYS.live);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          const now = Date.now();
          return data.filter((s) => s?.color && (!s.timestamp || now - s.timestamp < LIVE_MS)).map(migrate);
        } catch { return []; }
      }

      function recipes() {
        const map = new Map();
        const add = (r) => {
          if (!r?.color) return;
          const m = migrate(r);
          const k = m.timestamp ? `ts-${m.timestamp}` : `c-${m.color}-${m.word}-${m.nx}-${m.ny}`;
          if (!map.has(k)) map.set(k, m);
        };
        try {
          const raw = localStorage.getItem(KEYS.recipes);
          if (raw) JSON.parse(raw).forEach(add);
        } catch { /* ignore */ }
        liveSplashes().forEach(add);
        return [...map.values()];
      }

      function baseSizeFromWord(n, w) {
        const len = Math.max(1, Math.min(n, 10000));
        const mid = 30;
        let frac;
        if (len <= mid) {
          frac = 0.25 + (0.25 * Math.sqrt((len - 1) / (mid - 1)));
        } else {
          frac = 0.5 + 0.2 * (1 - Math.exp(-(len - mid) / 120));
        }
        return (w * frac) / 1.02;
      }

      function findRecipe(entry, list) {
        const day = entryDay(entry);
        const exact = list.find((r) => r.timestamp && entry.timestamp && r.timestamp === entry.timestamp);
        if (exact) return exact;
        const same = list.filter((r) => {
          if (!r.timestamp) return false;
          const d = new Date(r.timestamp);
          if (isNaN(d)) return false;
          const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
          return k === day;
        }).sort((a, b) => Math.abs((a.timestamp || 0) - (entry.timestamp || 0)) - Math.abs((b.timestamp || 0) - (entry.timestamp || 0)));
        if (same.length) return same[0];
        if (entry.word) return list.find((r) => r.word === entry.word && r.color === entry.color) || null;
        return null;
      }

      function synth(entry, i, total) {
        const r = rng(Number(entry.timestamp) || i + 1);
        const len = Math.max(1, (entry.word || '').length || 8);
        let nx = entry.nx;
        let ny = entry.ny;
        if (typeof entry.x === 'number') nx = entry.x;
        if (typeof entry.y === 'number') ny = entry.y;
        if (typeof nx !== 'number' || typeof ny !== 'number') {
          const a = (i / Math.max(1, total)) * Math.PI * 2 - Math.PI / 2 + r() * 0.35;
          const rad = 0.2 + r() * 0.16;
          nx = 0.5 + Math.cos(a) * rad;
          ny = 0.5 + Math.sin(a) * rad;
        }
        const wi = Math.min(1, Math.log1p(len) / Math.log1p(120));
        const faint = 0.3 + r() * 0.2;
        const bold = 0.9 + r() * 0.1;
        return migrate({
          nx, ny, color: String(entry.color).trim(), word: entry.word || '', timestamp: entry.timestamp || 0,
          baseSize: entry.baseSize || baseSizeFromWord(len, SRC_W),
          rotation: entry.rotation ?? r() * Math.PI * 2,
          scaleFactor: entry.scaleFactor ?? (0.92 + r() * 0.18 + wi * 0.06),
          opacity: entry.opacity ?? (faint + wi * (bold - faint))
        });
      }

      function resolveSplashes() {
        const days = sevenDays();
        if (!days.length) {
          const live = liveSplashes();
          return live.length ? live : SAMPLE.map(migrate);
        }
        const list = recipes();
        return days.map((entry, i) => {
          const recipe = findRecipe(entry, list);
          if (!recipe) return synth(entry, i, days.length);
          const m = migrate({ ...recipe, color: entry.color || recipe.color, word: entry.word || recipe.word, timestamp: entry.timestamp || recipe.timestamp });
          if (typeof entry.nx === 'number') m.nx = entry.nx;
          if (typeof entry.ny === 'number') m.ny = entry.ny;
          if (typeof entry.x === 'number') m.nx = entry.x;
          if (typeof entry.y === 'number') m.ny = entry.y;
          return m;
        });
      }

      function loadSplat() {
        if (splatOk) return Promise.resolve();
        if (splatPromise) return splatPromise;
        splatPromise = new Promise((resolve, reject) => {
          splatImg.onload = () => { splatOk = !!splatImg.naturalWidth; splatOk ? resolve() : reject(); };
          splatImg.onerror = reject;
          splatImg.src = SPLAT;
          if (splatImg.complete) splatImg.naturalWidth ? resolve() : reject();
        }).catch(() => { splatPromise = null; });
        return splatPromise;
      }

      function stamp(color) {
        if (!splatOk) return null;
        if (stamps[color]) return stamps[color];
        const w = splatImg.naturalWidth;
        const h = splatImg.naturalHeight;
        const c = document.createElement('canvas');
        c.width = w;
        c.height = h;
        const ctx = c.getContext('2d');
        ctx.fillStyle = color;
        ctx.fillRect(0, 0, w, h);
        ctx.globalCompositeOperation = 'screen';
        ctx.drawImage(splatImg, 0, 0);
        stamps[color] = c;
        return c;
      }

      function paintInkSplat(ctx, splash, destW, destH, srcW) {
        const img = stamp(splash.color);
        if (!img) return;
        const sourceW = splash.canvasW || srcW || SRC_W;
        const size = splash.baseSize * (splash.scaleFactor || 1) * (destW / sourceW);
        const x = splash.nx * destW;
        const y = splash.ny * destH;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(splash.rotation || 0);
        ctx.globalAlpha = splash.opacity ?? 1;
        ctx.globalCompositeOperation = 'source-over';
        ctx.drawImage(img, -size / 2, -size / 2, size, size);
        ctx.restore();
      }

      function drawInkOnly(ctx, splashes, destW, destH, item) {
        ctx.clearRect(0, 0, destW, destH);
        const srcW = item ? (item.canvasW || 400) : SRC_W;
        splashes.forEach((raw) => {
          const splash = item ? migrateGallery(raw) : migrate(raw);
          paintInkSplat(ctx, splash, destW, destH, srcW);
        });
      }

      function render() {
        if (!canvas || !box) return;
        const { width: w, height: h } = box.getBoundingClientRect();
        const cw = Math.round(w);
        const ch = Math.round(h);
        if (cw < 2 || ch < 2) {
          if (retries++ < 24) requestAnimationFrame(schedule);
          return;
        }
        retries = 0;
        const dpr = Math.min(2, devicePixelRatio || 1);
        canvas.width = Math.round(cw * dpr);
        canvas.height = Math.round(ch * dpr);
        canvas.style.width = cw + 'px';
        canvas.style.height = ch + 'px';
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        if (galleryItem?.splats?.length) {
          drawInkOnly(ctx, galleryItem.splats, cw, ch, galleryItem);
        } else {
          drawInkOnly(ctx, resolveSplashes(), cw, ch, null);
        }
      }

      function fitContainer() {
        if (!box || !overlay?.naturalWidth) return;
        box.style.aspectRatio = `${overlay.naturalWidth} / ${overlay.naturalHeight}`;
        box.style.width = 'min(46vw, 16.25rem)';
        box.style.height = 'auto';
      }

      function schedule() {
        if (queued) return;
        queued = true;
        requestAnimationFrame(() => {
          queued = false;
          loadSplat().then(render).catch(render);
        });
      }

      if (box && typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(schedule).observe(box);
      }

      if (overlay) {
        const ready = () => { fitContainer(); schedule(); };
        overlay.complete ? ready() : overlay.addEventListener('load', ready, { once: true });
      }

      window.addEventListener('resize', schedule);
      window.addEventListener('storage', (e) => {
        if (Object.values(KEYS).includes(e.key)) { initGallery(); schedule(); }
      });
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') { initGallery(); schedule(); }
      });

      initGallery();
      schedule();
    })();
  </script>
</body>
</html>
