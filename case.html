<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D0D11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="INSCAPE">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>プロダクトプレビュー — INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --canvas-bg: #f7f4eb;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", serif;
      color: #e8e6e2;
    }

    body {
      background:
        radial-gradient(ellipse 70% 45% at 50% 32%, rgba(255, 245, 228, 0.14) 0%, transparent 58%),
        radial-gradient(ellipse 90% 35% at 50% 100%, rgba(0, 0, 0, 0.5) 0%, transparent 55%),
        linear-gradient(168deg, #2c2620 0%, #1c1916 42%, #0f0e0c 100%);
    }

    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .header {
      flex-shrink: 0;
      padding: calc(0.85rem + env(safe-area-inset-top)) 0.65rem 0.5rem;
      background: linear-gradient(180deg, rgba(13, 13, 17, 0.96) 0%, rgba(13, 13, 17, 0) 100%);
    }

    .nav {
      display: flex;
      gap: 0.12rem;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav::-webkit-scrollbar { display: none; }

    .nav a {
      flex: 0 0 auto;
      font-size: 0.28rem;
      letter-spacing: 0.03em;
      color: rgba(232, 230, 226, 0.36);
      text-decoration: none;
      padding: 0.36rem 0.22rem;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      background: rgba(16, 16, 22, 0.78);
      white-space: nowrap;
    }

    .nav a:hover { color: rgba(232, 230, 226, 0.72); }

    .nav a.is-current {
      color: rgba(201, 169, 98, 0.56);
      border-color: rgba(201, 169, 98, 0.18);
      pointer-events: none;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0.5rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
    }

    /* ページ全体の縦縞スタジオ背景（ケース内の格子とは無関係） */
    .main::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          93deg,
          transparent 0,
          transparent 32px,
          rgba(255, 248, 235, 0.018) 32px,
          rgba(255, 248, 235, 0.018) 33px
        ),
        radial-gradient(ellipse 55% 28% at 50% 62%, rgba(160, 130, 95, 0.12) 0%, transparent 70%);
      opacity: 0.85;
    }

    .case-container {
      position: relative;
      z-index: 1;
      width: 260px;
      height: 559px;
      max-width: min(46vw, 16.25rem);
      max-height: min(78dvh, 35rem);
      aspect-ratio: 260 / 559;
      overflow: hidden;
      border-radius: 42px;
      background: var(--canvas-bg);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.08),
        0 8px 24px rgba(0, 0, 0, 0.35),
        0 28px 56px rgba(0, 0, 0, 0.48);
    }

    #caseCanvas,
    .case-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      border-radius: inherit;
    }

    #caseCanvas {
      z-index: 1;
      background: transparent;
    }

    .case-overlay {
      z-index: 2;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .note {
      position: relative;
      z-index: 1;
      margin-top: 1.65rem;
      max-width: 16.5rem;
      text-align: center;
      font-size: 0.52rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      line-height: 1.85;
      color: rgba(232, 228, 220, 0.62);
      opacity: 0.72;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <nav class="nav" aria-label="ナビゲーション">
        <a href="index.html">キャンバス</a>
        <a href="midspace.html">言葉の浮遊層</a>
        <a href="gallery.html">感情の回廊</a>
        <a href="mycolors.html">今日の私の色</a>
        <a href="ocean.html">感情の夜海</a>
        <a href="room.html">合言葉の部屋</a>
        <a class="is-current" href="case.html" aria-current="page">プロダクトプレビュー</a>
      </nav>
    </header>

    <main class="main" aria-label="プロダクトプレビュー">
      <div class="case-container" id="caseContainer">
        <canvas id="caseCanvas" aria-hidden="true"></canvas>
        <img
          src="clear-case-original.png"
          class="case-overlay"
          id="caseOverlay"
          width="360"
          height="664"
          alt="Clear Case"
          draggable="false"
          decoding="sync"
          loading="eager"
        >
      </div>
      <p class="note">※7日間アプリを続けると、あなただけの本当の色に変わります</p>
    </main>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const canvas = document.getElementById("caseCanvas");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");

      // コンテナのサイズにキャンバスの解像度を100%完全に合わせる
      const container = document.querySelector(".case-container");
      canvas.width = container.clientWidth || 260;
      canvas.height = container.clientHeight || 559;

      // 1. キャンバス全体を完全に「透明」にリセット（白背景を徹底排除）
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 2. localStorageから感情データ（模様）を読み込む
      const history = JSON.parse(localStorage.getItem("inscape_history") || "[]");

      // URLパラメータから日付を取得（なければ最新のデータ）
      const urlParams = new URLSearchParams(window.location.search);
      const targetDate = urlParams.get("date");
      let targetData = history.find(item => item.date === targetDate);
      if (!targetData && history.length > 0) {
        targetData = history[history.length - 1]; // 最新データ
      }

      // 3. インクの模様・ラインだけをキャンバスにプリント描画
      if (targetData && targetData.points) {
        ctx.save();

        // 模様のみを描画（背景のfillRectや塗りつぶしは絶対に実行しない）
        ctx.strokeStyle = "rgba(138, 43, 226, 0.85)"; // 鮮やかな紫色（データの色があればそれを使用）
        ctx.lineWidth = 5;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        // インクの弾けやラインを正確にケースサイズへスケーリングして描画
        ctx.beginPath();
        targetData.points.forEach((point, index) => {
          // index.htmlのキャンバス比率から、ケースの縦長比率へ座標を変換
          const x = (point.x / 100) * canvas.width;
          const y = (point.y / 100) * canvas.height;

          if (index === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        });
        ctx.stroke();
        ctx.restore();
      }

      // 4. 【最重要】カメラレンズユニット部分の完璧なくり抜き（型抜き）
      // 左上のカメラがある領域（横幅の約45%、縦幅の約22%）を強制的に完全に透明化する
      const cameraWidth = canvas.width * 0.45;
      const cameraHeight = canvas.height * 0.22;
      ctx.clearRect(0, 0, cameraWidth, cameraHeight);
    });
  </script>
</body>
</html>
