<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D0D11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="INSCAPE">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>プロダクトプレビュー — INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --case-deep: #0d0d11;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", serif;
      background: var(--case-deep);
      color: #e8e6e2;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      background:
        radial-gradient(ellipse 90% 50% at 50% -8%, rgba(60, 48, 88, 0.18) 0%, transparent 52%),
        radial-gradient(ellipse 70% 40% at 88% 95%, rgba(20, 40, 68, 0.14) 0%, transparent 48%),
        var(--case-deep);
    }

    .case-shell-page {
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .case-top {
      flex-shrink: 0;
      z-index: 20;
      padding:
        calc(0.85rem + env(safe-area-inset-top))
        calc(0.65rem + env(safe-area-inset-right))
        0.5rem
        calc(0.65rem + env(safe-area-inset-left));
      background: linear-gradient(180deg, rgba(13, 13, 17, 0.96) 0%, rgba(13, 13, 17, 0.88) 72%, rgba(13, 13, 17, 0) 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .site-nav {
      display: flex;
      align-items: stretch;
      justify-content: flex-start;
      gap: 0.12rem;
      overflow-x: auto;
      overflow-y: hidden;
      flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .site-nav::-webkit-scrollbar { display: none; height: 0; }

    .site-nav-link {
      flex: 0 0 auto;
      min-width: max-content;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.28rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-indent: 0.03em;
      color: rgba(232, 230, 226, 0.36);
      text-decoration: none;
      padding: 0.36rem 0.22rem;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      background: rgba(16, 16, 22, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 0.35s ease, border-color 0.35s ease, background 0.35s ease;
      white-space: nowrap;
      text-align: center;
    }

    .site-nav-link:hover {
      color: rgba(232, 230, 226, 0.72);
      border-color: rgba(184, 160, 122, 0.26);
      background: rgba(22, 22, 28, 0.9);
    }

    .site-nav-link.is-current {
      color: rgba(201, 169, 98, 0.56);
      border-color: rgba(201, 169, 98, 0.18);
      background: rgba(201, 169, 98, 0.05);
      pointer-events: none;
    }

    .case-main {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding:
        0.5rem 1.25rem
        calc(1.25rem + env(safe-area-inset-bottom));
    }

    .case-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 22rem;
    }

    .device-switch {
      display: flex;
      align-items: stretch;
      gap: 0.35rem;
      margin-bottom: 1.1rem;
      padding: 0.22rem;
      border: 0.5px solid rgba(255, 255, 255, 0.07);
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.025);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .device-switch__btn {
      flex: 1 1 0;
      min-width: 4.5rem;
      padding: 0.42rem 0.65rem;
      border: 0.5px solid transparent;
      border-radius: 1px;
      background: transparent;
      color: rgba(232, 230, 226, 0.38);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", serif;
      font-size: 0.48rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-indent: 0.14em;
      cursor: pointer;
      transition: color 0.35s ease, border-color 0.35s ease, background 0.35s ease;
    }

    .device-switch__btn:hover {
      color: rgba(232, 230, 226, 0.68);
    }

    .device-switch__btn.is-active {
      color: rgba(201, 169, 98, 0.72);
      border-color: rgba(201, 169, 98, 0.22);
      background: rgba(201, 169, 98, 0.07);
    }

    /* ── Phone case (layered — artist frame ready) ── */
    .phone-case {
      position: relative;
      width: min(52vw, 13.5rem);
      aspect-ratio: 9 / 16;
      max-height: min(62dvh, 30rem);
      filter: drop-shadow(0 28px 48px rgba(0, 0, 0, 0.55));
      transition: filter 0.4s ease;
    }

    .phone-case__bezel {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 0.42rem;
      background: linear-gradient(145deg, #2a2a32 0%, #121218 42%, #0a0a0e 100%);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        inset 0 -2px 8px rgba(0, 0, 0, 0.65),
        0 0 0 0.5px rgba(0, 0, 0, 0.8);
      transition: border-radius 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .phone-case.is-iphone .phone-case__bezel {
      border-radius: 2.1rem;
    }

    .phone-case.is-android .phone-case__bezel {
      border-radius: 1.25rem;
      background: linear-gradient(145deg, #2e2e34 0%, #14141a 45%, #0a0a0e 100%);
    }

    .phone-case__camera {
      position: absolute;
      z-index: 4;
      pointer-events: none;
      border: 0.5px solid rgba(255, 255, 255, 0.14);
      background: linear-gradient(145deg, #1e1e26 0%, #0c0c10 100%);
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.08),
        inset 0 -1px 4px rgba(0, 0, 0, 0.6);
      transition:
        top 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        left 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        right 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        width 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        height 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        border-radius 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .phone-case__camera-lenses {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.22rem;
      padding: 0.28rem;
    }

    .phone-case__lens {
      display: block;
      border-radius: 50%;
      border: 0.5px solid rgba(120, 140, 180, 0.35);
      background: radial-gradient(circle at 35% 30%, rgba(80, 100, 140, 0.5) 0%, #0a0a12 70%);
      transition: width 0.45s ease, height 0.45s ease;
    }

    /* iPhone — triple camera, top-left cluster */
    .phone-case.is-iphone .phone-case__camera {
      top: 0.55rem;
      left: 0.85rem;
      right: auto;
      width: 2.35rem;
      height: 2.35rem;
      border-radius: 0.72rem;
    }

    .phone-case.is-iphone .phone-case__camera-lenses {
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      gap: 0.18rem;
      padding: 0.32rem;
    }

    .phone-case.is-iphone .phone-case__lens {
      width: 0.62rem;
      height: 0.62rem;
    }

    .phone-case.is-iphone .phone-case__lens:nth-child(1) {
      width: 0.72rem;
      height: 0.72rem;
    }

    /* Android — vertical pill, left edge */
    .phone-case.is-android .phone-case__camera {
      top: 1.1rem;
      left: 0.5rem;
      right: auto;
      width: 1.15rem;
      height: 3.1rem;
      border-radius: 0.58rem;
    }

    .phone-case.is-android .phone-case__camera-lenses {
      flex-direction: column;
      gap: 0.2rem;
      padding: 0.38rem 0.2rem;
    }

    .phone-case.is-android .phone-case__lens {
      width: 0.52rem;
      height: 0.52rem;
    }

    .phone-case__screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #08080c;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.5);
      transition: border-radius 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .phone-case.is-iphone .phone-case__screen {
      border-radius: 1.75rem;
    }

    .phone-case.is-android .phone-case__screen {
      border-radius: 0.95rem;
    }

    .phone-case__gradient {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        165deg,
        #1a1038 0%,
        #4a2c6e 24%,
        #c86b9a 52%,
        #f0a8c8 76%,
        #1a3058 100%
      );
      transition: background 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .phone-case__glass {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(155deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0.02) 28%, transparent 48%),
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(255, 255, 255, 0.06) 0%, transparent 55%);
      mix-blend-mode: soft-light;
      opacity: 0.85;
    }

    .phone-case__artist-frame {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: transparent center / cover no-repeat;
    }

    .case-note {
      margin-top: 1.65rem;
      max-width: 16.5rem;
      text-align: center;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", serif;
      font-size: 0.52rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      line-height: 1.85;
      color: rgba(232, 230, 226, 0.5);
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="case-shell-page">
    <div class="case-top">
      <nav class="site-nav" aria-label="ナビゲーション">
        <a class="site-nav-link" href="index.html">キャンバス</a>
        <a class="site-nav-link" href="midspace.html">言葉の浮遊層</a>
        <a class="site-nav-link" href="gallery.html">感情の回廊</a>
        <a class="site-nav-link" href="mycolors.html">今日の私の色</a>
        <a class="site-nav-link" href="ocean.html">感情の夜海</a>
        <a class="site-nav-link" href="room.html">合言葉の部屋</a>
        <a class="site-nav-link is-current" href="case.html" aria-current="page">プロダクトプレビュー</a>
      </nav>
    </div>

    <main class="case-main" aria-label="プロダクトプレビュー">
      <div class="case-stage">
        <div class="device-switch" role="tablist" aria-label="ケースモデル">
          <button type="button" class="device-switch__btn is-active" data-device="iphone" role="tab" aria-selected="true">iPhone</button>
          <button type="button" class="device-switch__btn" data-device="android" role="tab" aria-selected="false">Android</button>
        </div>

        <div class="phone-case is-iphone" id="phoneCase">
          <div class="phone-case__bezel">
            <div class="phone-case__camera" aria-hidden="true">
              <div class="phone-case__camera-lenses">
                <span class="phone-case__lens"></span>
                <span class="phone-case__lens"></span>
                <span class="phone-case__lens"></span>
              </div>
            </div>
            <div class="phone-case__screen">
              <div class="phone-case__gradient" id="caseGradient" aria-hidden="true"></div>
              <div class="phone-case__glass" aria-hidden="true"></div>
              <div class="phone-case__artist-frame" id="caseArtistFrame" aria-hidden="true"></div>
            </div>
          </div>
        </div>

        <p class="case-note">※7日間アプリを続けると、あなただけの本当の色に変わります</p>
      </div>
    </main>
  </div>

  <script>
    (function () {
      'use strict';

      const INSCAPE_HISTORY_KEY = 'inscape_history';
      const MAX_CASE_DAYS = 7;
      const DEVICE_STORAGE_KEY = 'inscape_case_device';

      const SAMPLE_CRYSTAL_COLORS = [
        '#1a1038',
        '#3d2868',
        '#6b4a8e',
        '#9a6aaa',
        '#c86b9a',
        '#e8a8c8',
        '#2a4a6e'
      ];

      const phoneCaseEl = document.getElementById('phoneCase');
      const caseGradientEl = document.getElementById('caseGradient');
      const deviceBtns = document.querySelectorAll('.device-switch__btn');

      function parseEntryDate(entry) {
        if (!entry) return null;
        if (entry.timestamp && Number(entry.timestamp) > 0) {
          const d = new Date(entry.timestamp);
          if (!Number.isNaN(d.getTime())) return d;
        }
        if (entry.date) {
          const dateStr = String(entry.date);
          const matched = dateStr.match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
          if (matched) {
            const d = new Date(Number(matched[1]), Number(matched[2]) - 1, Number(matched[3]));
            if (!Number.isNaN(d.getTime())) return d;
          }
          const parsed = Date.parse(dateStr);
          if (!Number.isNaN(parsed)) return new Date(parsed);
        }
        return null;
      }

      function dayKeyFromEntry(entry) {
        const d = parseEntryDate(entry);
        if (!d) return `ts-${entry.timestamp || entry.date || Math.random()}`;
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        return `${y}-${mo}-${da}`;
      }

      function loadHistoryEntries() {
        try {
          const raw = localStorage.getItem(INSCAPE_HISTORY_KEY);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          return data
            .map((entry) => ({
              word: entry.word || entry.text || '',
              color: entry.color,
              date: entry.date || '',
              timestamp: entry.timestamp || 0
            }))
            .filter((e) => e.color && String(e.color).trim());
        } catch {
          return [];
        }
      }

      /** One color per diary day, up to 7 days — oldest → newest */
      function loadSevenDayColors() {
        const byDay = new Map();
        loadHistoryEntries().forEach((entry) => {
          const key = dayKeyFromEntry(entry);
          const existing = byDay.get(key);
          if (!existing || Number(entry.timestamp || 0) >= Number(existing.timestamp || 0)) {
            byDay.set(key, entry);
          }
        });

        return Array.from(byDay.values())
          .sort((a, b) => Number(a.timestamp || 0) - Number(b.timestamp || 0))
          .slice(-MAX_CASE_DAYS)
          .map((entry) => String(entry.color).trim());
      }

      /** Blend sparse user colors with sample palette to fill 7 crystal stops */
      function buildSevenCrystalStops(userColors) {
        if (!userColors.length) return SAMPLE_CRYSTAL_COLORS.slice();

        if (userColors.length >= MAX_CASE_DAYS) {
          return userColors.slice(-MAX_CASE_DAYS);
        }

        const stops = new Array(MAX_CASE_DAYS);
        const n = userColors.length;

        for (let i = 0; i < n; i++) {
          const slot = n === 1 ? 3 : Math.round((i / (n - 1)) * (MAX_CASE_DAYS - 1));
          stops[slot] = userColors[i];
        }

        for (let i = 0; i < MAX_CASE_DAYS; i++) {
          if (!stops[i]) {
            stops[i] = SAMPLE_CRYSTAL_COLORS[i];
          }
        }

        return stops;
      }

      function buildCrystalGradient(colors) {
        const stops = colors.map((color, i) => {
          const pct = (i / Math.max(1, colors.length - 1)) * 92;
          return `${color} ${pct.toFixed(1)}%`;
        });
        stops.push('rgba(8, 8, 14, 0.96) 100%');
        return `linear-gradient(168deg, ${stops.join(', ')})`;
      }

      function applyCaseGradient() {
        if (!caseGradientEl) return;
        const userColors = loadSevenDayColors();
        const crystal = buildSevenCrystalStops(userColors);
        caseGradientEl.style.background = buildCrystalGradient(crystal);
      }

      function setDeviceModel(device) {
        const model = device === 'android' ? 'android' : 'iphone';
        if (phoneCaseEl) {
          phoneCaseEl.classList.remove('is-iphone', 'is-android');
          phoneCaseEl.classList.add(model === 'android' ? 'is-android' : 'is-iphone');
        }
        deviceBtns.forEach((btn) => {
          const active = btn.dataset.device === model;
          btn.classList.toggle('is-active', active);
          btn.setAttribute('aria-selected', active ? 'true' : 'false');
        });
        try {
          sessionStorage.setItem(DEVICE_STORAGE_KEY, model);
        } catch { /* ignore */ }
      }

      deviceBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          setDeviceModel(btn.dataset.device);
        });
      });

      try {
        const saved = sessionStorage.getItem(DEVICE_STORAGE_KEY);
        if (saved === 'android' || saved === 'iphone') {
          setDeviceModel(saved);
        }
      } catch { /* ignore */ }

      applyCaseGradient();

      window.addEventListener('storage', (e) => {
        if (e.key === INSCAPE_HISTORY_KEY) applyCaseGradient();
      });

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') applyCaseGradient();
      });
    })();
  </script>
</body>
</html>
