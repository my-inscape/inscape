<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#030303">
  <title>プロダクトプレビュー — INSCAPE</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", serif;
      color: #e8e6e2;
    }

    body {
      background:
        repeating-linear-gradient(
          93deg,
          transparent 0,
          transparent 32px,
          rgba(255, 248, 235, 0.018) 32px,
          rgba(255, 248, 235, 0.018) 33px
        ),
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #030303;
    }

    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      flex-shrink: 0;
      padding: calc(0.85rem + env(safe-area-inset-top)) 0.65rem 0.5rem;
      background: linear-gradient(180deg, rgba(13, 13, 17, 0.96) 0%, rgba(13, 13, 17, 0) 100%);
    }

    .nav {
      display: flex;
      gap: 0.12rem;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav::-webkit-scrollbar { display: none; }

    .nav a {
      flex: 0 0 auto;
      font-size: 0.28rem;
      letter-spacing: 0.03em;
      color: rgba(232, 230, 226, 0.36);
      text-decoration: none;
      padding: 0.36rem 0.22rem;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      background: rgba(16, 16, 22, 0.78);
      white-space: nowrap;
    }

    .nav a.is-current {
      color: rgba(201, 169, 98, 0.56);
      border-color: rgba(201, 169, 98, 0.18);
      pointer-events: none;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
    }

    .case-container {
      position: relative;
      width: 260px;
      height: 559px;
      max-width: min(46vw, 16.25rem);
      max-height: min(78dvh, 35rem);
      aspect-ratio: 260 / 559;
      overflow: hidden;
      border-radius: 40px;
      background-color: #ffffff !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35), 0 28px 56px rgba(0, 0, 0, 0.48);
    }

    #caseCanvas,
    .case-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      border-radius: inherit;
    }

    #caseCanvas { z-index: 1; }

    .case-overlay {
      z-index: 2;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .note {
      margin-top: 1.65rem;
      max-width: 18rem;
      text-align: center;
      font-size: 0.52rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      line-height: 1.85;
      color: rgba(232, 228, 220, 0.62);
      opacity: 0.72;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <nav class="nav" aria-label="ナビゲーション">
        <a href="index.html">キャンバス</a>
        <a href="midspace.html">言葉の浮遊層</a>
        <a href="gallery.html">感情の回廊</a>
        <a href="mycolors.html">今日の私の色</a>
        <a href="ocean.html">感情の夜海</a>
        <a href="room.html">合言葉の部屋</a>
        <a class="is-current" href="case.html" aria-current="page">プロダクトプレビュー</a>
      </nav>
    </header>

    <main class="main">
      <div class="case-container" id="caseContainer">
        <canvas id="caseCanvas"></canvas>
        <img src="clear-case-original.png" class="case-overlay" id="caseOverlay" alt="Clear Case" width="360" height="664" decoding="sync" loading="eager">
      </div>
      <p class="note">※実際の製品は、あなただけの本当の色がプリントされた『クリアケース（透明）』として完成します。</p>
    </main>
  </div>

  <script>
    (function () {
      'use strict';

      /* ── gallery.html と同一 ── */
      const GALLERY_KEY = 'inscape_gallery';
      const INSCAPE_HISTORY_KEY = 'inscape_history';
      const HISTORY_KEY = 'histories';
      const LIVE_KEY = 'inscape_splashes';
      const SPLAT_IMAGE = 'splat.png';
      const CANVAS_BG = '#f7f4eb';
      const DEFAULT_CANVAS_W = 270;
      const DEFAULT_CANVAS_H = 480;
      const LEGACY_CANVAS_W = 400;
      const LEGACY_CANVAS_H = 300;

      const box = document.getElementById('caseContainer');
      const canvas = document.getElementById('caseCanvas');
      const overlay = document.getElementById('caseOverlay');

      const splatImg = new Image();
      const stampCache = {};
      let splatReady = false;

      function loadJson(key) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return [];
          const data = JSON.parse(raw);
          return Array.isArray(data) ? data : [];
        } catch {
          return [];
        }
      }

      function parseDateKey(str) {
        if (!str) return '';
        const m = String(str).match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
        if (!m) return String(str).trim();
        return m[1] + '.' + m[2].padStart(2, '0') + '.' + m[3].padStart(2, '0');
      }

      function urlParams() {
        const p = new URLSearchParams(location.search);
        const idx = p.get('idx');
        return {
          date: p.get('date') || '',
          idx: idx !== null && idx !== '' ? parseInt(idx, 10) : -1
        };
      }

      function galleryDates(item) {
        const keys = new Set();
        if (!item) return keys;
        keys.add(parseDateKey(item.date));
        (item.history || []).forEach(function (e) { keys.add(parseDateKey(e.date)); });
        (item.splats || []).forEach(function (s) {
          if (!s.timestamp) return;
          const d = new Date(s.timestamp);
          if (!isNaN(d)) keys.add(d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0'));
        });
        keys.delete('');
        return keys;
      }

      function pickGalleryItem() {
        const params = urlParams();
        if (!params.date && params.idx < 0) return null;
        const list = loadJson(GALLERY_KEY);
        const key = parseDateKey(params.date);
        if (params.idx >= 0 && params.idx < list.length) {
          const item = list[params.idx];
          if (item && item.splats && item.splats.length && (!key || galleryDates(item).has(key))) return item;
        }
        if (key) {
          for (let i = list.length - 1; i >= 0; i--) {
            if (list[i] && list[i].splats && list[i].splats.length && galleryDates(list[i]).has(key)) return list[i];
          }
        }
        return null;
      }

      function migrateSplash(s) {
        let baseSize = s.baseSize || 220;
        if (baseSize < 150) baseSize *= 2.5;
        return {
          nx: s.nx,
          ny: s.ny,
          color: s.color,
          baseSize: baseSize,
          rotation: s.rotation != null ? s.rotation : 0,
          scaleFactor: s.scaleFactor != null ? s.scaleFactor : 1,
          opacity: s.opacity != null ? s.opacity : 0.75
        };
      }

      function loadSplatImage() {
        if (splatReady) return Promise.resolve();
        return new Promise(function (resolve, reject) {
          splatImg.onload = function () {
            if (splatImg.naturalWidth > 0) { splatReady = true; resolve(); }
            else reject(new Error('splat invalid'));
          };
          splatImg.onerror = function () { reject(new Error('splat failed')); };
          splatImg.src = SPLAT_IMAGE;
          if (splatImg.complete && splatImg.naturalWidth > 0) { splatReady = true; resolve(); }
        });
      }

      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth || !color) return null;
        if (stampCache[color]) return stampCache[color];
        const w = splatImg.naturalWidth;
        const h = splatImg.naturalHeight;
        const work = document.createElement('canvas');
        work.width = w;
        work.height = h;
        const wctx = work.getContext('2d');
        wctx.fillStyle = color;
        wctx.fillRect(0, 0, w, h);
        wctx.globalCompositeOperation = 'screen';
        wctx.drawImage(splatImg, 0, 0);
        wctx.globalCompositeOperation = 'source-over';
        stampCache[color] = work;
        return work;
      }

      function drawSplatter(c, splash, w, h) {
        const stamp = createColorStamp(splash.color);
        if (!stamp) return;
        const cx = splash.nx * w;
        const cy = splash.ny * h;
        const size = splash.baseSize * (splash.scaleFactor || 1);
        c.save();
        c.translate(cx, cy);
        c.rotate(splash.rotation || 0);
        c.globalAlpha = splash.opacity != null ? splash.opacity : 1;
        c.globalCompositeOperation = 'multiply';
        c.drawImage(stamp, -size / 2, -size / 2, size, size);
        c.restore();
        c.globalCompositeOperation = 'source-over';
      }

      function getLegacyArtDimensions(item) {
        let legacyW = item && item.canvasW > 0 ? Math.round(item.canvasW) : 0;
        let legacyH = item && item.canvasH > 0 ? Math.round(item.canvasH) : 0;
        if (!legacyW || !legacyH) {
          legacyW = LEGACY_CANVAS_W;
          legacyH = LEGACY_CANVAS_H;
        }
        return { legacyW: legacyW, legacyH: legacyH };
      }

      function isPortrait916(w, h) {
        if (!w || !h) return false;
        return Math.abs((w / h) - (DEFAULT_CANVAS_W / DEFAULT_CANVAS_H)) < 0.04;
      }

      /* 元キャンバス比率を保ったままケース画面へ均等スケール */
      function drawArtUniform(c, artCanvas, displayW, displayH, srcW, srcH) {
        const scale = Math.min(displayW / srcW, displayH / srcH);
        const drawW = srcW * scale;
        const drawH = srcH * scale;
        const offsetX = (displayW - drawW) / 2;
        const offsetY = (displayH - drawH) / 2;
        c.drawImage(artCanvas, offsetX, offsetY, drawW, drawH);
      }

      function punchCameraCutout(c, canvasEl) {
        const cameraUnitWidth = canvasEl.width * 0.42;
        const cameraUnitHeight = canvasEl.height * 0.22;
        c.save();
        c.setTransform(1, 0, 0, 1, 0, 0);
        c.clearRect(0, 0, cameraUnitWidth, cameraUnitHeight);
        c.restore();
      }

      /* gallery.html renderRecipeToCanvas + 均等スケール + カメラ型抜き */
      function renderRecipeToCanvas(canvasEl, splats, item, displayW, displayH) {
        const legacy = getLegacyArtDimensions(item);
        const legacyW = legacy.legacyW;
        const legacyH = legacy.legacyH;
        const targetW = DEFAULT_CANVAS_W;
        const targetH = DEFAULT_CANVAS_H;
        const dpr = Math.min(2, window.devicePixelRatio || 1);

        canvasEl.width = Math.round(displayW * dpr);
        canvasEl.height = Math.round(displayH * dpr);
        canvasEl.style.width = displayW + 'px';
        canvasEl.style.height = displayH + 'px';

        const c = canvasEl.getContext('2d');
        c.setTransform(dpr, 0, 0, dpr, 0, 0);
        c.fillStyle = CANVAS_BG;
        c.fillRect(0, 0, displayW, displayH);

        if (Array.isArray(splats) && splats.length) {
          const needsRemap = !isPortrait916(legacyW, legacyH) || legacyW !== targetW || legacyH !== targetH;

          if (!needsRemap) {
            const art = document.createElement('canvas');
            art.width = targetW;
            art.height = targetH;
            const artCtx = art.getContext('2d');
            artCtx.fillStyle = CANVAS_BG;
            artCtx.fillRect(0, 0, targetW, targetH);
            splats.map(migrateSplash).forEach(function (splash) {
              drawSplatter(artCtx, splash, targetW, targetH);
            });
            drawArtUniform(c, art, displayW, displayH, targetW, targetH);
          } else {
            const off = document.createElement('canvas');
            off.width = legacyW;
            off.height = legacyH;
            const offCtx = off.getContext('2d');
            offCtx.fillStyle = CANVAS_BG;
            offCtx.fillRect(0, 0, legacyW, legacyH);
            splats.map(migrateSplash).forEach(function (splash) {
              drawSplatter(offCtx, splash, legacyW, legacyH);
            });
            drawArtUniform(c, off, displayW, displayH, legacyW, legacyH);
          }
        }

        punchCameraCutout(c, canvasEl);
      }

      function getSplatsAndItem() {
        const galleryItem = pickGalleryItem();
        if (galleryItem && galleryItem.splats && galleryItem.splats.length) {
          return { splats: galleryItem.splats, item: galleryItem };
        }

        const live = loadJson(LIVE_KEY).filter(function (s) {
          return s && s.color && typeof s.nx === 'number';
        });
        if (live.length) {
          return { splats: live, item: { canvasW: DEFAULT_CANVAS_W, canvasH: DEFAULT_CANVAS_H } };
        }

        const recipes = loadJson(HISTORY_KEY).filter(function (s) {
          return s && s.color && typeof s.nx === 'number';
        });
        if (recipes.length) {
          return { splats: recipes, item: { canvasW: DEFAULT_CANVAS_W, canvasH: DEFAULT_CANVAS_H } };
        }

        return { splats: [], item: { canvasW: DEFAULT_CANVAS_W, canvasH: DEFAULT_CANVAS_H } };
      }

      function render() {
        if (!canvas || !box) return;
        const rect = box.getBoundingClientRect();
        const w = Math.round(rect.width);
        const h = Math.round(rect.height);
        if (w < 2 || h < 2) {
          requestAnimationFrame(render);
          return;
        }
        const payload = getSplatsAndItem();
        renderRecipeToCanvas(canvas, payload.splats, payload.item, w, h);
      }

      function fitContainer() {
        if (!box || !overlay || !overlay.naturalWidth) return;
        box.style.aspectRatio = overlay.naturalWidth + ' / ' + overlay.naturalHeight;
        box.style.width = 'min(46vw, 16.25rem)';
        box.style.height = 'auto';
      }

      function boot() {
        loadSplatImage()
          .catch(function () {})
          .then(function () {
            if (overlay && !overlay.complete) {
              overlay.addEventListener('load', function () { fitContainer(); render(); }, { once: true });
            }
            fitContainer();
            render();
          });
      }

      if (box && typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(render).observe(box);
      }
      window.addEventListener('resize', render);
      window.addEventListener('storage', render);
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') render();
      });

      boot();
    })();
  </script>
</body>
</html>
