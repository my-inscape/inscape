<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#030303">
  <title>プロダクトプレビュー — INSCAPE</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", serif;
      color: #e8e6e2;
    }

    body {
      background:
        repeating-linear-gradient(
          93deg,
          transparent 0,
          transparent 32px,
          rgba(255, 248, 235, 0.018) 32px,
          rgba(255, 248, 235, 0.018) 33px
        ),
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #030303;
    }

    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      flex-shrink: 0;
      padding: calc(0.85rem + env(safe-area-inset-top)) 0.65rem 0.5rem;
      background: linear-gradient(180deg, rgba(13, 13, 17, 0.96) 0%, rgba(13, 13, 17, 0) 100%);
    }

    .nav {
      display: flex;
      gap: 0.12rem;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav::-webkit-scrollbar { display: none; }

    .nav a {
      flex: 0 0 auto;
      font-size: 0.28rem;
      letter-spacing: 0.03em;
      color: rgba(232, 230, 226, 0.36);
      text-decoration: none;
      padding: 0.36rem 0.22rem;
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      background: rgba(16, 16, 22, 0.78);
      white-space: nowrap;
    }

    .nav a.is-current {
      color: rgba(201, 169, 98, 0.56);
      border-color: rgba(201, 169, 98, 0.18);
      pointer-events: none;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
    }

    .case-container {
      position: relative;
      width: 280px;
      height: 520px;
      max-width: min(50vw, 17.5rem);
      max-height: min(78dvh, 32.5rem);
      background-color: #f8f9fa;
      border-radius: 45px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow:
        0 4px 14px rgba(0, 0, 0, 0.12),
        0 22px 48px rgba(0, 0, 0, 0.38),
        inset 0 2px 0 rgba(255, 255, 255, 0.95),
        inset 0 -3px 10px rgba(0, 0, 0, 0.05),
        inset 3px 0 8px rgba(255, 255, 255, 0.4),
        inset -3px 0 8px rgba(0, 0, 0, 0.04);
    }

    .camera-hole {
      position: absolute;
      top: 25px;
      left: 25px;
      width: 90px;
      height: 90px;
      border-radius: 24px;
      z-index: 3;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          93deg,
          transparent 0,
          transparent 32px,
          rgba(255, 248, 235, 0.018) 32px,
          rgba(255, 248, 235, 0.018) 33px
        ),
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #030303;
      box-shadow:
        inset 0 3px 8px rgba(0, 0, 0, 0.45),
        inset 0 -1px 3px rgba(255, 255, 255, 0.12),
        inset 2px 0 5px rgba(0, 0, 0, 0.2),
        inset -1px 0 3px rgba(255, 255, 255, 0.08);
    }

    #caseCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
      z-index: 1;
    }

    .note {
      margin-top: 1.65rem;
      max-width: 18rem;
      text-align: center;
      font-size: 0.52rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      line-height: 1.85;
      color: rgba(232, 228, 220, 0.62);
      opacity: 0.72;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <nav class="nav" aria-label="ナビゲーション">
        <a href="index.html">キャンバス</a>
        <a href="midspace.html">言葉の浮遊層</a>
        <a href="gallery.html">感情の回廊</a>
        <a href="mycolors.html">今日の私の色</a>
        <a href="ocean.html">感情の夜海</a>
        <a href="room.html">合言葉の部屋</a>
        <a class="is-current" href="case.html" aria-current="page">プロダクトプレビュー</a>
      </nav>
    </header>

    <main class="main">
      <div class="case-container" id="caseContainer">
        <div class="camera-hole" aria-hidden="true"></div>
        <canvas id="caseCanvas"></canvas>
      </div>
      <p class="note">※実際の製品は、あなただけの本当の色がプリントされた『クリアケース（透明）』として完成します。</p>
    </main>
  </div>

  <script>
    (function () {
      'use strict';

      var INSCAPE_HISTORY_KEY = 'inscape_history';
      var HISTORY_KEY = 'histories';
      var LIVE_KEY = 'inscape_splashes';
      var GALLERY_KEY = 'inscape_gallery';
      var SPLAT_IMAGE = 'splat.png';
      var CANVAS_BG = '#f7f4eb';
      var SRC_W = 270;
      var SRC_H = 480;

      var box = document.getElementById('caseContainer');
      var canvas = document.getElementById('caseCanvas');

      var splatImg = new Image();
      var stampCache = {};
      var splatReady = false;

      splatImg.onload = function () {
        if (splatImg.naturalWidth > 0) {
          splatReady = true;
          stampCache = {};
          render();
        }
      };
      splatImg.onerror = function () { splatReady = false; };
      try { splatImg.src = SPLAT_IMAGE; } catch (e) { splatReady = false; }
      if (splatImg.complete && splatImg.naturalWidth > 0) splatReady = true;

      function loadJson(key) {
        try {
          var raw = localStorage.getItem(key);
          if (!raw) return [];
          var data = JSON.parse(raw);
          return Array.isArray(data) ? data : [];
        } catch (e) {
          return [];
        }
      }

      function getPoints() {
        var history = loadJson(INSCAPE_HISTORY_KEY);
        var points = [];
        var h, e;

        for (h = 0; h < history.length; h++) {
          e = history[h];
          if (!e || !e.points || !Array.isArray(e.points)) continue;
          e.points.forEach(function (pt) {
            if (pt && pt.color) points.push(pt);
          });
        }
        if (points.length) return points;

        var params = new URLSearchParams(location.search);
        var idx = params.get('idx');
        var gallery = loadJson(GALLERY_KEY);
        if (idx !== null && idx !== '' && gallery[parseInt(idx, 10)]) {
          var item = gallery[parseInt(idx, 10)];
          if (item && item.splats && item.splats.length) return item.splats;
        }

        var out = [];
        loadJson(LIVE_KEY).forEach(function (s) {
          if (s && s.color) out.push(s);
        });
        if (out.length) return out;

        loadJson(HISTORY_KEY).forEach(function (s) {
          if (s && s.color) out.push(s);
        });
        return out;
      }

      /* gallery.html と100%同一のスプラッシュ描画 */
      function migrateSplash(s) {
        var baseSize = s.baseSize || s.size || 220;
        if (baseSize < 150) baseSize = baseSize * 2.5;
        return {
          nx: typeof s.nx === 'number' ? s.nx : (s.x != null ? s.x / 100 : 0.5),
          ny: typeof s.ny === 'number' ? s.ny : (s.y != null ? s.y / 100 : 0.5),
          color: s.color,
          baseSize: baseSize,
          rotation: s.rotation != null ? s.rotation : 0,
          scaleFactor: s.scaleFactor != null ? s.scaleFactor : 1,
          opacity: s.opacity != null ? s.opacity : 0.75
        };
      }

      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth || !color) return null;
        if (stampCache[color]) return stampCache[color];
        var w = splatImg.naturalWidth;
        var h = splatImg.naturalHeight;
        var work = document.createElement('canvas');
        work.width = w;
        work.height = h;
        var wctx = work.getContext('2d');
        wctx.fillStyle = color;
        wctx.fillRect(0, 0, w, h);
        wctx.globalCompositeOperation = 'screen';
        wctx.drawImage(splatImg, 0, 0);
        wctx.globalCompositeOperation = 'source-over';
        stampCache[color] = work;
        return work;
      }

      function drawSplatter(c, splash, w, h) {
        var stamp = createColorStamp(splash.color);
        if (!stamp) return;
        var cx = splash.nx * w;
        var cy = splash.ny * h;
        var size = splash.baseSize * (splash.scaleFactor || 1);
        c.save();
        c.translate(cx, cy);
        c.rotate(splash.rotation || 0);
        c.globalAlpha = splash.opacity != null ? splash.opacity : 1;
        c.globalCompositeOperation = 'multiply';
        c.drawImage(stamp, -size / 2, -size / 2, size, size);
        c.restore();
        c.globalCompositeOperation = 'source-over';
      }

      function render() {
        if (!canvas || !box) return;

        var w = Math.round(box.clientWidth) || 280;
        var h = Math.round(box.clientHeight) || 520;
        var dpr = Math.min(2, window.devicePixelRatio || 1);

        canvas.width = Math.round(w * dpr);
        canvas.height = Math.round(h * dpr);
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';

        var ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, w, h);

        var points = getPoints();
        if (!points.length) return;

        var art = document.createElement('canvas');
        art.width = SRC_W;
        art.height = SRC_H;
        var artCtx = art.getContext('2d');
        artCtx.fillStyle = CANVAS_BG;
        artCtx.fillRect(0, 0, SRC_W, SRC_H);

        points.forEach(function (point) {
          if (!point || !point.color) return;
          drawSplatter(artCtx, migrateSplash(point), SRC_W, SRC_H);
        });

        var fitScale = Math.min(w / SRC_W, h / SRC_H);
        var offsetX = (w - SRC_W * fitScale) / 2;
        var offsetY = (h - SRC_H * fitScale) / 2;
        ctx.drawImage(art, offsetX, offsetY, SRC_W * fitScale, SRC_H * fitScale);
      }

      render();

      if (box && typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(render).observe(box);
      }
      window.addEventListener('resize', render);
      window.addEventListener('storage', render);
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') render();
      });
    })();
  </script>
</body>
</html>
