<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="INSCAPE">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>感情の回廊 — INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper-antique: #f7f4eb;
      --mat-ivory: #fbf9f5;
      --gold-antique: #b8860b;
      --wood-walnut: #1c110a;
      --canvas-fabric-url: url('canvas-fabric.png');
      --canvas-portrait-w: 270px;
      --canvas-portrait-h: 480px;
      --canvas-portrait-ratio: 9 / 16;
    }

    html, body {
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      background: #030303;
      color: #e8e6e2;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background:
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #030303;
    }

    .corridor-top {
      position: relative;
      z-index: 2;
      flex: 0 0 auto;
      padding:
        calc(0.85rem + env(safe-area-inset-top))
        calc(0.65rem + env(safe-area-inset-right))
        0
        calc(0.65rem + env(safe-area-inset-left));
    }

    .cloud-sync-wrap {
      position: fixed;
      right: calc(0.25rem + env(safe-area-inset-right));
      bottom: calc(0.35rem + env(safe-area-inset-bottom));
      top: auto;
      z-index: 10100;
      padding: 0.65rem;
      margin: 0;
      touch-action: manipulation;
    }

    .cloud-sync-btn {
      position: relative;
      display: block;
      min-width: 3.25rem;
      min-height: 3.25rem;
      padding: 0.55rem 0.65rem;
      border: 0.5px solid rgba(201, 169, 98, 0.32);
      border-radius: 3px;
      background: rgba(10, 10, 12, 0.88);
      color: rgba(201, 169, 98, 0.82);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-indent: 0.14em;
      line-height: 1.2;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(201, 169, 98, 0.22);
      user-select: none;
      -webkit-user-select: none;
      transform: translateZ(0);
      box-shadow:
        0 2px 16px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease, transform 0.12s ease, box-shadow 0.12s ease;
    }

    .cloud-sync-btn:active:not(:disabled),
    .cloud-sync-btn.is-pressed {
      transform: translateZ(0) scale(0.94);
      background: rgba(201, 169, 98, 0.18);
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.35);
    }

    .cloud-sync-btn.is-cloud {
      border-color: rgba(201, 169, 98, 0.42);
      color: rgba(201, 169, 98, 0.88);
    }

    .cloud-sync-btn.is-syncing {
      color: rgba(232, 230, 226, 0.55);
      pointer-events: none;
    }

    .cloud-sync-btn.is-linked {
      color: rgba(232, 230, 226, 0.55);
      border-color: rgba(232, 230, 226, 0.2);
      min-width: 3.1rem;
    }

    .cloud-sync-btn.is-unconfigured {
      opacity: 0.72;
    }

    .cloud-sync-status {
      position: fixed;
      right: calc(0.55rem + env(safe-area-inset-right));
      bottom: calc(4.85rem + env(safe-area-inset-bottom));
      top: auto;
      z-index: 10099;
      max-width: min(72vw, 14rem);
      padding: 0.55rem 0.7rem;
      border: 0.5px solid rgba(201, 169, 98, 0.22);
      border-radius: 2px;
      background: rgba(8, 8, 10, 0.92);
      color: rgba(232, 230, 226, 0.72);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      line-height: 1.55;
      text-align: right;
      opacity: 0;
      visibility: hidden;
      transform: translateY(6px);
      transition: opacity 0.35s ease, visibility 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }

    .cloud-sync-status.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .cloud-sync-wrap {
        padding: 0.75rem;
      }

      .cloud-sync-btn {
        min-width: 3.5rem;
        min-height: 3.5rem;
        font-size: 0.72rem;
      }

      .cloud-sync-status {
        font-size: 0.62rem;
        max-width: min(78vw, 15rem);
      }
    }

    .site-nav {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 0.22rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .site-nav-link,
    .back-link {
      flex: 1 1 0;
      min-width: 3.4rem;
      max-width: 5.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.3rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-indent: 0.03em;
      color: rgba(232, 230, 226, 0.45);
      text-decoration: none;
      padding: 0.38rem 0.24rem;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      background: rgba(18, 19, 22, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .site-nav-link:hover,
    .back-link:hover {
      color: rgba(232, 230, 226, 0.82);
      border-color: rgba(184, 160, 122, 0.35);
      background: rgba(24, 25, 28, 0.88);
    }

    .site-nav-link.is-current {
      color: rgba(201, 169, 98, 0.62);
      border-color: rgba(201, 169, 98, 0.22);
      background: rgba(201, 169, 98, 0.06);
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .site-nav {
        gap: 0.12rem;
      }

      .site-nav-link,
      .back-link {
        font-size: 0.28rem;
        letter-spacing: 0.02em;
        text-indent: 0.02em;
        padding: 0.34rem 0.18rem;
      }
    }

    .back-link {
      margin-bottom: 0;
    }

    .museum-header {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .museum-title {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.55em;
      text-indent: 0.55em;
      color: rgba(232, 230, 226, 0.52);
      margin-bottom: 0.65rem;
    }

    .museum-subtitle {
      font-size: 0.5rem;
      letter-spacing: 0.35em;
      color: rgba(232, 230, 226, 0.28);
    }

    #gallery-container {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      flex: 0 0 auto;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 80px;
      padding: 20px 5vw calc(1.5rem + env(safe-area-inset-bottom, 0px));
      width: 100%;
      align-items: center;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    #gallery-container::-webkit-scrollbar {
      height: 6px;
    }

    #gallery-container::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
    }

    #gallery-container::-webkit-scrollbar-thumb {
      background: rgba(201, 169, 98, 0.35);
      border-radius: 3px;
    }

    .gallery-item {
      flex-shrink: 0;
      width: auto;
      max-width: min(94vw, calc(var(--canvas-portrait-w) + 4.5rem));
      height: auto;
      margin: 0 auto;
      text-align: center;
      position: relative;
      padding: 40px 0 20px;
      cursor: pointer;
    }

    .gallery-item::before {
      content: '';
      position: absolute;
      top: -8%;
      left: 50%;
      transform: translateX(-50%);
      width: 220%;
      height: 130%;
      background:
        radial-gradient(
          ellipse 38% 48% at 50% 0%,
          rgba(255, 252, 240, 0.42) 0%,
          rgba(255, 245, 210, 0.22) 18%,
          rgba(212, 175, 55, 0.1) 38%,
          rgba(201, 169, 98, 0.04) 55%,
          transparent 72%
        ),
        radial-gradient(
          ellipse 55% 35% at 50% 12%,
          rgba(255, 255, 255, 0.08) 0%,
          transparent 55%
        );
      pointer-events: none;
      z-index: 0;
      filter: blur(0.5px);
    }

    .gallery-item::after {
      content: '';
      position: absolute;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 75%;
      height: 48px;
      background: radial-gradient(ellipse 55% 100% at 50% 0%, rgba(0, 0, 0, 0.55) 0%, transparent 72%);
      pointer-events: none;
      z-index: 0;
      opacity: 0.7;
    }

    .gallery-item > * {
      position: relative;
      z-index: 1;
    }

    .museum-frame-sculpted {
      position: relative;
      box-sizing: border-box;
      display: inline-block;
      width: fit-content;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      padding: 12px;
      background: #ffffff;
      border: 20px solid #1c110a;
      border-top-color: #f3e5ab;
      border-left-color: #d4af37;
      border-right-color: #8a640f;
      border-bottom-color: #5c430a;
      outline: 3px solid #aa7c11;
      outline-offset: -20px;
      box-shadow:
        inset 0 4px 0 rgba(255, 255, 255, 0.35),
        inset 0 -2px 6px rgba(0, 0, 0, 0.06),
        0 4px 14px rgba(0, 0, 0, 0.42),
        0 20px 40px rgba(0, 0, 0, 0.8),
        0 36px 72px rgba(0, 0, 0, 0.52);
    }

    .museum-frame-sculpted::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 20px solid transparent;
      border-image: linear-gradient(145deg, rgba(255, 255, 255, 0.12) 0%, transparent 42%, rgba(0, 0, 0, 0.12) 100%) 1;
      opacity: 0.55;
    }

    .art-surface {
      position: relative;
      display: block;
      width: var(--canvas-portrait-w);
      max-width: 100%;
      height: auto;
      aspect-ratio: var(--canvas-portrait-ratio);
      margin: 0 auto;
      padding: 0;
      overflow: hidden;
      z-index: 2;
      line-height: 0;
      font-size: 0;
      background-color: #f7f4eb;
      background-image: none;
      opacity: 1;
      isolation: isolate;
    }

    .art-surface--snapshot {
      background-color: #f7f4eb;
    }

    .gallery-art-image {
      display: block;
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      max-height: none !important;
      object-fit: contain;
      object-position: center;
      margin: 0 auto !important;
      padding: 0 !important;
      box-sizing: border-box;
      z-index: 1;
      background: #f7f4eb;
      box-shadow: none;
      opacity: 1;
    }

    .gallery-art-canvas {
      display: block;
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      max-height: none !important;
      margin: 0 auto !important;
      padding: 0 !important;
      box-sizing: border-box;
      z-index: 1;
      background: #f7f4eb !important;
      background-image: none !important;
      box-shadow: none;
      opacity: 1;
    }

    .art-period-caption {
      margin-top: 1.1rem;
      padding: 0 0.35rem;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "Georgia", "Times New Roman", serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-indent: 0.14em;
      color: rgba(136, 136, 136, 0.88);
      line-height: 1.6;
      text-align: center;
    }

    .art-period-caption:empty {
      display: none;
    }

    .museum-wall-display {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 100%;
      text-align: center;
      overflow: visible;
      padding: 2rem 1rem 1.5rem;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.18) 0%, rgba(0, 0, 0, 0) 70%),
        radial-gradient(ellipse 88% 52% at 50% -6%, rgba(255, 252, 240, 0.09) 0%, transparent 55%),
        #0a0a0a;
      border-radius: 1px;
    }

    .museum-wall-display::before {
      content: '';
      position: absolute;
      inset: -8% -14%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 6%, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0) 62%),
        radial-gradient(ellipse 65% 38% at 50% 0%, rgba(201, 169, 98, 0.05) 0%, transparent 58%);
      opacity: 0.9;
    }

    .museum-wall-display > * {
      position: relative;
      z-index: 1;
    }

    .gallery-item .museum-wall-display {
      padding: 1.5rem 0.5rem 1.1rem;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.14) 0%, rgba(0, 0, 0, 0) 68%),
        radial-gradient(ellipse 85% 48% at 50% -5%, rgba(255, 252, 240, 0.07) 0%, transparent 52%),
        rgba(8, 8, 9, 0.88);
    }

    .museum-wall-export {
      padding: 2.75rem 1.5rem 2rem !important;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.18) 0%, rgba(0, 0, 0, 0) 70%),
        radial-gradient(ellipse 88% 52% at 50% -6%, rgba(255, 252, 240, 0.09) 0%, transparent 55%),
        #0a0a0a !important;
    }

    .no-data {
      flex-shrink: 0;
      width: 100%;
      color: #666;
      text-align: center;
      padding: 2rem;
      line-height: 2;
      letter-spacing: 0.08em;
      font-size: 0.72rem;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(28, 24, 20, 0.95) 0%, rgba(8, 7, 9, 0.98) 55%, #050506 100%);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.45s ease, visibility 0.45s ease;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .modal-vault {
      position: relative;
      width: 100%;
      min-height: min(100%, 100dvh);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      flex-shrink: 0;
      padding:
        calc(2.75rem + env(safe-area-inset-top))
        calc(1rem + env(safe-area-inset-right))
        calc(1.25rem + env(safe-area-inset-bottom))
        calc(1rem + env(safe-area-inset-left));
    }

    .vault-orbs-layer {
      position: absolute;
      inset: 0;
      z-index: 5;
      overflow: visible;
      pointer-events: none;
    }

    .vault-orbs-layer .vault-orb {
      pointer-events: auto;
      z-index: 5;
    }

    .vault-orb {
      position: absolute;
      border-radius: 50%;
      border: none;
      padding: 0;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.6);
      z-index: 5;
      will-change: transform, opacity;
      animation:
        vaultOrbIn 0.85s cubic-bezier(0.34, 1.2, 0.64, 1) var(--in-delay, 0s) forwards,
        vaultFloat var(--float-dur, 8s) ease-in-out var(--float-delay, 0s) infinite;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.55) 0%, transparent 42%),
        radial-gradient(circle at 72% 78%, rgba(0, 0, 0, 0.45) 0%, transparent 48%),
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--orb-color) 78%, white) 0%, var(--orb-color) 58%, color-mix(in srgb, var(--orb-color) 45%, black) 100%);
      box-shadow:
        inset 0 2px 6px rgba(255, 255, 255, 0.28),
        inset 0 -4px 10px rgba(0, 0, 0, 0.35),
        0 8px 28px rgba(0, 0, 0, 0.55),
        0 0 24px color-mix(in srgb, var(--orb-color) 35%, transparent);
      transition: transform 0.35s ease, box-shadow 0.35s ease, opacity 0.35s ease;
    }

    .vault-orb:hover,
    .vault-orb:focus-visible {
      z-index: 6;
      filter: brightness(1.15);
      box-shadow:
        inset 0 2px 8px rgba(255, 255, 255, 0.4),
        0 0 36px color-mix(in srgb, var(--orb-color) 55%, transparent);
      outline: none;
    }

    @keyframes vaultOrbIn {
      to { opacity: 0.84; transform: scale(1); }
    }

    @keyframes vaultFloat {
      0%   { translate: var(--fx0, 0px) var(--fy0, 0px); }
      18%  { translate: var(--fx1, 6px) var(--fy1, -14px); }
      38%  { translate: var(--fx2, -12px) var(--fy2, 5px); }
      55%  { translate: var(--fx3, 9px) var(--fy3, 11px); }
      72%  { translate: var(--fx4, -7px) var(--fy4, -9px); }
      88%  { translate: var(--fx5, 11px) var(--fy5, 3px); }
      100% { translate: var(--fx0, 0px) var(--fy0, 0px); }
    }

    .vault-tagline {
      position: absolute;
      bottom: calc(1.1rem + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: min(92vw, 22rem);
      text-align: center;
      font-size: 0.58rem;
      font-weight: 300;
      line-height: 2;
      letter-spacing: 0.12em;
      color: rgba(201, 169, 98, 0.42);
      pointer-events: none;
    }

    .modal-content {
      position: relative;
      z-index: 3;
      width: min(92vw, calc(var(--canvas-portrait-w) + 6rem));
      max-height: min(
        90dvh,
        calc(100dvh - 3.5rem - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px))
      );
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      text-align: center;
      transform: scale(0.88) translateY(12px);
      opacity: 0;
      transition: transform 0.5s cubic-bezier(0.34, 1.15, 0.64, 1), opacity 0.45s ease;
      pointer-events: auto;
      isolation: isolate;
      padding-bottom: 0.35rem;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .modal-content .museum-frame-sculpted {
      margin: 0 auto;
      box-shadow:
        inset 0 5px 0 rgba(255, 255, 255, 0.22),
        inset 0 -3px 10px rgba(0, 0, 0, 0.62),
        0 6px 18px rgba(0, 0, 0, 0.48),
        0 20px 40px rgba(0, 0, 0, 0.82),
        0 40px 80px rgba(0, 0, 0, 0.58),
        0 0 72px rgba(255, 252, 235, 0.045);
    }

    .modal-content .museum-wall-display {
      padding: 2.5rem 1.15rem 1.75rem;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.2) 0%, rgba(0, 0, 0, 0) 70%),
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(255, 252, 240, 0.1) 0%, transparent 54%),
        radial-gradient(ellipse 120% 80% at 50% 100%, rgba(0, 0, 0, 0.55) 0%, transparent 62%),
        #0a0a0a;
    }

    .modal-content .art-period-caption {
      margin-top: 1.15rem;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "Georgia", "Times New Roman", serif;
      font-size: 12px;
      font-weight: 300;
      color: rgba(136, 136, 136, 0.88);
      letter-spacing: 0.14em;
      text-indent: 0.14em;
      text-align: center;
    }

    .memory-popover {
      position: fixed;
      z-index: 10020;
      max-width: min(88vw, 18rem);
      padding: 1rem 1.1rem;
      background: rgba(14, 13, 16, 0.94);
      border: 0.5px solid rgba(201, 169, 98, 0.22);
      border-radius: 2px;
      box-shadow:
        0 16px 48px rgba(0, 0, 0, 0.75),
        0 0 32px rgba(201, 169, 98, 0.08);
      opacity: 0;
      visibility: hidden;
      transform: translate(-50%, -50%) scale(0.92);
      transition: opacity 0.35s ease, visibility 0.35s ease, transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
      pointer-events: none;
    }

    .memory-popover.visible {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    .memory-popover-date {
      font-size: 0.52rem;
      letter-spacing: 0.22em;
      color: rgba(201, 169, 98, 0.65);
      margin-bottom: 0.75rem;
    }

    .memory-popover-text {
      font-size: 0.78rem;
      font-weight: 300;
      line-height: 1.85;
      letter-spacing: 0.06em;

  <div id="gallery-container"></div>
  <div class="cloud-sync-wrap">

  </div>

  <script>
    (function () {
      'use strict';

      const GALLERY_KEY = 'inscape_gallery';
      const INSCAPE_HISTORY_KEY = 'inscape_history';
      const HISTORY_KEY = 'histories';
      const SPLASHES_KEY = 'inscape_splashes';
      const SPLAT_IMAGE = 'splat.png';
      const FABRIC_IMAGE = 'canvas-fabric.png';
      const CANVAS_BG = '#f7f4eb';
      const DEFAULT_CANVAS_W = 270;
      const DEFAULT_CANVAS_H = 480;
      const EXPORT_W = 1080;
      const EXPORT_H = 1920;
      const MAX_WORD_ENTRIES = 7;

      const splatImg = new Image();
      const fabricImg = new Image();
      const stampCache = {};
      let splatReady = false;
      let fabricReady = false;
      let fabricLoadPromise = null;
      let savePreviewObjectUrl = null;

      function formatHistoryDate(ts, fallback) {
        if (!ts) return fallback || '';
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return fallback || '';
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        const hr = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${y}/${mo}/${da} ${hr}:${mi}`;
      }

      function normalizeCoord(value, fallback) {
        if (typeof value !== 'number' || Number.isNaN(value)) return fallback;
        if (value > 1 && value <= 100) return value / 100;
        return value;
      }

      function mapHistoryEntry(entry, fallbackDate) {
        return {
          word: entry.word || entry.text || '',
          color: entry.color,
          date: entry.date || formatHistoryDate(entry.timestamp, fallbackDate || ''),
          timestamp: entry.timestamp || 0
        };
      }

      function pointToSplash(point) {
        if (!point || !point.color) return null;
        const nx = normalizeCoord(point.nx, normalizeCoord(point.x, undefined));
        const ny = normalizeCoord(point.ny, normalizeCoord(point.y, undefined));
        if (typeof nx !== 'number' || typeof ny !== 'number') return null;

        let baseSize = point.baseSize || point.size;
        if (!baseSize || baseSize < 1) baseSize = 220;

        return {
          nx,
          ny,
          color: point.color,
          baseSize,
          scaleFactor: point.scaleFactor ?? 1,
          rotation: point.rotation ?? 0,
          opacity: point.opacity ?? 0.75,
          word: point.word || '',
          timestamp: point.timestamp || 0
        };
      }

      function parseInscapeHistorySessions() {
        const sessions = [];
        try {
          const raw = localStorage.getItem(INSCAPE_HISTORY_KEY);
          if (!raw) return sessions;
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return sessions;

          data.forEach((item, sessionIndex) => {
            if (!item || typeof item !== 'object') return;

            if (Array.isArray(item.points) || Array.isArray(item.history)) {
              const points = Array.isArray(item.points) ? item.points : [];
              const history = Array.isArray(item.history) ? item.history : [];
              const splats = points.map(pointToSplash).filter(Boolean);
              sessions.push({
                points,
                splats,
                history: history.map((e) => mapHistoryEntry(e)).filter((e) => e.color),
                updatedAt: item.updatedAt || item.timestamp || 0,
                sessionIndex,
                title: item.title,
                analysis: item.analysis,
                wordsHash: item.wordsHash
              });
              return;
            }

            if (item.color && (item.word || item.text)) {
              let legacySession = sessions.find((s) => s._legacyFlat);
              if (!legacySession) {
                legacySession = {
                  points: [],
                  splats: [],
                  history: [],
                  updatedAt: 0,
                  sessionIndex,
                  _legacyFlat: true
                };
                sessions.push(legacySession);
              }
              const entry = mapHistoryEntry(item);
              legacySession.history.push(entry);
              if ((entry.timestamp || 0) > legacySession.updatedAt) {
                legacySession.updatedAt = entry.timestamp || 0;
              }
            }
          });
        } catch (err) {
          console.warn('inscape_history の解析に失敗:', err);
        }
        return sessions;
      }

      function loadSplashesFallback() {
        try {
          const raw = localStorage.getItem(SPLASHES_KEY);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          return data.map((s) => pointToSplash(s) || migrateSplash(s)).filter((s) => s && s.color);
        } catch {
          return [];
        }
      }

      function loadHistoriesFallback() {
        try {
          const raw = localStorage.getItem(HISTORY_KEY);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          return data.map((s) => pointToSplash(s) || migrateSplash(s)).filter((s) => s && s.color);
        } catch {
          return [];
        }
      }

      function splatsFingerprint(splats) {
        return splats
          .map((s) => `${Number(s.nx).toFixed(4)}|${Number(s.ny).toFixed(4)}|${s.color}|${s.timestamp || 0}`)
          .join('\u241f');
      }

      function getSplatsFromItem(item) {
        if (!item) return [];
        if (Array.isArray(item.splats) && item.splats.length) {
          return item.splats
            .map((s) => {
              const normalized = pointToSplash(s);
              return migrateSplash(normalized || s);
            })
            .filter((s) => s && s.color && typeof s.nx === 'number');
        }
        if (Array.isArray(item.points) && item.points.length) {
          return item.points.map(pointToSplash).filter(Boolean).map(migrateSplash);
        }
        return [];
      }

      function sessionToGalleryItem(session, storageRef) {
        let splats = session.splats && session.splats.length
          ? session.splats.map(migrateSplash)
          : session.points.map(pointToSplash).filter(Boolean).map(migrateSplash);

        if (!splats.length) {
          const fromHistories = loadHistoriesFallback();
          if (fromHistories.length) splats = fromHistories.map(migrateSplash);
        }
        if (!splats.length) {
          const live = loadSplashesFallback();
          if (live.length) splats = live.map(migrateSplash);
        }

        let history = Array.isArray(session.history) ? session.history : [];
        if (!history.length && splats.length) {
          history = splats.map((s, i) => mapHistoryEntry({
            word: s.word,
            color: s.color,
            timestamp: s.timestamp || i
          }));
        }

        return {
          splats,
          points: session.points || splats,
          history,
          date: history.length ? (history[history.length - 1].date || '') : '',
          updatedAt: session.updatedAt || 0,
          canvasW: DEFAULT_CANVAS_W,
          canvasH: DEFAULT_CANVAS_H,
          storageRef,
          source: storageRef.kind,
          title: session.title,
          analysis: session.analysis,
          wordsHash: session.wordsHash
        };
      }

      function loadGalleryRaw() {
        if (window.InscapeCloud && InscapeCloud.isReady()) {
          return InscapeCloud.getGallery();
        }
        try {
          const data = JSON.parse(localStorage.getItem(GALLERY_KEY)) || [];
          return Array.isArray(data) ? data : [];
        } catch {
          return [];
        }
      }

      function saveGalleryRaw(gallery) {
        const list = Array.isArray(gallery) ? gallery : [];
        if (window.InscapeCloud && InscapeCloud.isReady()) {
          InscapeCloud.setGallery(list);
          return;
        }
        try {
          localStorage.setItem(GALLERY_KEY, JSON.stringify(list));
        } catch (err) {
          console.warn('ギャラリー保存に失敗:', err);
        }
      }

      function drawSpacedText(ctx, text, centerX, y, spacingPx) {
        const chars = text.split('');
        let totalWidth = 0;
        chars.forEach((ch, i) => {
          totalWidth += ctx.measureText(ch).width;
          if (i < chars.length - 1) totalWidth += spacingPx;
        });
        let x = centerX - totalWidth / 2;
        chars.forEach((ch, i) => {
          ctx.fillText(ch, x, y);
          x += ctx.measureText(ch).width + (i < chars.length - 1 ? spacingPx : 0);
        });
      }

      function drawMuseumSpotlightBackground(ctx, w, h) {
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, w, h);

        const spotlight = ctx.createRadialGradient(
          w * 0.5, h * 0.1, 0,
          w * 0.5, h * 0.1, Math.max(w, h) * 0.82
        );
        spotlight.addColorStop(0, 'rgba(255, 255, 255, 0.18)');
        spotlight.addColorStop(0.32, 'rgba(255, 255, 255, 0.07)');
        spotlight.addColorStop(0.7, 'rgba(0, 0, 0, 0)');
        spotlight.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = spotlight;
        ctx.fillRect(0, 0, w, h);

        const warmGlow = ctx.createRadialGradient(
          w * 0.5, h * 0.02, 0,
          w * 0.5, h * 0.02, w * 0.58
        );
        warmGlow.addColorStop(0, 'rgba(255, 252, 240, 0.1)');
        warmGlow.addColorStop(0.45, 'rgba(255, 252, 240, 0.025)');
        warmGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = warmGlow;
        ctx.fillRect(0, 0, w, h);

        const vignette = ctx.createRadialGradient(
          w * 0.5, h * 0.46, Math.min(w, h) * 0.16,
          w * 0.5, h * 0.46, Math.max(w, h) * 0.96
        );
        vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
        vignette.addColorStop(0.52, 'rgba(0, 0, 0, 0.22)');
        vignette.addColorStop(0.82, 'rgba(5, 5, 5, 0.72)');
        vignette.addColorStop(1, 'rgba(5, 5, 5, 0.96)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, w, h);

        const floorFade = ctx.createLinearGradient(0, h * 0.68, 0, h);
        floorFade.addColorStop(0, 'rgba(0, 0, 0, 0)');
        floorFade.addColorStop(1, 'rgba(0, 0, 0, 0.52)');
        ctx.fillStyle = floorFade;
        ctx.fillRect(0, 0, w, h);
      }

      async function compositeToMuseumExport(artCanvas) {
        const final = document.createElement('canvas');
        final.width = EXPORT_W;
        final.height = EXPORT_H;
        const ctx = final.getContext('2d');

        drawMuseumSpotlightBackground(ctx, EXPORT_W, EXPORT_H);

        const logoReserve = 148;
        const topMargin = 220;
        const sidePad = 96;
        const maxW = EXPORT_W - sidePad * 2;
        const maxH = EXPORT_H - topMargin - logoReserve - 100;

        const scale = Math.min(maxW / artCanvas.width, maxH / artCanvas.height);
        const dw = artCanvas.width * scale;
        const dh = artCanvas.height * scale;
        const dx = (EXPORT_W - dw) / 2;
        const dy = topMargin + (maxH - dh) / 2;

        ctx.drawImage(artCanvas, dx, dy, dw, dh);

        ctx.save();
        const logoSize = 34;
        ctx.font = `300 ${logoSize}px "Times New Roman", Georgia, serif`;
        ctx.fillStyle = 'rgba(190, 190, 190, 0.62)';
        ctx.textBaseline = 'middle';
        drawSpacedText(ctx, 'INSCAPE', EXPORT_W / 2, EXPORT_H - 92, logoSize * 0.44);
        ctx.restore();

        return htmlCanvasToBlob(final);
      }

      function resolveSplashDrawSize(s) {
        if (typeof s.drawSizePx === 'number' && s.drawSizePx > 0) return s.drawSizePx;
        const baseSize = s.baseSize || s.size || 95;
        return baseSize * (s.scaleFactor ?? 1);
      }

      function migrateSplash(s) {
        let baseSize = s.baseSize || s.size || 95;
        if (baseSize >= 200) {
          // 旧仕様（220〜410px台）のデータはそのまま維持
        } else if (baseSize > 0 && baseSize < 35) {
          baseSize *= 2.5;
        }
        const drawSizePx = resolveSplashDrawSize({ ...s, baseSize });
        return {
          nx: s.nx,
          ny: s.ny,
          color: s.color || s.color1,
          baseSize,
          drawSizePx,
          rotation: s.rotation ?? 0,
          scaleFactor: s.scaleFactor ?? 1,
          opacity: s.opacity ?? 0.75,
          splashPattern: s.splashPattern ?? 0,
          word: s.word || '',
          timestamp: s.timestamp || 0
        };
      }

      function loadSplatImage() {
        return new Promise((resolve, reject) => {
          splatImg.onload = () => {
            if (splatImg.naturalWidth > 0) {
              splatReady = true;
              resolve();
            } else {
              reject(new Error('splat.png invalid'));
            }
          };
          splatImg.onerror = () => reject(new Error('splat.png load failed'));
          splatImg.src = SPLAT_IMAGE;
          if (splatImg.complete && splatImg.naturalWidth > 0) {
            splatReady = true;
            resolve();
          }
        });
      }

      function loadFabricImage() {
        if (fabricReady && fabricImg.naturalWidth > 0) return Promise.resolve(fabricImg);
        if (fabricLoadPromise) return fabricLoadPromise;

        fabricLoadPromise = new Promise((resolve) => {
          const finish = (ok) => {
            fabricLoadPromise = null;
            if (ok) {
              fabricReady = true;
              resolve(fabricImg);
            } else {
              resolve(null);
            }
          };

          fabricImg.onload = () => finish(fabricImg.naturalWidth > 0);
          fabricImg.onerror = () => finish(false);
          fabricImg.src = FABRIC_IMAGE;

          if (fabricImg.complete) {
            finish(fabricImg.naturalWidth > 0);
          }
        });

        return fabricLoadPromise;
      }

      function drawCanvasCrosshatch(targetCtx, w, h) {
        targetCtx.save();
        targetCtx.strokeStyle = 'rgba(0, 0, 0, 0.03)';
        targetCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 4) {
          targetCtx.beginPath();
          targetCtx.moveTo(0, y);
          targetCtx.lineTo(w, y);
          targetCtx.stroke();
        }
        for (let x = 0; x < w; x += 4) {
          targetCtx.beginPath();
          targetCtx.moveTo(x, 0);
          targetCtx.lineTo(x, h);
          targetCtx.stroke();
        }
        targetCtx.restore();
      }

      function drawCanvasBackgroundOnly(targetCtx, w, h) {
        targetCtx.globalCompositeOperation = 'source-over';
        targetCtx.fillStyle = CANVAS_BG;
        targetCtx.fillRect(0, 0, w, h);
      }

      function drawCanvasFabricBase(targetCtx, w, h, fabricImage) {
        targetCtx.globalCompositeOperation = 'source-over';
        targetCtx.fillStyle = CANVAS_BG;
        targetCtx.fillRect(0, 0, w, h);
        drawCanvasCrosshatch(targetCtx, w, h);
        if (fabricImage && fabricImage.naturalWidth > 0) {
          targetCtx.globalCompositeOperation = 'multiply';
          targetCtx.drawImage(fabricImage, 0, 0, w, h);
          targetCtx.globalCompositeOperation = 'source-over';
        }
      }

      function drawCanvasFabricOverlay(targetCtx, w, h, fabricImage) {
        if (!fabricImage || fabricImage.naturalWidth <= 0) return;
        targetCtx.save();
        targetCtx.globalAlpha = 0.35;
        targetCtx.globalCompositeOperation = 'multiply';
        targetCtx.drawImage(fabricImage, 0, 0, w, h);
        targetCtx.restore();
      }

      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth) return null;
        if (stampCache[color]) return stampCache[color];

        const w = splatImg.naturalWidth;
        const h = splatImg.naturalHeight;
        const work = document.createElement('canvas');
        work.width = w;
        work.height = h;
        const wctx = work.getContext('2d');

        wctx.fillStyle = color;
        wctx.fillRect(0, 0, w, h);
        wctx.globalCompositeOperation = 'screen';
        wctx.drawImage(splatImg, 0, 0);
        wctx.globalCompositeOperation = 'source-over';

        stampCache[color] = work;
        return work;
      }

      function drawSplatterStamp(c, stamp, size, alpha, pattern) {
        const p = pattern ?? 0;
        if (p === 1) {
          c.globalAlpha = alpha;
          c.drawImage(stamp, -size / 2, -size / 2, size, size);
          const spur = size * 0.36;
          const offsets = [[1, 0], [-1, 0], [0, -1], [0.65, 0.65]];
          offsets.forEach(([dx, dy]) => {
            c.globalAlpha = alpha * 0.52;
            c.drawImage(stamp, dx * spur - spur * 0.5, dy * spur - spur * 0.5, spur, spur);
          });
          return;
        }
        if (p === 2) {
          const heavy = size * 1.28;
          c.globalAlpha = alpha * 0.9;
          c.drawImage(stamp, -heavy / 2, -heavy / 2, heavy, heavy);
          c.globalAlpha = alpha * 0.42;
          c.drawImage(stamp, -size / 2, -size / 2, size, size);
          return;
        }
        c.globalAlpha = alpha;
        c.drawImage(stamp, -size / 2, -size / 2, size, size);
      }

      function drawSplatter(c, splash, w, h) {
        const stamp = createColorStamp(splash.color);
        if (!stamp) return;

        const cx = splash.nx * w;
        const cy = splash.ny * h;
        const size = splash.drawSizePx || (splash.baseSize * (splash.scaleFactor || 1));

        c.save();
        c.translate(cx, cy);
        c.rotate(splash.rotation || 0);
        c.globalCompositeOperation = 'multiply';
        drawSplatterStamp(c, stamp, size, splash.opacity ?? 1, splash.splashPattern ?? 0);
        c.restore();
        c.globalCompositeOperation = 'source-over';
      }

      function syncSnapshotAspect(surface, img) {
        const w = img.naturalWidth || 0;
        const h = img.naturalHeight || 0;
        if (!surface || !w || !h || h <= w) return;
        surface.style.aspectRatio = `${w} / ${h}`;
      }

      function mountArtworkSurface(surface, item) {
        if (!surface) return null;

        let artEl;
        if (item.artworkImageDataUrl) {
          surface.classList.add('art-surface--snapshot');
          const img = document.createElement('img');
          img.className = 'gallery-art-image';
          img.src = item.artworkImageDataUrl;
          img.alt = '';
          img.draggable = false;
          if (img.complete) {
            syncSnapshotAspect(surface, img);
          } else {
            img.addEventListener('load', () => syncSnapshotAspect(surface, img), { once: true });
          }
          surface.appendChild(img);
          artEl = img;
        } else {
          const artCanvas = document.createElement('canvas');
          artCanvas.className = 'gallery-art-canvas';
          renderRecipeToCanvas(artCanvas, getSplatsFromItem(item), item);
          surface.appendChild(artCanvas);
          artEl = artCanvas;
        }

        return artEl;
      }

      function renderRecipeToCanvas(canvasEl, splats, item) {
        const targetW = DEFAULT_CANVAS_W;
        const targetH = DEFAULT_CANVAS_H;
        const srcW = item && item.canvasW > 0 ? Math.round(item.canvasW) : targetW;
        const srcH = item && item.canvasH > 0 ? Math.round(item.canvasH) : targetH;
        const dpr = window.devicePixelRatio || 1;
        canvasEl.width = Math.round(targetW * dpr);
        canvasEl.height = Math.round(targetH * dpr);

        const c = canvasEl.getContext('2d');
        c.setTransform(dpr, 0, 0, dpr, 0, 0);
        const fabricImage = fabricReady && fabricImg.naturalWidth > 0 ? fabricImg : null;

        if (!Array.isArray(splats) || !splats.length) {
          drawCanvasBackgroundOnly(c, targetW, targetH);
          drawCanvasFabricOverlay(c, targetW, targetH, fabricImage);
          return;
        }

        if (srcW === targetW && srcH === targetH) {
          drawCanvasBackgroundOnly(c, targetW, targetH);
          splats.map(migrateSplash).forEach((splash) => {
            drawSplatter(c, splash, targetW, targetH);
          });
          drawCanvasFabricOverlay(c, targetW, targetH, fabricImage);
          return;
        }

        const off = document.createElement('canvas');
        off.width = srcW;
        off.height = srcH;
        const offCtx = off.getContext('2d');
        drawCanvasBackgroundOnly(offCtx, srcW, srcH);
        splats.map(migrateSplash).forEach((splash) => {
          drawSplatter(offCtx, splash, srcW, srcH);
        });
        drawCanvasFabricOverlay(offCtx, srcW, srcH, fabricImage);
        c.drawImage(off, 0, 0, targetW, targetH);
      }

      function loadGallery() {
        const items = [];

        try {
          const data = loadGalleryRaw();
          if (Array.isArray(data)) {
            data.forEach((entry, index) => {
              if (!entry) return;
              const splats = getSplatsFromItem(entry);
              if (!splats.length && !entry.artworkImageDataUrl) return;
              items.push({
                ...entry,
                splats,
                storageRef: { kind: 'gallery', index },
                source: 'inscape_gallery'
              });
            });
          }
        } catch (err) {
          console.warn('inscape_gallery の読み込みに失敗:', err);
        }

        return items;
      }

      function htmlCanvasToBlob(canvasEl) {
        return new Promise((resolve, reject) => {
          if (!canvasEl || !canvasEl.width || !canvasEl.height) {
            reject(new Error('canvas invalid'));

          }
          canvasEl.toBlob((blob) => {

      async function captureFramedArtworkBlob(containerEl) {

      function normalizeGalleryDateKey(str) {
        if (!str) return '';
        const matched = String(str).match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
        if (!matched) return String(str).trim();
        const y = matched[1];
        const mo = String(matched[2]).padStart(2, '0');
        const da = String(matched[3]).padStart(2, '0');
        return `${y}.${mo}.${da}`;
      }

      function formatDotDate(d) {
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        return `${y}.${mo}.${da}`;
      }

      function parseHistoryEntryToDate(entry) {
        if (!entry) return null;
        if (entry.timestamp && Number(entry.timestamp) > 0) {
          const d = new Date(entry.timestamp);
          if (!Number.isNaN(d.getTime())) return d;
        }
        if (entry.date) {
          const dateStr = String(entry.date);
          const matched = dateStr.match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
          if (matched) {
            const d = new Date(Number(matched[1]), Number(matched[2]) - 1, Number(matched[3]));
            if (!Number.isNaN(d.getTime())) return d;
          }
          const parsed = Date.parse(dateStr);
          if (!Number.isNaN(parsed)) return new Date(parsed);
        }
        return null;
      }

      function compactDotDate(dotDate) {
        const m = String(dotDate || '').match(/\d{4}\.(\d{2}\.\d{2})/);
        return m ? m[1] : String(dotDate || '');
      }

      function formatCompactPeriod(startStr, endStr) {
        const a = compactDotDate(startStr);
        const b = compactDotDate(endStr);
        if (!a && !b) return '';
        if (!b || a === b) return a;
        return `${a} - ${b}`;
      }

      function getArtworkDiaryDay(ts) {
        const n = Number(ts);
        if (!n || n <= 0) return null;
        const d = new Date(n);
        if (Number.isNaN(d.getTime())) return null;
        const shifted = new Date(d.getTime() - (6 * 60 * 60 * 1000));
        return new Date(shifted.getFullYear(), shifted.getMonth(), shifted.getDate());
      }

      function collectArtworkDiaryDays(list) {
        const source = Array.isArray(list) ? list : [];
        const seen = new Set();
        const days = [];
        source.forEach((entry) => {
          const day = getArtworkDiaryDay(entry && entry.timestamp);
          if (!day) return;
          const key = day.getTime();
          if (seen.has(key)) return;
          seen.add(key);
          days.push(day);
        });
        days.sort((a, b) => a.getTime() - b.getTime());
        return days;
      }

      function periodCaptionFromDays(days) {
        if (!days.length) return '';
        const startStr = formatDotDate(days[0]);
        const endStr = formatDotDate(days[days.length - 1]);
        return formatCompactPeriod(startStr, endStr);
      }

      function computeArtworkPeriodCaption(item) {
        const splats = getSplatsFromItem(item);
        const daysFromSplats = collectArtworkDiaryDays(splats);
        if (daysFromSplats.length) {
          return periodCaptionFromDays(daysFromSplats);
        }

        if (item.periodStart && item.periodEnd) {
          return formatCompactPeriod(item.periodStart, item.periodEnd);
        }
        if (item.period) {
          const parts = String(item.period).split(' - ').map((s) => s.trim());
          if (parts.length === 2) return formatCompactPeriod(parts[0], parts[1]);
          return compactDotDate(parts[0]);
        }

        const history = resolveArtworkHistory(item);
        const historyDays = [];
        const seenHistoryDays = new Set();
        history.forEach((entry) => {
          const parsed = parseHistoryEntryToDate(entry);
          if (!parsed) return;
          const day = getArtworkDiaryDay(parsed.getTime());
          if (!day) return;
          const key = day.getTime();
          if (seenHistoryDays.has(key)) return;
          seenHistoryDays.add(key);
          historyDays.push(day);
        });
        historyDays.sort((a, b) => a.getTime() - b.getTime());
        if (historyDays.length) {
          return periodCaptionFromDays(historyDays);
        }

        if (item.completedAt) {
          const completedDay = getArtworkDiaryDay(item.completedAt);
          if (completedDay) return compactDotDate(formatDotDate(completedDay));
        }

        const fallback = parseHistoryEntryToDate({ date: item.date, timestamp: item.completedAt || 0 });
        return fallback ? compactDotDate(formatDotDate(fallback)) : '';
      }

      function createPeriodCaptionElement(item) {
        const caption = document.createElement('p');
        caption.className = 'art-period-caption';
        caption.textContent = computeArtworkPeriodCaption(item);
        caption.setAttribute('aria-label', '作品の対象期間');
        return caption;
      }

      function createFramedArtwork(item) {
        const artWrapper = document.createElement('div');
        artWrapper.className = 'gallery-item';

        const wallDisplay = document.createElement('div');
        wallDisplay.className = 'museum-wall-display';

        const sculpted = document.createElement('div');
        sculpted.className = 'museum-frame-sculpted';

        const surface = document.createElement('div');
        surface.className = 'art-surface';

        mountArtworkSurface(surface, item);
        sculpted.appendChild(surface);
        wallDisplay.appendChild(sculpted);
        wallDisplay.appendChild(createPeriodCaptionElement(item));

        artWrapper.appendChild(wallDisplay);
        artWrapper._galleryItem = item;

        return artWrapper;
      }

      function loadGlobalInscapeHistory() {
        const flat = [];
        parseInscapeHistorySessions().forEach((session) => {
          session.history.forEach((entry) => flat.push(entry));
        });
        if (flat.length) {
          return flat.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        }

        const fromHistories = loadHistoriesFallback();
        if (fromHistories.length) {
          return fromHistories.map((s, i) => mapHistoryEntry({
            word: s.word,
            color: s.color,
            timestamp: s.timestamp || i
          }));
        }

        return loadSplashesFallback().map((s, i) => mapHistoryEntry({
          word: s.word,
          color: s.color,
          timestamp: s.timestamp || i
        }));
      }

      function resolveArtworkHistory(item) {
        if (Array.isArray(item.history) && item.history.length) {
          return item.history.map((e) => mapHistoryEntry(e, item.date)).filter((e) => e.color);
        }

        const splats = getSplatsFromItem(item);
        if (splats.length) {
          return splats.map((s, i) => mapHistoryEntry({
            word: s.word || '',
            color: s.color,
            timestamp: Number(s.timestamp) > 0 ? Number(s.timestamp) : 0,
            date: formatHistoryDate(s.timestamp, item.date || '')
          }, item.date)).filter((e) => e.color);
        }

        return [];
      }

      function randBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function applyOrbFloatVars(orb) {
        const amp = randBetween(10, 26);
        orb.style.setProperty('--float-dur', `${randBetween(4.2, 11.5).toFixed(2)}s`);
        orb.style.setProperty('--float-delay', `-${randBetween(1.5, 14).toFixed(2)}s`);
        orb.style.setProperty('--fx0', '0px');
        orb.style.setProperty('--fy0', '0px');
        for (let k = 1; k <= 5; k++) {
          orb.style.setProperty(`--fx${k}`, `${(Math.random() - 0.5) * amp * 2}px`);
          orb.style.setProperty(`--fy${k}`, `${(Math.random() - 0.5) * amp * 2}px`);
        }
        orb.style.setProperty('--in-delay', `${randBetween(0, 0.5).toFixed(2)}s`);
      }

      let memoryPopoverHideTimer = null;
      let modalView = 'overview';

      function isPointOnFrame(x, y, size, frameEl, layerRect) {
        if (!frameEl) return false;
        const fr = frameEl.getBoundingClientRect();
        const half = size / 2;
        const gap = 18;
        const fx = fr.left - layerRect.left - gap;
        const fy = fr.top - layerRect.top - gap;
        const fw = fr.width + gap * 2;
        const fh = fr.height + gap * 2;
        return x + half > fx && x - half < fx + fw && y + half > fy && y - half < fy + fh;
      }

      function getRandomScatterSlots(count, layerEl, frameEl) {
        const layerRect = layerEl.getBoundingClientRect();
        const slots = [];
        const edgePad = 14;

        for (let i = 0; i < count; i++) {
          const size = randBetween(20, 46);
          const half = size / 2 + edgePad;
          let placed = false;

          for (let attempt = 0; attempt < 80 && !placed; attempt++) {
            const x = randBetween(half, Math.max(half + 1, layerRect.width - half));
            const y = randBetween(half, Math.max(half + 1, layerRect.height - half));

            if (isPointOnFrame(x, y, size, frameEl, layerRect)) continue;

            const crowded = slots.some((s) => {
              return Math.hypot(s.x - x, s.y - y) < (s.size + size) * 0.48 + randBetween(8, 22);
            });
            if (!crowded) {
              slots.push({ x, y, size });
              placed = true;
            }
          }

          if (!placed) {
            for (let attempt = 0; attempt < 80 && !placed; attempt++) {
              const x = randBetween(half, Math.max(half + 1, layerRect.width - half));
              const y = randBetween(half, Math.max(half + 1, layerRect.height - half));
              if (!isPointOnFrame(x, y, size, frameEl, layerRect)) {
                slots.push({ x, y, size });
                placed = true;
              }
            }
          }

          if (!placed) {
            slots.push({
              x: randBetween(half, Math.max(half + 1, layerRect.width * 0.22)),
              y: randBetween(half, Math.max(half + 1, layerRect.height - half)),
              size
            });
          }
        }

        return slots.map((s) => ({
          left: `${((s.x / layerRect.width) * 100).toFixed(2)}%`,
          top: `${((s.y / layerRect.height) * 100).toFixed(2)}%`,
          size: s.size
        }));
      }

      function spawnVaultOrbs(historyEntries, layerEl, frameEl) {
        if (!layerEl) return;
        layerEl.innerHTML = '';

        const entries = historyEntries.length ? historyEntries : [{ color: '#6a7a8a', word: '', date: '' }];
        const scatterSlots = getRandomScatterSlots(entries.length, layerEl, frameEl);

        entries.forEach((entry, i) => {
          const orb = document.createElement('button');
          orb.type = 'button';
          orb.className = 'vault-orb';
          const slot = scatterSlots[i] || scatterSlots[scatterSlots.length - 1];
          const size = slot.size || randBetween(22, 40);

          orb.style.setProperty('--orb-color', entry.color || '#5a6a7a');
          orb.style.width = `${size}px`;
          orb.style.height = `${size}px`;
          orb.style.left = slot.left;
          orb.style.top = slot.top;

          applyOrbFloatVars(orb);
          orb.setAttribute('aria-label', '感情の記録を見る');

          orb.addEventListener('click', (e) => {
            e.stopPropagation();
            showMemoryPopover(entry, orb);
          });

          layerEl.appendChild(orb);
        });
      }

      function showMemoryPopover(entry, anchorEl) {
        const popover = document.getElementById('memoryPopover');
        const imageModal = document.getElementById('imageModal');
        if (!popover) return;

        clearTimeout(memoryPopoverHideTimer);
        modalView = 'diary';
        if (imageModal) imageModal.classList.add('view-diary');

        const dot = popover.querySelector('.memory-popover-dot');
        const dateEl = popover.querySelector('.memory-popover-date');
        const textEl = popover.querySelector('.memory-popover-text');

        if (dot) dot.style.setProperty('--pop-color', entry.color || '#888');
        if (dateEl) dateEl.textContent = entry.date || '—';
        if (textEl) {
          textEl.textContent = entry.word && entry.word.trim()
            ? entry.word
            : '言葉の記録は、この作品完成前のデータには含まれていません。';
        }

        const rect = anchorEl.getBoundingClientRect();
        let left = rect.left + rect.width / 2;
        let top = rect.top - 12;
        const margin = 12;
        const popW = 288;
        if (left - popW / 2 < margin) left = margin + popW / 2;
        if (left + popW / 2 > window.innerWidth - margin) left = window.innerWidth - margin - popW / 2;
        if (top < margin + 80) top = rect.bottom + 16;

        popover.style.left = `${left}px`;
        popover.style.top = `${top}px`;
        popover.setAttribute('aria-hidden', 'false');
        popover.classList.add('visible');
      }

      function hideMemoryPopover() {
        const popover = document.getElementById('memoryPopover');
        if (popover) {
          popover.classList.remove('visible');
          popover.setAttribute('aria-hidden', 'true');
        }
      }

      function returnToVaultOverview() {
        const imageModal = document.getElementById('imageModal');
        hideMemoryPopover();
        modalView = 'overview';

          imageModal.classList.remove('view-diary');

      function handleModalCloseRequest() {

          returnToVaultOverview();

        closeArtworkModal();

      function layoutVaultOrbs(galleryItem, vaultOrbs, modalBody) {
        if (!galleryItem || !vaultOrbs) return;
        spawnVaultOrbs(resolveArtworkHistory(galleryItem), vaultOrbs, modalBody);
      }

      function openArtworkModal(artwork, item) {
        const imageModal = document.getElementById('imageModal');
        const modalBody = document.getElementById('modalBody');
        const vaultOrbs = document.getElementById('vaultOrbs');
        if (!imageModal || !modalBody) return;

        hideMemoryPopover();
        modalBody.innerHTML = artwork.innerHTML;
        modalBody.scrollTop = 0;

        const galleryItem = item || artwork._galleryItem;

        const modalCanvas = modalBody.querySelector('.gallery-art-canvas');
        const modalSurface = modalBody.querySelector('.art-surface');
        const modalImg = modalBody.querySelector('.gallery-art-image');
        if (modalSurface && modalImg) {
          if (modalImg.complete) {
            syncSnapshotAspect(modalSurface, modalImg);
          } else {
            modalImg.addEventListener('load', () => syncSnapshotAspect(modalSurface, modalImg), { once: true });
          }
        }
        if (galleryItem && modalCanvas && !galleryItem.artworkImageDataUrl) {
          renderRecipeToCanvas(modalCanvas, getSplatsFromItem(galleryItem), galleryItem);
        }
        const staleOverlay = modalBody.querySelector('.paper-texture-overlay');
        if (staleOverlay) staleOverlay.remove();
        const staleLogo = modalBody.querySelector('.museum-brand-logo');
        if (staleLogo) staleLogo.remove();

        const listSaveBtn = modalBody.querySelector('.save-art-btn');
        if (listSaveBtn) listSaveBtn.remove();
        const listActions = modalBody.querySelector('.modal-art-actions');
        if (listActions) listActions.remove();

        const actionsWrap = document.createElement('div');
        actionsWrap.className = 'modal-art-actions';

        actionsWrap.appendChild(createSaveButton(() => modalBody));
        modalBody.appendChild(actionsWrap);

        hideMemoryPopover();
        modalView = 'overview';

        const periodCaption = modalBody.querySelector('.art-period-caption');
        if (periodCaption && galleryItem) {
          periodCaption.textContent = computeArtworkPeriodCaption(galleryItem);
        }

        const wallDisplay = modalBody.querySelector('.museum-wall-display');

        imageModal.classList.remove('view-diary');
        imageModal.classList.add('active');
        imageModal.setAttribute('aria-hidden', 'false');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            layoutVaultOrbs(galleryItem, vaultOrbs, modalBody);
          });
        });
      }

      function closeArtworkModal() {
        const imageModal = document.getElementById('imageModal');
        const modalBody = document.getElementById('modalBody');
        const vaultOrbs = document.getElementById('vaultOrbs');
        if (!imageModal || !modalBody) return;
        hideMemoryPopover();
        modalView = 'overview';
        imageModal.classList.remove('active', 'view-diary');
        imageModal.setAttribute('aria-hidden', 'true');
        modalBody.innerHTML = '';
        if (vaultOrbs) vaultOrbs.innerHTML = '';
      }

      function renderGallery() {
        const galleryContainer = document.getElementById('gallery-container');
        const galleryData = loadGallery();

        if (galleryData.length === 0) {
          galleryContainer.innerHTML = '<p class="no-data">まだ額装された完成作品がありません。7つの言葉を紡ぎ、作品が完成するとここに飾られます。</p>';
          return;
        }

        galleryContainer.innerHTML = '';
        const displayItems = galleryData.slice().reverse();
        displayItems.forEach((item) => {
          const artwork = createFramedArtwork(item);
          artwork.addEventListener('click', (e) => {
            if (e.target.closest('.save-art-btn')) return;
            openArtworkModal(artwork, item);
          });
          galleryContainer.appendChild(artwork);
        });
      }

      function bindSavePreview() {
        const overlay = document.getElementById('savePreviewOverlay');
        const closeBtn = document.getElementById('savePreviewClose');
        const panel = overlay && overlay.querySelector('.save-preview-panel');

        if (closeBtn) {
          closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeSavePreview();
          });
        }

        if (overlay) {
          overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeSavePreview();
          });
        }

        if (panel) {
          panel.addEventListener('click', (e) => e.stopPropagation());
        }
      }

      function bindImageModal() {
        const imageModal = document.getElementById('imageModal');
        const modalCloseHint = document.getElementById('modalCloseHint');
        const memoryPopover = document.getElementById('memoryPopover');
        if (!imageModal) return;

        if (modalCloseHint) {
          modalCloseHint.addEventListener('click', (e) => {
            e.stopPropagation();
            handleModalCloseRequest();
          });
        }

        const memoryPopoverClose = document.getElementById('memoryPopoverClose');
        if (memoryPopoverClose) {
          memoryPopoverClose.addEventListener('click', (e) => {
            e.stopPropagation();
            returnToVaultOverview();
          });
        }

        imageModal.addEventListener('click', (e) => {
          if (e.target.closest('.vault-orb') || e.target.closest('.memory-popover') ||
              e.target.closest('.save-art-btn') ||
              e.target.closest('.modal-content') ||
              e.target.closest('#modalCloseHint')) {
            return;
          }
          if (e.target === imageModal || e.target.classList.contains('modal-vault') ||
              e.target.classList.contains('vault-orbs-layer') ||
              e.target.classList.contains('vault-tagline')) {
            handleModalCloseRequest();
          }
        });

        if (memoryPopover) {
          memoryPopover.addEventListener('click', (e) => e.stopPropagation());
        }

        document.addEventListener('keydown', (e) => {
          if (e.key !== 'Escape') return;
          const saveOverlay = document.getElementById('savePreviewOverlay');
          if (saveOverlay && saveOverlay.classList.contains('active')) {
            closeSavePreview();
            return;
          }
          if (imageModal.classList.contains('active')) {
            handleModalCloseRequest();
          }
        });
      }

      let cloudStatusTimer = null;

      function showCloudStatusMessage(message, durationMs) {
        const el = document.getElementById('cloudSyncStatus');
        if (!el || !message) return;
        el.textContent = message;
        el.classList.add('visible');
        if (cloudStatusTimer) clearTimeout(cloudStatusTimer);
        cloudStatusTimer = setTimeout(() => {
          el.classList.remove('visible');
        }, durationMs || 3200);
      }

      function updateCloudSyncButton() {
        const btn = document.getElementById('cloudSyncBtn');
        if (!btn || !window.InscapeCloud) return;

        btn.classList.remove('is-linked', 'is-cloud', 'is-syncing', 'is-unconfigured');
        btn.disabled = false;

        const status = InscapeCloud.getCloudStatus ? InscapeCloud.getCloudStatus() : null;
        if (!status || !status.configured) {
          btn.textContent = '保管';
          btn.classList.add('is-unconfigured');
          btn.setAttribute('aria-label', 'クラウド保管（準備中）');
          return;
        }

        if (status.linked) {
          btn.textContent = '保管済';
          btn.classList.add('is-linked');
          btn.setAttribute('aria-label', 'Googleアカウントに保管済み');
          return;
        }

        if (status.mode === 'cloud') {
          btn.textContent = '保管';
          btn.classList.add('is-cloud');
          btn.setAttribute('aria-label', 'クラウド同期中。タップでGoogleに保管');
          return;
        }

        btn.textContent = '保管';
        btn.setAttribute('aria-label', 'クラウドに保管');
      }

      async function handleCloudSyncTap() {
        const btn = document.getElementById('cloudSyncBtn');
        if (!btn || !window.InscapeCloud || btn.disabled) return;

        if (!InscapeCloud.isConfigured || !InscapeCloud.isConfigured()) {
          showCloudStatusMessage('クラウドは準備中です（後日ご利用可能）', 4500);
          try {
            if (navigator.vibrate) navigator.vibrate(12);
          } catch (_) {}
          return;
        }

        btn.disabled = true;
        btn.classList.add('is-syncing');
        btn.textContent = '…';
        showCloudStatusMessage('接続しています…', 5000);

        let result = null;
        try {
          if (!InscapeCloud.isReady()) {
            await InscapeCloud.init();
            updateCloudSyncButton();
            if (InscapeCloud.isUsingCloud && InscapeCloud.isUsingCloud()) {
              showCloudStatusMessage('雲に同期しました');
            }
          }

          if (InscapeCloud.isGoogleLinked && InscapeCloud.isGoogleLinked()) {
            showCloudStatusMessage('すでに保管済みです');
            updateCloudSyncButton();
            return;
          }

          result = await InscapeCloud.linkWithGoogle();
          if (result && result.redirecting) {
            showCloudStatusMessage('Googleへ移動します…', 6000);
            return;
          }

          updateCloudSyncButton();
          showCloudStatusMessage('Googleに保管しました');
        } catch (err) {
          console.warn('Google 紐付けに失敗:', err);
          const code = err && err.code ? String(err.code) : '';
          if (code.includes('popup') || code.includes('cancel')) {
            showCloudStatusMessage('ログインがキャンセルされました');
          } else {
            showCloudStatusMessage('保管に失敗しました');
          }
          updateCloudSyncButton();
        } finally {
          btn.disabled = false;
          btn.classList.remove('is-syncing');
          if (!(result && result.redirecting)) {
            updateCloudSyncButton();
          }
        }
      }

      function bindCloudSyncButton() {
        const btn = document.getElementById('cloudSyncBtn');
        if (!btn) return;
        let lastTouchAt = 0;
        let handling = false;

        function onPressStart() {
          btn.classList.add('is-pressed');
        }

        function onPressEnd() {
          btn.classList.remove('is-pressed');
        }

        function runTap(e) {
          if (e) {
            e.preventDefault();
            e.stopPropagation();
          }
          if (handling) return;
          handling = true;
          handleCloudSyncTap().finally(() => {
            handling = false;
          });
        }

        btn.addEventListener('pointerdown', (e) => {
          if (e.pointerType === 'mouse' && e.button !== 0) return;
          onPressStart();
        }, { passive: true });

        btn.addEventListener('pointerup', onPressEnd, { passive: true });
        btn.addEventListener('pointercancel', onPressEnd, { passive: true });
        btn.addEventListener('pointerleave', onPressEnd, { passive: true });

        btn.addEventListener('touchend', (e) => {
          lastTouchAt = Date.now();
          runTap(e);
        }, { passive: false });

        btn.addEventListener('click', (e) => {
          if (Date.now() - lastTouchAt < 450) return;
          runTap(e);
        });

        updateCloudSyncButton();
      }

      window.addEventListener('DOMContentLoaded', () => {
        bindSavePreview();
        bindImageModal();
        bindCloudSyncButton();
        const boot = window.InscapeCloud
          ? InscapeCloud.init().catch((err) => {
            console.warn('クラウド初期化:', err);
          })
          : Promise.resolve();
        boot
          .then(() => {
            updateCloudSyncButton();
            const status = InscapeCloud.getCloudStatus ? InscapeCloud.getCloudStatus() : null;
            if (!status || !status.configured) {
              showCloudStatusMessage('いまは端末内に保存されています', 3600);
            } else if (InscapeCloud.isUsingCloud && InscapeCloud.isUsingCloud()) {
              showCloudStatusMessage('雲に同期されています', 3200);
            }
            try {
              if (sessionStorage.getItem('inscape_google_link_pending') === '1'
                && InscapeCloud.isGoogleLinked && InscapeCloud.isGoogleLinked()) {
                sessionStorage.removeItem('inscape_google_link_pending');
                showCloudStatusMessage('Googleに保管しました');
              }
            } catch (_) {}
            return loadSplatImage();
          })
          .then(() => loadFabricImage())
          .then(renderGallery)
          .catch(() => {
            const galleryContainer = document.getElementById('gallery-container');
            galleryContainer.innerHTML = '<p class="no-data">splat.png を読み込めませんでした。index.html と同じフォルダに置いてください。</p>';
          });
      });
    })();
  </script>

  <div class="modal-overlay" id="imageModal" aria-hidden="true">
    <div class="modal-vault">
      <button type="button" class="modal-close-hint" id="modalCloseHint" aria-label="閉じる">CLOSE</button>
      <div class="modal-content" id="modalBody"></div>
      <div class="vault-orbs-layer" id="vaultOrbs" aria-hidden="true"></div>
      <p class="vault-tagline">どんな感情もあなたが生きた証</p>
    </div>
  </div>
  <div class="memory-popover" id="memoryPopover" role="dialog" aria-hidden="true">
    <div class="memory-popover-dot"></div>
    <p class="memory-popover-date"></p>
    <p class="memory-popover-text"></p>
    <button type="button" class="memory-popover-close" id="memoryPopoverClose">閉じる</button>
  </div>
  <div class="save-preview-overlay" id="savePreviewOverlay" aria-hidden="true" role="dialog" aria-label="保存プレビュー">
    <div class="save-preview-panel">
      <button type="button" class="save-preview-close" id="savePreviewClose" aria-label="閉じる">CLOSE</button>
      <p class="save-preview-hint">画像を長押しして<br>「写真に追加」を選択して保存してください</p>
      <div class="save-preview-image-wrap">
        <img id="savePreviewImage" alt="INSCAPE — 額装作品" draggable="false">
      </div>
    </div>
  </div>
</body>
</html>
