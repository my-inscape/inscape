<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="INSCAPE">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>感情の回廊 — INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper-antique: #f7f4eb;
      --mat-ivory: #fbf9f5;
      --gold-antique: #b8860b;
      --wood-walnut: #1c110a;
      --canvas-fabric-url: url('canvas-fabric.png');
      --canvas-portrait-w: 270px;
      --canvas-portrait-h: 480px;
      --canvas-portrait-ratio: 9 / 16;
    }

    html, body {
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      background: #030303;
      color: #e8e6e2;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background:
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #030303;
    }

    .corridor-top {
      position: relative;
      z-index: 2;
      flex: 0 0 auto;
      padding:
        calc(0.85rem + env(safe-area-inset-top))
        calc(0.65rem + env(safe-area-inset-right))
        0
        calc(0.65rem + env(safe-area-inset-left));
    }

    .site-nav {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 0.22rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .site-nav-link,
    .back-link {
      flex: 1 1 0;
      min-width: 2.6rem;
      max-width: 4.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.3rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-indent: 0.03em;
      color: rgba(232, 230, 226, 0.45);
      text-decoration: none;
      padding: 0.38rem 0.24rem;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      background: rgba(18, 19, 22, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .site-nav-link:hover,
    .back-link:hover {
      color: rgba(232, 230, 226, 0.82);
      border-color: rgba(184, 160, 122, 0.35);
      background: rgba(24, 25, 28, 0.88);
    }

    .site-nav-link.is-current {
      color: rgba(201, 169, 98, 0.62);
      border-color: rgba(201, 169, 98, 0.22);
      background: rgba(201, 169, 98, 0.06);
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .site-nav {
        gap: 0.12rem;
      }

      .site-nav-link,
      .back-link {
        font-size: 0.28rem;
        letter-spacing: 0.02em;
        text-indent: 0.02em;
        padding: 0.34rem 0.18rem;
      }
    }

    .back-link {
      margin-bottom: 0;
    }

    .museum-header {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .museum-title {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.55em;
      text-indent: 0.55em;
      color: rgba(232, 230, 226, 0.52);
      margin-bottom: 0.65rem;
    }

    .museum-subtitle {
      font-size: 0.5rem;
      letter-spacing: 0.35em;
      color: rgba(232, 230, 226, 0.28);
    }

    #gallery-container {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      flex: 1 1 auto;
      overflow-x: auto;
      overflow-y: hidden;
      gap: clamp(56px, 9vw, 110px);
      padding: 24px 8vw calc(2rem + env(safe-area-inset-bottom, 0px));
      width: 100%;
      align-items: center;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    #gallery-container::-webkit-scrollbar {
      height: 6px;
    }

    #gallery-container::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
    }

    #gallery-container::-webkit-scrollbar-thumb {
      background: rgba(201, 169, 98, 0.35);
      border-radius: 3px;
    }

    /* ===== 詳細モード（縦スクロール・単一作品） ===== */
    .detail-view {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: clamp(64px, 10vh, 110px) 5vw calc(6rem + env(safe-area-inset-bottom, 0px));
      background:
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 70% 45% at 50% 108%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #050505;
      opacity: 0;
      visibility: hidden;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease, visibility 0s linear 0.5s;
    }

    .detail-view.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
      transition: opacity 0.5s ease, transform 0.5s ease, visibility 0s;
    }

    .detail-back-btn {
      position: fixed;
      top: calc(1rem + env(safe-area-inset-top, 0px));
      left: calc(1rem + env(safe-area-inset-left, 0px));
      z-index: 52;
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.55rem 1.1rem;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "Georgia", serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: rgba(232, 230, 226, 0.72);
      background: rgba(20, 20, 20, 0.55);
      border: 0.5px solid rgba(201, 169, 98, 0.35);
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .detail-back-btn:hover {
      color: #f3e5ab;
      border-color: rgba(201, 169, 98, 0.7);
      background: rgba(30, 26, 16, 0.7);
    }

    #detail-stage {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    /* 詳細モードでは作品間の余白を活かし、ボトル/タイトルを大きめに */
    .detail-view .gallery-item {
      cursor: default;
    }

    body.detail-open #gallery-container {
      pointer-events: none;
    }

    /* 一覧モードは額縁の真下にコンパクトに期間を出す */
    .gallery-item--list .museum-wall-display {
      gap: 0.9rem;
      padding: 1.4rem 1rem 1.1rem;
    }

    .art-period-caption--list {
      margin-top: 0.6rem;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-indent: 0.2em;
      opacity: 0.85;
    }

    /* 詳細モードの「作品を保存する」ボタン（細い白線＋ホバー発光のミニマル） */
    .detail-save-btn {
      align-self: center;
      margin-top: clamp(6px, 2vh, 20px);
      padding: 0.72rem 1.7rem;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "Georgia", serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-indent: 0.18em;
      color: rgba(232, 230, 226, 0.72);
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 999px;
      cursor: pointer;
      transition: color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, text-shadow 0.4s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .detail-save-btn:hover {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.55);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.08);
    }

    .detail-save-btn:active {
      transform: scale(0.98);
    }

    .gallery-item {
      flex-shrink: 0;
      width: auto;
      max-width: min(94vw, calc(var(--canvas-portrait-w) + 4.5rem));
      height: auto;
      /* 横スクロール列では auto マージンを使わない（中央寄せで後ろの作品が死角に入るのを防ぐ） */
      margin: 0;
      text-align: center;
      position: relative;
      padding: 40px 0 20px;
      cursor: pointer;
    }

    .gallery-item::before {
      content: '';
      position: absolute;
      top: -8%;
      left: 50%;
      transform: translateX(-50%);
      width: 220%;
      height: 130%;
      background:
        radial-gradient(
          ellipse 38% 48% at 50% 0%,
          rgba(255, 252, 240, 0.42) 0%,
          rgba(255, 245, 210, 0.22) 18%,
          rgba(212, 175, 55, 0.1) 38%,
          rgba(201, 169, 98, 0.04) 55%,
          transparent 72%
        ),
        radial-gradient(
          ellipse 55% 35% at 50% 12%,
          rgba(255, 255, 255, 0.08) 0%,
          transparent 55%
        );
      pointer-events: none;
      z-index: 0;
      filter: blur(0.5px);
    }

    .gallery-item::after {
      content: '';
      position: absolute;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 75%;
      height: 48px;
      background: radial-gradient(ellipse 55% 100% at 50% 0%, rgba(0, 0, 0, 0.55) 0%, transparent 72%);
      pointer-events: none;
      z-index: 0;
      opacity: 0.7;
    }

    .gallery-item > * {
      position: relative;
      z-index: 1;
    }

    .museum-frame-sculpted {
      position: relative;
      box-sizing: border-box;
      display: inline-block;
      width: fit-content;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      padding: 12px;
      background: #ffffff;
      border: 20px solid #1c110a;
      border-top-color: #f3e5ab;
      border-left-color: #d4af37;
      border-right-color: #8a640f;
      border-bottom-color: #5c430a;
      outline: 3px solid #aa7c11;
      outline-offset: -20px;
      box-shadow:
        inset 0 4px 0 rgba(255, 255, 255, 0.35),
        inset 0 -2px 6px rgba(0, 0, 0, 0.06),
        0 4px 14px rgba(0, 0, 0, 0.42),
        0 20px 40px rgba(0, 0, 0, 0.8),
        0 36px 72px rgba(0, 0, 0, 0.52);
    }

    .museum-frame-sculpted::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 20px solid transparent;
      border-image: linear-gradient(145deg, rgba(255, 255, 255, 0.12) 0%, transparent 42%, rgba(0, 0, 0, 0.12) 100%) 1;
      opacity: 0.55;
    }

    .art-surface {
      position: relative;
      display: block;
      width: var(--canvas-portrait-w);
      max-width: 100%;
      height: auto;
      aspect-ratio: var(--canvas-portrait-ratio);
      margin: 0 auto;
      padding: 0;
      overflow: hidden;
      z-index: 2;
      line-height: 0;
      font-size: 0;
      background-color: #f7f4eb;
      background-image: none;
      opacity: 1;
      isolation: isolate;
    }

    .art-surface--snapshot {
      background-color: #f7f4eb;
    }

    .gallery-art-image {
      display: block;
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      max-height: none !important;
      object-fit: fill;
      object-position: center;
      margin: 0 auto !important;
      padding: 0 !important;
      box-sizing: border-box;
      z-index: 1;
      background: #f7f4eb;
      box-shadow: none;
      opacity: 0;
      animation: galleryArtFadeIn 0.9s ease forwards;
    }

    .art-restore-hint {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      line-height: 1.7;
      color: rgba(80, 72, 60, 0.72);
      pointer-events: none;
    }

    @keyframes galleryArtFadeIn {
      from { opacity: 0; transform: scale(0.985); }
      to { opacity: 1; transform: scale(1); }
    }

    .gallery-art-canvas {
      display: block;
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      max-height: none !important;
      margin: 0 auto !important;
      padding: 0 !important;
      box-sizing: border-box;
      z-index: 1;
      background: #f7f4eb !important;
      background-image: none !important;
      box-shadow: none;
      opacity: 1;
    }

    .art-period-caption {
      margin-top: 1.1rem;
      padding: 0 0.35rem;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "Georgia", "Times New Roman", serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-indent: 0.14em;
      color: rgba(136, 136, 136, 0.88);
      line-height: 1.6;
      text-align: center;
    }

    .art-period-caption:empty {
      display: none;
    }

    .museum-wall-display {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(28px, 5vh, 56px);
      width: 100%;
      max-width: 100%;
      text-align: center;
      overflow: visible;
      padding: 2rem 1rem 1.5rem;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.18) 0%, rgba(0, 0, 0, 0) 70%),
        radial-gradient(ellipse 88% 52% at 50% -6%, rgba(255, 252, 240, 0.09) 0%, transparent 55%),
        #0a0a0a;
      border-radius: 1px;
    }

    .museum-wall-display::before {
      content: '';
      position: absolute;
      inset: -8% -14%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 6%, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0) 62%),
        radial-gradient(ellipse 65% 38% at 50% 0%, rgba(201, 169, 98, 0.05) 0%, transparent 58%);
      opacity: 0.9;
    }

    .museum-wall-display > * {
      position: relative;
      z-index: 1;
    }

    .gallery-item .museum-wall-display {
      position: relative;
    }

    .gallery-bottle-wrap {
      position: static;
      align-self: center;
      display: block;
      width: 84px;
      padding: 0;
      border: none;
      background: transparent;
      z-index: 1;
      cursor: pointer;
      transition: transform 0.35s ease, filter 0.35s ease;
      filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.55));
      -webkit-tap-highlight-color: transparent;
    }

    .gallery-bottle-wrap:hover {
      transform: scale(1.06) translateY(-3px);
      filter: drop-shadow(0 12px 26px rgba(201, 169, 98, 0.35));
    }

    .gallery-bottle-img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 2px;
    }

    .bottle-album-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      background: rgba(3, 3, 5, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .bottle-album-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .bottle-album-panel {
      width: min(92vw, 340px);
      max-height: 80vh;
      overflow-y: auto;
      padding: 1.25rem 1.1rem;
      border: 0.5px solid rgba(201, 169, 98, 0.28);
      border-radius: 4px;
      background: rgba(14, 15, 18, 0.92);
    }

    .bottle-album-title {
      font-size: 0.55rem;
      letter-spacing: 0.38em;
      text-indent: 0.38em;
      color: rgba(201, 169, 98, 0.62);
      margin-bottom: 0.35rem;
      text-align: center;
    }

    .bottle-album-sub {
      font-size: 0.42rem;
      letter-spacing: 0.18em;
      color: rgba(232, 230, 226, 0.32);
      text-align: center;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .bottle-album-day {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      padding: 0.55rem 0;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.06);
    }

    .bottle-album-day:last-child {
      border-bottom: none;
    }

    .bottle-album-swatch {
      flex: 0 0 auto;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-top: 0.15rem;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
    }

    .bottle-album-day-label {
      font-size: 0.4rem;
      letter-spacing: 0.2em;
      color: rgba(201, 169, 98, 0.5);
      margin-bottom: 0.2rem;
    }

    .bottle-album-word {
      font-size: 0.52rem;
      letter-spacing: 0.08em;
      line-height: 1.65;
      color: rgba(232, 230, 226, 0.72);
    }

    .bottle-album-close {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 0.5rem;
      font-size: 0.44rem;
      letter-spacing: 0.28em;
      color: rgba(232, 230, 226, 0.55);
      background: transparent;
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      border-radius: 2px;
      cursor: pointer;
    }

    .gallery-item .museum-wall-display {
      padding: 1.5rem 0.5rem 1.1rem;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.14) 0%, rgba(0, 0, 0, 0) 68%),
        radial-gradient(ellipse 85% 48% at 50% -5%, rgba(255, 252, 240, 0.07) 0%, transparent 52%),
        rgba(8, 8, 9, 0.88);
    }

    .museum-wall-export {
      padding: 2.75rem 1.5rem 2rem !important;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.18) 0%, rgba(0, 0, 0, 0) 70%),
        radial-gradient(ellipse 88% 52% at 50% -6%, rgba(255, 252, 240, 0.09) 0%, transparent 55%),
        #0a0a0a !important;
    }

    .no-data {
      flex-shrink: 0;
      width: 100%;
      color: #666;
      text-align: center;
      padding: 2rem;
      line-height: 2;
      letter-spacing: 0.08em;
      font-size: 0.72rem;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(28, 24, 20, 0.95) 0%, rgba(8, 7, 9, 0.98) 55%, #050506 100%);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.45s ease, visibility 0.45s ease;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .modal-vault {
      position: relative;
      width: 100%;
      min-height: min(100%, 100dvh);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      flex-shrink: 0;
      padding:
        calc(2.75rem + env(safe-area-inset-top))
        calc(1rem + env(safe-area-inset-right))
        calc(1.25rem + env(safe-area-inset-bottom))
        calc(1rem + env(safe-area-inset-left));
    }

    .vault-orbs-layer {
      position: absolute;
      inset: 0;
      z-index: 5;
      overflow: visible;
      pointer-events: none;
    }

    .vault-orbs-layer .vault-orb {
      pointer-events: auto;
      z-index: 5;
    }

    .vault-orb {
      position: absolute;
      border-radius: 50%;
      border: none;
      padding: 0;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.6);
      z-index: 5;
      will-change: transform, opacity;
      animation:
        vaultOrbIn 0.85s cubic-bezier(0.34, 1.2, 0.64, 1) var(--in-delay, 0s) forwards,
        vaultFloat var(--float-dur, 8s) ease-in-out var(--float-delay, 0s) infinite;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.55) 0%, transparent 42%),
        radial-gradient(circle at 72% 78%, rgba(0, 0, 0, 0.45) 0%, transparent 48%),
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--orb-color) 78%, white) 0%, var(--orb-color) 58%, color-mix(in srgb, var(--orb-color) 45%, black) 100%);
      box-shadow:
        inset 0 2px 6px rgba(255, 255, 255, 0.28),
        inset 0 -4px 10px rgba(0, 0, 0, 0.35),
        0 8px 28px rgba(0, 0, 0, 0.55),
        0 0 24px color-mix(in srgb, var(--orb-color) 35%, transparent);
