<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>感情の回廊 — INSCAPE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper-antique: #f7f4eb;
      --mat-ivory: #fbf9f5;
      --gold-antique: #b8860b;
      --wood-walnut: #1c110a;
      --canvas-fabric-url: url('canvas-fabric.png');
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      background: #030303;
      color: #e8e6e2;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background:
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(201, 169, 98, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 105%, rgba(255, 255, 255, 0.02) 0%, transparent 45%),
        #030303;
    }

    .corridor-top {
      position: relative;
      z-index: 2;
      padding:
        calc(0.85rem + env(safe-area-inset-top))
        calc(0.65rem + env(safe-area-inset-right))
        0
        calc(0.65rem + env(safe-area-inset-left));
    }

    .site-nav {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 0.22rem;
      margin-bottom: 1.25rem;
    }

    .site-nav-link,
    .back-link {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.36rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      text-indent: 0.05em;
      color: rgba(232, 230, 226, 0.45);
      text-decoration: none;
      padding: 0.42rem 0.22rem;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      background: rgba(18, 19, 22, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .site-nav-link:hover,
    .back-link:hover {
      color: rgba(232, 230, 226, 0.82);
      border-color: rgba(184, 160, 122, 0.35);
      background: rgba(24, 25, 28, 0.88);
    }

    .site-nav-link.is-current {
      color: rgba(201, 169, 98, 0.62);
      border-color: rgba(201, 169, 98, 0.22);
      background: rgba(201, 169, 98, 0.06);
      pointer-events: none;
    }

    .back-link {
      margin-bottom: 0;
    }

    .museum-header {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .museum-title {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.55em;
      text-indent: 0.55em;
      color: rgba(232, 230, 226, 0.52);
      margin-bottom: 0.65rem;
    }

    .museum-subtitle {
      font-size: 0.5rem;
      letter-spacing: 0.35em;
      color: rgba(232, 230, 226, 0.28);
    }

    #gallery-container {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 80px;
      padding: 20px 5vw;
      width: 100vw;
      height: calc(100vh - 120px);
      align-items: center;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    #gallery-container::-webkit-scrollbar {
      height: 6px;
    }

    #gallery-container::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
    }

    #gallery-container::-webkit-scrollbar-thumb {
      background: rgba(201, 169, 98, 0.35);
      border-radius: 3px;
    }

    .gallery-item {
      flex-shrink: 0;
      width: 90%;
      max-width: 400px;
      height: auto;
      margin: 0 auto;
      text-align: center;
      position: relative;
      padding: 48px 0 24px;
      cursor: pointer;
    }

    .gallery-item::before {
      content: '';
      position: absolute;
      top: -8%;
      left: 50%;
      transform: translateX(-50%);
      width: 220%;
      height: 130%;
      background:
        radial-gradient(
          ellipse 38% 48% at 50% 0%,
          rgba(255, 252, 240, 0.42) 0%,
          rgba(255, 245, 210, 0.22) 18%,
          rgba(212, 175, 55, 0.1) 38%,
          rgba(201, 169, 98, 0.04) 55%,
          transparent 72%
        ),
        radial-gradient(
          ellipse 55% 35% at 50% 12%,
          rgba(255, 255, 255, 0.08) 0%,
          transparent 55%
        );
      pointer-events: none;
      z-index: 0;
      filter: blur(0.5px);
    }

    .gallery-item::after {
      content: '';
      position: absolute;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 75%;
      height: 48px;
      background: radial-gradient(ellipse 55% 100% at 50% 0%, rgba(0, 0, 0, 0.55) 0%, transparent 72%);
      pointer-events: none;
      z-index: 0;
      opacity: 0.7;
    }

    .gallery-item > * {
      position: relative;
      z-index: 1;
    }

    .museum-frame-sculpted {
      position: relative;
      box-sizing: border-box;
      width: 100%;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      padding: 40px;
      background: #fbf9f5;
      border: 24px solid #1c110a;
      border-top-color: #f3e5ab;
      border-left-color: #d4af37;
      border-right-color: #8a640f;
      border-bottom-color: #5c430a;
      outline: 4px solid #aa7c11;
      outline-offset: -24px;
      box-shadow:
        inset 0 5px 0 rgba(255, 255, 255, 0.2),
        inset 0 -3px 10px rgba(0, 0, 0, 0.65),
        0 4px 14px rgba(0, 0, 0, 0.42),
        0 20px 40px rgba(0, 0, 0, 0.8),
        0 36px 72px rgba(0, 0, 0, 0.52);
    }

    .museum-frame-sculpted::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 24px solid transparent;
      border-image: linear-gradient(145deg, rgba(255, 255, 255, 0.08) 0%, transparent 40%, rgba(0, 0, 0, 0.35) 100%) 1;
      opacity: 0.85;
    }

    .art-surface {
      position: relative;
      width: 100%;
      height: auto;
      overflow: hidden;
      z-index: 1;
      line-height: 0;
      font-size: 0;
      padding: 0;
      margin: 0;
    }

    .gallery-art-canvas {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: top;
      background-color: #f7f4eb;
      background-image:
        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 4px),
        var(--canvas-fabric-url);
      background-blend-mode: multiply;
      background-size: auto, auto, cover;
      box-shadow:
        inset 5px 5px 15px rgba(0, 0, 0, 0.4),
        inset -3px -3px 10px rgba(255, 255, 255, 0.6);
    }

    .paper-texture-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background-color: transparent;
      background-image: var(--canvas-fabric-url);
      background-size: cover;
      background-blend-mode: multiply;
      mix-blend-mode: multiply;
      opacity: 0.35;
    }

    .art-period-caption {
      margin-top: 1.1rem;
      padding: 0 0.35rem;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Georgia", "Times New Roman", serif;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-indent: 0.16em;
      color: rgba(136, 136, 136, 0.92);
      line-height: 1.65;
    }

    .art-period-caption:empty {
      display: none;
    }

    .museum-wall-display {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 100%;
      text-align: center;
      overflow: visible;
      padding: 2rem 1rem 1.5rem;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.18) 0%, rgba(0, 0, 0, 0) 70%),
        radial-gradient(ellipse 88% 52% at 50% -6%, rgba(255, 252, 240, 0.09) 0%, transparent 55%),
        #0a0a0a;
      border-radius: 1px;
    }

    .museum-wall-display::before {
      content: '';
      position: absolute;
      inset: -8% -14%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 6%, rgba(255, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0) 62%),
        radial-gradient(ellipse 65% 38% at 50% 0%, rgba(201, 169, 98, 0.05) 0%, transparent 58%);
      opacity: 0.9;
    }

    .museum-wall-display > * {
      position: relative;
      z-index: 1;
    }

    .gallery-item .museum-wall-display {
      padding: 1.75rem 0.65rem 1.25rem;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.14) 0%, rgba(0, 0, 0, 0) 68%),
        radial-gradient(ellipse 85% 48% at 50% -5%, rgba(255, 252, 240, 0.07) 0%, transparent 52%),
        rgba(8, 8, 9, 0.88);
    }

    .museum-wall-export {
      padding: 2.75rem 1.5rem 2rem !important;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.18) 0%, rgba(0, 0, 0, 0) 70%),
        radial-gradient(ellipse 88% 52% at 50% -6%, rgba(255, 252, 240, 0.09) 0%, transparent 55%),
        #0a0a0a !important;
    }

    .share-art-btn {
      display: inline-block;
      margin-top: 1.15rem;
      padding: 0.65rem 1.1rem;
      border: 0.5px solid rgba(201, 169, 98, 0.28);
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.03);
      color: rgba(232, 230, 226, 0.62);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.52rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-indent: 0.28em;
      cursor: pointer;
      transition:
        color 0.3s ease,
        border-color 0.3s ease,
        background 0.3s ease,
        box-shadow 0.3s ease;
    }

    .share-art-btn:hover {
      color: rgba(232, 230, 226, 0.88);
      border-color: rgba(201, 169, 98, 0.45);
      background: rgba(201, 169, 98, 0.08);
      box-shadow: 0 0 20px rgba(201, 169, 98, 0.12);
    }

    .share-art-btn:active {
      transform: scale(0.98);
    }

    .share-art-btn.modal-share {
      margin-top: 1.35rem;
      letter-spacing: 0.22em;
      text-indent: 0.22em;
    }

    .modal-content .share-art-btn {
      color: rgba(232, 230, 226, 0.72);
      background: rgba(255, 255, 255, 0.05);
    }

    .no-data {
      flex-shrink: 0;
      width: 100%;
      color: #666;
      text-align: center;
      padding: 2rem;
      line-height: 2;
      letter-spacing: 0.08em;
      font-size: 0.72rem;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(28, 24, 20, 0.95) 0%, rgba(8, 7, 9, 0.98) 55%, #050506 100%);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.45s ease, visibility 0.45s ease;
      overflow: hidden;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .modal-vault {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding:
        calc(1.25rem + env(safe-area-inset-top))
        calc(1rem + env(safe-area-inset-right))
        calc(1.25rem + env(safe-area-inset-bottom))
        calc(1rem + env(safe-area-inset-left));
    }

    .vault-orbs-layer {
      position: absolute;
      inset: 0;
      z-index: 5;
      overflow: visible;
      pointer-events: none;
    }

    .vault-orbs-layer .vault-orb {
      pointer-events: auto;
      z-index: 5;
    }

    .vault-orb {
      position: absolute;
      border-radius: 50%;
      border: none;
      padding: 0;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.6);
      z-index: 5;
      will-change: transform, opacity;
      animation:
        vaultOrbIn 0.85s cubic-bezier(0.34, 1.2, 0.64, 1) var(--in-delay, 0s) forwards,
        vaultFloat var(--float-dur, 8s) ease-in-out var(--float-delay, 0s) infinite;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.55) 0%, transparent 42%),
        radial-gradient(circle at 72% 78%, rgba(0, 0, 0, 0.45) 0%, transparent 48%),
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--orb-color) 78%, white) 0%, var(--orb-color) 58%, color-mix(in srgb, var(--orb-color) 45%, black) 100%);
      box-shadow:
        inset 0 2px 6px rgba(255, 255, 255, 0.28),
        inset 0 -4px 10px rgba(0, 0, 0, 0.35),
        0 8px 28px rgba(0, 0, 0, 0.55),
        0 0 24px color-mix(in srgb, var(--orb-color) 35%, transparent);
      transition: transform 0.35s ease, box-shadow 0.35s ease, opacity 0.35s ease;
    }

    .vault-orb:hover,
    .vault-orb:focus-visible {
      z-index: 6;
      filter: brightness(1.15);
      box-shadow:
        inset 0 2px 8px rgba(255, 255, 255, 0.4),
        0 0 36px color-mix(in srgb, var(--orb-color) 55%, transparent);
      outline: none;
    }

    @keyframes vaultOrbIn {
      to { opacity: 0.84; transform: scale(1); }
    }

    @keyframes vaultFloat {
      0%   { translate: var(--fx0, 0px) var(--fy0, 0px); }
      18%  { translate: var(--fx1, 6px) var(--fy1, -14px); }
      38%  { translate: var(--fx2, -12px) var(--fy2, 5px); }
      55%  { translate: var(--fx3, 9px) var(--fy3, 11px); }
      72%  { translate: var(--fx4, -7px) var(--fy4, -9px); }
      88%  { translate: var(--fx5, 11px) var(--fy5, 3px); }
      100% { translate: var(--fx0, 0px) var(--fy0, 0px); }
    }

    .vault-tagline {
      position: absolute;
      bottom: calc(1.1rem + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: min(92vw, 22rem);
      text-align: center;
      font-size: 0.58rem;
      font-weight: 300;
      line-height: 2;
      letter-spacing: 0.12em;
      color: rgba(201, 169, 98, 0.42);
      pointer-events: none;
    }

    .modal-content {
      position: relative;
      z-index: 3;
      width: 90vw;
      max-width: 400px;
      text-align: center;
      transform: scale(0.88) translateY(12px);
      opacity: 0;
      transition: transform 0.5s cubic-bezier(0.34, 1.15, 0.64, 1), opacity 0.45s ease;
      pointer-events: auto;
      isolation: isolate;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .modal-content .museum-frame-sculpted {
      margin: 0 auto;
      box-shadow:
        inset 0 5px 0 rgba(255, 255, 255, 0.22),
        inset 0 -3px 10px rgba(0, 0, 0, 0.62),
        0 6px 18px rgba(0, 0, 0, 0.48),
        0 20px 40px rgba(0, 0, 0, 0.82),
        0 40px 80px rgba(0, 0, 0, 0.58),
        0 0 72px rgba(255, 252, 235, 0.045);
    }

    .modal-content .museum-wall-display {
      padding: 2.5rem 1.15rem 1.75rem;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.2) 0%, rgba(0, 0, 0, 0) 70%),
        radial-gradient(ellipse 90% 55% at 50% -8%, rgba(255, 252, 240, 0.1) 0%, transparent 54%),
        radial-gradient(ellipse 120% 80% at 50% 100%, rgba(0, 0, 0, 0.55) 0%, transparent 62%),
        #0a0a0a;
    }

    .modal-content .art-period-caption {
      margin-top: 1.15rem;
      font-size: 0.82rem;
      color: rgba(204, 204, 204, 0.68);
      letter-spacing: 0.18em;
      text-indent: 0.18em;
    }

    .memory-popover {
      position: fixed;
      z-index: 10020;
      max-width: min(88vw, 18rem);
      padding: 1rem 1.1rem;
      background: rgba(14, 13, 16, 0.94);
      border: 0.5px solid rgba(201, 169, 98, 0.22);
      border-radius: 2px;
      box-shadow:
        0 16px 48px rgba(0, 0, 0, 0.75),
        0 0 32px rgba(201, 169, 98, 0.08);
      opacity: 0;
      visibility: hidden;
      transform: translate(-50%, -50%) scale(0.92);
      transition: opacity 0.35s ease, visibility 0.35s ease, transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
      pointer-events: none;
    }

    .memory-popover.visible {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    .memory-popover-date {
      font-size: 0.52rem;
      letter-spacing: 0.22em;
      color: rgba(201, 169, 98, 0.65);
      margin-bottom: 0.75rem;
    }

    .memory-popover-text {
      font-size: 0.78rem;
      font-weight: 300;
      line-height: 1.85;
      letter-spacing: 0.06em;
      color: rgba(232, 230, 226, 0.78);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 40vh;
      overflow-y: auto;
    }

    .memory-popover-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-bottom: 0.65rem;
      box-shadow: 0 0 12px color-mix(in srgb, var(--pop-color) 60%, transparent);
      background: var(--pop-color);
    }

    .memory-popover-close {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 0.55rem 0.5rem;
      border: 0.5px solid rgba(201, 169, 98, 0.22);
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(232, 230, 226, 0.55);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.52rem;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-indent: 0.32em;
      cursor: pointer;
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }

    .memory-popover-close:hover {
      color: rgba(232, 230, 226, 0.85);
      border-color: rgba(201, 169, 98, 0.4);
      background: rgba(201, 169, 98, 0.08);
    }

    .modal-overlay.view-diary .vault-orbs-layer,
    .modal-overlay.view-diary .modal-content,
    .modal-overlay.view-diary .vault-tagline {
      opacity: 1;
      visibility: visible;
    }

    .modal-close-hint {
      position: absolute;
      top: calc(0.85rem + env(safe-area-inset-top));
      right: calc(1rem + env(safe-area-inset-right));
      z-index: 8;
      font-size: 0.48rem;
      letter-spacing: 0.18em;
      color: rgba(232, 230, 226, 0.28);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
    }

    .modal-art-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
      margin-top: 1.35rem;
    }

    .save-art-btn {
      display: inline-block;
      padding: 0.65rem 1.15rem;
      border: 0.5px solid rgba(201, 169, 98, 0.38);
      border-radius: 1px;
      background:
        linear-gradient(180deg, rgba(201, 169, 98, 0.1) 0%, rgba(255, 255, 255, 0.04) 100%);
      color: rgba(232, 230, 226, 0.78);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.52rem;
      font-weight: 400;
      letter-spacing: 0.26em;
      text-indent: 0.26em;
      cursor: pointer;
      transition:
        color 0.3s ease,
        border-color 0.3s ease,
        background 0.3s ease,
        box-shadow 0.3s ease,
        opacity 0.3s ease;
    }

    .save-art-btn:hover {
      color: rgba(255, 252, 240, 0.92);
      border-color: rgba(201, 169, 98, 0.55);
      background: rgba(201, 169, 98, 0.12);
      box-shadow: 0 0 24px rgba(201, 169, 98, 0.14);
    }

    .save-art-btn:active {
      transform: scale(0.98);
    }

    .save-art-btn:disabled,
    .share-art-btn:disabled {
      opacity: 0.45;
      cursor: wait;
      pointer-events: none;
    }

    .modal-content .save-art-btn {
      color: rgba(232, 230, 226, 0.82);
    }

    .modal-content .modal-art-actions .share-art-btn.modal-share {
      margin-top: 0;
    }

    .museum-brand-logo {
      display: none;
      margin-top: 1.75rem;
      font-family: "Times New Roman", "Georgia", "Hiragino Mincho ProN", serif;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.55em;
      text-indent: 0.55em;
      color: rgba(204, 204, 204, 0.42);
    }

    .modal-content .museum-brand-logo {
      display: block;
    }

    .save-preview-overlay {
      position: fixed;
      inset: 0;
      z-index: 10050;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(0.85rem + env(safe-area-inset-top))
        calc(0.85rem + env(safe-area-inset-right))
        calc(0.85rem + env(safe-area-inset-bottom))
        calc(0.85rem + env(safe-area-inset-left));
      background:
        radial-gradient(ellipse 70% 55% at 50% 45%, rgba(20, 18, 16, 0.97) 0%, rgba(3, 3, 4, 0.98) 100%);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    .save-preview-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .save-preview-panel {
      position: relative;
      width: min(92vw, 400px);
      max-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(18px) scale(0.96);
      opacity: 0;
      transition:
        transform 0.55s cubic-bezier(0.34, 1.15, 0.64, 1),
        opacity 0.45s ease;
    }

    .save-preview-overlay.active .save-preview-panel {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .save-preview-close {
      align-self: flex-end;
      margin-bottom: 0.85rem;
      font-size: 0.48rem;
      letter-spacing: 0.18em;
      color: rgba(232, 230, 226, 0.32);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.45rem 0.5rem;
    }

    .save-preview-hint {
      width: 100%;
      margin-bottom: 1rem;
      text-align: center;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Hiragino Sans", sans-serif;
      font-size: 0.58rem;
      font-weight: 300;
      line-height: 2;
      letter-spacing: 0.12em;
      color: rgba(201, 169, 98, 0.62);
    }

    .save-preview-image-wrap {
      width: 100%;
      aspect-ratio: 9 / 16;
      max-height: min(72vh, calc(92vw * 16 / 9));
      border-radius: 2px;
      overflow: hidden;
      box-shadow:
        0 24px 64px rgba(0, 0, 0, 0.85),
        0 0 48px rgba(201, 169, 98, 0.06);
      background: #0a0a0a;
    }

    .save-preview-image-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      -webkit-touch-callout: default;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <div class="corridor-top">
    <nav class="site-nav" aria-label="ナビゲーション">
      <a class="site-nav-link" href="index.html">キャンバス</a>
      <a class="site-nav-link is-current" href="gallery.html" aria-current="page">感情の回廊</a>
      <a class="site-nav-link" href="midspace.html">言葉の浮遊層</a>
      <a class="site-nav-link" href="mycolors.html">今日の私の色</a>
    </nav>

    <header class="museum-header">
      <h1 class="museum-title">感情の回廊</h1>
      <p class="museum-subtitle">CORRIDOR OF EMOTIONS</p>
    </header>
  </div>

  <div id="gallery-container"></div>

  <script>
    (function () {
      'use strict';

      const GALLERY_KEY = 'inscape_gallery';
      const INSCAPE_HISTORY_KEY = 'inscape_history';
      const HISTORY_KEY = 'histories';
      const SPLAT_IMAGE = 'splat.png';
      const CANVAS_BG = '#f7f4eb';
      const DEFAULT_CANVAS_W = 400;
      const DEFAULT_CANVAS_H = 300;
      const SHARE_APP_URL = 'https://my-inscape.github.io/inscape/';
      const SHARE_HASHTAG = '#INSCAPE';
      const EXPORT_W = 1080;
      const EXPORT_H = 1920;

      const splatImg = new Image();
      const stampCache = {};
      let splatReady = false;
      let savePreviewObjectUrl = null;

      function drawSpacedText(ctx, text, centerX, y, spacingPx) {
        const chars = text.split('');
        let totalWidth = 0;
        chars.forEach((ch, i) => {
          totalWidth += ctx.measureText(ch).width;
          if (i < chars.length - 1) totalWidth += spacingPx;
        });
        let x = centerX - totalWidth / 2;
        chars.forEach((ch, i) => {
          ctx.fillText(ch, x, y);
          x += ctx.measureText(ch).width + (i < chars.length - 1 ? spacingPx : 0);
        });
      }

      function drawMuseumSpotlightBackground(ctx, w, h) {
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, w, h);

        const spotlight = ctx.createRadialGradient(
          w * 0.5, h * 0.1, 0,
          w * 0.5, h * 0.1, Math.max(w, h) * 0.82
        );
        spotlight.addColorStop(0, 'rgba(255, 255, 255, 0.18)');
        spotlight.addColorStop(0.32, 'rgba(255, 255, 255, 0.07)');
        spotlight.addColorStop(0.7, 'rgba(0, 0, 0, 0)');
        spotlight.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = spotlight;
        ctx.fillRect(0, 0, w, h);

        const warmGlow = ctx.createRadialGradient(
          w * 0.5, h * 0.02, 0,
          w * 0.5, h * 0.02, w * 0.58
        );
        warmGlow.addColorStop(0, 'rgba(255, 252, 240, 0.1)');
        warmGlow.addColorStop(0.45, 'rgba(255, 252, 240, 0.025)');
        warmGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = warmGlow;
        ctx.fillRect(0, 0, w, h);

        const vignette = ctx.createRadialGradient(
          w * 0.5, h * 0.46, Math.min(w, h) * 0.16,
          w * 0.5, h * 0.46, Math.max(w, h) * 0.96
        );
        vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
        vignette.addColorStop(0.52, 'rgba(0, 0, 0, 0.22)');
        vignette.addColorStop(0.82, 'rgba(5, 5, 5, 0.72)');
        vignette.addColorStop(1, 'rgba(5, 5, 5, 0.96)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, w, h);

        const floorFade = ctx.createLinearGradient(0, h * 0.68, 0, h);
        floorFade.addColorStop(0, 'rgba(0, 0, 0, 0)');
        floorFade.addColorStop(1, 'rgba(0, 0, 0, 0.52)');
        ctx.fillStyle = floorFade;
        ctx.fillRect(0, 0, w, h);
      }

      async function compositeToMuseumExport(artCanvas) {
        const final = document.createElement('canvas');
        final.width = EXPORT_W;
        final.height = EXPORT_H;
        const ctx = final.getContext('2d');

        drawMuseumSpotlightBackground(ctx, EXPORT_W, EXPORT_H);

        const logoReserve = 148;
        const topMargin = 220;
        const sidePad = 96;
        const maxW = EXPORT_W - sidePad * 2;
        const maxH = EXPORT_H - topMargin - logoReserve - 100;

        const scale = Math.min(maxW / artCanvas.width, maxH / artCanvas.height);
        const dw = artCanvas.width * scale;
        const dh = artCanvas.height * scale;
        const dx = (EXPORT_W - dw) / 2;
        const dy = topMargin + (maxH - dh) / 2;

        ctx.drawImage(artCanvas, dx, dy, dw, dh);

        ctx.save();
        const logoSize = 34;
        ctx.font = `300 ${logoSize}px "Times New Roman", Georgia, serif`;
        ctx.fillStyle = 'rgba(190, 190, 190, 0.62)';
        ctx.textBaseline = 'middle';
        drawSpacedText(ctx, 'INSCAPE', EXPORT_W / 2, EXPORT_H - 92, logoSize * 0.44);
        ctx.restore();

        return htmlCanvasToBlob(final);
      }

      function migrateSplash(s) {
        let baseSize = s.baseSize || 220;
        if (baseSize < 150) baseSize *= 2.5;
        return {
          nx: s.nx,
          ny: s.ny,
          color: s.color,
          baseSize,
          rotation: s.rotation ?? 0,
          scaleFactor: s.scaleFactor ?? 1,
          opacity: s.opacity ?? 0.75
        };
      }

      function loadSplatImage() {
        return new Promise((resolve, reject) => {
          splatImg.onload = () => {
            if (splatImg.naturalWidth > 0) {
              splatReady = true;
              resolve();
            } else {
              reject(new Error('splat.png invalid'));
            }
          };
          splatImg.onerror = () => reject(new Error('splat.png load failed'));
          splatImg.src = SPLAT_IMAGE;
          if (splatImg.complete && splatImg.naturalWidth > 0) {
            splatReady = true;
            resolve();
          }
        });
      }

      function createColorStamp(color) {
        if (!splatReady || !splatImg.naturalWidth) return null;
        if (stampCache[color]) return stampCache[color];

        const w = splatImg.naturalWidth;
        const h = splatImg.naturalHeight;
        const work = document.createElement('canvas');
        work.width = w;
        work.height = h;
        const wctx = work.getContext('2d');

        wctx.fillStyle = color;
        wctx.fillRect(0, 0, w, h);
        wctx.globalCompositeOperation = 'screen';
        wctx.drawImage(splatImg, 0, 0);
        wctx.globalCompositeOperation = 'source-over';

        stampCache[color] = work;
        return work;
      }

      function drawSplatter(c, splash, w, h) {
        const stamp = createColorStamp(splash.color);
        if (!stamp) return;

        const cx = splash.nx * w;
        const cy = splash.ny * h;
        const size = splash.baseSize * (splash.scaleFactor || 1);

        c.save();
        c.translate(cx, cy);
        c.rotate(splash.rotation || 0);
        c.globalAlpha = splash.opacity ?? 1;
        c.globalCompositeOperation = 'multiply';
        c.drawImage(stamp, -size / 2, -size / 2, size, size);
        c.restore();
        c.globalCompositeOperation = 'source-over';
      }

      function getArtDimensions(item) {
        const srcW = item.canvasW > 0 ? Math.round(item.canvasW) : DEFAULT_CANVAS_W;
        const srcH = item.canvasH > 0 ? Math.round(item.canvasH) : DEFAULT_CANVAS_H;
        return { srcW, srcH };
      }

      function renderRecipeToCanvas(canvasEl, splats, srcW, srcH) {
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        canvasEl.width = Math.round(srcW * dpr);
        canvasEl.height = Math.round(srcH * dpr);
        canvasEl.style.width = '100%';
        canvasEl.style.height = 'auto';

        const c = canvasEl.getContext('2d');
        c.setTransform(dpr, 0, 0, dpr, 0, 0);
        c.fillStyle = CANVAS_BG;
        c.fillRect(0, 0, srcW, srcH);

        if (!Array.isArray(splats)) return;

        splats.map(migrateSplash).forEach((splash) => {
          drawSplatter(c, splash, srcW, srcH);
        });
      }

      function loadGallery() {
        let galleryData = [];
        try {
          galleryData = JSON.parse(localStorage.getItem(GALLERY_KEY)) || [];
        } catch (e) {
          galleryData = [];
        }
        if (!Array.isArray(galleryData)) galleryData = [];
        return galleryData.filter(entry => entry && Array.isArray(entry.splats) && entry.splats.length > 0);
      }

      function getShareCaption() {
        return `${SHARE_HASHTAG} ${SHARE_APP_URL}`;
      }

      function getFrameCaptureTarget(containerEl) {
        if (!containerEl) return null;
        if (containerEl.classList && containerEl.classList.contains('museum-wall-display')) {
          return containerEl;
        }
        const wallDisplay = containerEl.querySelector('.museum-wall-display');
        if (wallDisplay) return wallDisplay;
        if (containerEl.classList && containerEl.classList.contains('museum-frame-sculpted')) {
          return containerEl;
        }
        return containerEl.querySelector('.museum-frame-sculpted');
      }

      function stripPrivacyTextFromClone(clonedRoot) {
        if (!clonedRoot) return;
        clonedRoot.querySelectorAll(
          '.art-date, .share-art-btn, .save-art-btn, .modal-art-actions, ' +
          '.museum-brand-logo, .memory-popover, [data-export-hide], .privacy-export-hidden'
        ).forEach((node) => node.remove());

        clonedRoot.querySelectorAll('.gallery-art-canvas').forEach((canvasEl) => {
          const overlay = canvasEl.parentElement && canvasEl.parentElement.querySelector('.privacy-text-overlay');
          if (overlay) overlay.remove();
        });
      }

      function htmlCanvasToBlob(canvasEl) {
        return new Promise((resolve, reject) => {
          if (!canvasEl || !canvasEl.width || !canvasEl.height) {
            reject(new Error('canvas invalid'));
            return;
          }
          canvasEl.toBlob((blob) => {
            if (blob) resolve(blob);
            else reject(new Error('toBlob failed'));
          }, 'image/png', 1);
        });
      }

      async function captureFramedArtworkBlob(containerEl) {
        const frameEl = getFrameCaptureTarget(containerEl);
        if (!frameEl) throw new Error('frame target missing');
        if (typeof html2canvas !== 'function') throw new Error('html2canvas not loaded');

        const popover = document.getElementById('memoryPopover');
        if (popover && popover.classList.contains('visible')) {
          hideMemoryPopover();
        }

        const scale = Math.min(2.5, Math.max(1.5, window.devicePixelRatio || 1.5));
        const artCanvas = await html2canvas(frameEl, {
          scale,
          useCORS: true,
          allowTaint: false,
          backgroundColor: null,
          logging: false,
          onclone: (_doc, clonedEl) => {
            stripPrivacyTextFromClone(clonedEl);
            clonedEl.classList.add('museum-wall-export');
          }
        });

        return compositeToMuseumExport(artCanvas);
      }

      function closeSavePreview() {
        const overlay = document.getElementById('savePreviewOverlay');
        const img = document.getElementById('savePreviewImage');
        if (overlay) {
          overlay.classList.remove('active');
          overlay.setAttribute('aria-hidden', 'true');
        }
        if (img) img.removeAttribute('src');
        if (savePreviewObjectUrl) {
          URL.revokeObjectURL(savePreviewObjectUrl);
          savePreviewObjectUrl = null;
        }
      }

      function showSavePreview(blob) {
        const overlay = document.getElementById('savePreviewOverlay');
        const img = document.getElementById('savePreviewImage');
        if (!overlay || !img || !blob) return;

        closeSavePreview();
        savePreviewObjectUrl = URL.createObjectURL(blob);
        img.src = savePreviewObjectUrl;
        overlay.classList.add('active');
        overlay.setAttribute('aria-hidden', 'false');
      }

      function downloadBlob(blob, filename) {
        if (!blob) return;
        try {
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = filename || 'inscape-framed.png';
          link.rel = 'noopener';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          setTimeout(() => URL.revokeObjectURL(url), 2000);
        } catch (err) {
          console.warn('画像の保存に失敗:', err);
        }
      }

      function openTwitterShareFallback() {
        const text = encodeURIComponent(`${SHARE_HASHTAG}\n${SHARE_APP_URL}`);
        window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank', 'noopener,noreferrer');
      }

      async function shareFramedArtwork(containerEl, triggerBtn) {
        if (!containerEl) return;

        const prevLabel = triggerBtn ? triggerBtn.textContent : '';
        if (triggerBtn) {
          triggerBtn.disabled = true;
          triggerBtn.textContent = '画像を準備中…';
        }

        let blob;
        try {
          blob = await captureFramedArtworkBlob(containerEl);
        } catch (err) {
          console.warn('額装画像の生成に失敗:', err);
          openTwitterShareFallback();
          if (triggerBtn) {
            triggerBtn.disabled = false;
            triggerBtn.textContent = prevLabel;
          }
          return;
        } finally {
          if (triggerBtn && triggerBtn.disabled) {
            triggerBtn.disabled = false;
            triggerBtn.textContent = prevLabel;
          }
        }

        const pngFile = new File([blob], 'inscape-framed.png', { type: 'image/png' });
        const sharePayload = {
          title: 'INSCAPE',
          text: getShareCaption(),
          url: SHARE_APP_URL
        };

        if (navigator.share) {
          if (navigator.canShare && navigator.canShare({ files: [pngFile] })) {
            try {
              await navigator.share({ ...sharePayload, files: [pngFile] });
              return;
            } catch (err) {
              if (err && err.name === 'AbortError') return;
            }
          }

          try {
            await navigator.share(sharePayload);
            downloadBlob(blob, 'inscape-framed.png');
            return;
          } catch (err) {
            if (err && err.name === 'AbortError') return;
          }
        }

        openTwitterShareFallback();
        downloadBlob(blob, 'inscape-framed.png');
      }

      async function saveFramedArtwork(containerEl, triggerBtn) {
        if (!containerEl) return;

        const prevLabel = triggerBtn ? triggerBtn.textContent : '';
        if (triggerBtn) {
          triggerBtn.disabled = true;
          triggerBtn.textContent = '保存を準備中…';
        }

        try {
          const blob = await captureFramedArtworkBlob(containerEl);
          showSavePreview(blob);
        } catch (err) {
          console.warn('額装画像の保存に失敗:', err);
        } finally {
          if (triggerBtn) {
            triggerBtn.disabled = false;
            triggerBtn.textContent = prevLabel || 'この絵画を保存する';
          }
        }
      }

      function createShareButton(label, getContainer) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'share-art-btn';
        btn.textContent = label;
        btn.setAttribute('aria-label', label);
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const containerEl = typeof getContainer === 'function' ? getContainer() : getContainer;
          shareFramedArtwork(containerEl, btn);
        });
        return btn;
      }

      function createSaveButton(getContainer) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'save-art-btn';
        btn.textContent = 'この絵画を保存する';
        btn.setAttribute('aria-label', 'この絵画を保存する');
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const containerEl = typeof getContainer === 'function' ? getContainer() : getContainer;
          saveFramedArtwork(containerEl, btn);
        });
        return btn;
      }

      function formatDotDate(d) {
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        return `${y}.${mo}.${da}`;
      }

      function parseHistoryEntryToDate(entry) {
        if (!entry) return null;
        if (entry.timestamp && Number(entry.timestamp) > 0) {
          const d = new Date(entry.timestamp);
          if (!Number.isNaN(d.getTime())) return d;
        }
        if (entry.date) {
          const dateStr = String(entry.date);
          const matched = dateStr.match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
          if (matched) {
            const d = new Date(Number(matched[1]), Number(matched[2]) - 1, Number(matched[3]));
            if (!Number.isNaN(d.getTime())) return d;
          }
          const parsed = Date.parse(dateStr);
          if (!Number.isNaN(parsed)) return new Date(parsed);
        }
        return null;
      }

      function computeArtworkPeriodCaption(item) {
        const history = resolveArtworkHistory(item);
        const dates = history
          .map(parseHistoryEntryToDate)
          .filter(Boolean)
          .sort((a, b) => a.getTime() - b.getTime());

        if (dates.length === 0) {
          const fallback = parseHistoryEntryToDate({ date: item.date, timestamp: 0 });
          return fallback ? formatDotDate(fallback) : '';
        }

        const startStr = formatDotDate(dates[0]);
        const endStr = formatDotDate(dates[dates.length - 1]);
        return startStr === endStr ? startStr : `${startStr} - ${endStr}`;
      }

      function createBrandLogoElement() {
        const logo = document.createElement('p');
        logo.className = 'museum-brand-logo';
        logo.textContent = 'INSCAPE';
        logo.setAttribute('aria-hidden', 'true');
        return logo;
      }

      function createPeriodCaptionElement(item) {
        const caption = document.createElement('p');
        caption.className = 'art-period-caption';
        caption.textContent = computeArtworkPeriodCaption(item);
        caption.setAttribute('aria-label', '作品の対象期間');
        return caption;
      }

      function createFramedArtwork(item) {
        const { srcW, srcH } = getArtDimensions(item);
        const artWrapper = document.createElement('div');
        artWrapper.className = 'gallery-item';

        const wallDisplay = document.createElement('div');
        wallDisplay.className = 'museum-wall-display';

        const sculpted = document.createElement('div');
        sculpted.className = 'museum-frame-sculpted';

        const surface = document.createElement('div');
        surface.className = 'art-surface';
        surface.style.aspectRatio = `${srcW} / ${srcH}`;

        const artCanvas = document.createElement('canvas');
        artCanvas.className = 'gallery-art-canvas';
        renderRecipeToCanvas(artCanvas, item.splats, srcW, srcH);

        const texture = document.createElement('div');
        texture.className = 'paper-texture-overlay';
        texture.setAttribute('aria-hidden', 'true');

        surface.appendChild(artCanvas);
        surface.appendChild(texture);
        sculpted.appendChild(surface);
        wallDisplay.appendChild(sculpted);
        wallDisplay.appendChild(createPeriodCaptionElement(item));
        wallDisplay.appendChild(createBrandLogoElement());
        artWrapper.appendChild(wallDisplay);
        artWrapper.appendChild(createShareButton('この色を放流する', () => artWrapper));
        artWrapper._galleryItem = item;

        return artWrapper;
      }

      function formatHistoryDate(ts, fallback) {
        if (!ts) return fallback || '';
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return fallback || '';
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        const hr = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${y}/${mo}/${da} ${hr}:${mi}`;
      }

      function loadGlobalInscapeHistory() {
        try {
          const raw = localStorage.getItem(INSCAPE_HISTORY_KEY) || localStorage.getItem(HISTORY_KEY);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          return data.map((entry) => ({
            word: entry.word || entry.text || '',
            color: entry.color,
            date: entry.date || formatHistoryDate(entry.timestamp, ''),
            timestamp: entry.timestamp || 0
          })).filter((e) => e.color);
        } catch {
          return [];
        }
      }

      function resolveArtworkHistory(item) {
        const mapEntry = (entry, fallbackDate) => ({
          word: entry.word || entry.text || '',
          color: entry.color,
          date: entry.date || formatHistoryDate(entry.timestamp, fallbackDate || item.date || ''),
          timestamp: entry.timestamp || 0
        });

        if (Array.isArray(item.history) && item.history.length) {
          return item.history.map((e) => mapEntry(e, item.date)).filter((e) => e.color);
        }

        if (Array.isArray(item.splats) && item.splats.length) {
          return item.splats.map((s, i) => mapEntry({
            word: s.word || '',
            color: s.color,
            timestamp: s.timestamp || i,
            date: formatHistoryDate(s.timestamp, item.date || '')
          }, item.date)).filter((e) => e.color);
        }

        return [];
      }

      function randBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function applyOrbFloatVars(orb) {
        const amp = randBetween(10, 26);
        orb.style.setProperty('--float-dur', `${randBetween(4.2, 11.5).toFixed(2)}s`);
        orb.style.setProperty('--float-delay', `-${randBetween(1.5, 14).toFixed(2)}s`);
        orb.style.setProperty('--fx0', '0px');
        orb.style.setProperty('--fy0', '0px');
        for (let k = 1; k <= 5; k++) {
          orb.style.setProperty(`--fx${k}`, `${(Math.random() - 0.5) * amp * 2}px`);
          orb.style.setProperty(`--fy${k}`, `${(Math.random() - 0.5) * amp * 2}px`);
        }
        orb.style.setProperty('--in-delay', `${randBetween(0, 0.5).toFixed(2)}s`);
      }

      let memoryPopoverHideTimer = null;
      let modalView = 'overview';

      function isPointOnFrame(x, y, size, frameEl, layerRect) {
        if (!frameEl) return false;
        const fr = frameEl.getBoundingClientRect();
        const half = size / 2;
        const gap = 18;
        const fx = fr.left - layerRect.left - gap;
        const fy = fr.top - layerRect.top - gap;
        const fw = fr.width + gap * 2;
        const fh = fr.height + gap * 2;
        return x + half > fx && x - half < fx + fw && y + half > fy && y - half < fy + fh;
      }

      function getRandomScatterSlots(count, layerEl, frameEl) {
        const layerRect = layerEl.getBoundingClientRect();
        const slots = [];
        const edgePad = 14;

        for (let i = 0; i < count; i++) {
          const size = randBetween(20, 46);
          const half = size / 2 + edgePad;
          let placed = false;

          for (let attempt = 0; attempt < 80 && !placed; attempt++) {
            const x = randBetween(half, Math.max(half + 1, layerRect.width - half));
            const y = randBetween(half, Math.max(half + 1, layerRect.height - half));

            if (isPointOnFrame(x, y, size, frameEl, layerRect)) continue;

            const crowded = slots.some((s) => {
              return Math.hypot(s.x - x, s.y - y) < (s.size + size) * 0.48 + randBetween(8, 22);
            });
            if (!crowded) {
              slots.push({ x, y, size });
              placed = true;
            }
          }

          if (!placed) {
            for (let attempt = 0; attempt < 80 && !placed; attempt++) {
              const x = randBetween(half, Math.max(half + 1, layerRect.width - half));
              const y = randBetween(half, Math.max(half + 1, layerRect.height - half));
              if (!isPointOnFrame(x, y, size, frameEl, layerRect)) {
                slots.push({ x, y, size });
                placed = true;
              }
            }
          }

          if (!placed) {
            slots.push({
              x: randBetween(half, Math.max(half + 1, layerRect.width * 0.22)),
              y: randBetween(half, Math.max(half + 1, layerRect.height - half)),
              size
            });
          }
        }

        return slots.map((s) => ({
          left: `${((s.x / layerRect.width) * 100).toFixed(2)}%`,
          top: `${((s.y / layerRect.height) * 100).toFixed(2)}%`,
          size: s.size
        }));
      }

      function spawnVaultOrbs(historyEntries, layerEl, frameEl) {
        if (!layerEl) return;
        layerEl.innerHTML = '';

        const entries = historyEntries.length ? historyEntries : [{ color: '#6a7a8a', word: '', date: '' }];
        const scatterSlots = getRandomScatterSlots(entries.length, layerEl, frameEl);

        entries.forEach((entry, i) => {
          const orb = document.createElement('button');
          orb.type = 'button';
          orb.className = 'vault-orb';
          const slot = scatterSlots[i] || scatterSlots[scatterSlots.length - 1];
          const size = slot.size || randBetween(22, 40);

          orb.style.setProperty('--orb-color', entry.color || '#5a6a7a');
          orb.style.width = `${size}px`;
          orb.style.height = `${size}px`;
          orb.style.left = slot.left;
          orb.style.top = slot.top;

          applyOrbFloatVars(orb);
          orb.setAttribute('aria-label', '感情の記録を見る');

          orb.addEventListener('click', (e) => {
            e.stopPropagation();
            showMemoryPopover(entry, orb);
          });

          layerEl.appendChild(orb);
        });
      }

      function showMemoryPopover(entry, anchorEl) {
        const popover = document.getElementById('memoryPopover');
        const imageModal = document.getElementById('imageModal');
        if (!popover) return;

        clearTimeout(memoryPopoverHideTimer);
        modalView = 'diary';
        if (imageModal) imageModal.classList.add('view-diary');

        const dot = popover.querySelector('.memory-popover-dot');
        const dateEl = popover.querySelector('.memory-popover-date');
        const textEl = popover.querySelector('.memory-popover-text');

        if (dot) dot.style.setProperty('--pop-color', entry.color || '#888');
        if (dateEl) dateEl.textContent = entry.date || '—';
        if (textEl) {
          textEl.textContent = entry.word && entry.word.trim()
            ? entry.word
            : '言葉の記録は、この作品完成前のデータには含まれていません。';
        }

        const rect = anchorEl.getBoundingClientRect();
        let left = rect.left + rect.width / 2;
        let top = rect.top - 12;
        const margin = 12;
        const popW = 288;
        if (left - popW / 2 < margin) left = margin + popW / 2;
        if (left + popW / 2 > window.innerWidth - margin) left = window.innerWidth - margin - popW / 2;
        if (top < margin + 80) top = rect.bottom + 16;

        popover.style.left = `${left}px`;
        popover.style.top = `${top}px`;
        popover.setAttribute('aria-hidden', 'false');
        popover.classList.add('visible');
      }

      function hideMemoryPopover() {
        const popover = document.getElementById('memoryPopover');
        if (popover) {
          popover.classList.remove('visible');
          popover.setAttribute('aria-hidden', 'true');
        }
      }

      function returnToVaultOverview() {
        const imageModal = document.getElementById('imageModal');
        hideMemoryPopover();
        modalView = 'overview';
        if (imageModal) {
          imageModal.classList.remove('view-diary');
        }
      }

      function handleModalCloseRequest() {
        if (modalView === 'diary') {
          returnToVaultOverview();
          return;
        }
        closeArtworkModal();
      }

      function layoutVaultOrbs(galleryItem, vaultOrbs, modalBody) {
        if (!galleryItem || !vaultOrbs) return;
        spawnVaultOrbs(resolveArtworkHistory(galleryItem), vaultOrbs, modalBody);
      }

      function openArtworkModal(artwork, item) {
        const imageModal = document.getElementById('imageModal');
        const modalBody = document.getElementById('modalBody');
        const vaultOrbs = document.getElementById('vaultOrbs');
        if (!imageModal || !modalBody) return;

        hideMemoryPopover();
        modalBody.innerHTML = artwork.innerHTML;

        const srcCanvas = artwork.querySelector('.gallery-art-canvas');
        const modalCanvas = modalBody.querySelector('.gallery-art-canvas');
        if (srcCanvas && modalCanvas) {
          modalCanvas.width = srcCanvas.width;
          modalCanvas.height = srcCanvas.height;
          modalCanvas.style.width = '100%';
          modalCanvas.style.height = 'auto';
          const surface = modalBody.querySelector('.art-surface');
          if (surface && srcCanvas.parentElement) {
            surface.style.aspectRatio = srcCanvas.parentElement.style.aspectRatio || '';
          }
          modalCanvas.getContext('2d').drawImage(srcCanvas, 0, 0);
        }

        const listShareBtn = modalBody.querySelector('.share-art-btn');
        if (listShareBtn) listShareBtn.remove();
        const listSaveBtn = modalBody.querySelector('.save-art-btn');
        if (listSaveBtn) listSaveBtn.remove();
        const listActions = modalBody.querySelector('.modal-art-actions');
        if (listActions) listActions.remove();

        const actionsWrap = document.createElement('div');
        actionsWrap.className = 'modal-art-actions';

        const modalShareBtn = createShareButton('この感情を肯定する', () => modalBody);
        modalShareBtn.classList.add('modal-share');
        actionsWrap.appendChild(modalShareBtn);
        actionsWrap.appendChild(createSaveButton(() => modalBody));
        modalBody.appendChild(actionsWrap);

        hideMemoryPopover();
        modalView = 'overview';
        const galleryItem = item || artwork._galleryItem;

        const periodCaption = modalBody.querySelector('.art-period-caption');
        if (periodCaption && galleryItem) {
          periodCaption.textContent = computeArtworkPeriodCaption(galleryItem);
        }

        const wallDisplay = modalBody.querySelector('.museum-wall-display');
        if (wallDisplay && !wallDisplay.querySelector('.museum-brand-logo')) {
          wallDisplay.appendChild(createBrandLogoElement());
        }

        imageModal.classList.remove('view-diary');
        imageModal.classList.add('active');
        imageModal.setAttribute('aria-hidden', 'false');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            layoutVaultOrbs(galleryItem, vaultOrbs, modalBody);
          });
        });
      }

      function closeArtworkModal() {
        const imageModal = document.getElementById('imageModal');
        const modalBody = document.getElementById('modalBody');
        const vaultOrbs = document.getElementById('vaultOrbs');
        if (!imageModal || !modalBody) return;
        hideMemoryPopover();
        modalView = 'overview';
        imageModal.classList.remove('active', 'view-diary');
        imageModal.setAttribute('aria-hidden', 'true');
        modalBody.innerHTML = '';
        if (vaultOrbs) vaultOrbs.innerHTML = '';
      }

      function renderGallery() {
        const galleryContainer = document.getElementById('gallery-container');
        const galleryData = loadGallery();

        if (galleryData.length === 0) {
          galleryContainer.innerHTML = '<p class="no-data">まだ額装された作品がありません。7日間の言葉をキャンバスに投げ、作品を完成させてください。</p>';
          return;
        }

        galleryContainer.innerHTML = '';
        galleryData.slice().reverse().forEach((item) => {
          const artwork = createFramedArtwork(item);
          artwork.addEventListener('click', (e) => {
            if (e.target.closest('.share-art-btn') || e.target.closest('.save-art-btn')) return;
            openArtworkModal(artwork, item);
          });
          galleryContainer.appendChild(artwork);
        });
      }

      function bindSavePreview() {
        const overlay = document.getElementById('savePreviewOverlay');
        const closeBtn = document.getElementById('savePreviewClose');
        const panel = overlay && overlay.querySelector('.save-preview-panel');

        if (closeBtn) {
          closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeSavePreview();
          });
        }

        if (overlay) {
          overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeSavePreview();
          });
        }

        if (panel) {
          panel.addEventListener('click', (e) => e.stopPropagation());
        }
      }

      function bindImageModal() {
        const imageModal = document.getElementById('imageModal');
        const modalCloseHint = document.getElementById('modalCloseHint');
        const memoryPopover = document.getElementById('memoryPopover');
        if (!imageModal) return;

        if (modalCloseHint) {
          modalCloseHint.addEventListener('click', (e) => {
            e.stopPropagation();
            handleModalCloseRequest();
          });
        }

        const memoryPopoverClose = document.getElementById('memoryPopoverClose');
        if (memoryPopoverClose) {
          memoryPopoverClose.addEventListener('click', (e) => {
            e.stopPropagation();
            returnToVaultOverview();
          });
        }

        imageModal.addEventListener('click', (e) => {
          if (e.target.closest('.vault-orb') || e.target.closest('.memory-popover') ||
              e.target.closest('.share-art-btn') || e.target.closest('.save-art-btn') ||
              e.target.closest('.modal-content') ||
              e.target.closest('#modalCloseHint')) {
            return;
          }
          if (e.target === imageModal || e.target.classList.contains('modal-vault') ||
              e.target.classList.contains('vault-orbs-layer') ||
              e.target.classList.contains('vault-tagline')) {
            handleModalCloseRequest();
          }
        });

        if (memoryPopover) {
          memoryPopover.addEventListener('click', (e) => e.stopPropagation());
        }

        document.addEventListener('keydown', (e) => {
          if (e.key !== 'Escape') return;
          const saveOverlay = document.getElementById('savePreviewOverlay');
          if (saveOverlay && saveOverlay.classList.contains('active')) {
            closeSavePreview();
            return;
          }
          if (imageModal.classList.contains('active')) {
            handleModalCloseRequest();
          }
        });
      }

      window.addEventListener('DOMContentLoaded', () => {
        bindSavePreview();
        bindImageModal();
        loadSplatImage()
          .then(renderGallery)
          .catch(() => {
            const galleryContainer = document.getElementById('gallery-container');
            galleryContainer.innerHTML = '<p class="no-data">splat.png を読み込めませんでした。index.html と同じフォルダに置いてください。</p>';
          });
      });
    })();
  </script>

  <div class="modal-overlay" id="imageModal" aria-hidden="true">
    <div class="modal-vault">
      <button type="button" class="modal-close-hint" id="modalCloseHint" aria-label="閉じる">CLOSE</button>
      <div class="modal-content" id="modalBody"></div>
      <div class="vault-orbs-layer" id="vaultOrbs" aria-hidden="true"></div>
      <p class="vault-tagline">ドロドロした感情も、全部あなたの綺麗な一部。</p>
    </div>
  </div>
  <div class="memory-popover" id="memoryPopover" role="dialog" aria-hidden="true">
    <div class="memory-popover-dot"></div>
    <p class="memory-popover-date"></p>
    <p class="memory-popover-text"></p>
    <button type="button" class="memory-popover-close" id="memoryPopoverClose">閉じる</button>
  </div>
  <div class="save-preview-overlay" id="savePreviewOverlay" aria-hidden="true" role="dialog" aria-label="保存プレビュー">
    <div class="save-preview-panel">
      <button type="button" class="save-preview-close" id="savePreviewClose" aria-label="閉じる">CLOSE</button>
      <p class="save-preview-hint">画像を長押しして<br>「写真に追加」を選択して保存してください</p>
      <div class="save-preview-image-wrap">
        <img id="savePreviewImage" alt="INSCAPE — 額装作品" draggable="false">
      </div>
    </div>
  </div>
</body>
</html>
