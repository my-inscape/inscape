  <script>
    (function () {
      'use strict';

      const GALLERY_KEY = 'inscape_gallery';
      const INSCAPE_HISTORY_KEY = 'inscape_history';
      const HISTORY_KEY = 'histories';
      const SPLASHES_KEY = 'inscape_splashes';
      const FABRIC_IMAGE = 'canvas-fabric.png';
      const CANVAS_BG = '#f7f4eb';
      const DEFAULT_CANVAS_W = 270;
      const DEFAULT_CANVAS_H = 480;
      const EXPORT_W = 1080;
      const EXPORT_H = 1920;
      const MAX_WORD_ENTRIES = 7;

      const fabricImg = new Image();
      const stampCache = {};
      let fabricReady = false;
      let fabricLoadPromise = null;
      let savePreviewObjectUrl = null;

      function formatHistoryDate(ts, fallback) {
        if (!ts) return fallback || '';
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return fallback || '';
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        const hr = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${y}/${mo}/${da} ${hr}:${mi}`;
      }

      function normalizeCoord(value, fallback) {
        if (typeof value !== 'number' || Number.isNaN(value)) return fallback;
        if (value > 1 && value <= 100) return value / 100;
        return value;
      }

      function mapHistoryEntry(entry, fallbackDate) {
        return {
          word: entry.word || entry.text || '',
          color: entry.color,
          date: entry.date || formatHistoryDate(entry.timestamp, fallbackDate || ''),
          timestamp: entry.timestamp || 0
        };
      }

      function pointToSplash(point) {
        if (!point || !point.color) return null;
        const nx = normalizeCoord(point.nx, normalizeCoord(point.x, undefined));
        const ny = normalizeCoord(point.ny, normalizeCoord(point.y, undefined));
        if (typeof nx !== 'number' || typeof ny !== 'number') return null;

        let baseSize = point.baseSize || point.size;
        if (!baseSize || baseSize < 1) baseSize = 220;

        return {
          nx,
          ny,
          color: point.color,
          baseSize,
          scaleFactor: point.scaleFactor ?? 1,
          rotation: point.rotation ?? 0,
          opacity: point.opacity ?? 0.75,
          word: point.word || '',
          timestamp: point.timestamp || 0
        };
      }

      function parseInscapeHistorySessions() {
        const sessions = [];
        try {
          const raw = localStorage.getItem(INSCAPE_HISTORY_KEY);
          if (!raw) return sessions;
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return sessions;

          data.forEach((item, sessionIndex) => {
            if (!item || typeof item !== 'object') return;

            if (Array.isArray(item.points) || Array.isArray(item.history)) {
              const points = Array.isArray(item.points) ? item.points : [];
              const history = Array.isArray(item.history) ? item.history : [];
              const splats = points.map(pointToSplash).filter(Boolean);
              sessions.push({
                points,
                splats,
                history: history.map((e) => mapHistoryEntry(e)).filter((e) => e.color),
                updatedAt: item.updatedAt || item.timestamp || 0,
                sessionIndex,
                title: item.title,
                analysis: item.analysis,
                wordsHash: item.wordsHash
              });
              return;
            }

            if (item.color && (item.word || item.text)) {
              let legacySession = sessions.find((s) => s._legacyFlat);
              if (!legacySession) {
                legacySession = {
                  points: [],
                  splats: [],
                  history: [],
                  updatedAt: 0,
                  sessionIndex,
                  _legacyFlat: true
                };
                sessions.push(legacySession);
              }
              const entry = mapHistoryEntry(item);
              legacySession.history.push(entry);
              if ((entry.timestamp || 0) > legacySession.updatedAt) {
                legacySession.updatedAt = entry.timestamp || 0;
              }
            }
          });
        } catch (err) {
          console.warn('inscape_history の解析に失敗:', err);
        }
        return sessions;
      }

      function loadSplashesFallback() {
        try {
          const raw = localStorage.getItem(SPLASHES_KEY);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          return data.map((s) => pointToSplash(s) || migrateSplash(s)).filter((s) => s && s.color);
        } catch {
          return [];
        }
      }

      function loadHistoriesFallback() {
        try {
          const raw = localStorage.getItem(HISTORY_KEY);
          if (!raw) return [];
          const data = JSON.parse(raw);
          if (!Array.isArray(data)) return [];
          return data.map((s) => pointToSplash(s) || migrateSplash(s)).filter((s) => s && s.color);
        } catch {
          return [];
        }
      }

      function splatsFingerprint(splats) {
        return splats
          .map((s) => `${Number(s.nx).toFixed(4)}|${Number(s.ny).toFixed(4)}|${s.color}|${s.timestamp || 0}`)
          .join('\u241f');
      }

      function getSplatsFromItem(item) {
        if (!item) return [];
        if (Array.isArray(item.splats) && item.splats.length) {
          return item.splats
            .map((s) => {
              const normalized = pointToSplash(s);
              return migrateSplash(normalized || s);
            })
            .filter((s) => s && s.color && typeof s.nx === 'number');
        }
        if (Array.isArray(item.points) && item.points.length) {
          return item.points.map(pointToSplash).filter(Boolean).map(migrateSplash);
        }
        return [];
      }

      function sessionToGalleryItem(session, storageRef) {
        let splats = session.splats && session.splats.length
          ? session.splats.map(migrateSplash)
          : session.points.map(pointToSplash).filter(Boolean).map(migrateSplash);

        if (!splats.length) {
          const fromHistories = loadHistoriesFallback();
          if (fromHistories.length) splats = fromHistories.map(migrateSplash);
        }
        if (!splats.length) {
          const live = loadSplashesFallback();
          if (live.length) splats = live.map(migrateSplash);
        }

        let history = Array.isArray(session.history) ? session.history : [];
        if (!history.length && splats.length) {
          history = splats.map((s, i) => mapHistoryEntry({
            word: s.word,
            color: s.color,
            timestamp: s.timestamp || i
          }));
        }

        return {
          splats,
          points: session.points || splats,
          history,
          date: history.length ? (history[history.length - 1].date || '') : '',
          updatedAt: session.updatedAt || 0,
          canvasW: DEFAULT_CANVAS_W,
          canvasH: DEFAULT_CANVAS_H,
          storageRef,
          source: storageRef.kind,
          title: session.title,
          analysis: session.analysis,
          wordsHash: session.wordsHash
        };
      }

      function loadGalleryRaw() {
        try {
          const data = JSON.parse(localStorage.getItem(GALLERY_KEY)) || [];
          return Array.isArray(data) ? data : [];
        } catch {
          return [];
        }
      }

      function saveGalleryRaw(gallery) {
        const list = Array.isArray(gallery) ? gallery : [];
        try {
          localStorage.setItem(GALLERY_KEY, JSON.stringify(list));
        } catch (err) {
          console.warn('ギャラリー保存に失敗:', err);
        }
      }

      function drawSpacedText(ctx, text, centerX, y, spacingPx) {
        const chars = text.split('');
        let totalWidth = 0;
        chars.forEach((ch, i) => {
          totalWidth += ctx.measureText(ch).width;
          if (i < chars.length - 1) totalWidth += spacingPx;
        });
        let x = centerX - totalWidth / 2;
        chars.forEach((ch, i) => {
          ctx.fillText(ch, x, y);
          x += ctx.measureText(ch).width + (i < chars.length - 1 ? spacingPx : 0);
        });
      }

      function drawMuseumSpotlightBackground(ctx, w, h) {
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, w, h);

        const spotlight = ctx.createRadialGradient(
          w * 0.5, h * 0.1, 0,
          w * 0.5, h * 0.1, Math.max(w, h) * 0.82
        );
        spotlight.addColorStop(0, 'rgba(255, 255, 255, 0.18)');
        spotlight.addColorStop(0.32, 'rgba(255, 255, 255, 0.07)');
        spotlight.addColorStop(0.7, 'rgba(0, 0, 0, 0)');
        spotlight.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = spotlight;
        ctx.fillRect(0, 0, w, h);

        const warmGlow = ctx.createRadialGradient(
          w * 0.5, h * 0.02, 0,
          w * 0.5, h * 0.02, w * 0.58
        );
        warmGlow.addColorStop(0, 'rgba(255, 252, 240, 0.1)');
        warmGlow.addColorStop(0.45, 'rgba(255, 252, 240, 0.025)');
        warmGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = warmGlow;
        ctx.fillRect(0, 0, w, h);

        const vignette = ctx.createRadialGradient(
          w * 0.5, h * 0.46, Math.min(w, h) * 0.16,
          w * 0.5, h * 0.46, Math.max(w, h) * 0.96
        );
        vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
        vignette.addColorStop(0.52, 'rgba(0, 0, 0, 0.22)');
        vignette.addColorStop(0.82, 'rgba(5, 5, 5, 0.72)');
        vignette.addColorStop(1, 'rgba(5, 5, 5, 0.96)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, w, h);

        const floorFade = ctx.createLinearGradient(0, h * 0.68, 0, h);
        floorFade.addColorStop(0, 'rgba(0, 0, 0, 0)');
        floorFade.addColorStop(1, 'rgba(0, 0, 0, 0.52)');
        ctx.fillStyle = floorFade;
        ctx.fillRect(0, 0, w, h);
      }

      async function compositeToMuseumExport(artCanvas) {
        const final = document.createElement('canvas');
        final.width = EXPORT_W;
        final.height = EXPORT_H;
        const ctx = final.getContext('2d');

        drawMuseumSpotlightBackground(ctx, EXPORT_W, EXPORT_H);

        const logoReserve = 148;
        const topMargin = 220;
        const sidePad = 96;
        const maxW = EXPORT_W - sidePad * 2;
        const maxH = EXPORT_H - topMargin - logoReserve - 100;

        const scale = Math.min(maxW / artCanvas.width, maxH / artCanvas.height);
        const dw = artCanvas.width * scale;
        const dh = artCanvas.height * scale;
        const dx = (EXPORT_W - dw) / 2;
        const dy = topMargin + (maxH - dh) / 2;

        ctx.drawImage(artCanvas, dx, dy, dw, dh);

        ctx.save();
        const logoSize = 34;
        ctx.font = `300 ${logoSize}px "Times New Roman", Georgia, serif`;
        ctx.fillStyle = 'rgba(190, 190, 190, 0.62)';
        ctx.textBaseline = 'middle';
        drawSpacedText(ctx, 'INSCAPE', EXPORT_W / 2, EXPORT_H - 92, logoSize * 0.44);
        ctx.restore();

        return htmlCanvasToBlob(final);
      }

      function resolveSplashDrawSize(s) {
        if (typeof s.drawSizePx === 'number' && s.drawSizePx > 0) return s.drawSizePx;
        const baseSize = s.baseSize || s.size || 95;
        return baseSize * (s.scaleFactor ?? 1);
      }

      function migrateSplash(s) {
        let baseSize = s.baseSize || s.size || 95;
        if (baseSize >= 200) {
          // 旧仕様（220〜410px台）のデータはそのまま維持
        } else if (baseSize > 0 && baseSize < 35) {
          baseSize *= 2.5;
        }
        const drawSizePx = resolveSplashDrawSize({ ...s, baseSize });
        return {
          nx: s.nx,
          ny: s.ny,
          color: s.color || s.color1,
          baseSize,
          drawSizePx,
          rotation: s.rotation ?? 0,
          scaleFactor: s.scaleFactor ?? 1,
          opacity: s.opacity ?? 0.75,
          splashPattern: s.splashPattern ?? 0,
          word: s.word || '',
          timestamp: s.timestamp || 0
        };
      }

      function loadFabricImage() {
        if (fabricReady && fabricImg.naturalWidth > 0) return Promise.resolve(fabricImg);
        if (fabricLoadPromise) return fabricLoadPromise;

        fabricLoadPromise = new Promise((resolve) => {
          const finish = (ok) => {
            fabricLoadPromise = null;
            if (ok) {
              fabricReady = true;
              resolve(fabricImg);
            } else {
              resolve(null);
            }
          };

          fabricImg.onload = () => finish(fabricImg.naturalWidth > 0);
          fabricImg.onerror = () => finish(false);
          fabricImg.src = FABRIC_IMAGE;

          if (fabricImg.complete) {
            finish(fabricImg.naturalWidth > 0);
          }
        });

        return fabricLoadPromise;
      }

      function drawCanvasCrosshatch(targetCtx, w, h) {
        targetCtx.save();
        targetCtx.strokeStyle = 'rgba(0, 0, 0, 0.03)';
        targetCtx.lineWidth = 1;
        for (let y = 0; y < h; y += 4) {
          targetCtx.beginPath();
          targetCtx.moveTo(0, y);
          targetCtx.lineTo(w, y);
          targetCtx.stroke();
        }
        for (let x = 0; x < w; x += 4) {
          targetCtx.beginPath();
          targetCtx.moveTo(x, 0);
          targetCtx.lineTo(x, h);
          targetCtx.stroke();
        }
        targetCtx.restore();
      }

      function drawCanvasBackgroundOnly(targetCtx, w, h) {
        targetCtx.globalCompositeOperation = 'source-over';
        targetCtx.fillStyle = CANVAS_BG;
        targetCtx.fillRect(0, 0, w, h);
      }

      function drawCanvasFabricBase(targetCtx, w, h, fabricImage) {
        targetCtx.globalCompositeOperation = 'source-over';
        targetCtx.fillStyle = CANVAS_BG;
        targetCtx.fillRect(0, 0, w, h);
        drawCanvasCrosshatch(targetCtx, w, h);
        if (fabricImage && fabricImage.naturalWidth > 0) {
          targetCtx.globalCompositeOperation = 'multiply';
          targetCtx.drawImage(fabricImage, 0, 0, w, h);
          targetCtx.globalCompositeOperation = 'source-over';
        }
      }

      function drawCanvasFabricOverlay(targetCtx, w, h, fabricImage) {
        if (!fabricImage || fabricImage.naturalWidth <= 0) return;
        targetCtx.save();
        targetCtx.globalAlpha = 0.35;
        targetCtx.globalCompositeOperation = 'multiply';
        targetCtx.drawImage(fabricImage, 0, 0, w, h);
        targetCtx.restore();
      }

      // splat.png は廃止。旧レシピ用スタンプは生成しない（完成作品は artworkImageDataUrl を使用）。
      function createColorStamp() {
        return null;
      }

      function drawSplatterStamp(c, stamp, size, alpha, pattern) {
        const p = pattern ?? 0;
        if (p === 1) {
          c.globalAlpha = alpha;
          c.drawImage(stamp, -size / 2, -size / 2, size, size);
          const spur = size * 0.36;
          const offsets = [[1, 0], [-1, 0], [0, -1], [0.65, 0.65]];
          offsets.forEach(([dx, dy]) => {
            c.globalAlpha = alpha * 0.52;
            c.drawImage(stamp, dx * spur - spur * 0.5, dy * spur - spur * 0.5, spur, spur);
          });
          return;
        }
        if (p === 2) {
          const heavy = size * 1.28;
          c.globalAlpha = alpha * 0.9;
          c.drawImage(stamp, -heavy / 2, -heavy / 2, heavy, heavy);
          c.globalAlpha = alpha * 0.42;
          c.drawImage(stamp, -size / 2, -size / 2, size, size);
          return;
        }
        c.globalAlpha = alpha;
        c.drawImage(stamp, -size / 2, -size / 2, size, size);
      }

      function drawSplatter(c, splash, w, h) {
        const stamp = createColorStamp(splash.color);
        if (!stamp) return;

        const cx = splash.nx * w;
        const cy = splash.ny * h;
        const size = splash.drawSizePx || (splash.baseSize * (splash.scaleFactor || 1));

        c.save();
        c.translate(cx, cy);
        c.rotate(splash.rotation || 0);
        c.globalCompositeOperation = 'multiply';
        drawSplatterStamp(c, stamp, size, splash.opacity ?? 1, splash.splashPattern ?? 0);
        c.restore();
        c.globalCompositeOperation = 'source-over';
      }

      function applyArtworkSurfaceAspect(surface, item, img) {
        if (!surface) return;
        let w = item && item.canvasW > 0 ? Math.round(item.canvasW) : 0;
        let h = item && item.canvasH > 0 ? Math.round(item.canvasH) : 0;
        if ((!w || !h) && item && item.snapshotPixelW > 0 && item.snapshotPixelH > 0) {
          w = Math.round(item.snapshotPixelW);
          h = Math.round(item.snapshotPixelH);
        }
        if ((!w || !h) && img && img.naturalWidth > 0 && img.naturalHeight > 0) {
          w = img.naturalWidth;
          h = img.naturalHeight;
        }
        if (!w || !h) {
          w = DEFAULT_CANVAS_W;
          h = DEFAULT_CANVAS_H;
        }
        surface.style.aspectRatio = `${w} / ${h}`;
      }

      function syncSnapshotAspect(surface, item, img) {
        applyArtworkSurfaceAspect(surface, item, img);
      }

      function mountArtworkSurface(surface, item) {
        if (!surface) return null;

        let artEl;
        if (hasValidArtworkImage(item)) {
          surface.classList.add('art-surface--snapshot');
          const img = document.createElement('img');
          img.className = 'gallery-art-image';
          img.src = item.artworkImageDataUrl;
          img.alt = '';
          img.draggable = false;
          applyArtworkSurfaceAspect(surface, item, img);
          if (img.complete) {
            syncSnapshotAspect(surface, item, img);
          } else {
            img.addEventListener('load', () => syncSnapshotAspect(surface, item, img), { once: true });
          }
          surface.appendChild(img);
          artEl = img;
        } else {
          // 画像が容量退避で剥がされていても額縁は残す（キャンバス再訪で再ベイクされる）
          const artCanvas = document.createElement('canvas');
          artCanvas.className = 'gallery-art-canvas';
          applyArtworkSurfaceAspect(surface, item);
          renderRecipeToCanvas(artCanvas, getSplatsFromItem(item), item);
          surface.appendChild(artCanvas);
          const hint = document.createElement('div');
          hint.className = 'art-restore-hint';
          hint.textContent = '画像を復元中…キャンバスを開くと再生されます';
          surface.appendChild(hint);
          artEl = artCanvas;
        }

        return artEl;
      }

      function renderRecipeToCanvas(canvasEl, splats, item) {
        const targetW = DEFAULT_CANVAS_W;
        const targetH = DEFAULT_CANVAS_H;
        const srcW = item && item.canvasW > 0 ? Math.round(item.canvasW) : targetW;
        const srcH = item && item.canvasH > 0 ? Math.round(item.canvasH) : targetH;
        const dpr = window.devicePixelRatio || 1;
        canvasEl.width = Math.round(targetW * dpr);
        canvasEl.height = Math.round(targetH * dpr);

        const c = canvasEl.getContext('2d');
        c.setTransform(dpr, 0, 0, dpr, 0, 0);
        const fabricImage = fabricReady && fabricImg.naturalWidth > 0 ? fabricImg : null;

        if (!Array.isArray(splats) || !splats.length) {
          drawCanvasBackgroundOnly(c, targetW, targetH);
          drawCanvasFabricOverlay(c, targetW, targetH, fabricImage);
          return;
        }

        if (srcW === targetW && srcH === targetH) {
          drawCanvasBackgroundOnly(c, targetW, targetH);
          splats.map(migrateSplash).forEach((splash) => {
            drawSplatter(c, splash, targetW, targetH);
          });
          drawCanvasFabricOverlay(c, targetW, targetH, fabricImage);
          return;
        }

        const off = document.createElement('canvas');
        off.width = srcW;
        off.height = srcH;
        const offCtx = off.getContext('2d');
        drawCanvasBackgroundOnly(offCtx, srcW, srcH);
        splats.map(migrateSplash).forEach((splash) => {
          drawSplatter(offCtx, splash, srcW, srcH);
        });
        drawCanvasFabricOverlay(offCtx, srcW, srcH, fabricImage);
        c.drawImage(off, 0, 0, targetW, targetH);
      }

      // 有効な完成画像(Base64)を持つか判定。
      function hasValidArtworkImage(entry) {
        const url = entry && entry.artworkImageDataUrl;
        return typeof url === 'string' && url.indexOf('data:image') === 0 && url.length > 512;
      }

      // flower（色データ）が残っていれば画像欠落でも回廊に載せる（容量退避の「見せかけの消失」を防ぐ）
      function galleryEntryHasRecoverableFlower(entry) {
        const f = entry && entry.flower;
        return !!(f && (f.center || (Array.isArray(f.petals) && f.petals.length)));
      }

      function loadGallery() {
        const items = [];
        let rawCount = 0;
        let skippedEmpty = 0;

        try {
          const data = loadGalleryRaw();
          if (Array.isArray(data)) {
            rawCount = data.length;
            data.forEach((entry, index) => {
              if (!entry) return;
              // 完成画像があるか、flowerから再描画可能なものだけ表示。
              // ★件数の slice(0,3) 等の表示制限はしない。全件を横スクロール対象にする。
              if (!hasValidArtworkImage(entry) && !galleryEntryHasRecoverableFlower(entry)) {
                skippedEmpty++;
                return;
              }
              const splats = getSplatsFromItem(entry);
              items.push({
                ...entry,
                splats,
                storageRef: { kind: 'gallery', index },
                source: 'inscape_gallery'
              });
            });
          }
        } catch (err) {
          console.warn('inscape_gallery の読み込みに失敗:', err);
        }

        console.log('[gallery] LocalStorage件数:', rawCount, '/ 表示:', items.length, '/ 空スキップ:', skippedEmpty);
        return items;
      }

      function getFrameCaptureTarget(containerEl) {
        if (!containerEl) return null;
        if (containerEl.classList && containerEl.classList.contains('museum-wall-display')) {
          return containerEl;
        }
        const wallDisplay = containerEl.querySelector('.museum-wall-display');
        if (wallDisplay) return wallDisplay;
        if (containerEl.classList && containerEl.classList.contains('museum-frame-sculpted')) {
          return containerEl;
        }
        return containerEl.querySelector('.museum-frame-sculpted');
      }

      function stripPrivacyTextFromClone(clonedRoot) {
        if (!clonedRoot) return;
        clonedRoot.querySelectorAll(
          '.art-date, .save-art-btn, .detail-save-btn, .modal-art-actions, ' +
          '.museum-brand-logo, .memory-popover, [data-export-hide], .privacy-export-hidden, ' +
          '.artwork-caption-block, .art-period-caption, .gallery-bottle-wrap'
        ).forEach((node) => node.remove());

        clonedRoot.querySelectorAll('.gallery-art-canvas, .gallery-art-image').forEach((artEl) => {
          const overlay = artEl.parentElement && artEl.parentElement.querySelector('.privacy-text-overlay');
          if (overlay) overlay.remove();
        });
      }

      function htmlCanvasToBlob(canvasEl) {
        return new Promise((resolve, reject) => {
          if (!canvasEl || !canvasEl.width || !canvasEl.height) {
            reject(new Error('canvas invalid'));
            return;
          }
          canvasEl.toBlob((blob) => {
            if (blob) resolve(blob);
            else reject(new Error('toBlob failed'));
          }, 'image/png', 1);
        });
      }

      async function captureFramedArtworkBlob(containerEl) {
        const frameEl = getFrameCaptureTarget(containerEl);
        if (!frameEl) throw new Error('frame target missing');
        if (typeof html2canvas !== 'function') throw new Error('html2canvas not loaded');

        const popover = document.getElementById('memoryPopover');
        if (popover && popover.classList.contains('visible')) {
          hideMemoryPopover();
        }

        const scale = Math.min(2.5, Math.max(1.5, window.devicePixelRatio || 1.5));
        const artCanvas = await html2canvas(frameEl, {
          scale,
          useCORS: true,
          allowTaint: false,
          backgroundColor: null,
          logging: false,
          onclone: (_doc, clonedEl) => {
            stripPrivacyTextFromClone(clonedEl);
            clonedEl.classList.add('museum-wall-export');
          }
        });

        return compositeToMuseumExport(artCanvas);
      }

      function closeSavePreview() {
        const overlay = document.getElementById('savePreviewOverlay');
        const img = document.getElementById('savePreviewImage');
        if (overlay) {
          overlay.classList.remove('active');
          overlay.setAttribute('aria-hidden', 'true');
        }
        if (img) img.removeAttribute('src');
        if (savePreviewObjectUrl) {
          URL.revokeObjectURL(savePreviewObjectUrl);
          savePreviewObjectUrl = null;
        }
      }

      function showSavePreview(blobOrUrl) {
        const overlay = document.getElementById('savePreviewOverlay');
        const img = document.getElementById('savePreviewImage');
        if (!overlay || !img || !blobOrUrl) return;

        closeSavePreview();
        if (typeof blobOrUrl === 'string') {
          img.src = blobOrUrl;
        } else {
          savePreviewObjectUrl = URL.createObjectURL(blobOrUrl);
          img.src = savePreviewObjectUrl;
        }
        // 長押しでカメラロールへ入れられるよう、iOSのコールアウトを許可
        img.style.webkitTouchCallout = 'default';
        img.style.pointerEvents = 'auto';
        overlay.classList.add('active');
        overlay.setAttribute('aria-hidden', 'false');
      }

      function downloadBlob(blob, filename) {
        if (!blob) return;
        try {
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = filename || 'inscape-framed.png';
          link.rel = 'noopener';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          setTimeout(() => URL.revokeObjectURL(url), 2000);
        } catch (err) {
          console.warn('画像の保存に失敗:', err);
        }
      }

      // dataURL → PNG File（共有・写真アプリ互換を最大化）
      async function artworkDataUrlToPngFile(dataUrl, filename) {
        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = dataUrl;
        });
        const cv = document.createElement('canvas');
        cv.width = Math.max(1, img.naturalWidth || img.width);
        cv.height = Math.max(1, img.naturalHeight || img.height);
        const ctx = cv.getContext('2d');
        ctx.fillStyle = '#f7f4eb';
        ctx.fillRect(0, 0, cv.width, cv.height);
        ctx.drawImage(img, 0, 0);
        const blob = await new Promise((resolve, reject) => {
          cv.toBlob((b) => (b ? resolve(b) : reject(new Error('toBlob failed'))), 'image/png');
        });
        return new File([blob], filename || 'INSCAPE_Artwork.png', { type: 'image/png' });
      }

      async function blobToPngFile(blob, filename) {
        if (blob && blob.type === 'image/png') {
          return new File([blob], filename || 'INSCAPE_Artwork.png', { type: 'image/png' });
        }
        const url = URL.createObjectURL(blob);
        try {
          return await artworkDataUrlToPngFile(url, filename);
        } finally {
          URL.revokeObjectURL(url);
        }
      }

      // 第一優先: スマホのみ Web Share（共有シート→写真に保存）
      // PCで navigator.share があると「ファイル保存」になりやすいのでモバイル限定。
      // 第二優先: 長押し誘導モーダル（ブラウザDLには落とさない）
      function isLikelyMobileShareTarget() {
        const ua = navigator.userAgent || '';
        if (/Android|iPhone|iPad|iPod/i.test(ua)) return true;
        if (navigator.platform === 'MacIntel' && (navigator.maxTouchPoints || 0) > 1) return true;
        return false;
      }

      async function shareImageFileOrShowPreview(file, previewSrc) {
        if (isLikelyMobileShareTarget() && file && navigator.share && typeof navigator.canShare === 'function') {
          try {
            const payload = {
              files: [file],
              title: 'INSCAPE - 感情の回廊',
              text: '今日の私の感情を染め上げた作品です。'
            };
            if (navigator.canShare(payload)) {
              await navigator.share(payload);
              return 'shared';
            }
          } catch (err) {
            if (err && (err.name === 'AbortError' || err.name === 'NotAllowedError')) {
              return 'aborted';
            }
            console.warn('[share] Web Share 失敗 → 長押しモーダルへ:', err);
          }
        }
        showSavePreview(previewSrc || file);
        return 'preview';
      }

      async function saveFramedArtwork(containerEl, triggerBtn) {
        if (!containerEl) return;

        const prevLabel = triggerBtn ? triggerBtn.textContent : '';
        if (triggerBtn) {
          triggerBtn.disabled = true;
          triggerBtn.textContent = '保存を準備中…';
        }

        try {
          const blob = await captureFramedArtworkBlob(containerEl);
          const file = await blobToPngFile(blob, 'INSCAPE_Artwork.png');
          await shareImageFileOrShowPreview(file, blob);
        } catch (err) {
          console.warn('額装画像の保存に失敗:', err);
        } finally {
          if (triggerBtn) {
            triggerBtn.disabled = false;
            triggerBtn.textContent = prevLabel || 'この絵画を保存する';
          }
        }
      }

      function createSaveButton(getContainer) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'save-art-btn';
        btn.textContent = 'この絵画を保存する';
        btn.setAttribute('aria-label', 'この絵画を保存する');
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const containerEl = typeof getContainer === 'function' ? getContainer() : getContainer;
          saveFramedArtwork(containerEl, btn);
        });
        return btn;
      }

      function normalizeGalleryDateKey(str) {
        if (!str) return '';
        const matched = String(str).match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
        if (!matched) return String(str).trim();
        const y = matched[1];
        const mo = String(matched[2]).padStart(2, '0');
        const da = String(matched[3]).padStart(2, '0');
        return `${y}.${mo}.${da}`;
      }

      function formatDotDate(d) {
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const da = String(d.getDate()).padStart(2, '0');
        return `${y}.${mo}.${da}`;
      }

      function parseHistoryEntryToDate(entry) {
        if (!entry) return null;
        if (entry.timestamp && Number(entry.timestamp) > 0) {
          const d = new Date(entry.timestamp);
          if (!Number.isNaN(d.getTime())) return d;
        }
        if (entry.date) {
          const dateStr = String(entry.date);
          const matched = dateStr.match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
          if (matched) {
            const d = new Date(Number(matched[1]), Number(matched[2]) - 1, Number(matched[3]));
            if (!Number.isNaN(d.getTime())) return d;
          }
          const parsed = Date.parse(dateStr);
          if (!Number.isNaN(parsed)) return new Date(parsed);
        }
        return null;
      }

      function compactDotDate(dotDate) {
        const m = String(dotDate || '').match(/\d{4}\.(\d{2}\.\d{2})/);
        return m ? m[1] : String(dotDate || '');
      }

      function formatCompactPeriod(startStr, endStr) {
        const a = compactDotDate(startStr);
        const b = compactDotDate(endStr);
        if (!a && !b) return '';
        if (!b || a === b) return a;
        return `${a} - ${b}`;
      }

      function getArtworkDiaryDay(ts) {
        const n = Number(ts);
        if (!n || n <= 0) return null;
        const d = new Date(n);
        if (Number.isNaN(d.getTime())) return null;
        const shifted = new Date(d.getTime() - (6 * 60 * 60 * 1000));
        return new Date(shifted.getFullYear(), shifted.getMonth(), shifted.getDate());
      }

      function collectArtworkDiaryDays(list) {
        const source = Array.isArray(list) ? list : [];
        const seen = new Set();
        const days = [];
        source.forEach((entry) => {
          const day = getArtworkDiaryDay(entry && entry.timestamp);
          if (!day) return;
          const key = day.getTime();
          if (seen.has(key)) return;
          seen.add(key);
          days.push(day);
        });
        days.sort((a, b) => a.getTime() - b.getTime());
        return days;
      }

      function periodCaptionFromDays(days) {
        if (!days.length) return '';
        const startStr = formatDotDate(days[0]);
        const endStr = formatDotDate(days[days.length - 1]);
        return formatCompactPeriod(startStr, endStr);
      }

      function computeArtworkPeriodCaption(item) {
        if (item.flowerDays) {
          const periodText = (() => {
            if (item.periodStart && item.periodEnd) {
              return formatCompactPeriod(item.periodStart, item.periodEnd);
            }
            if (item.period) {
              const parts = String(item.period).split(' - ').map((s) => s.trim());
              if (parts.length === 2) return formatCompactPeriod(parts[0], parts[1]);
              return compactDotDate(parts[0]);
            }
            return '';
          })();
          const flowerLabel = `${item.flowerDays}日間の感情が注がれた作品`;
          return periodText ? `${flowerLabel} · ${periodText}` : flowerLabel;
        }

        const splats = getSplatsFromItem(item);
        const daysFromSplats = collectArtworkDiaryDays(splats);
        if (daysFromSplats.length) {
          return periodCaptionFromDays(daysFromSplats);
        }

        if (item.periodStart && item.periodEnd) {
          return formatCompactPeriod(item.periodStart, item.periodEnd);
        }
        if (item.period) {
          const parts = String(item.period).split(' - ').map((s) => s.trim());
          if (parts.length === 2) return formatCompactPeriod(parts[0], parts[1]);
          return compactDotDate(parts[0]);
        }

        const history = resolveArtworkHistory(item);
        const historyDays = [];
        const seenHistoryDays = new Set();
        history.forEach((entry) => {
          const parsed = parseHistoryEntryToDate(entry);
          if (!parsed) return;
          const day = getArtworkDiaryDay(parsed.getTime());
          if (!day) return;
          const key = day.getTime();
          if (seenHistoryDays.has(key)) return;
          seenHistoryDays.add(key);
          historyDays.push(day);
        });
        historyDays.sort((a, b) => a.getTime() - b.getTime());
        if (historyDays.length) {
          return periodCaptionFromDays(historyDays);
        }

        if (item.completedAt) {
          const completedDay = getArtworkDiaryDay(item.completedAt);
          if (completedDay) return compactDotDate(formatDotDate(completedDay));
        }

        const fallback = parseHistoryEntryToDate({ date: item.date, timestamp: item.completedAt || 0 });
        return fallback ? compactDotDate(formatDotDate(fallback)) : '';
      }

      // 作品の「7日間」の開始日・終了日を各作品のセッション情報から算出する。
      // 返り値: { start:'YYYY.MM.DD', end:'YYYY.MM.DD' } または null
      function computeArtworkPeriodRange(item) {
        if (!item) return null;
        const days = collectArtworkDiaryDays(getFlowerDaysFromItem(item));
        if (days.length) {
          return { start: formatDotDate(days[0]), end: formatDotDate(days[days.length - 1]) };
        }
        if (item.periodStart && item.periodEnd) {
          return { start: normalizeGalleryDateKey(item.periodStart), end: normalizeGalleryDateKey(item.periodEnd) };
        }
        if (item.period) {
          const parts = String(item.period).split(' - ').map((s) => s.trim());
          if (parts.length === 2) return { start: normalizeGalleryDateKey(parts[0]), end: normalizeGalleryDateKey(parts[1]) };
          const one = normalizeGalleryDateKey(parts[0]);
          if (one) return { start: one, end: one };
        }
        if (item.completedAt) {
          const d = getArtworkDiaryDay(item.completedAt);
          if (d) return { start: formatDotDate(d), end: formatDotDate(d) };
        }
        const fb = parseHistoryEntryToDate({ date: item.date, timestamp: item.completedAt || 0 });
        if (fb) return { start: formatDotDate(fb), end: formatDotDate(fb) };
        return null;
      }

      // 作品に記録された日数（＝ボトルに注がれた感情の日数）
      function getArtworkDayCount(item) {
        const n = getFlowerDaysFromItem(item).length;
        if (n > 0) return n;
        if (item && item.flowerDays) return item.flowerDays;
        return 7;
      }

      // detail=false: 一覧用の短い期間（例: 07.07 - 07.13）
      // detail=true : 詳細用の文（例: 7日間の感情が注がれた作品（07.07 - 07.13））
      function createPeriodCaptionElement(item, detail) {
        const caption = document.createElement('p');
        caption.className = 'art-period-caption' + (detail ? '' : ' art-period-caption--list');
        const range = computeArtworkPeriodRange(item);
        const shortPeriod = range ? formatCompactPeriod(range.start, range.end) : '';
        if (detail) {
          const n = getArtworkDayCount(item);
          caption.textContent = shortPeriod
            ? `${n}日間の感情が注がれた作品（${shortPeriod}）`
            : `${n}日間の感情が注がれた作品`;
        } else {
          caption.textContent = shortPeriod;
        }
        caption.setAttribute('aria-label', '作品の対象期間');
        return caption;
      }

      function getFlowerDaysFromItem(item) {
        const flower = item && item.flower;
        if (!flower) return resolveArtworkHistory(item);
        const days = [];
        if (flower.center) {
          days.push(mapHistoryEntry({
            word: flower.center.word,
            color: flower.center.color,
            timestamp: flower.center.timestamp
          }));
        }
        (flower.petals || []).forEach((p) => {
          days.push(mapHistoryEntry({
            word: p.word,
            color: p.color,
            timestamp: p.timestamp
          }));
        });
        days.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        return days.length ? days : resolveArtworkHistory(item);
      }

      function openBottleAlbum(item) {
        const overlay = document.getElementById('bottleAlbumOverlay');
        const daysEl = document.getElementById('bottleAlbumDays');
        if (!overlay || !daysEl || !item) return;
        const days = getFlowerDaysFromItem(item);
        daysEl.innerHTML = '';
        days.forEach((entry, i) => {
          const row = document.createElement('div');
          row.className = 'bottle-album-day';
          const swatch = document.createElement('div');
          swatch.className = 'bottle-album-swatch';
          swatch.style.background = entry.color || '#888';
          const body = document.createElement('div');
          const label = document.createElement('p');
          label.className = 'bottle-album-day-label';
          label.textContent = `Day ${i + 1}`;
          const word = document.createElement('p');
          word.className = 'bottle-album-word';
          word.textContent = entry.word && entry.word.trim() ? entry.word : '—';
          body.appendChild(label);
          body.appendChild(word);
          row.appendChild(swatch);
          row.appendChild(body);
          daysEl.appendChild(row);
        });
        overlay.classList.add('active');
        overlay.setAttribute('aria-hidden', 'false');
      }

      function closeBottleAlbum() {
        const overlay = document.getElementById('bottleAlbumOverlay');
        if (overlay) {
          overlay.classList.remove('active');
          overlay.setAttribute('aria-hidden', 'true');
        }
      }

      // 完成作品を写真アプリへ（Web Share 優先 / 失敗時は長押しモーダル）
      // ★額装込みで合成してから渡す（内側キャンバスのみの書き出しをやめる）
      // ※ LocalStorage 上の gallery データは変更しない（端末への画像持ち出しのみ）
      async function downloadArtworkImage(item, triggerBtn, frameHostEl) {
        const url = item && item.artworkImageDataUrl;
        if (!url) return;

        const range = computeArtworkPeriodRange(item);
        const endStr = (range && range.end) ? range.end : formatDotDate(new Date());
        const datePart = String(endStr).replace(/[^0-9]/g, '');
        const filename = `INSCAPE_Artwork_${datePart || 'artwork'}.png`;

        const prevLabel = triggerBtn ? triggerBtn.textContent : '';
        if (triggerBtn) {
          triggerBtn.disabled = true;
          triggerBtn.textContent = '保存を準備中…';
        }

        try {
          let file = null;
          let preview = null;

          // 1) 画面上のゴールド額縁DOMを html2canvas で忠実にキャプチャ（可能なら最優先）
          if (frameHostEl && typeof html2canvas === 'function') {
            try {
              const blob = await captureFramedArtworkBlob(frameHostEl);
              file = await blobToPngFile(blob, filename);
              preview = blob;
            } catch (err) {
              console.warn('[framed-save] DOMキャプチャ失敗 → Canvas合成へ:', err);
            }
          }

          // 2) DOMが取れない場合：CSS額縁と同色のベベルを Canvas 上で合成
          if (!file) {
            const FX = window.INSCAPE_FRAME_EXPORT;
            if (FX && typeof FX.composeFramedPngFile === 'function') {
              const framed = await FX.composeFramedPngFile(url, filename, {
                padT: 14, padR: 14, padB: 14, padL: 14, border: 20, outline: 3, margin: 64, maxArtSide: 960
              });
              file = framed.file;
              preview = framed.previewUrl;
            } else {
              file = await artworkDataUrlToPngFile(url, filename);
              preview = url;
            }
          }

          await shareImageFileOrShowPreview(file, preview);
        } catch (err) {
          console.warn('作品画像の共有準備に失敗:', err);
          try {
            const FX = window.INSCAPE_FRAME_EXPORT;
            if (FX) {
              const framed = await FX.composeFramedPngFile(url, filename);
              showSavePreview(framed.previewUrl);
            } else {
              showSavePreview(url);
            }
          } catch (_) {
            showSavePreview(url);
          }
        } finally {
          if (triggerBtn) {
            triggerBtn.disabled = false;
            triggerBtn.textContent = prevLabel || '作品を保存する';
          }
        }
      }

      // flower(center+petals)の7色から「感情のボトル」を再描画する。
      // 保存画像(bottleImageDataUrl)が容量退避で剥がされた作品でも、色データからボトルを復元できる。
      function renderMemoryBottleCanvas(colors) {
        const dpr = Math.max(2, window.devicePixelRatio || 1);
        const W = 150, H = 208;
        const cv = document.createElement('canvas');
        cv.width = Math.round(W * dpr);
        cv.height = Math.round(H * dpr);
        const c = cv.getContext('2d');
        c.setTransform(dpr, 0, 0, dpr, 0, 0);

        const cx = W / 2;
        const neckW = 24, neckTop = 18;
        const bodyR = 55;
        const bodyCy = H - bodyR - 12;
        const bodyCx = cx;
        const neckBottom = bodyCy - bodyR * 0.6;
        const nl = cx - neckW / 2, nr = cx + neckW / 2;

        const tracePath = () => {
          c.beginPath();
          c.moveTo(nl, neckTop + 6);
          c.quadraticCurveTo(nl, neckTop, nl + 6, neckTop);
          c.lineTo(nr - 6, neckTop);
          c.quadraticCurveTo(nr, neckTop, nr, neckTop + 6);
          c.lineTo(nr, neckBottom);
          c.quadraticCurveTo(nr + 6, bodyCy - bodyR * 0.72, bodyCx + bodyR, bodyCy);
          c.arc(bodyCx, bodyCy, bodyR, 0, Math.PI, false);
          c.quadraticCurveTo(nl - 6, bodyCy - bodyR * 0.72, nl, neckBottom);
          c.closePath();
        };

        const list = Array.isArray(colors) ? colors.filter(Boolean) : [];
        const N = list.length;
        const liqTop = bodyCy - bodyR * 0.5;
        const liqBot = bodyCy + bodyR;

        c.save();
        tracePath();
        c.clip();
        // ガラスの下地
        c.fillStyle = 'rgba(255,255,255,0.04)';
        c.fillRect(0, 0, W, H);
        // 液体（最新色が上・古い色が下）
        if (N) {
          const g = c.createLinearGradient(0, liqTop, 0, liqBot);
          for (let j = 0; j < N; j++) {
            const col = list[N - 1 - j];
            g.addColorStop(N === 1 ? 0 : j / (N - 1), col);
          }
          if (N === 1) g.addColorStop(1, list[0]);
          c.fillStyle = g;
          c.fillRect(0, liqTop, W, liqBot - liqTop);
          // 水面のわずかな光
          c.fillStyle = 'rgba(255,255,255,0.18)';
          c.fillRect(0, liqTop, W, 1.5);
        }
        // 中央の縦ハイライト（ガラスの光）
        const hl = c.createLinearGradient(cx - bodyR, 0, cx + bodyR, 0);
        hl.addColorStop(0, 'rgba(255,255,255,0)');
        hl.addColorStop(0.18, 'rgba(255,255,255,0.22)');
        hl.addColorStop(0.32, 'rgba(255,255,255,0)');
        hl.addColorStop(1, 'rgba(255,255,255,0)');
        c.fillStyle = hl;
        c.fillRect(0, 0, W, H);
        c.restore();

        // ガラスの外郭ライン
        c.save();
        tracePath();
        c.lineWidth = 1.6;
        c.strokeStyle = 'rgba(255,255,255,0.55)';
        c.stroke();
        c.restore();

        return cv;
      }

      // item.flower(center+petals) から、index.html と同一の drops配列 [{color,opacity}] を作る。
      // 時系列（古い→新しい）で並べる。ボトルは末尾(最新)を一番上に積む。
      function getBottleDropsFromItem(item) {
        const f = item && item.flower;
        let drops = [];
        if (f && f.center) {
          drops = [f.center, ...(f.petals || [])].filter(Boolean).map((d) => ({
            color: d.color, opacity: d.opacity, timestamp: d.timestamp || 0
          }));
        }
        if (!drops.length) {
          const days = getFlowerDaysFromItem(item);
          drops = (days || []).map((d) => ({ color: d && d.color, opacity: undefined, timestamp: (d && d.timestamp) || 0 }));
        }
        drops.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        return drops.filter((d) => d.color);
      }

      // 詳細ビューのボトル要素（タップで7日間の日記アルバムを開く）を生成。
      // index.html と同一アルゴリズム(INSCAPE_BOTTLE)で flower の色から本物のガラス質感を再描画する。
      // 保存画像が容量退避で消えた作品でも、色データから必ず高品質なボトルを復元できる。
      function buildGalleryBottleEl(item) {
        const drops = getBottleDropsFromItem(item);
        if (!drops.length && !item.bottleImageDataUrl) return null;

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'gallery-bottle-wrap';
        btn.setAttribute('aria-label', '一週間の記憶を見る');

        if (window.INSCAPE_BOTTLE && drops.length) {
          // 本物のガラスボトルを再描画（ガラス実体→内部陰影→液体→screen/overlayハイライト）
          const cv = document.createElement('canvas');
          cv.className = 'gallery-bottle-img';
          cv.setAttribute('role', 'img');
          cv.setAttribute('aria-label', '感情のボトル');
          const seed = (item.flower && item.flower.seed) || 7;
          const B = window.INSCAPE_BOTTLE;
          const doRender = () => B.renderInto(cv, drops, seed, B.LOGICAL_W, B.LOGICAL_H);
          B.load().then(doRender);
          if (B.ready()) doRender();
          btn.appendChild(cv);
        } else if (item.bottleImageDataUrl) {
          const img = document.createElement('img');
          img.className = 'gallery-bottle-img';
          img.src = item.bottleImageDataUrl;
          img.alt = '感情のボトル';
          btn.appendChild(img);
        } else {
          const colors = drops.map((d) => d.color);
          const cv = renderMemoryBottleCanvas(colors);
          cv.className = 'gallery-bottle-img';
          btn.appendChild(cv);
        }
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          openBottleAlbum(item);
        });
        return btn;
      }

      // detail=false: 一覧モード（額縁のみ / ボトル・タイトル非表示）
      // detail=true : 詳細モード（額縁 -> ボトル -> タイトルの縦並び）
      function createFramedArtwork(item, detail) {
        const artWrapper = document.createElement('div');
        artWrapper.className = 'gallery-item' + (detail ? ' gallery-item--detail' : ' gallery-item--list');

        const wallDisplay = document.createElement('div');
        wallDisplay.className = 'museum-wall-display';

        const sculpted = document.createElement('div');
        sculpted.className = 'museum-frame-sculpted';

        const surface = document.createElement('div');
        surface.className = 'art-surface';

        mountArtworkSurface(surface, item);
        sculpted.appendChild(surface);

        // (1) 額縁アート本体（一覧・詳細とも表示）
        wallDisplay.appendChild(sculpted);

        if (detail) {
          // (2) 使用したボトル（詳細モードのみ）— タップで7日間の日記。
          // 保存画像が無くても flower の色から再描画するので、必ず表示＆タップ可能。
          const bottleEl = buildGalleryBottleEl(item);
          if (bottleEl) wallDisplay.appendChild(bottleEl);
          // (3) 作品タイトルと期間（例: 7日間の感情が注がれた作品（07.07 - 07.13））
          wallDisplay.appendChild(createPeriodCaptionElement(item, true));

          // (4) 作品を写真へ保存（Web Share → 長押しモーダル）
          if (item.artworkImageDataUrl) {
            const saveBtn = document.createElement('button');
            saveBtn.type = 'button';
            saveBtn.className = 'detail-save-btn';
            saveBtn.textContent = '作品を保存する';
            saveBtn.setAttribute('aria-label', '作品を写真アプリに保存する');
            saveBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              // ゴールド額縁（sculpted）のみをキャプチャ（ボトル／ボタンは含めない）
              downloadArtworkImage(item, saveBtn, sculpted);
            });
            wallDisplay.appendChild(saveBtn);
          }
        } else {
          // 一覧モードは額縁の真下に短い期間だけ（例: 07.07 - 07.13）
          wallDisplay.appendChild(createPeriodCaptionElement(item, false));
        }

        artWrapper.appendChild(wallDisplay);
        artWrapper._galleryItem = item;

        return artWrapper;
      }

      function loadGlobalInscapeHistory() {
        const flat = [];
        parseInscapeHistorySessions().forEach((session) => {
          session.history.forEach((entry) => flat.push(entry));
        });
        if (flat.length) {
          return flat.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        }

        const fromHistories = loadHistoriesFallback();
        if (fromHistories.length) {
          return fromHistories.map((s, i) => mapHistoryEntry({
            word: s.word,
            color: s.color,
            timestamp: s.timestamp || i
          }));
        }

        return loadSplashesFallback().map((s, i) => mapHistoryEntry({
          word: s.word,
          color: s.color,
          timestamp: s.timestamp || i
        }));
      }

      function resolveArtworkHistory(item) {
        if (Array.isArray(item.history) && item.history.length) {
          return item.history.map((e) => mapHistoryEntry(e, item.date)).filter((e) => e.color);
        }

        const splats = getSplatsFromItem(item);
        if (splats.length) {
          return splats.map((s, i) => mapHistoryEntry({
            word: s.word || '',
            color: s.color,
            timestamp: Number(s.timestamp) > 0 ? Number(s.timestamp) : 0,
            date: formatHistoryDate(s.timestamp, item.date || '')
          }, item.date)).filter((e) => e.color);
        }

        return [];
      }

      function randBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function applyOrbFloatVars(orb) {
        const amp = randBetween(10, 26);
        orb.style.setProperty('--float-dur', `${randBetween(4.2, 11.5).toFixed(2)}s`);
        orb.style.setProperty('--float-delay', `-${randBetween(1.5, 14).toFixed(2)}s`);
        orb.style.setProperty('--fx0', '0px');
        orb.style.setProperty('--fy0', '0px');
        for (let k = 1; k <= 5; k++) {
          orb.style.setProperty(`--fx${k}`, `${(Math.random() - 0.5) * amp * 2}px`);
          orb.style.setProperty(`--fy${k}`, `${(Math.random() - 0.5) * amp * 2}px`);
        }
        orb.style.setProperty('--in-delay', `${randBetween(0, 0.5).toFixed(2)}s`);
      }

      let memoryPopoverHideTimer = null;
      let modalView = 'overview';

      function isPointOnFrame(x, y, size, frameEl, layerRect) {
        if (!frameEl) return false;
        const fr = frameEl.getBoundingClientRect();
        const half = size / 2;
        const gap = 18;
        const fx = fr.left - layerRect.left - gap;
        const fy = fr.top - layerRect.top - gap;
        const fw = fr.width + gap * 2;
        const fh = fr.height + gap * 2;
        return x + half > fx && x - half < fx + fw && y + half > fy && y - half < fy + fh;
      }

      function getRandomScatterSlots(count, layerEl, frameEl) {
        const layerRect = layerEl.getBoundingClientRect();
        const slots = [];
        const edgePad = 14;

        for (let i = 0; i < count; i++) {
          const size = randBetween(20, 46);
          const half = size / 2 + edgePad;
          let placed = false;

          for (let attempt = 0; attempt < 80 && !placed; attempt++) {
            const x = randBetween(half, Math.max(half + 1, layerRect.width - half));
            const y = randBetween(half, Math.max(half + 1, layerRect.height - half));

            if (isPointOnFrame(x, y, size, frameEl, layerRect)) continue;

            const crowded = slots.some((s) => {
              return Math.hypot(s.x - x, s.y - y) < (s.size + size) * 0.48 + randBetween(8, 22);
            });
            if (!crowded) {
              slots.push({ x, y, size });
              placed = true;
            }
          }

          if (!placed) {
            for (let attempt = 0; attempt < 80 && !placed; attempt++) {
              const x = randBetween(half, Math.max(half + 1, layerRect.width - half));
              const y = randBetween(half, Math.max(half + 1, layerRect.height - half));
              if (!isPointOnFrame(x, y, size, frameEl, layerRect)) {
                slots.push({ x, y, size });
                placed = true;
              }
            }
          }

          if (!placed) {
            slots.push({
              x: randBetween(half, Math.max(half + 1, layerRect.width * 0.22)),
              y: randBetween(half, Math.max(half + 1, layerRect.height - half)),
              size
            });
          }
        }

        return slots.map((s) => ({
          left: `${((s.x / layerRect.width) * 100).toFixed(2)}%`,
          top: `${((s.y / layerRect.height) * 100).toFixed(2)}%`,
          size: s.size
        }));
      }

      function spawnVaultOrbs(historyEntries, layerEl, frameEl) {
        if (!layerEl) return;
        layerEl.innerHTML = '';

        const entries = historyEntries.length ? historyEntries : [{ color: '#6a7a8a', word: '', date: '' }];
        const scatterSlots = getRandomScatterSlots(entries.length, layerEl, frameEl);

        entries.forEach((entry, i) => {
          const orb = document.createElement('button');
          orb.type = 'button';
          orb.className = 'vault-orb';
          const slot = scatterSlots[i] || scatterSlots[scatterSlots.length - 1];
          const size = slot.size || randBetween(22, 40);

          orb.style.setProperty('--orb-color', entry.color || '#5a6a7a');
          orb.style.width = `${size}px`;
          orb.style.height = `${size}px`;
          orb.style.left = slot.left;
          orb.style.top = slot.top;

          applyOrbFloatVars(orb);
          orb.setAttribute('aria-label', '感情の記録を見る');

          orb.addEventListener('click', (e) => {
            e.stopPropagation();
            showMemoryPopover(entry, orb);
          });

          layerEl.appendChild(orb);
        });
      }

      function showMemoryPopover(entry, anchorEl) {
        const popover = document.getElementById('memoryPopover');
        const imageModal = document.getElementById('imageModal');
        if (!popover) return;

        clearTimeout(memoryPopoverHideTimer);
        modalView = 'diary';
        if (imageModal) imageModal.classList.add('view-diary');

        const dot = popover.querySelector('.memory-popover-dot');
        const dateEl = popover.querySelector('.memory-popover-date');
        const textEl = popover.querySelector('.memory-popover-text');

        if (dot) dot.style.setProperty('--pop-color', entry.color || '#888');
        if (dateEl) dateEl.textContent = entry.date || '—';
        if (textEl) {
          textEl.textContent = entry.word && entry.word.trim()
            ? entry.word
            : '言葉の記録は、この作品完成前のデータには含まれていません。';
        }

        const rect = anchorEl.getBoundingClientRect();
        let left = rect.left + rect.width / 2;
        let top = rect.top - 12;
        const margin = 12;
        const popW = 288;
        if (left - popW / 2 < margin) left = margin + popW / 2;
        if (left + popW / 2 > window.innerWidth - margin) left = window.innerWidth - margin - popW / 2;
        if (top < margin + 80) top = rect.bottom + 16;

        popover.style.left = `${left}px`;
        popover.style.top = `${top}px`;
        popover.setAttribute('aria-hidden', 'false');
        popover.classList.add('visible');
      }

      function hideMemoryPopover() {
        const popover = document.getElementById('memoryPopover');
        if (popover) {
          popover.classList.remove('visible');
          popover.setAttribute('aria-hidden', 'true');
        }
      }

      function returnToVaultOverview() {
        const imageModal = document.getElementById('imageModal');
        hideMemoryPopover();
        modalView = 'overview';
        if (imageModal) {
          imageModal.classList.remove('view-diary');
        }
      }

      function handleModalCloseRequest() {
        if (modalView === 'diary') {
          returnToVaultOverview();
          return;
        }
        closeArtworkModal();
      }

      function layoutVaultOrbs(galleryItem, vaultOrbs, modalBody) {
        if (!galleryItem || !vaultOrbs) return;
        spawnVaultOrbs(resolveArtworkHistory(galleryItem), vaultOrbs, modalBody);
      }

      function openArtworkModal(artwork, item) {
        const imageModal = document.getElementById('imageModal');
        const modalBody = document.getElementById('modalBody');
        const vaultOrbs = document.getElementById('vaultOrbs');
        if (!imageModal || !modalBody) return;

        hideMemoryPopover();
        modalBody.innerHTML = artwork.innerHTML;
        modalBody.scrollTop = 0;

        const galleryItem = item || artwork._galleryItem;

        const modalCanvas = modalBody.querySelector('.gallery-art-canvas');
        const modalSurface = modalBody.querySelector('.art-surface');
        const modalImg = modalBody.querySelector('.gallery-art-image');
        if (modalSurface && modalImg) {
          if (modalImg.complete) {
            syncSnapshotAspect(modalSurface, modalImg);
          } else {
            modalImg.addEventListener('load', () => syncSnapshotAspect(modalSurface, modalImg), { once: true });
          }
        }
        if (galleryItem && modalCanvas && !galleryItem.artworkImageDataUrl) {
          renderRecipeToCanvas(modalCanvas, getSplatsFromItem(galleryItem), galleryItem);
        }
        const staleOverlay = modalBody.querySelector('.paper-texture-overlay');
        if (staleOverlay) staleOverlay.remove();
        const staleLogo = modalBody.querySelector('.museum-brand-logo');
        if (staleLogo) staleLogo.remove();

        const listSaveBtn = modalBody.querySelector('.save-art-btn');
        if (listSaveBtn) listSaveBtn.remove();
        const listActions = modalBody.querySelector('.modal-art-actions');
        if (listActions) listActions.remove();

        const actionsWrap = document.createElement('div');
        actionsWrap.className = 'modal-art-actions';

        actionsWrap.appendChild(createSaveButton(() => modalBody));
        modalBody.appendChild(actionsWrap);

        hideMemoryPopover();
        modalView = 'overview';

        const periodCaption = modalBody.querySelector('.art-period-caption');
        if (periodCaption && galleryItem) {
          periodCaption.textContent = computeArtworkPeriodCaption(galleryItem);
        }

        const wallDisplay = modalBody.querySelector('.museum-wall-display');

        imageModal.classList.remove('view-diary');
        imageModal.classList.add('active');
        imageModal.setAttribute('aria-hidden', 'false');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            layoutVaultOrbs(galleryItem, vaultOrbs, modalBody);
          });
        });
      }

      function closeArtworkModal() {
        const imageModal = document.getElementById('imageModal');
        const modalBody = document.getElementById('modalBody');
        const vaultOrbs = document.getElementById('vaultOrbs');
        if (!imageModal || !modalBody) return;
        hideMemoryPopover();
        modalView = 'overview';
        imageModal.classList.remove('active', 'view-diary');
        imageModal.setAttribute('aria-hidden', 'true');
        modalBody.innerHTML = '';
        if (vaultOrbs) vaultOrbs.innerHTML = '';
      }

      // 一覧に読み込んだ作品（storageRef.index -> item）を保持し、詳細/ディープリンクで参照する
      let galleryItemsById = {};

      function getDetailIdForItem(item) {
        if (item && item.storageRef && typeof item.storageRef.index === 'number') {
          return String(item.storageRef.index);
        }
        return null;
      }

      function renderGallery() {
        const galleryContainer = document.getElementById('gallery-container');
        const galleryData = loadGallery();
        galleryItemsById = {};

        if (galleryData.length === 0) {
          galleryContainer.innerHTML = '<p class="no-data">まだ額装された完成作品がありません。7日間の感情をボトルに預け、線画へ注いで完成させるとここに飾られます。</p>';
          return;
        }

        galleryContainer.innerHTML = '';
        const displayItems = galleryData.slice().reverse();
        displayItems.forEach((item) => {
          const id = getDetailIdForItem(item);
          if (id !== null) galleryItemsById[id] = item;

          // 一覧モードは「額縁のみ」（ボトル・タイトルは出さない）
          const artwork = createFramedArtwork(item, false);
          artwork.addEventListener('click', (e) => {
            if (e.target.closest('.save-art-btn')) return;
            openDetail(item);
          });
          galleryContainer.appendChild(artwork);
        });

        // 個別URL（?id=）で開かれた場合は該当作品の詳細を直接表示
        const params = new URLSearchParams(location.search);
        const requestedId = params.get('id');
        if (requestedId !== null && galleryItemsById[requestedId]) {
          openDetail(galleryItemsById[requestedId], { fromUrl: true });
        }
      }

      // ===== 詳細モード（縦スクロール単一作品） =====
      function openDetail(item, opts) {
        const detailView = document.getElementById('detail-view');
        const stage = document.getElementById('detail-stage');
        if (!detailView || !stage || !item) return;

        stage.innerHTML = '';
        stage.appendChild(createFramedArtwork(item, true));

        detailView.classList.add('active');
        detailView.setAttribute('aria-hidden', 'false');
        document.body.classList.add('detail-open');
        detailView.scrollTop = 0;

        const id = getDetailIdForItem(item);
        if (id !== null) {
          const url = `${location.pathname}?id=${encodeURIComponent(id)}`;
          if (opts && opts.fromUrl) {
            history.replaceState({ detailId: id }, '', url);
          } else {
            history.pushState({ detailId: id }, '', url);
          }
        }
      }

      function closeDetail(opts) {
        const detailView = document.getElementById('detail-view');
        if (!detailView) return;
        detailView.classList.remove('active');
        detailView.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('detail-open');
        const stage = document.getElementById('detail-stage');
        if (stage) window.setTimeout(() => { if (!detailView.classList.contains('active')) stage.innerHTML = ''; }, 520);
        if (!(opts && opts.fromPop)) {
          history.pushState({}, '', location.pathname);
        }
      }

      function isDetailOpen() {
        const detailView = document.getElementById('detail-view');
        return !!(detailView && detailView.classList.contains('active'));
      }

      function bindSavePreview() {
        const overlay = document.getElementById('savePreviewOverlay');
        const closeBtn = document.getElementById('savePreviewClose');
        const panel = overlay && overlay.querySelector('.save-preview-panel');

        if (closeBtn) {
          closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeSavePreview();
          });
        }

        if (overlay) {
          overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeSavePreview();
          });
        }

        if (panel) {
          panel.addEventListener('click', (e) => e.stopPropagation());
        }
      }

      function bindImageModal() {
        const imageModal = document.getElementById('imageModal');
        const modalCloseHint = document.getElementById('modalCloseHint');
        const memoryPopover = document.getElementById('memoryPopover');
        if (!imageModal) return;

        if (modalCloseHint) {
          modalCloseHint.addEventListener('click', (e) => {
            e.stopPropagation();
            handleModalCloseRequest();
          });
        }

        const memoryPopoverClose = document.getElementById('memoryPopoverClose');
        if (memoryPopoverClose) {
          memoryPopoverClose.addEventListener('click', (e) => {
            e.stopPropagation();
            returnToVaultOverview();
          });
        }

        imageModal.addEventListener('click', (e) => {
          if (e.target.closest('.vault-orb') || e.target.closest('.memory-popover') ||
              e.target.closest('.save-art-btn') ||
              e.target.closest('.modal-content') ||
              e.target.closest('#modalCloseHint')) {
            return;
          }
          if (e.target === imageModal || e.target.classList.contains('modal-vault') ||
              e.target.classList.contains('vault-orbs-layer') ||
              e.target.classList.contains('vault-tagline')) {
            handleModalCloseRequest();
          }
        });

        if (memoryPopover) {
          memoryPopover.addEventListener('click', (e) => e.stopPropagation());
        }

        document.addEventListener('keydown', (e) => {
          if (e.key !== 'Escape') return;
          const bottleAlbum = document.getElementById('bottleAlbumOverlay');
          if (bottleAlbum && bottleAlbum.classList.contains('active')) {
            closeBottleAlbum();
            return;
          }
          const saveOverlay = document.getElementById('savePreviewOverlay');
          if (saveOverlay && saveOverlay.classList.contains('active')) {
            closeSavePreview();
            return;
          }
          if (imageModal.classList.contains('active')) {
            handleModalCloseRequest();
            return;
          }
          if (isDetailOpen()) {
            closeDetail();
          }
        });
      }

      window.addEventListener('DOMContentLoaded', () => {
        bindSavePreview();
        bindImageModal();
        const bottleAlbumClose = document.getElementById('bottleAlbumClose');
        const bottleAlbumOverlay = document.getElementById('bottleAlbumOverlay');
        if (bottleAlbumClose) bottleAlbumClose.addEventListener('click', closeBottleAlbum);
        if (bottleAlbumOverlay) {
          bottleAlbumOverlay.addEventListener('click', (e) => {
            if (e.target === bottleAlbumOverlay) closeBottleAlbum();
          });
        }

        // 「← 回廊へ戻る」ボタンで一覧モードへ復帰
        const detailBackBtn = document.getElementById('detailBackBtn');
        if (detailBackBtn) {
          detailBackBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeDetail();
          });
        }
        // ブラウザの戻る/進むで一覧⇄詳細を同期
        window.addEventListener('popstate', () => {
          const params = new URLSearchParams(location.search);
          const requestedId = params.get('id');
          if (requestedId !== null && galleryItemsById[requestedId]) {
            openDetail(galleryItemsById[requestedId], { fromUrl: true });
          } else if (isDetailOpen()) {
            closeDetail({ fromPop: true });
          }
        });

        // アセットのロード完了を待たず、即座に LocalStorage の完成作品を描画する。
        // 布テクスチャは補助的なので裏で読み込むだけ（描画はブロックしない）。
        loadFabricImage().catch(() => {});
        renderGallery();
      });
    })();
  </script>

  <div class="modal-overlay" id="imageModal" aria-hidden="true">
    <div class="modal-vault">
      <button type="button" class="modal-close-hint" id="modalCloseHint" aria-label="閉じる">CLOSE</button>
      <div class="modal-content" id="modalBody"></div>
      <div class="vault-orbs-layer" id="vaultOrbs" aria-hidden="true"></div>
      <p class="vault-tagline">どんな感情もあなたが生きた証</p>
    </div>
  </div>
  <div class="memory-popover" id="memoryPopover" role="dialog" aria-hidden="true">
    <div class="memory-popover-dot"></div>
    <p class="memory-popover-date"></p>
    <p class="memory-popover-text"></p>
    <button type="button" class="memory-popover-close" id="memoryPopoverClose">閉じる</button>
  </div>
  <div class="save-preview-overlay" id="savePreviewOverlay" aria-hidden="true" role="dialog" aria-label="写真への保存">
    <div class="save-preview-panel">
      <button type="button" class="save-preview-close" id="savePreviewClose" aria-label="閉じる">✕</button>
      <p class="save-preview-hint">画像を長押しして<br>「写真に追加」または「画像を保存」を選択してください</p>
      <div class="save-preview-image-wrap">
        <img id="savePreviewImage" alt="INSCAPE — 額装作品" draggable="false">
      </div>
    </div>
  </div>

  <div class="bottle-album-overlay" id="bottleAlbumOverlay" aria-hidden="true" role="dialog" aria-label="一週間の記憶">
    <div class="bottle-album-panel" id="bottleAlbumPanel">
      <p class="bottle-album-title">一週間の記憶</p>
      <p class="bottle-album-sub">ボトルに閉じ込められた、7日分の感情</p>
      <div id="bottleAlbumDays"></div>
      <button type="button" class="bottle-album-close" id="bottleAlbumClose">閉じる</button>
    </div>
  </div>
</body>
</html>
